<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>SigaJuncal · Gestão de Farmácia</title>

<!-- PWA / Samsung Internet & Mobile WebAPKs — permite adicionar a app ao ecrã
     principal (Android/iOS) ou ambiente de trabalho (PC) em modo standalone
     limpo, sem a barra de endereço do browser. Os ícones (icon-192.png e
     icon-512.png) e o manifest.json vivem na raiz do repositório, ao lado
     deste index.html. -->
<link rel="manifest" href="./manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SigaJuncal">
<meta name="application-name" content="SigaJuncal">
<meta name="theme-color" content="#0ea5e9">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="./icon-512.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<link rel="shortcut icon" type="image/png" href="./icon-512.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root{
    --pharm-50:#f0f7fb; --pharm-100:#dcedf5; --pharm-200:#b9dbeb; --pharm-300:#8cc3dc;
    --pharm-400:#57a4c8; --pharm-500:#3688b0; --pharm-600:#256f95; --pharm-700:#1f5a7a;
    --pharm-800:#1c4a63; --pharm-900:#193d52; --pharm-950:#0d2530;
    --blue:#2563eb; --blue-bg:#eff6ff; --blue-bd:#bfdbfe;
    --orange:#ea580c; --orange-bg:#fff7ed; --orange-bd:#fed7aa;
    --green:#059669; --green-bg:#ecfdf5; --green-bd:#a7f3d0;
    --red:#dc2626; --red-bg:#fef2f2; --red-bd:#fecaca;
    --amber:#b45309;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--pharm-50); color:var(--pharm-950);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--pharm-200);border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  @keyframes fadeSlide{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .animate-in{animation:fadeSlide .25s ease-out;}
  button{font-family:inherit;}
  h1,h2,h3,p{margin:0;}

  .app-shell{display:flex;min-height:100vh;}

  /* Sidebar (desktop) */
  .sidebar-desktop{width:260px;flex-shrink:0;background:#fff;border-right:1px solid var(--pharm-200);
    height:100vh;position:fixed;top:0;left:0;display:none;flex-direction:column;padding:20px 0;
    overflow-y:auto;z-index:30;}
  @media (min-width:1024px){.sidebar-desktop{display:flex;}}

  .sidebar-mobile-overlay{position:fixed;inset:0;z-index:40;display:flex;}
  .sidebar-mobile-panel{width:280px;max-width:82vw;background:#fff;height:100%;
    box-shadow:0 10px 30px rgba(0,0,0,.18);border-right:1px solid var(--pharm-200);display:flex;flex-direction:column;padding:20px 0;overflow-y:auto;}
  .sidebar-mobile-backdrop{flex:1;background:rgba(13,37,48,.35);}

  .sidebar-brand-logo{position:relative;display:flex;align-items:center;justify-content:center;
    padding:22px 44px 18px;border-bottom:1px solid var(--pharm-100);margin-bottom:6px;}
  .sidebar-logo-img{max-width:172px;width:100%;height:auto;object-fit:contain;}
  .sidebar-badge-slot{padding:0 16px 18px;}
  .active-user-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;
    padding:16px 12px;
    background:var(--pharm-50);border:1px solid var(--pharm-200);border-radius:12px;
    width:100%;font-family:inherit;cursor:pointer;
    box-shadow:0 4px 12px rgba(37,111,149,.15);
    transition:background-color .15s ease,border-color .15s ease,box-shadow .15s ease;}
  /* Cartão-invólucro: agrupa o badge do utilizador + (só p/ Administrador)
     o botão de Modo de Teste — sem margens próprias, já herda o
     espaçamento do .sidebar-badge-slot à volta. */
  .active-user-card .active-user-badge{margin-bottom:8px;}
  .active-user-badge:hover{background:#fef2f2;border-color:#fecaca;box-shadow:0 6px 16px rgba(220,38,38,.18);}
  .active-user-badge:hover .active-user-icon{color:var(--red);}
  .active-user-badge.inactive{background:#f59e0b;border-color:#f59e0b;box-shadow:0 4px 12px rgba(245,158,11,.38);}
  .active-user-badge.inactive .active-user-icon{color:#451a03;}
  .active-user-badge.inactive:hover{background:#d97706;border-color:#d97706;box-shadow:0 6px 16px rgba(180,83,9,.45);}
  .active-user-badge.inactive:hover .active-user-icon{color:#451a03;}
  .active-user-icon{width:auto;height:auto;background:transparent;color:var(--pharm-600);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .active-user-name{font-size:14px;font-weight:800;color:var(--pharm-900);line-height:1.25;
    white-space:normal;max-width:none;overflow:visible;text-overflow:clip;}
  .active-user-role{font-size:11px;font-weight:700;color:var(--pharm-500);text-transform:uppercase;
    letter-spacing:.04em;margin-top:1px;}
  .active-user-perfil{display:inline-block;font-size:9px;font-weight:800;color:#7c3aed;
    background:#f5f3ff;border:1px solid #ddd6fe;text-transform:uppercase;letter-spacing:.05em;
    margin-top:5px;padding:2px 7px;border-radius:6px;}
  .active-user-badge.inactive .active-user-name{color:#451a03;}
  .active-user-badge.inactive .active-user-role{color:#78350f;}
  .close-btn{background:none;border:none;color:var(--pharm-400);cursor:pointer;padding:4px;
    display:flex;align-items:center;justify-content:center;}
  .close-btn-abs{position:absolute;top:14px;right:14px;}
  .close-btn:hover{color:var(--pharm-700);}

  .nav{flex:1;padding:0 12px;display:flex;flex-direction:column;gap:4px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;
    font-weight:600;font-size:14px;color:var(--pharm-700);cursor:pointer;border:1px solid var(--pharm-200);background:transparent;
    width:92%;max-width:280px;margin-left:4px;margin-right:auto;text-align:left;justify-content:flex-start;
    transition:.12s;position:relative;box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .nav-item + .nav-item{margin-top:8px;}
  .nav-item:hover{background:var(--pharm-50);border-color:var(--pharm-300);}
  .nav-item.active{background:var(--pharm-600);border-color:var(--pharm-600);color:#fff;font-weight:800;
    box-shadow:0 2px 8px rgba(37,111,149,.3);}
  .nav-item.active:hover{background:var(--pharm-700);}
  .nav-item.active .nav-icon{color:#fff;}
  .nav-item-home{position:relative;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    background:var(--pharm-800);border-color:var(--pharm-800);color:#fff;font-weight:800;
    padding:13px 12px;box-shadow:0 4px 12px rgba(28,74,99,.35);}
  .nav-item-home .nav-icon{color:#fff;}
  .nav-item-home:hover{background:var(--pharm-900);border-color:var(--pharm-900);
    box-shadow:0 6px 16px rgba(28,74,99,.42);}
  .nav-item-home.active{background:var(--pharm-950);border-color:var(--pharm-950);}
  .nav-item-home.active .nav-icon{color:#fff;}
  .nav-item-home.active:hover{background:#081820;}
  .nav-item-chat{position:relative;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    background:var(--pharm-600);border-color:var(--pharm-600);color:#fff;font-weight:800;
    padding:13px 12px;box-shadow:0 4px 12px rgba(37,111,149,.32);}
  .nav-item-chat .nav-icon{color:#fff;}
  .nav-item-chat:hover{background:var(--pharm-700);border-color:var(--pharm-700);
    box-shadow:0 6px 16px rgba(37,111,149,.4);}
  .nav-item-chat.active{background:var(--pharm-800);border-color:var(--pharm-800);}
  .nav-item-chat.active:hover{background:var(--pharm-900);}
  .nav-badge{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;padding:0 5px;border-radius:999px;
    background:#f43f5e;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;
    line-height:1;box-shadow:0 0 0 2px #fff;animation:navBadgePulse 1.6s ease-in-out infinite;}
  @keyframes navBadgePulse{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}
  /* Presença de utilizadores online */
  .presenca-online-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
    color:#059669;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:999px;padding:5px 12px;}
  .presenca-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;
    animation:presencaDotPulse 1.8s ease-in-out infinite;}
  @keyframes presencaDotPulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .presenca-online-nomes{font-weight:500;font-size:11px;color:#0d9668;opacity:.85;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  /* Chat Interno */
  .chat-page-wrap{display:flex;flex-direction:column;}
  .chat-messages{display:flex;flex-direction:column;gap:14px;padding:6px 4px 16px;max-height:56vh;min-height:280px;overflow-y:auto;}
  .chat-msg-row{display:flex;flex-direction:column;max-width:72%;}
  .chat-msg-row.own{align-self:flex-end;align-items:flex-end;}
  .chat-msg-row.other{align-self:flex-start;align-items:flex-start;}
  .chat-msg-name{font-size:11px;font-weight:700;color:var(--pharm-500);margin:0 0 3px;padding:0 4px;}
  .chat-bubble-wrap{position:relative;display:flex;align-items:center;gap:6px;}
  .chat-bubble{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.4;white-space:pre-wrap;word-break:break-word;}
  .chat-msg-row.own .chat-bubble{background:var(--pharm-600);color:#fff;border-bottom-right-radius:4px;}
  .chat-msg-row.other .chat-bubble{background:var(--pharm-100);color:var(--pharm-900);border-bottom-left-radius:4px;}
  .chat-msg-time{font-size:10px;color:var(--pharm-400);margin:3px 4px 0;}
  .chat-msg-actions{display:none;gap:4px;}
  .chat-msg-row.own:hover .chat-msg-actions{display:flex;}
  .chat-emoji-row{display:flex;gap:4px;margin:10px 0 8px;flex-wrap:wrap;}
  .chat-emoji-btn{font-size:17px;background:#fff;border:1px solid var(--pharm-200);border-radius:8px;padding:3px 9px;cursor:pointer;line-height:1.4;}
  .chat-emoji-btn:hover{background:var(--pharm-50);}
  .chat-input-row{display:flex;gap:8px;align-items:center;padding-top:10px;border-top:1px solid var(--pharm-100);}
  .chat-input-row .input{flex:1;}
  /* Bloco de Notas rápido */
  .nota-rapida-card{margin-top:18px;background:#fffdf3;border:1px solid #fde68a;}
  .nota-rapida-header{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:800;
    color:var(--pharm-800);margin-bottom:10px;}
  .nota-rapida-status{margin-left:auto;font-size:11px;font-weight:600;color:var(--pharm-400);
    text-transform:none;letter-spacing:0;}
  .nota-rapida-textarea{width:100%;min-height:220px;resize:vertical;border:1px solid var(--pharm-200);
    border-radius:10px;padding:10px 12px;font-family:inherit;font-size:13.5px;line-height:1.5;
    color:var(--pharm-900);background:#fff;}
  .nota-rapida-textarea:disabled,.nota-rapida-textarea:read-only{opacity:.6;background:var(--pharm-50);}

  /* Documentos — linha de produto discriminado */
  .doc-item-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px;}
  .doc-item-row .doc-item-nome{width:320px;max-width:100%;}
  .doc-item-row .doc-item-preco{width:112px;max-width:100%;}
  @media (max-width:640px){.doc-item-row .doc-item-nome,.doc-item-row .doc-item-preco{width:100%;}}
  .doc-medidas-row{display:flex;gap:16px;flex-wrap:wrap;}
  .doc-medida-field{width:160px;max-width:100%;}
  /* Larguras compactas para os campos dos formulários de Documentos —
     equivalentes aos utilitários Tailwind pedidos (max-w-md, w-40, etc). */
  .doc-fields-row{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;}
  .doc-w-md{max-width:448px;}
  .doc-w-xs{max-width:320px;}
  .doc-w-40{max-width:160px;}
  .doc-w-80{max-width:320px;}
  .doc-w-28{max-width:112px;}
  .doc-w-32{max-width:128px;}
  .doc-w-36{max-width:144px;}
  .doc-fields-row .field{flex:1 1 auto;min-width:0;}
  .pagamento-toggle-btn{flex:1;padding:12px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;
    font-size:15px;font-weight:800;letter-spacing:.03em;cursor:pointer;transition:.15s;color:#64748b;}
  .pagamento-toggle-btn:hover{border-color:#cbd5e1;}
  .pagamento-toggle-btn.tone-green.ativo{background:#dcfce7;border-color:#16a34a;color:#15803d;}
  .pagamento-toggle-btn.tone-red.ativo{background:#fee2e2;border-color:#dc2626;color:#b91c1c;}

  /* Modo de Teste do Administrador — pausa o auto-bloqueio por 10 min */
  .modo-teste-overlay{display:none;position:fixed;inset:0;pointer-events:none;z-index:9999;}
  .modo-teste-overlay.ativo{display:block;box-shadow:inset 0 0 0 6px #ef4444;
    animation:modoTestePulse 1.4s ease-in-out infinite;}
  @keyframes modoTestePulse{
    0%,100%{box-shadow:inset 0 0 0 6px rgba(239,68,68,.95);}
    50%{box-shadow:inset 0 0 0 6px rgba(239,68,68,.3);}
  }
  .modo-teste-btn{width:100%;margin-top:8px;padding:8px 8px;border-radius:8px;
    border:1px solid #fecdd3;background:#fff1f2;color:#be123c;font-weight:600;font-size:11px;
    cursor:pointer;text-align:center;transition:.15s;box-sizing:border-box;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .modo-teste-btn-icon{font-size:16px;line-height:1;}
  .modo-teste-btn-text{line-height:1.35;}
  .modo-teste-btn-sub{display:block;font-size:10px;font-weight:400;opacity:.8;margin-top:1px;}
  .modo-teste-btn:hover{background:#ffe4e6;}
  .modo-teste-btn.ativo{background:#e11d48;border-color:#be123c;color:#fff;font-weight:700;
    animation:modoTesteBtnPulse 1.4s ease-in-out infinite;}
  @keyframes modoTesteBtnPulse{0%,100%{opacity:1;}50%{opacity:.75;}}

  /* Documentos — folha A4 e impressão/PDF */
  .doc-print-area{display:none;}
  .doc-a4{width:210mm;min-height:297mm;height:auto;box-sizing:border-box;
    padding:20mm 25mm 15mm;display:flex;flex-direction:column;justify-content:space-between;
    font-family:Arial,Helvetica,sans-serif;color:#0f172a;background:#fff;
    page-break-inside:avoid;break-inside:avoid;page-break-after:avoid;page-break-before:avoid;}
  .doc-topo-meta{font-size:8px;color:#aaaaaa;letter-spacing:.02em;
    margin:0 0 8px;text-align:right;}
  .doc-conteudo{flex:0 0 auto;}
  .doc-header{display:flex;justify-content:space-between;align-items:flex-start;
    border-bottom:2px solid #0f172a;padding-bottom:16px;margin-bottom:30px;}
  .doc-header-info p{margin:1px 0;font-size:11px;line-height:1.5;color:#0f172a;}
  .doc-header-info .doc-header-nome{font-size:14px;font-weight:700;color:#0f172a;margin-bottom:3px;}
  .doc-header-logo{height:72px;width:auto;object-fit:contain;}
  .doc-title{text-align:center;font-size:20px;font-weight:700;letter-spacing:.08em;
    margin:0 0 38px;text-transform:uppercase;color:#0f172a;}
  .doc-body-text{font-size:13.5px;line-height:2.05;text-align:justify;margin:18px 0 28px;color:#0f172a;}
  .doc-table{width:100%;border-collapse:collapse;margin:0 0 26px;font-size:12.5px;color:#0f172a;}
  .doc-table th,.doc-table td{border:1px solid #64748b;padding:7px 10px;text-align:left;color:#0f172a;}
  .doc-table th{background:#f1f5f9;font-weight:700;}
  .doc-table-total td{font-weight:800;background:#f1f5f9;}
  /* Estado de Pagamento em destaque no Formulário de Entrega impresso —
     caixa autónoma (não é uma linha de tabela) desenhada para nunca depender
     de cor de fundo: impressoras a laser/toner a preto e branco muitas vezes
     ignoram o "print background" do browser, o que apaga qualquer destaque
     baseado só em cor. Aqui o contraste vem inteiramente de borda preta
     grossa, texto em maiúsculas e peso 800, e do símbolo [ ✓ ]/[ ⚠ ]. */
  .doc-pagamento-box{display:flex;align-items:center;gap:12px;border:2px solid #000;
    padding:12px 16px;margin:0 0 26px;font-weight:800;font-size:14pt;line-height:1.3;
    text-transform:uppercase;letter-spacing:.02em;color:#000;background:#fff;}
  .doc-pagamento-symbol{font-size:16pt;line-height:1;flex-shrink:0;}
  .doc-pagamento-box.doc-pagamento-ok{border-width:2px;}
  .doc-pagamento-box.doc-pagamento-alerta{border:3px dashed #000;font-size:16pt;padding:14px 18px;}
  .doc-rodape{flex:0 0 auto;}
  .doc-date-line{margin:0 0 42px;font-size:13px;color:#0f172a;}
  .doc-signature-block{margin-top:8px;}
  .doc-signature-line{border-top:1px solid #0f172a;width:280px;margin:48px 0 6px;}
  .doc-signature-name{font-size:13px;font-weight:700;margin:0;color:#0f172a;}
  .doc-declaracao-legal{font-size:9.5px;line-height:1.5;color:#334155;margin:12px 0 0;
    max-width:420px;text-align:justify;font-style:italic;}
  .doc-stamp-box{width:260px;height:120px;border:1.5px dashed #64748b;margin-top:22px;
    display:flex;align-items:center;justify-content:center;font-size:10px;color:#64748b;
    text-transform:uppercase;letter-spacing:.06em;}
  @media print{
    @page{size:A4 portrait;margin:0 !important;} /* Elimina soma de alturas no motor de impressão */
    html,body{
      width:210mm !important;height:297mm !important;
      margin:0 !important;padding:0 !important;overflow:hidden !important;background:#fff !important;
      -webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;
    }
    body *{visibility:hidden !important;}
    .doc-print-area,.doc-print-area *{visibility:visible !important;}
    .doc-print-area{display:block !important;position:absolute !important;left:0 !important;top:0 !important;
      width:210mm !important;height:297mm !important;margin:0 !important;padding:0 !important;overflow:hidden !important;}
    .doc-a4{width:210mm !important;height:297mm !important;max-height:297mm !important;min-height:0 !important;
      box-sizing:border-box !important;box-shadow:none !important;margin:0 !important;
      padding:15mm 18mm !important; /* Margens reais no interior da folha */
      display:flex !important;flex-direction:column !important;justify-content:space-between !important;
      page-break-after:avoid !important;break-after:avoid !important;
      page-break-before:avoid !important;break-before:avoid !important;
      page-break-inside:avoid !important;break-inside:avoid !important;
      overflow:hidden !important;}
    .doc-a4 *:last-child{margin-bottom:0 !important;padding-bottom:0 !important;}
  }
  .nota-rapida-textarea:focus{outline:none;border-color:var(--pharm-400);}
  /* Itens da sidebar sem acesso (perfis restritos: Estafeta, Prestador de
     Serviço) — visivelmente cinzentos/desativados, nunca clicáveis, para
     destacar de forma inequívoca qual é o único botão ativo. */
  .nav-item.nav-item-disabled,
  .nav-item:disabled{
    background:var(--pharm-50); border-color:var(--pharm-100); color:var(--pharm-300);
    opacity:.6; cursor:not-allowed; pointer-events:none; box-shadow:none; font-weight:600;
  }
  .nav-item.nav-item-disabled .nav-icon,
  .nav-item:disabled .nav-icon{ color:var(--pharm-300); }
  .nav-item.nav-item-disabled:hover,
  .nav-item:disabled:hover{ background:var(--pharm-50); border-color:var(--pharm-100); }
  .nav-item-definicoes{background:#e5e7eb;border-color:#d1d5db;color:var(--pharm-800);}
  .nav-item-definicoes:hover{background:#d1d5db;}
  .nav-item-definicoes.active{background:#d1d5db;border-color:#9ca3af;color:var(--pharm-900);}
  .nav-item-definicoes .nav-icon{color:var(--pharm-700);}
  .nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .nav-divider{height:1px;background:var(--pharm-100);margin:10px 6px;}
  .nav-section-title{font-size:10.5px;font-weight:800;text-transform:uppercase;color:var(--pharm-500);
    letter-spacing:.07em;padding:2px 12px 6px;}

  .sidebar-footer{padding:16px 20px 4px;margin-top:12px;border-top:1px solid var(--pharm-100);}
  .sidebar-footer p{font-size:11px;color:var(--pharm-400);line-height:1.5;}

  /* Topbar mobile */
  .topbar-mobile{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;
    background:#fff;border-bottom:1px solid var(--pharm-200);position:sticky;top:0;z-index:30;}
  @media (min-width:1024px){.topbar-mobile{display:none;}}
  .hamburger{background:none;border:none;padding:6px;border-radius:8px;cursor:pointer;color:var(--pharm-800);
    display:flex;align-items:center;justify-content:center;}
  .hamburger:hover{background:var(--pharm-50);}
  .topbar-title{display:flex;align-items:center;gap:6px;font-weight:800;color:var(--pharm-800);font-size:14px;}

  .main{flex:1;min-width:0;}
  @media (min-width:1024px){.main{margin-left:260px;}}
  .page-container{max-width:none;padding:22px 16px 120px;}
  @media (min-width:640px){.page-container{padding:30px 24px 128px;}}
  @media (min-width:1024px){.page-container{padding:34px 40px 136px;}}
  @media (min-width:1440px){.page-container{padding:34px 56px 136px;}}

  /* Page header */
  .page-header{display:flex;flex-direction:column;gap:14px;margin-bottom:22px;}
  @media (min-width:640px){.page-header{flex-direction:row;align-items:flex-end;justify-content:space-between;}}
  .page-eyebrow{display:flex;align-items:center;gap:7px;color:var(--pharm-500);font-size:12px;font-weight:700;
    text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
  .page-title{font-size:25px;font-weight:800;color:var(--pharm-900);letter-spacing:-.01em;}
  .page-subtitle{color:var(--pharm-500);font-size:13.5px;margin-top:4px;}

  /* Botão Voltar contextual — círculo minimalista com seta, sempre 44px de
     alvo de toque (mobile e desktop), sem texto por extenso. */
  .page-header-wrap{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
  .page-header-wrap .page-header{flex:1;min-width:0;margin-bottom:0;}
  .back-btn{display:inline-flex;align-items:center;justify-content:center;color:var(--pharm-600);
    background:var(--pharm-50);border:1px solid var(--pharm-100);width:44px;height:44px;min-width:44px;
    border-radius:50%;cursor:pointer;font-family:inherit;appearance:none;-webkit-appearance:none;
    flex-shrink:0;padding:0;transition:background .15s ease,color .15s ease;}
  .back-btn:hover{color:#fff;background:var(--pharm-600);}
  .back-btn-label{display:none;}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;font-weight:700;
    font-size:13.5px;border:1px solid transparent;cursor:pointer;transition:.15s;white-space:nowrap;}
  .btn-primary{background:#059669;color:#fff;font-weight:700;box-shadow:0 1px 2px rgba(0,0,0,.06);transition:background-color .15s ease;}
  .btn-primary:hover{background:#047857;}
  .btn-primary:disabled{background:#9ca3af;cursor:not-allowed;box-shadow:none;}
  .btn-fab{display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;
    border-radius:50%;background:#059669;color:#fff;border:none;cursor:pointer;padding:0;flex-shrink:0;
    box-shadow:0 3px 10px rgba(5,150,105,.4);appearance:none;-webkit-appearance:none;
    transition:background-color .15s ease,transform .15s ease,box-shadow .15s ease;}
  .btn-fab:hover{background:#047857;transform:scale(1.07);box-shadow:0 5px 14px rgba(5,150,105,.5);}
  .btn-fab:active{transform:scale(0.96);}
  .btn-fab.tone-blue{background:var(--blue);box-shadow:0 3px 10px rgba(37,99,235,.4);}
  .btn-fab.tone-blue:hover{background:#1d4ed8;box-shadow:0 5px 14px rgba(37,99,235,.5);}
  .btn-fab.tone-red{background:var(--red);box-shadow:0 3px 10px rgba(220,38,38,.4);}
  .btn-fab.tone-red:hover{background:#b91c1c;box-shadow:0 5px 14px rgba(220,38,38,.5);}
  .btn-fab.tone-green{background:#16a34a;box-shadow:0 3px 10px rgba(22,163,74,.4);}
  .btn-fab.tone-green:hover{background:#15803d;box-shadow:0 5px 14px rgba(22,163,74,.5);}
  .btn-fab:disabled{background:#cbd5e1 !important;box-shadow:none !important;cursor:not-allowed;transform:none !important;}
  .bottom-action-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:16px;
    justify-content:center;align-items:center;background:#fff;border:1px solid var(--pharm-200);padding:12px 18px;
    border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.16);z-index:60;}
  @media (min-width:1024px){.bottom-action-bar{left:calc(50% + 130px);}}
  .selectable-row{transition:background-color .1s ease;}
  .checkbox-cell{width:36px;text-align:center;}
  .pedidos-table th, .pedidos-table td{text-align:center;}
  .pedidos-table thead th{position:sticky;top:0;z-index:5;background:var(--pharm-50);
    box-shadow:0 1px 0 var(--pharm-200);}
  .pedidos-table th:nth-child(2), .pedidos-table td:nth-child(2){text-align:left;}
  .estado-badge-clicavel{cursor:pointer;}
  .row-checkbox{width:17px;height:17px;cursor:pointer;accent-color:var(--pharm-600);}
  .selectable-row.row-selected{background:var(--pharm-100) !important;}
  .selectable-row.row-selected td{background:transparent;}
  .btn-fab-sm{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;
    border-radius:50%;background:var(--red);color:#fff;border:none;cursor:pointer;padding:0;flex-shrink:0;
    box-shadow:0 2px 6px rgba(220,38,38,.35);appearance:none;-webkit-appearance:none;
    transition:background-color .15s ease,transform .15s ease,box-shadow .15s ease;}
  .btn-fab-sm:hover{background:#b91c1c;transform:scale(1.08);box-shadow:0 3px 9px rgba(220,38,38,.45);}
  .btn-fab-sm:active{transform:scale(0.95);}
  .btn-fab-sm.tone-blue{background:var(--blue);box-shadow:0 2px 6px rgba(37,99,235,.35);}
  .btn-fab-sm.tone-blue:hover{background:#1d4ed8;box-shadow:0 3px 9px rgba(37,99,235,.45);}
  .btn-fab-sm.tone-green{background:#16a34a;box-shadow:0 2px 6px rgba(22,163,74,.35);}
  .btn-fab-sm.tone-green:hover{background:#15803d;box-shadow:0 3px 9px rgba(22,163,74,.45);}
  .btn-fab-sm.tone-gray{background:var(--pharm-400);box-shadow:0 2px 6px rgba(0,0,0,.15);}
  .btn-fab-sm.tone-gray:hover{background:var(--pharm-600);}
  .btn-fab-sm.tone-orange{background:var(--orange);box-shadow:0 2px 6px rgba(234,88,12,.35);}
  .btn-fab-sm.tone-orange:hover{background:#c2410c;}
  .inline-input{min-width:120px;}
  .aviso-toggle{cursor:pointer;background:none;border:none;padding:2px;border-radius:6px;}
  .inline-estado{font-size:12px;padding:5px 8px;min-width:0;}
  .rota-tag{display:inline-flex;align-items:center;justify-content:center;}
  .rota-tag.rota-inativa{color:var(--pharm-300);}
  .rota-tag.rota-ativa{color:var(--pharm-600);}
  .rota-toggle{cursor:pointer;background:none;border:none;padding:2px;border-radius:6px;}
  .aviso-toggle:hover{background:var(--pharm-100);}
  .badge-cotacao{display:inline-block;font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:20px;
    white-space:nowrap;text-transform:uppercase;letter-spacing:.02em;}
  .badge-cotacao.tone-gray{background:var(--pharm-100);color:var(--pharm-500);}
  .badge-cotacao.tone-orange{background:#ffedd5;color:#c2410c;}
  .badge-cotacao.tone-green{background:#dcfce7;color:#15803d;}
  .orcamento-linha{padding:14px 0;border-top:1px solid var(--pharm-100);}
  .orcamento-linha:first-of-type{border-top:none;padding-top:4px;}
  .orcamentos-panel-bloqueado{opacity:.6;}
  .orcamentos-panel-bloqueado .orcamento-linha{pointer-events:none;}
  .orcamento-linha-grid{display:grid;grid-template-columns:1fr;gap:8px;align-items:center;}
  @media (min-width:760px){.orcamento-linha-grid{grid-template-columns:auto 1.3fr 0.9fr 0.9fr 1.3fr auto;gap:10px;}}
  .orcamento-checkbox-wrap{display:flex;align-items:center;justify-content:center;padding:0;margin:0;cursor:pointer;}
  .orcamento-checkbox-wrap input{width:17px;height:17px;accent-color:var(--pharm-600);cursor:pointer;}
  .orcamento-nome-combo{min-width:0;}
  .orcamento-linha-aprovada{background:#f0fdf4;border-radius:12px;padding-left:12px;padding-right:12px;
    margin:0 -12px;}
  .orcamento-aprovado-btn{background:#16a34a !important;color:#fff !important;border-color:#16a34a !important;}
  .orcamento-fornecedor-fixo{font-size:13.5px;font-weight:700;color:var(--pharm-800);margin:0;
    padding:9px 2px;}
  .orcamento-prazo-wrap{display:flex;align-items:center;gap:6px;}
  .orcamento-prazo-wrap .input{flex:1;min-width:0;}
  .orcamento-prazo-sufixo{font-size:12px;font-weight:600;color:var(--pharm-500);white-space:nowrap;}
  .form-delete-btn{width:38px;height:38px;margin-left:auto;}
  .row-actions{display:inline-flex;align-items:center;gap:10px;justify-content:flex-end;}
  .row-actions .btn-link.edit{margin-right:0;}
  .btn-secondary{background:var(--pharm-50);color:var(--pharm-700);border-color:var(--pharm-200);}
  .btn-secondary:hover{background:var(--pharm-100);}
  .btn-secondary:disabled{background:#f1f5f9;color:#94a3b8;border-color:#e2e8f0;cursor:not-allowed;}
  .btn-secondary:disabled:hover{background:#f1f5f9;}
  .btn-link{background:none;border:none;font-weight:700;font-size:12.5px;cursor:pointer;padding:0;}
  .btn-link.edit{color:var(--pharm-600);margin-right:14px;}
  .btn-link.edit:hover{color:var(--pharm-800);text-decoration:underline;}
  .btn-link.del{color:var(--red);}
  .btn-link.del:hover{color:#b91c1c;text-decoration:underline;}
  .btn-link.correct{color:#16a34a;display:inline-flex;align-items:center;gap:4px;font-family:inherit;}
  .btn-link.correct:hover{color:#15803d;text-decoration:underline;}
  .btn-link.revert-link{color:#c2410c;display:inline-flex;align-items:center;gap:4px;font-family:inherit;}
  .btn-link.revert-link:hover{color:#9a3412;text-decoration:underline;}

  /* Cards */
  .card{background:#fff;border:1px solid var(--pharm-200);border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .card-pad{padding:20px;}
  .card-dashed{border:1px dashed var(--pharm-200);border-radius:16px;padding:44px 20px;text-align:center;
    color:var(--pharm-400);font-size:14px;background:#fff;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .card-dashed .empty-icon{color:var(--pharm-300);}

  /* Forms */
  /* Grelha responsiva de 6 colunas em ecrãs pequenos e 12 em ecrãs ≥640px —
     permite campos curtos (datas, horas, PVP, quantidades) e médios
     (contacto, localidade, estado) ficarem lado a lado em vez de ocupar
     sempre a largura toda. Campos sem "size" definido mantêm o
     comportamento anterior (metade da linha; span2 continua a ser 100%). */
  .form-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:16px 14px;}
  @media (min-width:640px){.form-grid{grid-template-columns:repeat(12,1fr);}}
  .field{grid-column:span 6;} /* default: 100% no telemóvel, 50% (2 por linha) a partir de 640px */
  @media (min-width:640px){.field{grid-column:span 6;}}
  .span2{grid-column:1/-1;}
  /* Campos curtos — datas, horas, PVP/valores, nº cliente, quantidades/troco:
     2 por linha no telemóvel, 4 por linha a partir de 640px. */
  .field-xs{grid-column:span 3;}
  @media (min-width:640px){.field-xs{grid-column:span 3;}}
  /* Campos médios — contacto, localidade, estafeta/responsável, estados:
     2 por linha no telemóvel, 3 por linha a partir de 640px. */
  .field-sm{grid-column:span 3;}
  @media (min-width:640px){.field-sm{grid-column:span 4;}}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--pharm-600);margin-bottom:5px;}
  .field-helper-text{font-size:11.5px;color:var(--pharm-500);margin-top:5px;font-weight:600;}
  .backup-status{font-size:12.5px;font-weight:700;margin-top:12px;}
  .input,.select,.textarea{width:100%;border:1px solid var(--pharm-200);background:#fff;border-radius:10px;
    padding:9px 12px;font-size:14px;color:var(--pharm-950);font-family:inherit;}
  .textarea{resize:vertical;min-height:56px;}
  .input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--pharm-400);
    box-shadow:0 0 0 3px rgba(54,136,176,.15);}
  .checkbox-field{display:flex;align-items:center;gap:8px;padding-top:23px;cursor:pointer;user-select:none;
    grid-column:span 6;white-space:nowrap;}
  .checkbox-field input{width:16px;height:16px;accent-color:var(--pharm-600);cursor:pointer;flex-shrink:0;}
  .checkbox-field span{font-size:13.5px;font-weight:600;color:var(--pharm-800);white-space:nowrap;}
  /* Formações — seletor de participantes em tags/checkboxes */
  .participante-tags{display:flex;flex-wrap:wrap;gap:8px;}
  .participante-tag{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:999px;
    border:1px solid var(--pharm-200);background:var(--pharm-50);font-size:12.5px;font-weight:600;color:var(--pharm-700);
    cursor:pointer;user-select:none;transition:.12s;}
  .participante-tag span{color:inherit;}
  .participante-tag:hover{background:var(--pharm-100);border-color:var(--pharm-300);}
  .participante-tag input{width:14px;height:14px;accent-color:var(--pharm-600);cursor:pointer;}
  .participante-tag.participante-tag-ativo{background:var(--pharm-600);border-color:var(--pharm-600);color:#fff;}
  .participante-tag.participante-tag-ativo span{color:#fff;}
  .participante-tag.participante-tag-ativo input{accent-color:#fff;}
  .participante-tag.participante-tag-ativo:hover{background:var(--pharm-700);border-color:var(--pharm-700);}
  .form-actions{display:flex;align-items:center;gap:10px;margin-top:20px;flex-wrap:wrap;}
  .btn-revert{display:inline-flex;align-items:center;gap:6px;background:#fff7ed;color:#c2410c;
    border:1px solid #fed7aa;padding:10px 16px;border-radius:10px;font-weight:700;font-size:13.5px;
    cursor:pointer;font-family:inherit;transition:background .15s ease,border-color .15s ease;}
  .btn-revert:hover{background:#ffedd5;border-color:#fdba74;}
  .btn-text-danger{background:none;border:none;color:var(--red);font-size:12px;font-weight:700;
    cursor:pointer;padding:8px 4px;margin-left:auto;font-family:inherit;opacity:.75;}
  .btn-text-danger:hover{opacity:1;text-decoration:underline;}
  .form-error{margin-top:14px;padding:9px 12px;background:#fef2f2;border:1px solid #fecaca;
    color:#b91c1c;font-size:12.5px;font-weight:600;border-radius:8px;}
  .readonly-notice{margin-top:14px;padding:9px 12px;background:var(--pharm-50);border:1px solid var(--pharm-200);
    color:var(--pharm-600);font-size:12px;font-weight:600;border-radius:8px;}

  /* Ações e Eventos */
  .evento-row{display:flex;align-items:center;gap:13px;padding:14px 18px;border-top:1px solid var(--pharm-100);
    cursor:pointer;transition:background .12s ease;}
  .evento-row:first-child{border-top:none;}
  .evento-row:hover{background:var(--pharm-50);}
  .evento-row-icon{color:var(--pharm-500);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .evento-row-main{flex:1;min-width:0;}
  .evento-row-title{font-size:13.5px;font-weight:700;color:var(--pharm-900);margin:0;}
  .tree-root{padding-top:6px;}
  .tree-node-header{display:flex;align-items:center;gap:8px;width:100%;padding:11px 6px;
    background:none;border:none;cursor:pointer;color:var(--pharm-800);text-align:left;
    font-family:inherit;border-top:1px solid var(--pharm-100);}
  .tree-node:first-child > .tree-node-header{border-top:none;}
  .tree-node-header:hover{background:var(--pharm-50);}
  .tree-node-header .tree-node-label{flex:1;font-size:14px;font-weight:800;}
  .tree-node-mes{padding-left:26px;}
  .tree-node-mes .tree-node-label{font-size:12.5px;font-weight:700;text-transform:capitalize;}
  .tree-children{padding-left:14px;}
  .tree-children-dias{padding-left:26px;border-left:2px solid var(--pharm-100);margin-left:8px;}
  .evento-row-sub{font-size:11.5px;color:var(--pharm-500);margin:2px 0 0;}

  /* Mensagem do Dia / Passagem de Turno */
  .msg-dia-banner{position:relative;background:linear-gradient(135deg,#fffbeb,#fef9e7);
    border:1px solid #fde68a;border-radius:16px;padding:16px 54px 16px 18px;margin-bottom:22px;
    box-shadow:0 2px 8px rgba(0,0,0,.04);}
  .msg-dia-text{font-size:13.5px;color:var(--pharm-800);line-height:1.5;margin:0;white-space:pre-wrap;
    font-weight:500;}
  .msg-dia-text.placeholder{color:#9ca3af;font-style:italic;font-weight:400;}
  .msg-edit-btn{position:absolute;bottom:12px;right:12px;}
  .msg-dia-banner-nova{animation:msgDiaPulse 1.2s ease-in-out infinite;}
  @keyframes msgDiaPulse{
    0%,100%{box-shadow:0 0 0 4px rgba(251,191,36,.75);}
    50%{box-shadow:0 0 0 4px rgba(251,191,36,.25);}
  }

  /* Marcações de Eventos — edição em linha na tabela */
  .inline-input{width:100%;min-width:0;border:1px solid var(--pharm-200);border-radius:7px;
    padding:6px 9px;font-size:12.5px;font-family:inherit;background:#fff;color:var(--pharm-900);}
  .inline-input:focus{outline:none;border-color:var(--pharm-400);box-shadow:0 0 0 2px rgba(54,136,176,.15);}
  .marc-editing-row td{background:var(--pharm-50);vertical-align:middle;}
  .marc-obs-cell{max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    font-size:12.5px;color:var(--pharm-600);}
  .marc-blocked-row{background:#f1f1ef;}
  .row-em-uso{background:#fff7ed;}
  .row-em-uso:hover{background:#ffedd5;}
  .row-em-uso.row-selected{background:var(--pharm-100) !important;}
  .badge-em-uso{display:inline-flex;align-items:center;gap:4px;margin-top:5px;font-size:10px;
    font-weight:800;color:#c2410c;background:#ffedd5;border:1px solid #fdba74;border-radius:6px;
    padding:2px 7px;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap;}
  .badge-em-uso-off{display:inline-flex;align-items:center;gap:4px;margin-top:5px;font-size:10px;
    font-weight:700;color:var(--pharm-500);background:var(--pharm-50);border:1px solid var(--pharm-200);
    border-radius:6px;padding:2px 7px;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap;}
  .progress-track{flex:1;height:8px;border-radius:6px;background:var(--pharm-100);overflow:hidden;min-width:70px;}
  .progress-fill{height:100%;border-radius:6px;transition:width .3s ease,background-color .3s ease;}

  /* Entregas — ecrã de transição (escolha de farmácia) */
  .entrega-selector-grid{display:grid;grid-template-columns:1fr;gap:18px;max-width:520px;margin:32px 0 0;}
  @media (min-width:640px){.entrega-selector-grid{grid-template-columns:1fr 1fr;}}
  .entrega-farmacia-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;padding:38px 20px;border-radius:18px;border:none;cursor:pointer;font-family:inherit;
    font-size:16px;font-weight:800;color:#fff;appearance:none;-webkit-appearance:none;
    box-shadow:0 6px 18px rgba(0,0,0,.12);transition:transform .15s ease,box-shadow .15s ease;}
  .entrega-farmacia-btn:hover{transform:scale(1.03);box-shadow:0 10px 26px rgba(0,0,0,.18);}
  .entrega-farmacia-btn:active{transform:scale(0.98);}
  .entrega-farmacia-btn.tone-entrega-juncal{background:linear-gradient(135deg,var(--pharm-700),var(--pharm-900));}
  .entrega-farmacia-btn.tone-entrega-boanova{background:linear-gradient(135deg,var(--blue),#1d4ed8);}
  .badge-bloco{display:inline-block;font-size:11px;font-weight:700;color:var(--pharm-700);
    background:var(--pharm-50);border:1px solid var(--pharm-200);border-radius:6px;padding:2px 8px;
    white-space:nowrap;}
  /* Temporizador Inteligente de Hora Limite — Entregas Pendentes */
  .entrega-timer-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
    border-radius:999px;padding:3px 9px 3px 7px;white-space:nowrap;border:1px solid transparent;}
  .entrega-timer-badge.tone-verde{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}
  .entrega-timer-badge.tone-amarelo{background:#fffbeb;color:#b45309;border-color:#fde68a;}
  .entrega-timer-badge.tone-vermelho{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);}
  .entrega-timer-badge.piscar{animation:entregaTimerPiscar 1.1s ease-in-out infinite;}
  @keyframes entregaTimerPiscar{0%,100%{opacity:1;}50%{opacity:.45;}}
  /* Assistente de Rota Dinâmico — banner no topo do Módulo de Entregas */
  .assistente-rota-card{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px;
    background:var(--blue-bg);border:1px solid var(--blue-bd);}
  .assistente-rota-card.alerta{background:var(--red-bg);border-color:var(--red-bd);
    animation:entregaTimerPiscar 1.6s ease-in-out infinite;}
  .assistente-rota-icon{flex-shrink:0;color:var(--blue);margin-top:1px;}
  .assistente-rota-card.alerta .assistente-rota-icon{color:var(--red);}
  .assistente-rota-texto{font-size:13.5px;font-weight:600;line-height:1.5;color:var(--pharm-900);margin:0;}
  .marc-blocked-row td{color:#9a9a94;cursor:not-allowed;}
  .marc-blocked-label{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-align:center;}


  /* Tabs (Erros de Stock) */
  .tabs-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .tab-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:10px;
    border:1px solid var(--pharm-200);background:#fff;font-size:13px;font-weight:700;
    cursor:pointer;font-family:inherit;transition:.15s;color:var(--pharm-600);}
  .tab-btn .tab-count{font-size:10.5px;font-weight:800;padding:1px 7px;border-radius:999px;
    background:var(--pharm-100);color:var(--pharm-600);}
  .tab-btn.tone-red{color:#b91c1c;border-color:#fecaca;}
  .tab-btn.tone-red .tab-count{background:#fee2e2;color:#b91c1c;}
  .tab-btn.tone-red.active{background:#dc2626;border-color:#dc2626;color:#fff;}
  .tab-btn.tone-red.active .tab-count{background:rgba(255,255,255,.25);color:#fff;}
  .tab-btn.tone-green{color:#15803d;border-color:#bbf7d0;}
  .tab-btn.tone-green .tab-count{background:#dcfce7;color:#15803d;}
  .tab-btn.tone-green.active{background:#16a34a;border-color:#16a34a;color:#fff;}
  .tab-btn.tone-green.active .tab-count{background:rgba(255,255,255,.25);color:#fff;}
  .tab-btn.tone-orange{color:#c2410c;border-color:#fed7aa;}
  .tab-btn.tone-orange .tab-count{background:#ffedd5;color:#c2410c;}
  .tab-btn.tone-orange.active{background:#ea580c;border-color:#ea580c;color:#fff;}
  .tab-btn.tone-orange.active .tab-count{background:rgba(255,255,255,.25);color:#fff;}
  .tab-btn.tone-blue{color:#1d4ed8;border-color:#bfdbfe;}
  .tab-btn.tone-blue .tab-count{background:#dbeafe;color:#1d4ed8;}
  .tab-btn.tone-blue.active{background:var(--blue);border-color:var(--blue);color:#fff;}
  .tab-btn.tone-blue.active .tab-count{background:rgba(255,255,255,.25);color:#fff;}

  /* Tables */
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead tr{background:var(--pharm-50);text-align:left;}
  th{padding:9px 14px;font-size:10px;font-weight:700;color:var(--pharm-600);text-transform:uppercase;
    letter-spacing:.03em;white-space:nowrap;}
  td{padding:8px 14px;white-space:nowrap;color:var(--pharm-800);border-top:1px solid var(--pharm-100);}
  tbody tr{transition:background .1s;}
  tbody tr:hover{background:rgba(54,136,176,.05);}
  tbody tr.row-resolved{background:var(--green-bg);}
  tbody tr.row-resolved:hover{background:#d9f7e8;}
  tbody tr.row-cancelled{background:var(--red-bg);}
  tbody tr.row-cancelled:hover{background:#fde2e2;}
  .text-right{text-align:right;}
  .cell-strong{font-weight:600;color:var(--pharm-900);}
  .cell-muted{color:var(--pharm-300);}

  /* Badges */
  .badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-size:10.5px;
    font-weight:800;white-space:nowrap;letter-spacing:.01em;}
  .badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd);}
  .badge-purple{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe;}
  .premios-mural-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
  .premio-mural-card{display:flex;flex-direction:column;}
  .mapa-tarefas-fab{position:fixed;bottom:88px;right:24px;width:48px;height:48px;border-radius:50%;
    background:var(--blue);color:#fff;border:none;display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 10px rgba(37,99,235,.4);cursor:pointer;z-index:60;
    transition:background-color .15s ease,transform .15s ease,box-shadow .15s ease;}
  .mapa-tarefas-fab:hover{background:#1d4ed8;transform:scale(1.05);box-shadow:0 5px 14px rgba(37,99,235,.5);}
  .mapa-tarefas-fab:active{transform:scale(0.96);}
  /* Sobe acima da assinatura fixa no rodapé (.app-signature, bottom:14px) para
     nunca lhe tapar o texto — sobretudo em ecrãs pequenos, onde a barra seria
     mais apertada. */
  @media (max-width:1023px){.mapa-tarefas-fab{bottom:calc(80px + env(safe-area-inset-bottom));}}
  .badge-orange{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd);}
  .badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
  .badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
  .aviso-tag{display:inline-flex;align-items:center;justify-content:center;}
  .aviso-tag.aviso-inativo{color:var(--pharm-300);}
  .aviso-tag.aviso-ativo{color:#ca8a04;}

  /* Stat cards */
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:28px;}
  @media (min-width:640px){.stat-grid{grid-template-columns:repeat(3,1fr);}}
  @media (min-width:1280px){.stat-grid{grid-template-columns:repeat(5,1fr);}}
  .quick-filter-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:18px;}
  @media (min-width:640px){.quick-filter-grid{grid-template-columns:repeat(3,1fr);}}
  .stat-card{background:#fff;border:1px solid var(--pharm-200);border-radius:16px;padding:18px;
    display:flex;align-items:center;gap:14px;box-shadow:0 1px 2px rgba(0,0,0,.03);width:100%;
    font-family:inherit;text-align:left;appearance:none;-webkit-appearance:none;}
  .stat-card.clickable{cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease;}
  .stat-card.clickable:hover{transform:scale(1.02);box-shadow:0 6px 16px rgba(0,0,0,.08);border-color:var(--pharm-300);}
  .stat-card.clickable:active{transform:scale(0.99);}
  .stat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    color:#fff;flex-shrink:0;background:rgba(255,255,255,.24);}
  .stat-value{font-size:21px;font-weight:800;color:var(--pharm-900);line-height:1;}
  .stat-label{font-size:11.5px;font-weight:600;color:var(--pharm-500);margin-top:5px;}

  /* Cartões de resumo coloridos (Painel de Controlo) */
  .stat-card.tone-card{border:none;box-shadow:0 4px 14px rgba(0,0,0,.08);}
  .stat-card.tone-card .stat-value{color:#fff;}
  .stat-card.tone-card .stat-label{color:rgba(255,255,255,.86);}
  .stat-card.tone-card.clickable:hover{box-shadow:0 8px 22px rgba(0,0,0,.16);}
  .stat-card.tone-blue-soft{background:linear-gradient(135deg,#4a9bc4,#2f7699);}
  .stat-card.tone-orange{background:linear-gradient(135deg,#fb923c,#e8721b);}
  .stat-card.tone-yellow{background:linear-gradient(135deg,#f2b53d,#d99509);}
  .stat-card.tone-purple{background:linear-gradient(135deg,#a78bfa,#7c4fea);}
  .stat-card.tone-red{background:linear-gradient(135deg,#f56565,#dc2626);}
  .stat-card.tone-green{background:linear-gradient(135deg,#4ade80,#16a34a);}
  .entregas-badge-card{background:linear-gradient(135deg,#fde047,#eab308);}
  .entregas-badge-card .stat-icon{background:rgba(0,0,0,.08);color:#422006;}
  .entregas-badge-card .stat-label{color:#422006 !important;opacity:.85;}
  .entregas-badge-card .next-evento-card-title{color:#1c1206 !important;}
  .entregas-badge-card .next-evento-card-sub{color:#422006 !important;opacity:.9;}
  .next-evento-card-title{font-size:13px;font-weight:800;color:#fff;line-height:1.3;margin-top:4px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .next-evento-card-sub{font-size:11px;font-weight:600;color:rgba(255,255,255,.82);margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* Dashboard grid */
  .dash-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:22px;align-items:stretch;}
  @media (min-width:768px){.dash-grid{grid-template-columns:1fr 1fr;}}
  .dash-grid > *{margin-bottom:0 !important;}
  .dash-grid .nota-rapida-card{margin-top:0;height:100%;display:flex;flex-direction:column;}
  /* Título simples de cada secção da Homepage, sem caixa nem fundo agregador —
     os botões assentam diretamente sobre o fundo geral da app. */
  .home-section{margin-bottom:36px;}
  .home-section-title{font-weight:800;color:var(--pharm-800);font-size:15px;margin-bottom:14px;}
  .dash-col{display:flex;flex-direction:column;height:100%;}
  .dash-card-title{font-weight:800;color:var(--pharm-800);font-size:15px;margin-bottom:14px;}
  .recent-list-scroll{flex:1;overflow-y:auto;min-height:0;}
  .metas-list-scroll{flex:1;overflow-y:auto;min-height:0;}
  .meta-row{padding:11px 4px;border-top:1px solid var(--pharm-100);border-radius:8px;}
  .meta-row:first-child{border-top:none;}
  .meta-row-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:7px;}
  .meta-row-title{font-size:13px;font-weight:700;color:var(--pharm-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .meta-row-count{font-size:12px;font-weight:700;color:var(--pharm-500);flex-shrink:0;}
  .meta-produtos-list{margin-top:9px;display:flex;flex-direction:column;gap:6px;}
  .meta-produto-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .meta-produto-nome{font-size:12px;color:var(--pharm-700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .meta-produto-contagem-btn{font-size:12px;font-weight:700;color:var(--pharm-700);background:var(--pharm-50);
    border:1px solid var(--pharm-200);border-radius:7px;padding:2px 8px;cursor:pointer;flex-shrink:0;
    font-family:inherit;transition:.12s;}
  .meta-produto-contagem-btn:hover{background:var(--pharm-100);border-color:var(--pharm-300);}
  .meta-row-count-btn{background:none;border:none;cursor:pointer;font-family:inherit;padding:2px 4px;border-radius:6px;}
  .meta-row-count-btn:hover{background:var(--pharm-100);text-decoration:underline;}
  /* Input compacto do popup de edição rápida das Unidades Vendidas dos
     Objetivos — em vez do input genérico a 100% de largura, fica pequeno,
     centrado e com o número em destaque. */
  .input-unidades-compacto{width:120px;max-width:120px;margin:6px auto 0;display:block;
    text-align:center;font-size:1.25rem;font-weight:600;}
  .recent-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;
    border-top:1px solid var(--pharm-100);}
  .recent-item:first-child{border-top:none;}
  .recent-left{display:flex;align-items:center;gap:11px;min-width:0;}
  .recent-icon{color:var(--pharm-500);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .recent-name{font-size:13.5px;font-weight:700;color:var(--pharm-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .recent-sub{font-size:11.5px;color:var(--pharm-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .recent-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .recent-date{font-size:11.5px;color:var(--pharm-400);}

  .quick-grid{display:grid;grid-template-columns:repeat(auto-fill,200px);gap:14px;justify-content:start;}
  @media (max-width:640px){.quick-grid{grid-template-columns:repeat(auto-fill,minmax(0,1fr));}}
  @media (max-width:420px){.quick-grid{grid-template-columns:1fr;}}
  .quick-item{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    gap:10px;padding:22px 16px;width:200px;max-width:100%;border-radius:14px;border:1px solid rgba(0,0,0,.08);
    background:#fff;cursor:pointer;font-family:inherit;appearance:none;-webkit-appearance:none;
    transition:background .15s ease,border-color .15s ease,transform .15s ease,box-shadow .15s ease;
    box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .quick-item:hover{background:#ecfdf5;border-color:var(--pharm-300);transform:scale(1.02);
    box-shadow:0 6px 16px rgba(0,0,0,.08);}
  .quick-item:active{transform:scale(0.99);}
  .quick-item .icon-wrap{display:flex;align-items:center;justify-content:center;color:var(--pharm-600);
    transition:color .15s ease;}
  .quick-item:hover .icon-wrap{color:var(--pharm-700);}
  .quick-item span.label{font-size:13.5px;font-weight:700;color:var(--pharm-800);line-height:1.3;}

  /* Cores ténues dos cartões/botões da Homepage, consoante a secção-mãe */
  .quick-item.tone-blue{background:#eff6ff;border-color:#bfdbfe;}
  .quick-item.tone-blue:hover{background:#dbeafe;border-color:#93c5fd;}
  .quick-item.tone-blue .icon-wrap{color:#2563eb;}

  /* Cartões de categoria de Pedidos (Manipulados, Ortopedia, Ervanária,
     Veterinária, Outros Fornecedores) — hierarquia visual reforçada face
     aos restantes quick-items da app: borda mais definida, sombra própria,
     elevação ao hover e estado ativo/pressionado no azul institucional. */
  .pedido-categoria-card{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    gap:12px;padding:26px 18px;width:200px;max-width:100%;border-radius:16px;
    border:1.5px solid var(--pharm-200);background:#fff;cursor:pointer;font-family:inherit;
    appearance:none;-webkit-appearance:none;box-shadow:0 2px 8px rgba(15,53,74,.08);
    transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease,background-color .15s ease;}
  .pedido-categoria-card .icon-wrap{display:flex;align-items:center;justify-content:center;color:var(--pharm-700);
    transition:color .15s ease;}
  .pedido-categoria-card span.label{font-size:14px;font-weight:800;color:var(--pharm-800);line-height:1.3;
    transition:color .15s ease;}
  .pedido-categoria-card:hover{transform:translateY(-3px);border-color:var(--pharm-400);
    box-shadow:0 10px 24px rgba(15,53,74,.16);}
  .pedido-categoria-card:active,
  .pedido-categoria-card.categoria-ativa{
    background:var(--pharm-600);border-color:var(--pharm-600);transform:translateY(-1px);
    box-shadow:0 6px 16px rgba(37,111,149,.35);}
  .pedido-categoria-card:active .icon-wrap,
  .pedido-categoria-card.categoria-ativa .icon-wrap,
  .pedido-categoria-card:active span.label,
  .pedido-categoria-card.categoria-ativa span.label{color:#fff;}

  /* .hub-card — o mesmo tratamento visual do .pedido-categoria-card acima,
     generalizado para todos os cartões de navegação das restantes secções
     da sidebar (Stocks, Gestão, Entregas, Agendas, Equipa, Definições),
     organizados em planos/níveis (ver .hub-tier-row). */
  .hub-card{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    gap:12px;padding:26px 18px;width:200px;max-width:100%;border-radius:16px;
    border:1.5px solid var(--pharm-200);background:#fff;cursor:pointer;font-family:inherit;
    appearance:none;-webkit-appearance:none;box-shadow:0 2px 8px rgba(15,53,74,.08);
    transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease,background-color .15s ease;}
  .hub-card .icon-wrap{display:flex;align-items:center;justify-content:center;color:var(--pharm-700);
    transition:color .15s ease;}
  .hub-card span.label{font-size:14px;font-weight:800;color:var(--pharm-800);line-height:1.3;
    transition:color .15s ease;}
  .hub-card:hover{transform:translateY(-3px);border-color:var(--pharm-400);
    box-shadow:0 10px 24px rgba(15,53,74,.16);}
  .hub-card:active{background:var(--pharm-600);border-color:var(--pharm-600);transform:translateY(-1px);
    box-shadow:0 6px 16px rgba(37,111,149,.35);}
  .hub-card:active .icon-wrap,
  .hub-card:active span.label{color:#fff;}
  /* Reclamações — único cartão com destaque vermelho de alerta */
  .hub-card.hub-card-red{border-color:#fecaca;}
  .hub-card.hub-card-red .icon-wrap{color:var(--red);}
  .hub-card.hub-card-red span.label{color:#b91c1c;}
  .hub-card.hub-card-red:hover{border-color:#fca5a5;box-shadow:0 10px 24px rgba(220,38,38,.16);}
  .hub-card.hub-card-red:active{background:var(--red);border-color:var(--red);}
  .hub-card.hub-card-red:active .icon-wrap,
  .hub-card.hub-card-red:active span.label{color:#fff;}
  /* Entregas — distinção cromática entre as duas farmácias: Juncal fica no
     azul institucional (estilo por omissão do .hub-card), Boa Nova em verde. */
  .hub-card.hub-card-boanova{border-color:var(--green-bd);}
  .hub-card.hub-card-boanova .icon-wrap{color:var(--green);}
  .hub-card.hub-card-boanova span.label{color:#065f46;}
  .hub-card.hub-card-boanova:hover{border-color:#6ee7b7;box-shadow:0 10px 24px rgba(5,150,105,.18);}
  .hub-card.hub-card-boanova:active{background:var(--green);border-color:var(--green);}
  .hub-card.hub-card-boanova:active .icon-wrap,
  .hub-card.hub-card-boanova:active span.label{color:#fff;}
  /* Espaçamento limpo entre planos/níveis de um hub de navegação — sem
     texto de rótulo, só uma quebra vertical entre linhas de cartões. */
  .hub-tier-row{margin-top:18px;}
  .hub-tier-row:first-child{margin-top:0;}
  .quick-item.tone-red{background:#fef2f2;border-color:#fecaca;}
  .quick-item.tone-red:hover{background:#fee2e2;border-color:#fca5a5;}
  .quick-item.tone-red .icon-wrap{color:#dc2626;}
  .quick-item.tone-purple{background:#f5f3ff;border-color:#ddd6fe;}
  .quick-item.tone-purple:hover{background:#ede9fe;border-color:#c4b5fd;}
  .quick-item.tone-purple .icon-wrap{color:#7c3aed;}
  .quick-item.tone-gray{background:#f8fafc;border-color:#e2e8f0;}
  .quick-item.tone-gray:hover{background:#f1f5f9;border-color:#cbd5e1;}
  .quick-item.tone-gray .icon-wrap{color:#64748b;}
  .quick-item.tone-teal{background:#f0fdfa;border-color:#99f6e4;}
  .quick-item.tone-teal:hover{background:#ccfbf1;border-color:#5eead4;}
  .quick-item.tone-teal .icon-wrap{color:#0d9488;}
  .quick-item.tone-yellow{background:#fefce8;border-color:#fde047;}
  .quick-item.tone-yellow:hover{background:#fef9c3;border-color:#facc15;}
  .quick-item.tone-yellow .icon-wrap{color:#a16207;}

  /* Calendário Mensal Visual */
  .cal-pair{display:grid;grid-template-columns:1fr;gap:14px;max-width:620px;}
  @media (min-width:640px){.cal-pair{grid-template-columns:1fr 1fr;}}
  .cal-carousel-4{max-width:1100px;flex:1;min-width:0;}
  @media (min-width:900px){.cal-carousel-4{grid-template-columns:1fr 1fr;max-width:820px;}}
  @media (min-width:1200px){.cal-carousel-4{grid-template-columns:1fr 1fr 1fr 1fr;max-width:1100px;}}
  .cal-carousel-outer{width:100%;}
  .cal-carousel-row{display:flex;align-items:stretch;gap:14px;}
  .cal-nav-btn-grande{flex-shrink:0;align-self:center;display:flex;align-items:center;justify-content:center;
    width:44px;height:44px;border-radius:50%;border:1px solid var(--pharm-200);background:#fff;
    color:var(--pharm-700);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:.15s;}
  .cal-nav-btn-grande:hover{background:var(--pharm-600);border-color:var(--pharm-600);color:#fff;transform:scale(1.06);}
  .cal-card{min-width:0;padding:16px;transition:background-color .2s ease,opacity .2s ease;}
  /* Centro — ponto focal absoluto: fundo mais saturado e elementos bem definidos */
  .cal-card.cal-card-atual{background:var(--pharm-100);border-color:var(--pharm-400);
    box-shadow:0 4px 14px rgba(0,0,0,.08);}
  .cal-card.cal-card-atual .cal-cell{background:#fff;}
  .cal-card.cal-card-atual .dash-card-title{color:var(--pharm-800);font-weight:800;}
  /* Esquerda — passado/histórico: suavizado e opaco, só para consulta */
  .cal-card.cal-card-passado{opacity:.55;background:var(--pharm-50);filter:grayscale(.3);}
  /* Direita — futuro imediato: tom claro e nitidamente distinto do cinza */
  .cal-card.cal-card-futuro{background:#fff;border-color:var(--pharm-200);}
  .cal-card .dash-card-title{font-size:13.5px;margin-bottom:0;}
  .cal-card-contagem{font-size:10.5px;font-weight:700;color:var(--pharm-500);margin-top:3px;
    display:inline-flex;align-items:center;gap:4px;}
  .cal-card.cal-card-atual .cal-card-contagem{color:var(--pharm-700);}
  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:11px 0 5px;}
  .cal-weekday{text-align:center;font-size:9.5px;font-weight:800;color:var(--pharm-400);
    text-transform:uppercase;letter-spacing:.02em;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .cal-cell{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;border-radius:6px;
    font-size:11.5px;font-weight:700;color:var(--pharm-800);background:var(--pharm-100);}
  .cal-cell-empty{background:none;}
  .cal-cell-marcado{color:#1c1206;text-shadow:0 1px 2px rgba(255,255,255,.5);}
  .cal-cell-clicavel{cursor:pointer;}
  .cal-cell-passado{opacity:.4;filter:grayscale(.6);}
  /* O Dia Presente mantém sempre o seu destaque forte, seja qual for a
     posição (esquerda/centro/direita) em que o respetivo mês estiver.
     A regra abaixo tem especificidade superior à de ".cal-card-atual
     .cal-cell" (que forçava fundo branco em todas as células do mês
     central) para que o contorno de "Hoje" nunca seja engolido — e não
     define "background" com !important, para que a cor do dia (quando
     há marcações) continue visível por baixo do contorno. */
  .cal-card .cal-cell.cal-cell-today{outline:2.5px solid var(--pharm-600);outline-offset:-2px;
    background:var(--pharm-200);box-shadow:0 0 0 1px #fff inset;font-weight:900;
    filter:none !important;opacity:1 !important;}

  /* Reservado para o módulo Agenda (ainda por construir): distinção visual
     entre dias/vagas passados (opacos, sem interação de agendamento) e
     futuros (destacados, prontos a interagir). Aplicar estas classes às
     células/linhas da agenda assim que esse módulo existir. */
  .agenda-dia-passado{opacity:.5;filter:grayscale(.4);pointer-events:none;}
  .agenda-dia-futuro{opacity:1;}
  .agenda-vaga-passada{background:var(--pharm-50) !important;color:var(--pharm-400) !important;
    cursor:not-allowed;opacity:.6;}
  .agenda-vaga-futura{cursor:pointer;}
  .agenda-slots-list{display:flex;flex-direction:column;gap:5px;max-height:60vh;overflow-y:auto;}
  .agenda-slot-row{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:10px;
    background:var(--pharm-50);}
  .agenda-slot-hora{font-size:12px;font-weight:800;color:var(--pharm-700);width:96px;flex-shrink:0;
    font-variant-numeric:tabular-nums;}
  .agenda-slot-label{flex:1;font-size:13px;color:var(--pharm-600);min-width:0;}
  .agenda-slot-livre{background:#fff;border:1px dashed var(--pharm-200);}
  .agenda-slot-bloqueado{background:var(--pharm-100);}
  .agenda-slot-bloqueado .agenda-slot-label{color:var(--pharm-500);font-style:italic;}
  .agenda-slot-ocupado{background:#eff6ff;}
  .agenda-slot-encaixe{background:#fdf4ff;border:1px dashed #d8b4fe;}
  .agenda-slot-confirmada{background:#dcfce7 !important;}
  .agenda-slot-confirmada .agenda-slot-label{color:#15803d;}
  .agenda-slot-cancelada{background:#fee2e2 !important;}
  .agenda-slot-cancelada .agenda-slot-label{color:#b91c1c;text-decoration:line-through;}
  .agenda-dia-panel .agenda-slots-list{margin-top:4px;}

  /* Zonas cromáticas dos cartões principais da Homepage */
  .zone-pedidos{background:#dbeafe;border-color:#93c5fd;}
  .zone-gestao{background:#fef2f2;border-color:#fecaca;}
  .zone-lembretes{background:#f5f3ff;border-color:#ddd6fe;}
  .zone-lixo{background:#f5f5f4;border-color:#e0e0de;}

  .welcome-eyebrow{color:var(--pharm-500);font-size:13.5px;font-weight:600;}
  .welcome-title{font-size:27px;font-weight:800;color:var(--pharm-900);margin-top:5px;letter-spacing:-.01em;}
  .welcome-sub{font-size:13.5px;color:var(--pharm-500);margin-top:5px;}

  /* Search bar */
  .search-row{display:flex;flex-direction:column;gap:10px;}
  @media (min-width:640px){.search-row{flex-direction:row;}}
  .search-input-wrap{position:relative;flex:1;}
  .search-input-wrap .icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--pharm-400);
    display:flex;align-items:center;justify-content:center;}
  .search-input{width:100%;border:1px solid var(--pharm-200);background:var(--pharm-50);border-radius:10px;
    padding:11px 12px 11px 36px;font-size:14px;font-family:inherit;}
  .search-input:focus{outline:none;border-color:var(--pharm-400);box-shadow:0 0 0 3px rgba(54,136,176,.15);background:#fff;}
  .filter-select{border:1px solid var(--pharm-200);background:#fff;border-radius:10px;padding:11px 12px;
    font-size:13.5px;font-weight:600;font-family:inherit;}
  .filter-select:focus{outline:none;box-shadow:0 0 0 3px rgba(54,136,176,.15);}
  .results-count{font-size:12px;color:var(--pharm-400);margin-top:9px;}
  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .filter-chip{display:inline-flex;align-items:center;gap:7px;background:var(--pharm-100);color:var(--pharm-700);
    padding:5px 6px 5px 12px;border-radius:999px;font-size:11.5px;font-weight:700;}
  .chip-close{background:rgba(255,255,255,.6);border:none;color:var(--pharm-600);cursor:pointer;
    width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .chip-close:hover{background:#fff;color:var(--pharm-800);}

  /* Indicador e popover de Observações */
  .obs-btn{background:var(--pharm-50);border:1px solid var(--pharm-200);color:var(--pharm-600);
    border-radius:8px;width:30px;height:26px;display:inline-flex;align-items:center;justify-content:center;
    cursor:pointer;transition:.12s;padding:0;}
  .obs-btn:hover{background:var(--pharm-100);border-color:var(--pharm-300);}
  .obs-popover{position:fixed;z-index:80;width:min(300px,calc(100vw - 20px));background:#fff;
    border:1px solid var(--pharm-200);border-radius:12px;box-shadow:0 14px 34px rgba(0,0,0,.18);
    padding:12px 14px;animation:fadeSlide .15s ease-out;}
  .obs-popover-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:10px;}
  .obs-popover-head .obs-popover-title{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;
    color:var(--pharm-500);text-transform:uppercase;letter-spacing:.04em;}
  .obs-popover-close{background:none;border:none;color:var(--pharm-400);cursor:pointer;padding:2px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;}
  .obs-popover-close:hover{color:var(--pharm-700);}
  .obs-popover-text{font-size:13px;color:var(--pharm-800);line-height:1.55;white-space:pre-wrap;margin:0;}

  /* Calculadoras de PVP */
  .calc-page-grid{display:grid;grid-template-columns:1fr;gap:18px;}
  @media (min-width:900px){.calc-page-grid{grid-template-columns:1fr 1fr;}}
  .calc-card{border-radius:16px;border:1px solid;padding:20px;}
  .calc-card.tone-yellow{background:#fefce8;border-color:#fef08a;}
  .calc-card.tone-green{background:#f0fdf4;border-color:#bbf7d0;}
  .calc-card.tone-pink{background:#fdf2f8;border-color:#fbcfe8;}
  .calc-card.tone-orange{background:#fff7ed;border-color:#fed7aa;}
  .calc-card-head{display:flex;align-items:center;gap:9px;margin-bottom:2px;}
  .calc-card-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;}
  .calc-card-icon.tone-yellow{background:#ca8a04;} .calc-card-icon.tone-green{background:#16a34a;}
  .calc-card-icon.tone-pink{background:#db2777;} .calc-card-icon.tone-orange{background:#ea580c;}
  .calc-card-title{font-weight:800;font-size:14.5px;color:var(--pharm-900);}
  .calc-card-sub{font-size:11.5px;color:var(--pharm-500);margin:2px 0 16px 39px;}
  .calc-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .calc-field{}
  .calc-field.span2{grid-column:1/-1;}
  .calc-field label{display:block;font-size:11px;font-weight:700;color:var(--pharm-600);margin-bottom:4px;}
  .calc-input{width:100%;border:1px solid var(--pharm-200);background:#fff;border-radius:10px;
    padding:9px 11px;font-size:14px;font-family:inherit;color:var(--pharm-950);}
  .calc-input:focus{outline:none;border-color:var(--pharm-400);box-shadow:0 0 0 3px rgba(54,136,176,.15);}
  .calc-readonly{width:100%;border:1px solid rgba(0,0,0,.13);background:rgba(0,0,0,.055);
    color:var(--pharm-900);border-radius:10px;padding:9px 11px;font-size:14px;font-weight:700;
    font-family:inherit;cursor:not-allowed;}
  .calc-readonly:focus{outline:none;box-shadow:none;}
  .calc-divider{height:1px;background:rgba(0,0,0,.08);margin:14px 0;}
  /* Rede de segurança: nunca mostrar as setinhas de incremento em nenhum
     input numérico só de leitura/desativado da app (ex: campos calculados
     automaticamente) — alguns browsers continuam a desenhá-las mesmo com
     disabled/readonly. */
  input[readonly]::-webkit-outer-spin-button,
  input[readonly]::-webkit-inner-spin-button,
  input:disabled::-webkit-outer-spin-button,
  input:disabled::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  input[readonly][type=number],
  input:disabled[type=number]{-moz-appearance:textfield;}

  /* Modal (edição rápida a partir da Pesquisa de Pedidos) */
  .modal-overlay{position:fixed;inset:0;background:rgba(13,37,48,.45);z-index:60;
    display:flex;align-items:center;justify-content:center;padding:18px;}
  .modal-panel{background:#fff;border-radius:16px;max-width:640px;width:100%;max-height:88vh;
    overflow-y:auto;padding:22px;box-shadow:0 24px 60px rgba(0,0,0,.28);}
  .modal-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .modal-title{font-weight:800;color:var(--pharm-800);font-size:16px;}
  .modal-tag{font-size:11px;font-weight:700;color:var(--pharm-500);text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}
  .confirm-panel{max-width:420px;}
  .confirm-message{font-size:14px;color:var(--pharm-800);line-height:1.55;margin:0 0 18px;}
  .btn-danger-solid{background:var(--red);color:#fff;font-weight:700;box-shadow:0 1px 2px rgba(0,0,0,.06);
    transition:background-color .15s ease;}
  .btn-danger-solid:hover{background:#b91c1c;}

  /* Toasts — feedback visível e não-bloqueante para erros/avisos de rede
     (ex: falha ao contactar o Supabase) em ações que não têm um formulário
     próprio onde mostrar o erro inline (toggles rápidos, listas, etc.). */
  .toast-stack{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;
    display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;
    max-width:calc(100vw - 32px);}
  .toast{pointer-events:auto;display:flex;align-items:center;gap:10px;padding:12px 16px;
    border-radius:12px;font-size:13.5px;font-weight:600;color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.22);
    animation:toastIn .18s ease-out;max-width:420px;}
  .toast-error{background:var(--red);}
  .toast-success{background:#059669;}
  .toast-info{background:var(--pharm-800);}
  .toast-closing{animation:toastOut .18s ease-in forwards;}
  @keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes toastOut{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(8px);}}
  .toast-close{background:none;border:none;color:#fff;opacity:.8;cursor:pointer;padding:2px;
    display:flex;align-items:center;flex-shrink:0;}
  .toast-close:hover{opacity:1;}

  /* Assinatura e relógio do rodapé */
  .app-signature{position:fixed;bottom:14px;right:18px;z-index:40;text-align:right;
    pointer-events:none;user-select:none;line-height:1.3;}
  .app-signature.app-signature-clickable{pointer-events:auto;cursor:pointer;}
  .app-signature.app-signature-clickable:hover .sig-title{color:var(--pharm-600);}
  .app-signature .sig-title{font-size:13.5px;font-weight:700;color:#334155;margin:0;}
  .app-signature .sig-sub{font-size:11.5px;font-weight:600;color:#64748b;margin:1px 0 0;}
  @media (max-width:639px){
    .app-signature{bottom:10px;right:12px;}
    .app-signature .sig-sub{display:none;}
    .app-signature .sig-title{font-size:11px;}
  }
  .app-clock{position:fixed;bottom:14px;left:18px;z-index:40;text-align:left;
    pointer-events:none;user-select:none;line-height:1.3;}
  .app-clock .clock-time{font-size:13.5px;font-weight:700;color:#334155;margin:0;font-variant-numeric:tabular-nums;}
  @media (max-width:639px){
    .app-clock{bottom:10px;left:12px;}
    .app-clock .clock-time{font-size:11px;}
  }

  /* Tela de bloqueio (palavra-passe de acesso) */
  .login-gate{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
    padding:20px;background:linear-gradient(135deg,var(--pharm-800),var(--pharm-950));}
  .login-panel{background:#fff;border-radius:20px;padding:38px 32px 32px;max-width:360px;width:100%;
    box-shadow:0 24px 60px rgba(0,0,0,.35);text-align:center;}
  .login-logo{max-width:168px;width:100%;height:auto;display:block;margin:0 auto 16px;}
  .login-sub{font-size:13px;color:var(--pharm-500);margin:0 0 18px;line-height:1.5;}
  .login-field{margin-bottom:8px;}
  .login-input{width:100%;border:1px solid var(--pharm-200);border-radius:10px;padding:11px 14px;
    font-size:14px;font-family:inherit;text-align:center;letter-spacing:.03em;}
  .login-input:focus{outline:none;border-color:var(--pharm-400);box-shadow:0 0 0 3px rgba(54,136,176,.15);}
  /* Mascaramento puramente visual: o valor real do campo nunca é alterado por
     JavaScript, evitando qualquer risco de corrupção do texto digitado. */
  .login-input-masked{-webkit-text-security:disc;-moz-text-security:disc;text-security:disc;letter-spacing:.25em;}
  .login-error{color:var(--red);font-size:12px;font-weight:600;min-height:16px;margin:0 0 12px;}
  .login-panel .btn{width:100%;justify-content:center;}
  .btn-text-reset{display:block;width:100%;margin-top:12px;background:none;border:none;
    color:var(--pharm-400);font-size:11px;font-family:inherit;cursor:pointer;text-decoration:underline;}
  .btn-text-reset:hover{color:var(--pharm-600);}
  .login-gate.lock-mode{background:linear-gradient(135deg,#7f1d1d,#450a0a);z-index:200;}

  /* Ecrã de carregamento inicial (Supabase) */
  .boot-loading{position:fixed;inset:0;z-index:110;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;background:#ffffff;}
  .boot-loading-logo{max-width:220px;width:60%;height:auto;}
  .boot-spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--pharm-100);
    border-top-color:var(--pharm-600);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .boot-loading-text{color:var(--pharm-500);font-size:13px;font-weight:600;}

  /* =================================================================
     OTIMIZAÇÃO MOBILE (iOS Safari / Android Chrome) — só se aplica em
     ecrãs de smartphone; em tablet/desktop nada disto entra em ação.
  ================================================================= */
  @media (max-width:768px){
    /* Menu/hambúrguer e gaveta lateral — alvos de toque confortáveis */
    .hamburger{width:44px;height:44px;padding:0;}
    .topbar-mobile{padding-top:calc(12px + env(safe-area-inset-top));}
    .sidebar-mobile-panel{padding-bottom:env(safe-area-inset-bottom);}
    .nav-item{min-height:44px;padding:12px;}
    .back-btn{width:44px;height:44px;min-width:44px;}

    /* Safe area — nada fica tapado pela Home Bar do iPhone nem pelos
       botões de navegação do Android */
    .bottom-action-bar{bottom:calc(20px + env(safe-area-inset-bottom));}
    .toast-stack{bottom:calc(20px + env(safe-area-inset-bottom));}
    .app-signature{bottom:calc(14px + env(safe-area-inset-bottom));}
    .app-clock{bottom:calc(14px + env(safe-area-inset-bottom));}
    .modal-panel{margin-bottom:env(safe-area-inset-bottom);}

    /* Tabelas grandes — scroll horizontal suave, nunca partem a página */
    .table-wrap{-webkit-overflow-scrolling:touch;}

    /* Previne o auto-zoom do Safari no iPhone ao focar num campo — exige
       fonte de pelo menos 16px em qualquer input/select/textarea */
    .input,.select,.textarea{font-size:16px;}
  }

  /* Ecrãs estreitos (telemóvel) — linhas da Agenda e modais/tabelas em
     geral: nunca deixar o nome do cliente/marcação cortado ou sobreposto
     aos ícones de ação (ex: sino de aviso). */
  @media (max-width:600px){
    .modal-panel{padding:16px;border-radius:14px;max-height:92vh;}
    .modal-title{font-size:14.5px;}

    .agenda-slot-row{flex-wrap:wrap;gap:4px 8px;padding:10px;row-gap:6px;}
    .agenda-slot-hora{width:auto;order:1;}
    .row-actions{order:2;margin-left:auto;flex-wrap:wrap;justify-content:flex-end;gap:6px;}
    .agenda-slot-label{order:3;flex-basis:100%;white-space:normal;overflow-wrap:anywhere;}

    /* Cartões/linhas de tabela com ações à direita — nunca sobrepor texto */
    .row-actions{gap:6px;}
    table td, table th{padding:8px 6px;}
  }
</style>

function h(tag, attrs, children) {
  attrs = attrs || {};
  const e = document.createElement(tag);
  for (const k in attrs) {
    const v = attrs[k];
    if (v === undefined || v === null || v === false) continue;
    if (k === 'class') e.className = v;
    else if (k.indexOf('on') === 0 && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'checked') { if (v) e.setAttribute('checked', ''); e.checked = v; }
    else if (k === 'value') e.value = v;
    else e.setAttribute(k, v);
  }
  (Array.isArray(children) ? children : (children !== undefined ? [children] : [])).forEach(c => {
    if (c === null || c === undefined || c === false) return;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  });
  return e;
}
