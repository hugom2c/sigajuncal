// Módulo "Pedidos" — hub reestruturado: os botões de criação rápida por
// categoria ficam no topo, seguidos de 4 badges de métricas (clicáveis, cada
// um filtra a tabela) e, logo a seguir, a tabela de pesquisa/consulta unificada
// já visível — sem precisar de entrar num separador "Pesquisa de Pedidos" à parte.
function buildPedidosHubPage(container, preset, goTo) {
  function unified() {
    const m = STATE.manipulados.map(r => ({ id: `M${r.id}`, origId: r.id, listKey: 'manipulados', schema: manipuladosSchema, tag: 'Manipulados', categoria: 'Manipulados', icon: 'flask', nome: r.nome, contacto: r.contacto, produto: r.manipulado, responsavel: r.responsavel, estado: r.estado, data: r.data, aviso: r.aviso, obs: r.obs }));
    const o = STATE.ortopedia.map(r => ({ id: `O${r.id}`, origId: r.id, listKey: 'ortopedia', schema: ortopediaSchema, tag: 'Ortopedia', categoria: 'Ortopedia', icon: 'body', nome: r.nome, contacto: r.contacto, produto: r.tipo ? `${r.produto} · ${r.tipo}` : (r.descricaoArtigo ? `${r.produto} · ${r.descricaoArtigo}` : r.produto), responsavel: r.responsavel, estado: r.estado, data: r.data, aviso: r.aviso, obs: r.obs }));
    const e = STATE.ervanaria.map(r => ({ id: `E${r.id}`, origId: r.id, listKey: 'ervanaria', schema: ervanariaSchema, tag: 'Ervanária', categoria: 'Ervanária', icon: 'leaf', nome: r.nome, contacto: r.contacto, produto: r.produto, responsavel: r.responsavel, estado: r.estado, data: r.data, aviso: r.aviso, obs: r.obs }));
    const f = STATE.outros.map(r => ({ id: `F${r.id}`, origId: r.id, listKey: 'outros', schema: outrosSchema, tag: 'Outros Fornecedores', categoria: 'Outros Fornecedores', icon: 'package', nome: r.nome, contacto: r.contacto, produto: r.produto, responsavel: r.responsavel, estado: r.estado, data: r.data, aviso: r.aviso, obs: r.obs }));
    const v = STATE.veterinaria.map(r => ({ id: `V${r.id}`, origId: r.id, listKey: 'veterinaria', schema: veterinariaSchema, tag: 'Veterinária', categoria: 'Veterinária', icon: 'paw', nome: r.nome, contacto: r.contacto, produto: r.produto, responsavel: r.responsavel, estado: r.estado, data: r.data, aviso: r.aviso, obs: r.obs }));
    return [...m, ...o, ...e, ...f, ...v].sort((a, b) => (b.data || '').localeCompare(a.data || ''));
  }
  const categorias = ['Todos', 'Manipulados', 'Ortopedia', 'Ervanária', 'Veterinária', 'Outros Fornecedores'];
  const effective = preset || STATE.consultaState || {};
  let statusFilter = effective.statusFilter || null;
  const anoCorrente = new Date().getFullYear();

  clear(container);
  const wrap = h('div', { class: 'animate-in' });
  wrap.appendChild(withBackButton(buildPageHeader('clipboard', 'Pedidos', 'Criação rápida e pesquisa de todos os pedidos registados.', undefined), goTo));

  // Botões de criação rápida por categoria (Manipulados, Ortopedia, Ervanária,
  // Veterinária, Outros Fornecedores) — os mesmos do antigo hub genérico.
  const pedidosSection = NAV_SECTIONS.find(s => s.title === 'Pedidos');
  const createGrid = h('div', { class: 'quick-grid', style: 'margin-bottom:28px;' }, pedidosSection.items.map(item => h('button', { class: 'pedido-categoria-card', onclick: () => goTo(item.key) }, [
    h('span', { class: 'icon-wrap' }, Icon(item.icon, { size: 40, strokeWidth: 1.6 })),
    h('span', { class: 'label' }, item.label),
  ])));
  wrap.appendChild(createGrid);

  const allPedidos = unified();
  const pendentesCount = allPedidos.filter(r => r.estado !== 'Resolvido' && r.estado !== 'Cancelado').length;
  const emOrcamentoCount = allPedidos.filter(r => r.estado === 'Em Orçamento').length;
  const porLevantarCount = allPedidos.filter(r => r.estado === 'Satisfeito').length;
  const resolvidosAnoCount = allPedidos.filter(r => r.estado === 'Resolvido' && (r.data || '').startsWith(String(anoCorrente))).length;

  const searchInput = h('input', { class: 'search-input', type: 'text', placeholder: 'Pesquisar por nome, contacto, produto ou responsável...' });
  const filterSelect = h('select', { class: 'filter-select' }, categorias.map(c => h('option', { value: c }, c)));
  searchInput.value = effective.query || '';
  filterSelect.value = effective.cat || 'Todos';
  const resultsCount = h('p', { class: 'results-count' }, '');
  const chipRow = h('div', { class: 'chip-row' });
  const resultsContainer = h('div', {});

  function applyQuickFilter(sf) {
    filterSelect.value = 'Todos';
    searchInput.value = '';
    statusFilter = sf;
    renderChip();
    renderResults();
  }
  // 4 badges de métricas — cor intuitiva por estado, cada um filtra a tabela abaixo ao clicar.
  wrap.appendChild(h('div', { class: 'stat-grid' }, [
    buildStatCard('alert', 'Pedidos Pendentes', pendentesCount, 'orange', () => applyQuickFilter('pendentes')),
    buildStatCard('clock', 'Em Orçamento', emOrcamentoCount, 'yellow', () => applyQuickFilter('em-orcamento')),
    buildStatCard('truck', 'Por Levantar', porLevantarCount, 'blue-soft', () => applyQuickFilter('satisfeito')),
    buildStatCard('checkcircle', `Resolvidos (${anoCorrente})`, resolvidosAnoCount, 'green', () => applyQuickFilter('resolvido-ano')),
  ]));

  const searchCard = h('div', { class: 'card card-pad', style: 'margin-bottom:22px;' }, [
    h('div', { class: 'search-row' }, [
      h('div', { class: 'search-input-wrap' }, [h('span', { class: 'icon' }, Icon('search', { size: 15 })), searchInput]),
      filterSelect,
    ]),
    chipRow,
    resultsCount,
  ]);
  wrap.appendChild(searchCard);
  wrap.appendChild(resultsContainer);
  container.appendChild(wrap);

  function statusFilterLabel(sf) {
    if (sf === 'pendentes') return 'Pedidos Pendentes';
    if (sf === 'em-orcamento') return 'Em Orçamento';
    if (sf === 'satisfeito') return 'Por Levantar';
    if (sf === 'resolvido-ano') return `Resolvidos (${anoCorrente})`;
    return '';
  }

  function renderChip() {
    clear(chipRow);
    if (!statusFilter) return;
    const closeBtn = h('button', { class: 'chip-close', title: 'Remover filtro' }, Icon('x', { size: 11, strokeWidth: 2.5 }));
    closeBtn.addEventListener('click', () => { statusFilter = null; renderChip(); renderResults(); });
    chipRow.appendChild(h('span', { class: 'filter-chip' }, [h('span', {}, `Filtro: ${statusFilterLabel(statusFilter)}`), closeBtn]));
  }

  function openEdit(row) {
    openRecordModal(row.listKey, row.schema, STATE[row.listKey].find(r => r.id === row.origId), row.tag, () => {
      buildPedidosHubPage(container, { query: searchInput.value, cat: filterSelect.value, statusFilter }, goTo);
    });
  }

  // Mesmo toggle de um clique usado em todas as outras listas da app —
  // aqui a lista agrega várias categorias, por isso usa-se listKey/origId
  // de cada linha para saber a que tabela e registo gravar.
  async function toggleAvisoResultado(r) {
    const updated = await dbUpdate(r.listKey, r.origId, { aviso: !r.aviso });
    if (updated) { STATE[r.listKey] = STATE[r.listKey].map(x => x.id === r.origId ? updated : x); renderResults(); }
    else showDbErrorToast('Não foi possível atualizar o aviso');
  }

  function renderResults() {
    const query = searchInput.value.trim().toLowerCase();
    const cat = filterSelect.value;
    STATE.consultaState = { query: searchInput.value, cat, statusFilter };
    const filtered = unified().filter(r => {
      if (cat !== 'Todos' && r.categoria !== cat) return false;
      if (statusFilter === 'pendentes' && (r.estado === 'Resolvido' || r.estado === 'Cancelado')) return false;
      if (statusFilter === 'em-orcamento' && r.estado !== 'Em Orçamento') return false;
      if (statusFilter === 'satisfeito' && r.estado !== 'Satisfeito') return false;
      if (statusFilter === 'resolvido-ano' && !(r.estado === 'Resolvido' && (r.data || '').startsWith(String(anoCorrente)))) return false;
      if (!query) return true;
      return [r.nome, r.contacto, r.produto, r.responsavel].some(v => (v || '').toLowerCase().includes(query));
    });
    resultsCount.textContent = `${filtered.length} resultado${filtered.length === 1 ? '' : 's'} encontrado${filtered.length === 1 ? '' : 's'}`;

    clear(resultsContainer);
    if (filtered.length === 0) {
      resultsContainer.appendChild(EmptyState('Nenhum resultado para essa pesquisa.'));
      return;
    }
    const thead = h('thead', {}, h('tr', {}, [...['Categoria', 'Nome', 'Contacto', 'Produto', 'Responsável', 'Data', 'Estado', 'Aviso', 'Obs.'].map(t => h('th', {}, t)), h('th', { class: 'text-right' }, 'Ações')]));
    const tbody = h('tbody', {}, filtered.map(r => {
      const avisadoBtn = h('button', {
        class: 'aviso-tag aviso-toggle' + (r.aviso ? ' aviso-ativo' : ' aviso-inativo'),
        title: r.aviso ? 'Utente avisado — clicar para desmarcar' : 'Utente não avisado — clicar para marcar',
      }, Icon(r.aviso ? 'bell' : 'bellOff', { size: 16, strokeWidth: 2.2 }));
      avisadoBtn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => toggleAvisoResultado(r)); });
      return h('tr', { class: rowClassForEstado(r.estado) }, [
        h('td', {}, [h('span', { style: 'display:inline-flex;align-items:center;gap:6px;' }, [Icon(r.icon, { size: 14, style: 'color:var(--pharm-500);' }), r.categoria])]),
        h('td', { class: 'cell-strong' }, r.nome),
        h('td', {}, r.contacto),
        h('td', {}, r.produto || '—'),
        h('td', {}, r.responsavel || '—'),
        h('td', {}, formatDate(r.data)),
        h('td', {}, r.estado ? StatusBadge(r.estado) : h('span', { class: 'cell-muted' }, '—')),
        h('td', {}, avisadoBtn),
        h('td', {}, ObsIndicator(buildDetalhesTexto(r.schema, STATE[r.listKey].find(x => x.id === r.origId) || {}))),
        h('td', { class: 'text-right' }, editIconButton(() => openEdit(r))),
      ]);
    }));
    resultsContainer.appendChild(h('div', { class: 'card' }, h('div', { class: 'table-wrap' }, h('table', {}, [thead, tbody]))));
  }

  searchInput.addEventListener('input', renderResults);
  filterSelect.addEventListener('change', renderResults);
  renderChip();
  renderResults();
}


/* =================================================================
   CALCULADORAS DE PVP
================================================================= */
function calcNum(v) {
  if (v === null || v === undefined) return null;
  const s = String(v).trim().replace(',', '.');
  if (s === '') return null;
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}
function formatEuro(v) {
  if (v === null || v === undefined || !isFinite(v)) return '—';
  return v.toFixed(2).replace('.', ',') + ' €';
}
function formatPercent(v) {
  if (v === null || v === undefined || !isFinite(v)) return '—';
  return v.toFixed(2).replace('.', ',') + ' %';
}

function calcInputField(label, defaultValue, span2) {
  const input = h('input', {
    class: 'calc-input', type: 'number', step: '0.01', min: '0', inputmode: 'decimal',
    placeholder: '0,00',
  });
  input.value = (defaultValue === undefined || defaultValue === null || defaultValue === '') ? '' : String(defaultValue);
  input.addEventListener('keydown', (e) => { if (e.key === '-') e.preventDefault(); });
  input.addEventListener('input', () => {
    if (input.value !== '' && parseFloat(input.value) < 0) input.value = input.value.replace('-', '');
  });
  const field = h('div', { class: 'calc-field' + (span2 ? ' span2' : '') }, [h('label', {}, label), input]);
  return { field, input };
}
function calcSelectField(label, options, span2) {
  const select = h('select', { class: 'calc-input' }, options.map((o, i) => h('option', { value: String(o), selected: i === 0 ? 'selected' : undefined }, `${o}%`)));
  select.value = String(options[0]);
  const field = h('div', { class: 'calc-field' + (span2 ? ' span2' : '') }, [h('label', {}, label), select]);
  return { field, input: select };
}
function calcReadonlyField(label, span2) {
  const input = h('input', { class: 'calc-readonly', type: 'text', readonly: 'readonly' });
  input.value = '—';
  const field = h('div', { class: 'calc-field' + (span2 ? ' span2' : '') }, [h('label', {}, label), input]);
  return { field, input };
}
function calcCardHeader(tone, title, sub) {
  return [
    h('div', { class: 'calc-card-head' }, [
      h('div', { class: `calc-card-icon tone-${tone}` }, Icon('calculator', { size: 15 })),
      h('div', { class: 'calc-card-title' }, title),
    ]),
    h('p', { class: 'calc-card-sub' }, sub),
  ];
}

/* 1. Siloal, Medi, etc. — amarelo */
function buildCalcSiloal() {
  const pvf = calcInputField('PVF (€)', '');
  const iva = calcSelectField('IVA (%)', [23, 13, 6]);
  const margem = calcInputField('Margem (%)', 15);
  const lucro = calcReadonlyField('Lucro (€)');
  const pvp = calcReadonlyField('PVP (€)', true);

  function recompute() {
    const pvfV = calcNum(pvf.input.value);
    const ivaV = calcNum(iva.input.value);
    const margemV = calcNum(margem.input.value);
    if (pvfV === null || ivaV === null || margemV === null) {
      lucro.input.value = '—'; pvp.input.value = '—'; return;
    }
    const lucroV = (pvfV / (1 - (margemV / 100))) - pvfV;
    const pvpV = (pvfV / (1 - (margemV / 100))) * (1 + (ivaV / 100));
    lucro.input.value = formatEuro(lucroV);
    pvp.input.value = formatEuro(pvpV);
  }
  [pvf.input, iva.input, margem.input].forEach(el => { el.addEventListener('input', recompute); el.addEventListener('change', recompute); });
  recompute();

  return h('div', { class: 'calc-card tone-yellow' }, [
    ...calcCardHeader('yellow', 'Calculadora Geral', 'Medi, Siloal, etc.'),
    h('div', { class: 'calc-fields' }, [pvf.field, iva.field, margem.field, lucro.field, pvp.field]),
  ]);
}

/* 2. Sr. Luís — verde */
function buildCalcSrLuis() {
  const pvpE = calcInputField('PVP* (€)', '');
  const iva = calcSelectField('IVA (%)', [23, 13, 6]);
  const margem = calcInputField('Margem (%)', 20);
  const pvfE = calcReadonlyField('PVF* (€)');
  const lucro = calcReadonlyField('Lucro (€)');
  const pvpFinal = calcReadonlyField('PVP (€)', true);

  function recompute() {
    const pvpV = calcNum(pvpE.input.value);
    const ivaV = calcNum(iva.input.value);
    const margemV = calcNum(margem.input.value);
    if (pvpV === null || ivaV === null || margemV === null) {
      pvfE.input.value = '—'; lucro.input.value = '—'; pvpFinal.input.value = '—'; return;
    }
    const pvfCalc = (pvpV / (1 + (ivaV / 100))) * 0.85;
    const pvpFinalV = (pvfCalc / (1 - (margemV / 100))) * (1 + (ivaV / 100));
    const lucroV = (pvpFinalV / (1 + (ivaV / 100))) - pvfCalc;
    pvfE.input.value = formatEuro(pvfCalc);
    lucro.input.value = formatEuro(lucroV);
    pvpFinal.input.value = formatEuro(pvpFinalV);
  }
  [pvpE.input, iva.input, margem.input].forEach(el => { el.addEventListener('input', recompute); el.addEventListener('change', recompute); });
  recompute();

  return h('div', { class: 'calc-card tone-green' }, [
    ...calcCardHeader('green', 'Calculadora STOP Ortopedia', 'Sr. Luís'),
    h('div', { class: 'calc-fields' }, [pvpE.field, iva.field, margem.field, pvfE.field, lucro.field, pvpFinal.field]),
  ]);
}

/* 3. Ervanária, exceto Solgar — rosa, margem fixa 20% */
function buildCalcErvanaria() {
  const pvpE = calcInputField('PVP* (€)', '');
  const iva = calcSelectField('IVA (%)', [23, 13, 6]);
  const margem = calcReadonlyField('Margem (%)');
  margem.input.value = formatPercent(20);
  const pvfE = calcReadonlyField('PVF* (€)');
  const lucro = calcReadonlyField('Lucro (€)');
  const pvpFinal = calcReadonlyField('PVP (€)', true);

  function recompute() {
    const pvpV = calcNum(pvpE.input.value);
    const ivaV = calcNum(iva.input.value);
    if (pvpV === null || ivaV === null) {
      pvfE.input.value = '—'; lucro.input.value = '—'; pvpFinal.input.value = '—'; return;
    }
    const pvfCalc = (pvpV / (1 + (ivaV / 100))) * 0.80;
    const pvpFinalV = (pvfCalc / (1 - (20 / 100))) * (1 + (ivaV / 100));
    const lucroV = (pvpFinalV / (1 + (ivaV / 100))) - pvfCalc;
    pvfE.input.value = formatEuro(pvfCalc);
    lucro.input.value = formatEuro(lucroV);
    pvpFinal.input.value = formatEuro(pvpFinalV);
  }
  [pvpE.input, iva.input].forEach(el => { el.addEventListener('input', recompute); el.addEventListener('change', recompute); });
  recompute();

  return h('div', { class: 'calc-card tone-pink' }, [
    ...calcCardHeader('pink', 'Calculadora Ervanário Portuense', 'Exceto Solgar, Margem Fixa 20%'),

}

/* 4. Ervanária Solgar — laranja */
function buildCalcSolgar() {
  const pvpE = calcInputField('PVP* (€)', '');
  const iva = calcSelectField('IVA (%)', [23, 13, 6]);
  const margem = calcInputField('Margem (%)', 15);
  const lucro = calcReadonlyField('Lucro (€)');
  const pvpFinal = calcReadonlyField('PVP (€)', true);

  function recompute() {
    const pvpV = calcNum(pvpE.input.value);
    const ivaV = calcNum(iva.input.value);
    const margemV = calcNum(margem.input.value);
    if (pvpV === null || ivaV === null || margemV === null) {
      lucro.input.value = '—'; pvpFinal.input.value = '—'; return;
    }
    const valorBase = pvpV / (1 + (ivaV / 100));
    const lucroV = (valorBase / (1 - (margemV / 100))) - valorBase;
    const pvpFinalV = (valorBase / (1 - (margemV / 100))) * (1 + (ivaV / 100));
    lucro.input.value = formatEuro(lucroV);
    pvpFinal.input.value = formatEuro(pvpFinalV);
  }
  [pvpE.input, iva.input, margem.input].forEach(el => { el.addEventListener('input', recompute); el.addEventListener('change', recompute); });
  recompute();

  return h('div', { class: 'calc-card tone-orange' }, [
    ...calcCardHeader('orange', 'Calculadora Solgar', 'Ervanário Portuense'),
    h('div', { class: 'calc-fields' }, [pvpE.field, iva.field, margem.field, lucro.field, pvpFinal.field]),
  ]);
}

/* =================================================================
   LEMBRETES
================================================================= */
function buildLembretesPage(container, goTo, embedded) {
  let showForm = false, editingId = null, draft = emptyRecord(lembretesSchema);
  let searchQuery = '';
  let activeTab = 'pending';
  let formError = '';
  let saving = false;
  let selectedIds = new Set();

  function rerender() { clear(container); container.appendChild(build()); }
  function openNew() { draft = emptyRecord(lembretesSchema); editingId = null; formError = ''; showForm = true; rerender(); }
  function openEdit(r) { draft = Object.assign({}, r); editingId = r.id; formError = ''; showForm = true; rerender(); }
  function openEditSelected() {
    if (selectedIds.size !== 1) return;
    const r = STATE.lembretes.find(x => x.id === [...selectedIds][0]);
    if (r) openEdit(r);
  }
  function toggleSelect(id) { if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); rerender(); }
  async function submit() {
    const missing = checkRequiredFields(draft, lembretesSchema);
    if (missing.length) {
      formError = buildRequiredMessage(missing, lembretesSchema);
      rerender();
      return;
    }
    formError = '';
    draft.responsavel = currentUserName();
    normalizeNameFields(draft);
    saving = true; rerender();
    if (editingId) {
      const updated = await dbUpdate('lembretes', editingId, draft);
      if (updated) STATE.lembretes = STATE.lembretes.map(r => r.id === editingId ? updated : r);
      else formError = `Não foi possível guardar as alterações. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    } else {
      const created = await dbInsert('lembretes', Object.assign({ data: todayISO(), estado: 'Pendente' }, draft));
      if (created) STATE.lembretes = [created, ...STATE.lembretes];
      else formError = `Não foi possível adicionar o lembrete. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    }
    saving = false;
    if (!formError) showForm = false;
    rerender();
  }
  function cancel() { formError = ''; showForm = false; rerender(); }
  function removeSelected() {
    if (selectedIds.size === 0) return;
    const ids = [...selectedIds];
    const plural = ids.length > 1;
    confirmDialog(`ATENÇÃO: Tem a certeza de que quer eliminar permanentemente ${ids.length} registo${plural ? 's' : ''} selecionado${plural ? 's' : ''}? Esta ação não pode ser desfeita!`, async () => {
      const apagados = await bulkSoftDelete('lembretes', ids);
      STATE.lembretes = STATE.lembretes.filter(r => !apagados.has(r.id));
      selectedIds = new Set([...selectedIds].filter(id => !apagados.has(id)));
      showForm = false; rerender();
    }, { danger: true, confirmLabel: 'Eliminar' });
  }
  function conclude(id) {
    confirmDialog('Tem a certeza de que quer marcar este lembrete como concluído?', async () => {
      const updated = await dbUpdate('lembretes', id, { estado: 'Concluído' });
      if (updated) {
        STATE.lembretes = STATE.lembretes.map(r => r.id === id ? updated : r);
        selectedIds = new Set([...selectedIds].filter(x => x !== id));
        showForm = false;
        activeTab = 'resolved';
        rerender();
      } else showDbErrorToast('Não foi possível concluir o lembrete');
    }, { confirmLabel: 'Concluir' });
  }
  function unconclude(id) {
    confirmDialog('Tem a certeza de que quer anular a conclusão deste lembrete e devolvê-lo aos ativos?', async () => {
      const updated = await dbUpdate('lembretes', id, { estado: 'Pendente' });
      if (updated) {
        STATE.lembretes = STATE.lembretes.map(r => r.id === id ? updated : r);
        showForm = false;
        activeTab = 'pending';
        rerender();
      } else showDbErrorToast('Não foi possível anular a conclusão');
    }, { confirmLabel: 'Anular Conclusão' });
  }

  function visibleLembretes() {
    const q = searchQuery.trim().toLowerCase();
    let list = STATE.lembretes;
    if (q) list = list.filter(r => [r.responsavel, r.info].some(v => (v || '').toLowerCase().includes(q)));
    list = activeTab === 'resolved' ? list.filter(r => r.estado === 'Concluído') : list.filter(r => r.estado !== 'Concluído');
    return list.slice().sort((a, b) => (b.data || '').localeCompare(a.data || ''));
  }

  function buildTable(list, mode) {
    if (list.length === 0) {
      const msg = searchQuery
        ? 'Nenhum resultado para essa pesquisa.'
        : (mode === 'resolved' ? 'Ainda não há lembretes concluídos.' : 'Sem lembretes pendentes. Tudo em dia!');
      return EmptyState(msg);
    }
    const thead = h('thead', {}, h('tr', {}, ['', 'Data', 'Responsável', 'Informação / Tarefa', 'Estado'].map(t => h('th', {}, t))));
    const tbody = h('tbody', {}, list.map(r => {
      const pendente = mode !== 'resolved';
      let estadoBadge;
      if (pendente) {
        estadoBadge = h('span', { class: 'badge badge-orange estado-badge-clicavel', title: 'Clicar para marcar como concluído' }, 'PENDENTE');
        estadoBadge.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => conclude(r.id)); });
      } else {
        estadoBadge = h('span', { class: 'badge badge-green' }, 'CONCLUÍDO');
      }
      const selected = selectedIds.has(r.id);
      const row = h('tr', { class: 'selectable-row' + (pendente ? '' : ' row-resolved') + (selected ? ' row-selected' : '') }, [
        buildSelectionCheckbox(r.id, selectedIds, toggleSelect),
        h('td', {}, formatDate(r.data)),
        h('td', { class: 'cell-strong' }, r.responsavel || '—'),
        h('td', { style: 'white-space:normal;max-width:460px;' }, r.info || '—'),
        h('td', {}, estadoBadge),
      ]);
      return row;
    }));
    return h('div', { class: 'card' }, h('div', { class: 'table-wrap' }, h('table', {}, [thead, tbody])));
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    const pendingCount = STATE.lembretes.filter(r => r.estado !== 'Concluído').length;
    const resolvedCount = STATE.lembretes.filter(r => r.estado === 'Concluído').length;
    if (!embedded) {
      wrap.appendChild(withBackButton(buildPageHeader('bell', 'Lembretes', 'Avisos e pendências da equipa.', STATE.lembretes.length), goTo));
    }

    if (showForm) {
      const pendenteAgora = editingId && draft.estado !== 'Concluído';
      wrap.appendChild(buildRecordForm(lembretesSchema, draft, {
        editing: !!editingId, onSubmit: submit, onCancel: cancel,
        errorMessage: formError, saving,
        onConclude: (editingId && pendenteAgora) ? () => conclude(editingId) : null, concludeLabel: 'Marcar como Concluído',
        onRevert: (editingId && draft.estado === 'Concluído') ? () => unconclude(editingId) : null, revertLabel: 'Anular Conclusão',
        onDelete: null,
      }));
    }

    const tabsRow = h('div', { class: 'tabs-row' }, [
      h('button', { class: 'tab-btn tone-orange' + (activeTab === 'pending' ? ' active' : ''), onclick: () => { activeTab = 'pending'; selectedIds = new Set(); rerender(); } }, [
        Icon('bell', { size: 14 }), h('span', {}, 'Lembretes Pendentes'), h('span', { class: 'tab-count' }, String(pendingCount)),
      ]),
      h('button', { class: 'tab-btn tone-green' + (activeTab === 'resolved' ? ' active' : ''), onclick: () => { activeTab = 'resolved'; selectedIds = new Set(); rerender(); } }, [
        Icon('checkcircle', { size: 14 }), h('span', {}, 'Histórico de Concluídos'), h('span', { class: 'tab-count' }, String(resolvedCount)),
      ]),
    ]);
    wrap.appendChild(tabsRow);

    const searchInput = h('input', { class: 'search-input', type: 'text', placeholder: 'Pesquisar por responsável ou informação...' });
    searchInput.value = searchQuery;
    const resultsCount = h('p', { class: 'results-count' }, '');
    const resultsContainer = h('div', {});
    function renderResults() {
      const list = visibleLembretes();
      resultsCount.textContent = `${list.length} resultado${list.length === 1 ? '' : 's'} encontrado${list.length === 1 ? '' : 's'}`;
      clear(resultsContainer);
      resultsContainer.appendChild(buildTable(list, activeTab === 'resolved' ? 'resolved' : 'pending'));
    }
    searchInput.addEventListener('input', () => { searchQuery = searchInput.value; renderResults(); });

    const searchCard = h('div', { class: 'card card-pad', style: 'margin-bottom:22px;' }, [
      h('div', { class: 'search-row' }, [
        h('div', { class: 'search-input-wrap' }, [h('span', { class: 'icon' }, Icon('search', { size: 15 })), searchInput]),
      ]),
      resultsCount,
    ]);
    wrap.appendChild(searchCard);
    wrap.appendChild(resultsContainer);
    renderResults();

    if (!showForm) {
      wrap.appendChild(buildBottomActionBar({
        selectedCount: selectedIds.size,
        addLabel: 'Novo lembrete',
        onAdd: openNew,
        onEdit: openEditSelected,
        onDelete: removeSelected,
        onConclude: activeTab === 'pending' ? () => { if (selectedIds.size === 1) conclude([...selectedIds][0]); } : null,
        concludeLabel: 'Marcar como Concluído',
      }));
    }
    return wrap;
  }

  rerender();
}

];
const SUBTIPOS_RASTREIO = ['Auditivo', 'Cardiovascular', 'Glicémia', 'Outro'];
const INTERVALOS_VAGA_MIN = [10, 15, 20, 30, 45, 60];

function eventoLabel(ev) {
  if (ev.tipoEvento === 'Rastreio') return `Rastreio · ${ev.subtipoRastreio || '—'}`;
  if (ev.tipoEvento === 'Conselheira') return `Conselheira · ${ev.marcaConselheira || '—'}`;
  return ev.tipoEvento || 'Evento';
}

function eventoViewSchema(ev) {

  if (ev.tipoEvento === 'Rastreio') {

  schema.push({ name: 'horaFinal', label: 'Hora Final', type: 'text', size: 'xs' });

  schema.push({ name: 'responsavel', label: 'Responsável', type: 'text', size: 'sm' });
  schema.push({ name: 'notas', label: 'Notas', type: 'textarea', col: 2 });
  return schema;
}
function proximoEvento() {
  const hoje = todayISO();
  const futuros = (STATE.eventos || []).filter(ev => ev.dataEvento && ev.dataEvento >= hoje);
  if (futuros.length === 0) return null;
  return futuros.slice().sort((a, b) => a.dataEvento.localeCompare(b.dataEvento))[0];
}
// Próxima consulta/serviço de Agenda (Nutrição, Podologia, Prima Corpus,
// etc.) agendada — em qualquer prestador, não só o que o utilizador está a
// ver de momento.
function proximaAgendaMarcacao() {
  const hoje = todayISO();
  const futuras = (STATE.agendaMarcacoes || []).filter(m => m.tipoLinha !== 'bloqueado' && m.data && m.data >= hoje && String(m.nomeCliente || '').trim());
  if (!futuras.length) return null;
  return futuras.slice().sort((a, b) => (a.data + normalizarHora(a.hora)).localeCompare(b.data + normalizarHora(b.hora)))[0];
}

// Gera a grelha de horários "HH:MM" entre horaInicio e horaFim (exclusive),
// espaçados de intervaloMin em intervaloMin minutos — equivalente ao
// agendaGerarSlots(), mas parametrizado por dia de evento.
function eventoGerarSlots(horaInicio, horaFim, intervaloMin) {
  const slots = [];
  const ip = String(horaInicio || '09:00').split(':').map(v => parseInt(v, 10));
  const fp = String(horaFim || '18:00').split(':').map(v => parseInt(v, 10));
  let hh = isNaN(ip[0]) ? 9 : ip[0];
  let mm = isNaN(ip[1]) ? 0 : ip[1];
  const hf = isNaN(fp[0]) ? 18 : fp[0];
  const mf = isNaN(fp[1]) ? 0 : fp[1];
  const step = (parseInt(intervaloMin, 10) > 0) ? parseInt(intervaloMin, 10) : 15;
  let guard = 0;
  while ((hh < hf || (hh === hf && mm < mf)) && guard < 500) {
    slots.push(`${pad2(hh)}:${pad2(mm)}`);
    mm += step;
    while (mm >= 60) { mm -= 60; hh += 1; }
    guard += 1;
  }
  return slots;
}

// Contagem de dias de evento (por tipo) num dado mês/ano — usada no badge
// por baixo do cabeçalho de cada mês na vista de calendário do Eventos.
function eventoContagemMes(tipo, year, month) {
  const prefixo = `${year}-${pad2(month + 1)}`;
  return (STATE.eventos || []).filter(ev => ev.tipoEvento === tipo && (ev.dataEvento || '').startsWith(prefixo)).length;
}
function eventoContagemLabel(n) {
  return n === 1 ? '1 dia configurado' : `${n} dias configurados`;
}

/* ---- Calendário mensal dedicado ao Eventos (evita tocar no calendário
   partilhado das Agendas / Página Inicial) ---- */
function buildEventoMonthCalendar(tipo, year, month, posicao, onDayClick) {
  const firstDay = new Date(year, month, 1);
  const startWeekday = (firstDay.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = todayISO();
  const tipoInfo = EVENTO_TIPOS.find(t => t.key === tipo);

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(h('div', { class: 'cal-cell cal-cell-empty' }));
  for (let d = 1; d <= daysInMonth; d++) {
    const dateISO = `${year}-${pad2(month + 1)}-${pad2(d)}`;
    const ev = (STATE.eventos || []).find(e => e.tipoEvento === tipo && e.dataEvento === dateISO);
    const isToday = dateISO === todayStr;
    const isPast = dateISO < todayStr;
    const cell = h('div', {
      class: 'cal-cell'
        + (isToday ? ' cal-cell-today' : '')
        + (ev ? ' cal-cell-marcado' : '')
        + (isPast ? ' cal-cell-passado' : ' cal-cell-clicavel'),
      style: ev ? `background:${tipoInfo.cor};` : '',
      title: ev ? eventoLabel(ev) : undefined,
    }, String(d));
    cell.addEventListener('click', (e) => { e.stopPropagation(); onDayClick(dateISO, isPast, ev || null); });
    cells.push(cell);
  }

  const weekdayRow = h('div', { class: 'cal-weekdays' }, DIAS_SEMANA_PT.map(d => h('div', { class: 'cal-weekday' }, d)));
  const total = eventoContagemMes(tipo, year, month);
  return h('div', { class: `card card-pad cal-card cal-card-${posicao}` }, [
    h('h3', { class: 'dash-card-title' }, `${MESES_PT[month]} ${year}`),
    h('p', { class: 'cal-card-contagem' }, eventoContagemLabel(total)),
    weekdayRow,
    h('div', { class: 'cal-grid' }, cells),
  ]);
}
function buildEventoCalendarioCarrossel(tipo, onDayClick) {
  let offset = 0;
  const wrap = h('div', { class: 'cal-carousel-outer' });

  function render() {
    clear(wrap);
    const hoje = new Date();
    const posicoes = ['passado', 'atual', 'futuro', 'futuro'];
    const meses = [-1, 0, 1, 2].map((i, idx) => {
      const d = new Date(hoje.getFullYear(), hoje.getMonth() + offset + i, 1);
      return buildEventoMonthCalendar(tipo, d.getFullYear(), d.getMonth(), posicoes[idx], onDayClick);
    });
    const prevBtn = h('button', { class: 'cal-nav-btn-grande', title: 'Recuar um mês', 'aria-label': 'Recuar um mês' }, Icon('arrowleft', { size: 24, strokeWidth: 2.6 }));
    prevBtn.addEventListener('click', () => { offset -= 1; render(); });
    const nextBtn = h('button', { class: 'cal-nav-btn-grande', title: 'Avançar um mês', 'aria-label': 'Avançar um mês' }, Icon('arrowright', { size: 24, strokeWidth: 2.6 }));
    nextBtn.addEventListener('click', () => { offset += 1; render(); });
    wrap.appendChild(h('div', { class: 'cal-carousel-row' }, [prevBtn, h('div', { class: 'cal-pair cal-carousel-4' }, meses), nextBtn]));
  }
  render();
  return wrap;
}

/* ---- Modal do "dia de evento": configuração inicial (se ainda não

function buildEventoDiaModal(tipo, dateISO, evento, onSaved) {
  const overlay = h('div', { class: 'modal-overlay' });
  function close() { overlay.remove(); }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

  const tipoInfo = EVENTO_TIPOS.find(t => t.key === tipo);
  const isPast = dateISO < todayISO();
  let currentEvento = evento;
  let marcacoes = [];
  let loadingMarc = !!currentEvento;

  // Formulário de configuração de um novo dia
  let cfgDraft = {
    horaInicial: '09:00', horaFinal: '18:00', intervaloMin: '15', notas: '',
    subtipoRastreio: '', subtipoRastreioOutro: '',
    marcaConselheira: '', campanha: '',
    miniFaciais: false, miniFaciaisHoraInicial: '09:00', miniFaciaisHoraFinal: '18:00', miniFaciaisIntervaloMin: '20',
  };
  let cfgError = '';
  let cfgSaving = false;
  let editingEvento = false; // true quando o formulário está a editar (não a criar) o dia

  // Formulário de nova marcação (ou encaixe) dentro de um grupo de vagas
  let showForm = false; // false | { grupo, hora, encaixe }
  let formDraft = {};
  let formError = '';
  let saving = false;

  function marcacoesDoGrupo(grupo) { return marcacoes.filter(m => (m.grupoVaga || 'principal') === grupo); }

  async function carregarMarcacoes() {
    if (!currentEvento) { marcacoes = []; loadingMarc = false; return; }
    loadingMarc = true; render();
    marcacoes = await dbFetchMarcacoes(currentEvento.id);
    loadingMarc = false; render();
  }

  /* ---- Criação do dia ---- */
  async function submitCfg() {
    if (tipo === 'Rastreio' && !String(cfgDraft.subtipoRastreio || '').trim()) { cfgError = 'Por favor, escolha o Tipo de Rastreio.'; render(); return; }
    if (tipo === 'Rastreio' && cfgDraft.subtipoRastreio === 'Outro' && !String(cfgDraft.subtipoRastreioOutro || '').trim()) { cfgError = 'Indique o tipo de rastreio em "Outro".'; render(); return; }
    if (tipo === 'Conselheira' && !String(cfgDraft.marcaConselheira || '').trim()) { cfgError = 'Por favor, preencha a Marca.'; render(); return; }
    if (tipo === 'Rastreio' && (!/^\d{2}:\d{2}$/.test(String(cfgDraft.horaInicial || '')) || !/^\d{2}:\d{2}$/.test(String(cfgDraft.horaFinal || '')))) {
      cfgError = 'Indique a Hora Inicial e a Hora Final no formato HH:MM.'; render(); return;
    }
    if (tipo === 'Conselheira' && cfgDraft.miniFaciais && (!/^\d{2}:\d{2}$/.test(String(cfgDraft.miniFaciaisHoraInicial || '')) || !/^\d{2}:\d{2}$/.test(String(cfgDraft.miniFaciaisHoraFinal || '')))) {
      cfgError = 'Indique a Hora Inicial e a Hora Final das Mini-Faciais no formato HH:MM.'; render(); return;
    }
    cfgError = '';
    cfgSaving = true; render();

    const payload = {
      tipoEvento: tipo, dataEvento: dateISO, responsavel: currentUserName(), notas: cfgDraft.notas || '',
    };
    if (tipo === 'Rastreio') {
      payload.horaInicial = cfgDraft.horaInicial;
      payload.horaFinal = cfgDraft.horaFinal;
      payload.intervaloMin = parseInt(cfgDraft.intervaloMin, 10) || 15;
      payload.subtipoRastreio = cfgDraft.subtipoRastreio === 'Outro' ? cfgDraft.subtipoRastreioOutro : cfgDraft.subtipoRastreio;
    } else if (tipo === 'Conselheira') {
      payload.marcaConselheira = cfgDraft.marcaConselheira;
      payload.campanha = cfgDraft.campanha || '';
      payload.miniFaciais = !!cfgDraft.miniFaciais;
      if (cfgDraft.miniFaciais) {
        payload.miniFaciaisHoraInicial = cfgDraft.miniFaciaisHoraInicial;
        payload.miniFaciaisHoraFinal = cfgDraft.miniFaciaisHoraFinal;
        payload.miniFaciaisIntervaloMin = parseInt(cfgDraft.miniFaciaisIntervaloMin, 10) || 20;
      }
    }

    const created = editingEvento
      ? await dbUpdate('eventos', currentEvento.id, payload)
      : await dbInsert('eventos', payload);
    if (!created) {
      cfgError = `Não foi possível ${editingEvento ? 'guardar as alterações' : 'criar o dia'}. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
      cfgSaving = false; render(); return;
    }

    if (editingEvento) {
      const miniFaciaisJustEnabled = !!payload.miniFaciais && !currentEvento.miniFaciais;
      STATE.eventos = STATE.eventos.map(e => e.id === created.id ? created : e);
      currentEvento = created;
      if (miniFaciaisJustEnabled) {
        const slotsMini = eventoGerarSlots(payload.miniFaciaisHoraInicial, payload.miniFaciaisHoraFinal, payload.miniFaciaisIntervaloMin);
        const rows = slotsMini.map(hora => ({
          eventoId: created.id, hora, grupoVaga: 'mini_facial', tipoLinha: 'vaga', estado: '', aviso: false,
          nomeCliente: '', nFicha: '', contacto: '', observacoes: '', responsavel: currentUserName(),
        }));
        if (rows.length) await dbInsertMarcacoesBulk(rows);
      }
      editingEvento = false;
      cfgSaving = false;
      if (onSaved) onSaved();
      await carregarMarcacoes();
      return;
    }

    STATE.eventos = [created, ...STATE.eventos];

    const rows = [];
    if (tipo === 'Rastreio') {
      const slotsPrincipais = eventoGerarSlots(payload.horaInicial, payload.horaFinal, payload.intervaloMin);
      slotsPrincipais.forEach(hora => rows.push({
        eventoId: created.id, hora, grupoVaga: 'principal', tipoLinha: 'vaga', estado: '', aviso: false,
        nomeCliente: '', nFicha: '', contacto: '', observacoes: '', responsavel: currentUserName(),
      }));
    }
    if (payload.miniFaciais) {
      const slotsMini = eventoGerarSlots(payload.miniFaciaisHoraInicial, payload.miniFaciaisHoraFinal, payload.miniFaciaisIntervaloMin);
      slotsMini.forEach(hora => rows.push({
        eventoId: created.id, hora, grupoVaga: 'mini_facial', tipoLinha: 'vaga', estado: '', aviso: false,
        nomeCliente: '', nFicha: '', contacto: '', observacoes: '', responsavel: currentUserName(),
      }));
    }
    if (rows.length) await dbInsertMarcacoesBulk(rows);

    currentEvento = created;
    cfgSaving = false;
    if (onSaved) onSaved();
    await carregarMarcacoes();
  }

  function abrirEdicaoEvento() {

    cfgDraft = {
      horaInicial: currentEvento.horaInicial || '09:00',
      horaFinal: currentEvento.horaFinal || '18:00',
      intervaloMin: currentEvento.intervaloMin || '15',
      notas: currentEvento.notas || '',
      subtipoRastreio: outroCustom ? 'Outro' : (currentEvento.subtipoRastreio || ''),

      marcaConselheira: currentEvento.marcaConselheira || '',
      campanha: currentEvento.campanha || '',
      miniFaciais: !!currentEvento.miniFaciais,

  /* ---- Ações sobre uma vaga (idênticas às da Agenda) ---- */
  function abrirNovaMarcacao(grupo, hora, vagaExistente) {
    formDraft = { nomeCliente: '', nFicha: '', contacto: '', observacoes: '', aviso: false };

  }
  function abrirEncaixe(grupo) {
    formDraft = { hora: '', nomeCliente: '', nFicha: '', contacto: '', observacoes: '', aviso: false };
    formError = ''; showForm = { grupo, hora: '', encaixe: true }; render();
  }
  function cancelForm() { showForm = false; formError = ''; render(); }

  async function submitForm() {
    if (!String(formDraft.nomeCliente || '').trim()) { formError = 'Por favor, preencha o Nome do Cliente.'; render(); return; }
    if (!String(formDraft.contacto || '').trim()) { formError = 'Por favor, preencha o Contacto.'; render(); return; }
    if (!/^[0-9]{9}$/.test(String(formDraft.contacto || '').trim())) { formError = 'O Contacto deve ter exatamente 9 dígitos numéricos.'; render(); return; }
    let hora = showForm.hora;
    if (showForm.encaixe) {
      formDraft.hora = normalizarHora(formDraft.hora);
      if (!/^\d{2}:\d{2}$/.test(formDraft.hora)) { formError = 'Indique a hora do encaixe no formato HH:MM (ex: 14:10).'; render(); return; }
      hora = formDraft.hora;
      const colide = marcacoesDoGrupo(showForm.grupo).some(m => m.hora === hora);
      if (colide) { formError = `ATENÇÃO: já existe uma vaga às ${hora} neste grupo. Escolha outra hora.`; render(); return; }
    }
    formError = '';
    saving = true; render();
    const payload = {
      eventoId: currentEvento.id, hora, grupoVaga: showForm.grupo, tipoLinha: 'vaga', estado: 'agendada',
      nomeCliente: toTitleCasePT(formDraft.nomeCliente), nFicha: formDraft.nFicha || '', contacto: formDraft.contacto || '',
      observacoes: formDraft.observacoes || '', aviso: !!formDraft.aviso, responsavel: currentUserName(),
    };
    // Se já existe uma vaga pré-criada vazia para esta hora, atualiza-a em
    // vez de inserir outra linha — evita duplicar o slot na base de dados.
    const created = showForm.vagaId
      ? await dbUpdateMarcacao(showForm.vagaId, payload)
      : await dbInsertMarcacao(payload);
    saving = false;
    if (created) {
      marcacoes = showForm.vagaId ? marcacoes.map(x => x.id === created.id ? created : x) : [...marcacoes, created];
      showForm = false;
      if (onSaved) onSaved();
      render();
    } else {
      formError = `Não foi possível guardar. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
      render();
    }
  }

  function bloquearVaga(grupo, hora, vagaExistente) {
    confirmDialog('Tem a certeza de que pretende bloquear esta vaga?', async () => {
      const payload = { eventoId: currentEvento.id, hora, grupoVaga: grupo, tipoLinha: 'bloqueado', estado: '', responsavel: currentUserName() };
      const created = vagaExistente
        ? await dbUpdateMarcacao(vagaExistente.id, payload)
        : await dbInsertMarcacao(payload);
      if (created) {
        marcacoes = vagaExistente ? marcacoes.map(x => x.id === created.id ? created : x) : [...marcacoes, created];
        if (onSaved) onSaved(); render();
      } else showDbErrorToast('Não foi possível bloquear a vaga');
    });
  }
  function desbloquearVaga(m) {
    confirmDialog('Tem a certeza de que pretende desbloquear esta vaga?', async () => {
      const ok = await dbDeleteMarcacao(m.id);
      if (ok) { marcacoes = marcacoes.filter(x => x.id !== m.id); if (onSaved) onSaved(); render(); }
      else showDbErrorToast('Não foi possível desbloquear a vaga');
    });
  }
  function eliminarMarcacao(m) {
    confirmDialog(`Eliminar a marcação de ${m.nomeCliente || 'sem nome'}?`, async () => {
      const ok = await dbDeleteMarcacao(m.id);
      if (ok) { marcacoes = marcacoes.filter(x => x.id !== m.id); if (onSaved) onSaved(); render(); }
      else showDbErrorToast('Não foi possível eliminar a marcação');
    }, { danger: true, confirmLabel: 'Eliminar' });
  }
  function confirmarMarcacao(m) {
    confirmDialog('Tem a certeza que pretende confirmar esta vaga?', async () => {
      const updated = await dbUpdateMarcacao(m.id, { estado: 'confirmada' });
      if (updated) { marcacoes = marcacoes.map(x => x.id === m.id ? updated : x); if (onSaved) onSaved(); render(); }
      else showDbErrorToast('Não foi possível confirmar a vaga');
    }, { confirmLabel: 'Confirmar' });
  }
  function cancelarMarcacao(m) {
    confirmDialog('Tem a certeza que pretende cancelar esta vaga?', async () => {
      const updated = await dbUpdateMarcacao(m.id, { estado: 'cancelada' });
      if (updated) { marcacoes = marcacoes.map(x => x.id === m.id ? updated : x); if (onSaved) onSaved(); render(); }
      else showDbErrorToast('Não foi possível cancelar a vaga');
    }, { danger: true, confirmLabel: 'Cancelar Vaga' });
  }
  async function toggleAviso(m) {
    const updated = await dbUpdateMarcacao(m.id, { aviso: !m.aviso });
    if (updated) { marcacoes = marcacoes.map(x => x.id === m.id ? updated : x); if (onSaved) onSaved(); render(); }
    else showDbErrorToast('Não foi possível atualizar o aviso');
  }
  // "Fechar Dia" só é permitido quando não há nenhuma marcação ativa (vagas
  // vazias/bloqueadas não contam, e uma marcação já cancelada também não).
  function eventoTemMarcacaoAtiva() {
    return marcacoes.some(m => m.tipoLinha !== 'bloqueado' && !vagaVazia(m) && m.estado !== 'cancelada');
  }
  function eliminarDia() {
    if (eventoTemMarcacaoAtiva()) return; // bloqueado — nunca deveria disparar, mas por segurança
    confirmDialog('Tem a certeza de que quer fechar este dia? O dia e todas as suas vagas livres deixam de ficar disponíveis no calendário.', async () => {
      const ok = await dbDelete('eventos', currentEvento.id);
      if (ok) { STATE.eventos = STATE.eventos.filter(e => e.id !== currentEvento.id); if (onSaved) onSaved(); close(); }
      else showDbErrorToast('Não foi possível fechar o dia');
    }, { danger: true, confirmLabel: 'Fechar Dia' });
  }
  function buildAbrirFecharDiaEventoBtn() {
    if (isPast) return null;
    if (!currentEvento) {
      const btn = h('button', { class: 'btn btn-secondary', title: 'Cria e ativa este dia de evento' }, [Icon('lockOpen', { size: 14, strokeWidth: 2.2 }), ' Abrir Dia']);
      btn.addEventListener('click', () => requireAuth(submitCfg));
      return btn;
    }
    if (editingEvento) return null; // o próprio formulário de edição já trata de guardar
    const bloqueado = eventoTemMarcacaoAtiva();
    const btn = h('button', {
      class: 'btn btn-secondary',
      disabled: bloqueado ? 'disabled' : undefined,
      title: bloqueado ? 'Cancele ou remova todas as marcações para poder fechar este dia.' : 'Fecha este dia e remove a sua disponibilidade no calendário',
    }, [Icon('lockClosed', { size: 14, strokeWidth: 2.2 }), ' Fechar Dia']);
    if (!bloqueado) btn.addEventListener('click', () => requireAuth(eliminarDia));
    return btn;
  }
  const headerAcoesEl = h('div', { style: 'display:flex;align-items:center;gap:8px;' });
  function renderHeaderAcoes() {
    clear(headerAcoesEl);
    const btn = buildAbrirFecharDiaEventoBtn();
    if (btn) headerAcoesEl.appendChild(btn);
  }

  // Ao criar um dia, TODOS os slots são pré-criados na base de dados já
  // (para reservar a hora), mas sem dados de utente — por isso uma vaga só
  // conta como "ocupada" quando tem mesmo Nome ou Contacto preenchidos.
  function vagaVazia(m) {
    return !m || (m.tipoLinha !== 'bloqueado' && !String(m.nomeCliente || '').trim() && !String(m.contacto || '').trim());
  }
  function estadoClasseVaga(m) {
    if (m.estado === 'confirmada') return ' agenda-slot-confirmada';
    if (m.estado === 'cancelada') return ' agenda-slot-cancelada';
    return '';
  }
  function estadoSufixoVaga(m) {
    if (m.estado === 'confirmada') return ' · Confirmada';
    if (m.estado === 'cancelada') return ' · Cancelada';
    return '';
  }
  function avisoToggleBtn(m) {
    const btn = h('button', { class: 'aviso-tag aviso-toggle' + (m.aviso ? ' aviso-ativo' : ' aviso-inativo'), title: m.aviso ? 'Utente avisado — clicar para desmarcar' : 'Utente não avisado — clicar para marcar' },
      Icon(m.aviso ? 'bell' : 'bellOff', { size: 16, strokeWidth: 2.2 }));
    btn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => toggleAviso(m)); });
    return btn;
  }
  function statusActionBtns(m) {
    const confirmBtn = h('button', { class: 'btn-fab-sm tone-green', title: 'Confirmar', 'aria-label': 'Confirmar' }, Icon('check', { size: 13, strokeWidth: 2.4 }));
    confirmBtn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => confirmarMarcacao(m)); });
    const cancelBtn = h('button', { class: 'btn-fab-sm tone-orange', title: 'Cancelar', 'aria-label': 'Cancelar' }, Icon('x', { size: 13, strokeWidth: 2.4 }));
    cancelBtn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => cancelarMarcacao(m)); });
    return [confirmBtn, cancelBtn];
  }

  function buildBookingForm() {
    const nomeInput = h('input', { class: 'input', placeholder: 'Nome do Cliente' });
    nomeInput.value = formDraft.nomeCliente || '';
    nomeInput.addEventListener('input', () => { formDraft.nomeCliente = nomeInput.value; });
    const fichaInput = h('input', { class: 'input', placeholder: 'Nº Ficha' });
    fichaInput.value = formDraft.nFicha || '';
    fichaInput.addEventListener('input', () => { formDraft.nFicha = fichaInput.value; });
    const contactoInput = h('input', { class: 'input', placeholder: 'Contacto (9 dígitos)', inputmode: 'numeric', pattern: '[0-9]{9}', maxlength: '9' });
    contactoInput.value = formDraft.contacto || '';
    contactoInput.addEventListener('input', () => {
      const cleaned = contactoInput.value.replace(/\D/g, '').slice(0, 9);
      if (cleaned !== contactoInput.value) contactoInput.value = cleaned;
      formDraft.contacto = contactoInput.value;
    });
    const obsInput = h('input', { class: 'input', placeholder: 'Observações' });
    obsInput.value = formDraft.observacoes || '';
    obsInput.addEventListener('input', () => { formDraft.observacoes = obsInput.value; });

    const campos = [];
    if (showForm.encaixe) {
      const horaInput = h('input', { class: 'input', placeholder: 'Hora (ex: 14:10)' });
      horaInput.value = formDraft.hora || '';
      horaInput.addEventListener('input', () => { formDraft.hora = horaInput.value; });
      campos.push(h('div', { class: 'field field-xs' }, [h('label', {}, 'Hora'), horaInput]));
    }
    const avisoCb = h('input', { type: 'checkbox', checked: !!formDraft.aviso });
    avisoCb.addEventListener('change', () => { formDraft.aviso = avisoCb.checked; });

    campos.push(h('div', { class: 'field span2' }, [h('label', {}, 'Nome do Cliente *'), nomeInput]));
    campos.push(h('div', { class: 'field field-xs' }, [h('label', {}, 'Nº Ficha'), fichaInput]));
    campos.push(h('div', { class: 'field field-sm' }, [h('label', {}, 'Contacto *'), contactoInput]));
    campos.push(h('label', { class: 'checkbox-field' }, [avisoCb, h('span', {}, 'Aviso ao cliente')]));
    campos.push(h('div', { class: 'field span2' }, [h('label', {}, 'Observações'), obsInput]));

    const saveBtn = h('button', { class: 'btn btn-primary', onclick: saving ? null : () => requireAuth(submitForm), disabled: saving ? 'disabled' : undefined }, saving ? 'A guardar…' : 'Confirmar Marcação');
    const cancelBtn = h('button', { class: 'btn btn-secondary', onclick: cancelForm }, 'Cancelar');
    const children = [h('div', { class: 'form-grid' }, campos)];
    if (formError) children.push(h('p', { class: 'form-error' }, formError));
    children.push(h('div', { class: 'form-actions' }, [saveBtn, cancelBtn]));
    return h('div', { class: 'card card-pad' }, children);
  }

  function buildVagasGrupo(grupo, titulo, slotsPadrao) {
    const doGrupo = marcacoesDoGrupo(grupo);
    const ocupacao = {};
    doGrupo.forEach(m => { ocupacao[m.hora] = m; });
    const linhasGrade = slotsPadrao.map(hora => {
      const m = ocupacao[hora];
      let node;
      if (vagaVazia(m)) {
        if (isPast) {
          node = h('div', { class: 'agenda-slot-row agenda-vaga-passada' }, [h('span', { class: 'agenda-slot-hora' }, hora), h('span', { class: 'agenda-slot-label cell-muted' }, '—')]);
        } else {
          const bookBtn = h('button', { class: 'btn-fab-sm tone-blue', title: 'Marcar', 'aria-label': 'Marcar' }, Icon('plus', { size: 13, strokeWidth: 2.4 }));
          bookBtn.addEventListener('click', () => requireAuth(() => abrirNovaMarcacao(grupo, hora, m)));
          const blockBtn = h('button', { class: 'btn-fab-sm tone-gray', title: 'Bloquear vaga', 'aria-label': 'Bloquear vaga' }, Icon('lockClosed', { size: 12, strokeWidth: 2.2 }));
          blockBtn.addEventListener('click', () => requireAuth(() => bloquearVaga(grupo, hora, m)));
          node = h('div', { class: 'agenda-slot-row agenda-slot-livre agenda-vaga-futura' }, [
            h('span', { class: 'agenda-slot-hora' }, hora), h('span', { class: 'agenda-slot-label cell-muted' }, 'Vaga livre'),
            h('div', { class: 'row-actions' }, [bookBtn, blockBtn]),
          ]);
        }
      } else if (m.tipoLinha === 'bloqueado') {
        const acoes = [];
        if (!isPast) {
          const reabrirBtn = h('button', { class: 'btn-fab-sm tone-gray', title: 'Reabrir vaga', 'aria-label': 'Reabrir vaga' }, Icon('lockOpen', { size: 12, strokeWidth: 2.2 }));
          reabrirBtn.addEventListener('click', () => requireAuth(() => desbloquearVaga(m)));
          acoes.push(reabrirBtn);
        }
        node = h('div', { class: 'agenda-slot-row agenda-slot-bloqueado' + (isPast ? ' agenda-vaga-passada' : '') }, [
          h('span', { class: 'agenda-slot-hora' }, hora), h('span', { class: 'agenda-slot-label' }, 'Indisponível'),
          h('div', { class: 'row-actions' }, acoes),
        ]);
      } else {
        const acoes = [avisoToggleBtn(m)];
        if (!isPast) {
          acoes.push(...statusActionBtns(m));
          const delBtn = h('button', { class: 'btn-fab-sm tone-red', title: 'Eliminar', 'aria-label': 'Eliminar' }, Icon('trash', { size: 12, strokeWidth: 2.2 }));
          delBtn.addEventListener('click', () => requireAuth(() => eliminarMarcacao(m)));
          acoes.push(delBtn);
        }
        node = h('div', { class: 'agenda-slot-row agenda-slot-ocupado' + estadoClasseVaga(m) + (isPast ? ' agenda-vaga-passada' : '') }, [
          h('span', { class: 'agenda-slot-hora' }, hora),
          h('span', { class: 'agenda-slot-label cell-strong' }, `${m.nomeCliente || '—'}${estadoSufixoVaga(m)}`),
          h('div', { class: 'row-actions' }, acoes),
        ]);
      }
      return { hora, node };
    });

    const encaixes = ordenarPorHora(doGrupo.filter(m => !slotsPadrao.includes(m.hora)));
    const linhasEncaixe = encaixes.map(m => {
      const acoes = [avisoToggleBtn(m)];
      if (!isPast) {
        acoes.push(...statusActionBtns(m));
        const delBtn = h('button', { class: 'btn-fab-sm tone-red', title: 'Eliminar vaga extra', 'aria-label': 'Eliminar vaga extra' }, Icon('trash', { size: 12, strokeWidth: 2.2 }));
        delBtn.addEventListener('click', () => requireAuth(() => eliminarMarcacao(m)));
        acoes.push(delBtn);
      }
      const node = h('div', { class: 'agenda-slot-row agenda-slot-encaixe' + estadoClasseVaga(m) + (isPast ? ' agenda-vaga-passada' : '') }, [
        h('span', { class: 'agenda-slot-hora' }, `${m.hora} · Encaixe`), h('span', { class: 'agenda-slot-label cell-strong' }, `${m.nomeCliente || '—'}${estadoSufixoVaga(m)}`),
        h('div', { class: 'row-actions' }, acoes),
      ]);
      return { hora: normalizarHora(m.hora), node };
    });

    // Intercala as linhas de encaixe com a grelha padrão pela hora real —
    // em vez de as amontoar sempre no fim, cada encaixe aparece encostado
    // ao horário certo entre as vagas normais.
    const linhas = linhasGrade.concat(linhasEncaixe)
      .sort((a, b) => normalizarHora(a.hora).localeCompare(normalizarHora(b.hora)))
      .map(item => item.node);

    const children = [h('h3', { class: 'dash-card-title' }, titulo), h('div', { class: 'agenda-slots-list' }, linhas)];
    if (!isPast) {
      const encaixeBtn = h('button', { class: 'btn btn-secondary', style: 'margin-top:10px;width:100%;', onclick: () => requireAuth(() => abrirEncaixe(grupo)) }, [Icon('plus', { size: 14 }), ' Nova Linha de Encaixe']);
      children.push(encaixeBtn);
    }
    return h('div', { class: 'card card-pad', style: 'margin-bottom:16px;' }, children);
  }

  const bodyEl = h('div', {});
  function render() {
    renderHeaderAcoes();
    clear(bodyEl);
    if (!currentEvento || editingEvento) { bodyEl.appendChild(buildCfgForm()); return; }
    if (loadingMarc) { bodyEl.appendChild(EmptyState('A carregar vagas…')); return; }
    if (showForm) { bodyEl.appendChild(buildBookingForm()); return; }

    if (!isPast) {
      const editEventoBtn = h('button', { class: 'btn btn-secondary', onclick: () => requireAuth(abrirEdicaoEvento) }, [Icon('pencil', { size: 14 }), ' Editar Evento']);
      bodyEl.appendChild(h('div', { class: 'form-actions', style: 'margin-bottom:16px;margin-top:0;' }, [editEventoBtn]));
    }

    const infoLinhas = [];
    if (currentEvento.tipoEvento === 'Rastreio') infoLinhas.push(`Tipo: ${currentEvento.subtipoRastreio || '—'}`);
    if (currentEvento.tipoEvento === 'Conselheira') {
      infoLinhas.push(`Marca: ${currentEvento.marcaConselheira || '—'}`);
      if (currentEvento.campanha) infoLinhas.push(`Campanha: ${currentEvento.campanha}`);
    }
    if (currentEvento.notas) infoLinhas.push(`Notas: ${currentEvento.notas}`);
    bodyEl.appendChild(h('div', { class: 'card card-pad', style: 'margin-bottom:16px;' }, infoLinhas.map(t => h('p', { class: 'login-sub', style: 'text-align:left;margin:2px 0;' }, t))));

    if (currentEvento.tipoEvento === 'Rastreio') {
      const slotsPrincipais = eventoGerarSlots(currentEvento.horaInicial, currentEvento.horaFinal, currentEvento.intervaloMin);
      bodyEl.appendChild(buildVagasGrupo('principal', 'Vagas', slotsPrincipais));
    }

    if (currentEvento.tipoEvento === 'Conselheira' && currentEvento.miniFaciais) {
      const slotsMini = eventoGerarSlots(currentEvento.miniFaciaisHoraInicial, currentEvento.miniFaciaisHoraFinal, currentEvento.miniFaciaisIntervaloMin);
      bodyEl.appendChild(buildVagasGrupo('mini_facial', 'Mini-Faciais', slotsMini));
    } else if (currentEvento.tipoEvento === 'Conselheira') {
      bodyEl.appendChild(EmptyState('Este Dia de Conselheira não tem Mini-Faciais nem vagas de agendamento associadas.'));
    }
  }

  // Lista para impressão/PDF: junta as vagas de todos os grupos (principal +
  // Mini-Faciais, quando existirem), só marcações efetivas, ordenadas por hora.
  function linhasImpressaoEvento() {
    return ordenarPorHora(marcacoes.filter(m => m.tipoLinha !== 'bloqueado'))
      .map(m => ({
        hora: normalizarHora(m.hora), nome: m.nomeCliente, contacto: m.contacto,
        estado: (m.estado === 'confirmada' ? 'Confirmada' : (m.estado === 'cancelada' ? 'Cancelada' : 'Por confirmar')),
        observacoes: m.observacoes,
      }));
  }

  const panel = h('div', { class: 'modal-panel agenda-dia-panel' }, [
    h('div', { class: 'modal-title-row' }, [
      h('div', {}, [
        h('p', { class: 'modal-tag' }, tipoInfo.nome),
        h('p', { class: 'modal-title' }, formatDate(dateISO)),
      ]),
      h('div', { style: 'display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;' }, [
        headerAcoesEl,
        buildListaDiaAcoes(tipoInfo.nome, currentEvento ? eventoLabel(currentEvento) : tipoInfo.nome, dateISO, linhasImpressaoEvento),
        h('button', { class: 'close-btn', onclick: close }, Icon('x', { size: 16 })),
      ]),
    ]),
    isPast ? h('p', { class: 'readonly-notice' }, 'Este dia já passou — fica só para consulta, sem novos agendamentos.') : null,
    bodyEl,
  ]);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  render();
  if (currentEvento) carregarMarcacoes();
  return overlay;
}

/* ---- Página de um tipo de Eventos: calendário mensal (clicar num dia
   abre a configuração ou a grelha de vagas desse dia) ---- */
function buildEventoTipoPage(container, goTo, tipo) {
  const tipoInfo = EVENTO_TIPOS.find(t => t.key === tipo);

  function rerender() { clear(container); container.appendChild(build()); }
  function onDayClick(dateISO, isPast, ev) {
    if (isPast && !ev) return; // dias passados sem evento não abrem nada
    document.body.appendChild(buildEventoDiaModal(tipo, dateISO, ev, rerender));
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    wrap.appendChild(withBackButton(buildPageHeader(tipoInfo.icon, tipoInfo.nome, 'Calendário mensal — clique num dia para configurar ou consultar vagas.', undefined), goTo));
    wrap.appendChild(buildEventoCalendarioCarrossel(tipo, onDayClick));
    return wrap;
  }

  rerender();
}

/* ---- Hub inicial de Eventos: 2 cartões (Rastreios / Dias de
   Conselheira) ---- */
function buildEventosPage(container, goTo) {
  clear(container);
  const wrap = h('div', { class: 'animate-in' });
  wrap.appendChild(withBackButton(buildPageHeader('star', 'Eventos', 'Escolha o tipo de evento para consultar ou marcar.', undefined), goTo));
  const grid = h('div', { class: 'quick-grid' }, EVENTO_TIPOS.map(t => h('button', { class: 'quick-item tone-blue', onclick: () => goTo(t.pageKey) }, [
    h('span', { class: 'icon-wrap' }, Icon(t.icon, { size: 40, strokeWidth: 1.6 })),

  container.appendChild(wrap);
}


/* =================================================================
   MANIPULADOS — ORÇAMENTOS CONHECIDOS (matriz comparativa)
================================================================= */
function checkOrcamentoRowRequired(d) {
  const missing = [];
  if (!String(d.data || '').trim()) missing.push('Data');
  if (!String(d.dosagemCapsulas || '').trim()) missing.push('Manipulado');
  return missing;
}

function buildOrcamentosPage(container, goTo) {
  let searchQuery = '';
  let editingOrcId = null; // null | 'new' | id
  let editingOrcDraft = {};
  let orcSaving = false;
  let orcRowError = '';
  let selectedOrcIds = new Set();

  function rerender() { clear(container); container.appendChild(build()); }

  function orcStartNew() {
    editingOrcId = 'new';
    selectedOrcIds = new Set();
    editingOrcDraft = { data: todayISO(), dosagemCapsulas: '', precoGuarani: '', precoSerpaPinto: '', precoClerigos: '' };
    orcRowError = '';
    rerender();
  }
  function orcStartEditSelected() {
    if (selectedOrcIds.size !== 1) return;
    const r = STATE.orcamentos.find(x => x.id === [...selectedOrcIds][0]);
    if (!r) return;
    editingOrcId = r.id;
    editingOrcDraft = Object.assign({}, r);
    orcRowError = '';
    rerender();
  }
  function orcCancelEdit() {
    editingOrcId = null;
    editingOrcDraft = {};
    orcRowError = '';
    rerender();
  }
  function toggleSelect(id) {
    if (selectedOrcIds.has(id)) selectedOrcIds.delete(id); else selectedOrcIds.add(id);
    rerender();
  }

  async function orcSaveRow() {
    const missing = checkOrcamentoRowRequired(editingOrcDraft);
    if (missing.length) {
      orcRowError = `Por favor, preencha: ${missing.join(', ')}.`;
      rerender();
      return;
    }
    orcRowError = '';
    orcSaving = true; rerender();
    if (editingOrcId === 'new') {
      const created = await dbInsert('orcamentos', editingOrcDraft);
      if (created) { STATE.orcamentos = [created, ...STATE.orcamentos]; editingOrcId = null; editingOrcDraft = {}; }
      else orcRowError = `Não foi possível adicionar o orçamento. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    } else {
      const updated = await dbUpdate('orcamentos', editingOrcId, editingOrcDraft);
      if (updated) { STATE.orcamentos = STATE.orcamentos.map(r => r.id === editingOrcId ? updated : r); editingOrcId = null; editingOrcDraft = {}; }

/* =================================================================
   DESAFIOS DA FARMÁCIA (campanhas e objetivos de vendas)
================================================================= */
function checkDesafioRequired(d) {
  const missing = [];
  if (!String(d.tituloDesafio || '').trim()) missing.push('Título do Prémio');
  if (!String(d.dataInicio || '').trim()) missing.push('Data de Início');
  if (!String(d.dataFim || '').trim()) missing.push('Data de Fim');
  return missing;
}
function desafioAtivo(d) {
  const hoje = todayISO();
  return !d.concluido && (d.dataInicio || '') <= hoje && hoje <= (d.dataFim || '9999-12-31');
}

function buildDesafiosPage(container, goTo, embedded) {
  let activeTab = 'ativos';

// ---- Permissões: só estes cargos podem emitir declarações em "Documentos" ----
function podeEmitirDocumentos() {
  // Nunca deixa o script rebentar por o utilizador ainda não estar pronto —
  // mas, ao contrário de um "cargo por omissão" otimista, a ausência de
  // sessão nunca concede acesso: por segurança, cai sempre para "sem cargo".
  const cargo = (activeUser && activeUser.categoriaProfissional) ? String(activeUser.categoriaProfissional).trim().toLowerCase() : '';
  if (!activeUser || !cargo) return false;
  // Cargos permitidos — cobre as duas flexões de género de cada um.
  const CARGOS_PERMITIDOS = [
    'diretor técnico', 'diretora técnica',
    'diretor técnico adjunto', 'diretora técnica adjunta',
    'farmacêutico', 'farmacêutica',
    'técnico de farmácia', 'técnica de farmácia',
  ];
  return CARGOS_PERMITIDOS.includes(cargo);
  // Nota: "Técnico(a) Auxiliar de Farmácia", "Administrativo(a)", "Estafeta"
  // e "Estagiário(a)" ficam sempre de fora — não constam da lista acima.
}
function buildDocumentosAcessoNegado(container, goTo) {
  clear(container);
  const wrap = h('div', { class: 'animate-in' });

  wrap.appendChild(EmptyState('A emissão de declarações está reservada a Farmacêuticos e Técnicos de Farmácia.'));

}

// Marca d'água discreta no topo, uniforme para todos os documentos impressos.
function buildDocTopoMeta() {
  const agora = new Date();
  const dataHora = `${pad2(agora.getDate())}/${pad2(agora.getMonth() + 1)}/${agora.getFullYear()} ${pad2(agora.getHours())}:${pad2(agora.getMinutes())}`;
  return h('p', { class: 'doc-topo-meta' }, `SigaJuncal · ${dataHora}`);

// Monta a folha A4 final: conteúdo (cabeçalho, título, texto, tabela) num
// bloco, e o rodapé (data/assinatura/carimbo) noutro — só assim o
// "justify-content:space-between" da folha empurra o rodapé para o fundo em
// vez de espalhar espaço entre cada parágrafo individual.
function buildDocA4(conteudoKids, rodapeNode) {
  return h('div', { class: 'doc-a4' }, [
    h('div', { class: 'doc-conteudo' }, [buildDocTopoMeta(), ...conteudoKids]),
    rodapeNode,
  ]);
}

// ---- Impressão / PDF: área oculta que só fica visível no modo de
// impressão (window.print), reaproveitada também pelo html2pdf.js. ----
function getDocPrintArea() {
  let el = document.getElementById('doc-print-area');
  if (!el) {
    el = document.createElement('div');
    el.id = 'doc-print-area';
    el.className = 'doc-print-area';
    document.body.appendChild(el);
  }
  return el;
}
function prepararImpressaoDoc(conteudoNode) {
  const area = getDocPrintArea();
  clear(area);
  area.appendChild(conteudoNode);
  return area;
}
function imprimirDocumento(conteudoNode) {
  prepararImpressaoDoc(conteudoNode);
  setTimeout(() => window.print(), 60);
}
async function baixarPdfDocumento(conteudoNode, nomeFicheiro) {
  const area = prepararImpressaoDoc(conteudoNode);
  const folha = area.querySelector('.doc-a4');
  if (window.html2pdf && folha) {
    try {
      await window.html2pdf().set({
        margin: 0,
        filename: nomeFicheiro,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      }).from(folha).save();
      return;
    } catch (e) {
      console.error('[html2pdf] erro ao gerar PDF:', formatarErroSeguro(e));
    }
  }
  alert('Não foi possível gerar o PDF diretamente — usa "Imprimir" e escolhe "Guardar como PDF" na caixa de diálogo de impressão do browser.');
  imprimirDocumento(conteudoNode);
}

// ---- Lista imprimível de um dia de Agenda/Evento (Hora · Cliente · Estado)
// — reaproveita o cabeçalho/rodapé da farmácia e a infraestrutura de
// impressão/PDF já existente para as declarações. ----
function buildListaDiaDoc(titulo, subtitulo, dataISO, linhas) {
  const kids = [
    buildDocLetterhead(),
    h('h1', { class: 'doc-title', style: 'font-size:16px;letter-spacing:.02em;text-transform:none;margin-bottom:22px;' },
      `${subtitulo ? subtitulo + ' - ' : ''}${titulo} | ${formatDate(dataISO)}`),
  ];
  if (!linhas.length) {
    kids.push(h('p', { class: 'doc-body-text' }, 'Sem marcações para este dia.'));
  } else {
    const thead = h('thead', {}, h('tr', {}, ['Hora', 'Cliente', 'Contacto', 'Estado', 'Observações'].map(t => h('th', {}, t))));
    const tbody = h('tbody', {}, linhas.map(l => h('tr', {}, [
      h('td', {}, l.hora),
      h('td', {}, l.nome || '—'),
      h('td', {}, l.contacto || '—'),
      h('td', {}, l.estado || '—'),
      h('td', {}, l.observacoes || '—'),
    ])));
    kids.push(h('table', { class: 'doc-table' }, [thead, tbody]));
  }
  // Documento interno de trabalho — sem formalismos legais: nada de
  // data/assinatura do responsável nem caixa de carimbo, ao contrário das

  return buildDocA4(kids, null);
