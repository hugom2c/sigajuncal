// getLinhas é uma função (não um array estático) — cada clique lê os dados
// da agenda/evento tal como estão nesse momento, incluindo marcações
// criadas depois de o modal ter sido aberto.
function buildListaDiaAcoes(titulo, subtitulo, dataISO, getLinhas) {
  const printBtn = h('button', { class: 'btn-fab-sm tone-blue', title: 'Imprimir Lista', 'aria-label': 'Imprimir Lista' }, Icon('printer', { size: 14, strokeWidth: 2.2 }));
  printBtn.addEventListener('click', () => imprimirDocumento(buildListaDiaDoc(titulo, subtitulo, dataISO, getLinhas())));
  const pdfBtn = h('button', { class: 'btn-fab-sm tone-gray', title: 'Exportar PDF', 'aria-label': 'Exportar PDF' }, Icon('download', { size: 14, strokeWidth: 2.2 }));
  pdfBtn.addEventListener('click', () => baixarPdfDocumento(buildListaDiaDoc(titulo, subtitulo, dataISO, getLinhas()), `${titulo} - ${dataISO}.pdf`));
  return h('div', { style: 'display:flex;gap:8px;' }, [printBtn, pdfBtn]);
}

// ---- Registo em Supabase de cada declaração emitida (documentos_emitidos).
// itens/parâmetros vão como texto em formato JSON — mais simples e mais
// robusto do que depender de uma coluna jsonb ligada ao conversor genérico
// camelCase<->snake_case usado no resto da app. ----
async function dbInserirDocumentoEmitido(record) {
  if (!sb) { lastDbError = 'Cliente Supabase indisponível.'; return null; }
  try {
    const row = {
      tipo: record.tipo,
      nome_utente: record.nomeUtente || null,
      cc_utente: record.ccUtente || null,
      discriminado: !!record.discriminado,
      valor_total: (record.valorTotal !== undefined && record.valorTotal !== null) ? record.valorTotal : null,
      itens_json: record.itens ? JSON.stringify(record.itens) : null,
      parametros_json: record.parametros ? JSON.stringify(record.parametros) : null,
      responsavel_nome: record.responsavelNome || null,
      responsavel_cargo: record.responsavelCargo || null,
      data_emissao: record.dataEmissao || null,
    };
    const { data, error } = await sb.from('documentos_emitidos').insert(row).select().single();
    if (error) { lastDbError = error.message; console.error('[Supabase] erro ao gravar documento emitido:', error.message); return null; }
    return rowToRecord(data);
  } catch (e) { lastDbError = e && e.message ? e.message : 'Falha de rede ao comunicar com o Supabase.'; console.error('[Supabase] erro de rede ao gravar documento emitido:', formatarErroSeguro(e)); return null; }
}
async function dbAtualizarDocumentoEmitido(id, record) {
  if (!sb) { lastDbError = 'Cliente Supabase indisponível.'; return null; }
  try {
    const row = {
      tipo: record.tipo,
      nome_utente: record.nomeUtente || null,
      cc_utente: record.ccUtente || null,
      discriminado: !!record.discriminado,
      valor_total: (record.valorTotal !== undefined && record.valorTotal !== null) ? record.valorTotal : null,
      itens_json: record.itens ? JSON.stringify(record.itens) : null,
      parametros_json: record.parametros ? JSON.stringify(record.parametros) : null,
      responsavel_nome: record.responsavelNome || null,
      responsavel_cargo: record.responsavelCargo || null,
      data_emissao: record.dataEmissao || null,
    };
    const { data, error } = await sb.from('documentos_emitidos').update(row).eq('id', id).select().single();
    if (error) { lastDbError = error.message; console.error('[Supabase] erro ao atualizar documento emitido:', error.message); return null; }
    return rowToRecord(data);
  } catch (e) { lastDbError = e && e.message ? e.message : 'Falha de rede ao comunicar com o Supabase.'; console.error('[Supabase] erro de rede ao atualizar documento emitido:', formatarErroSeguro(e)); return null; }
}
async function dbEliminarDocumentoEmitido(id) {
  if (!sb) { lastDbError = 'Cliente Supabase indisponível.'; return false; }
  try {
    const { error } = await sb.from('documentos_emitidos').delete().eq('id', id);
    if (error) { lastDbError = error.message; console.error('[Supabase] erro ao eliminar documento emitido:', error.message); return false; }
    return true;
  } catch (e) { lastDbError = e && e.message ? e.message : 'Falha de rede ao comunicar com o Supabase.'; console.error('[Supabase] erro de rede ao eliminar documento emitido:', formatarErroSeguro(e)); return false; }
}
async function dbFetchDocumentosEmitidos() {
  if (!sb) { lastDbError = 'Cliente Supabase indisponível.'; return []; }
  try {
    const { data, error } = await sb.from('documentos_emitidos').select('*').order('created_at', { ascending: false });
    if (error) { lastDbError = error.message; console.error('[Supabase] erro ao ler documentos_emitidos:', error.message); return []; }
    return (data || []).map(rowToRecord);
  } catch (e) { lastDbError = e && e.message ? e.message : 'Falha de rede ao comunicar com o Supabase.'; console.error('[Supabase] erro de rede ao ler documentos_emitidos:', formatarErroSeguro(e)); return []; }
}
function parseJSONSafe(str) {
  if (!str) return null;
  try { return JSON.parse(str); } catch (e) { return null; }
}
// Usada pelos 4 formulários de Documentos: cria um registo novo, ou
// atualiza o existente quando se está a editar a partir do Histórico —
// e mantém STATE.documentosEmitidos sempre sincronizado a seguir.
async function gravarOuAtualizarDocumento(editingId, registo) {
  const resultado = editingId ? await dbAtualizarDocumentoEmitido(editingId, registo) : await dbInserirDocumentoEmitido(registo);
  if (resultado) STATE.documentosEmitidos = await dbFetchDocumentosEmitidos();
  return resultado;
}

/* ---- Declaração de Despesas Mensal ---- */
function buildDeclaracaoDespesasPage(container, goTo) {
  if (!podeEmitirDocumentos()) { buildDocumentosAcessoNegado(container, goTo); return; }

  const registoEditar = (documentoEmEdicao && documentoEmEdicao.tipo === 'despesas_mensal') ? documentoEmEdicao : null;
  documentoEmEdicao = null;
  let editingId = registoEditar ? registoEditar.id : null;
  let draft = registoEditar ? (() => {
    const params = parseJSONSafe(registoEditar.parametrosJson) || {};
    const itensSalvos = parseJSONSafe(registoEditar.itensJson) || [];
    return {
      nomeUtente: registoEditar.nomeUtente || '',
      ccUtente: registoEditar.ccUtente || '',
      genero: params.genero || 'Masculino',
      discriminado: !!registoEditar.discriminado,
      valorTotalManual: registoEditar.discriminado ? '' : String(registoEditar.valorTotal != null ? registoEditar.valorTotal : ''),
      itens: itensSalvos.length ? itensSalvos.map(it => ({ nome: it.nome || '', preco: String(it.preco != null ? it.preco : '') })) : [{ nome: '', preco: '' }],
    };
  })() : { nomeUtente: '', ccUtente: '', genero: 'Masculino', discriminado: false, valorTotalManual: '', itens: [{ nome: '', preco: '' }] };
  let saving = false;

  function rerender() { clear(container); container.appendChild(build()); }
  function calcularTotal() {
    if (!draft.discriminado) return parseFloat(String(draft.valorTotalManual).replace(',', '.')) || 0;
    return draft.itens.reduce((s, it) => s + (parseFloat(String(it.preco).replace(',', '.')) || 0), 0);
  }

  function construirDocumentoNode(dataEmissaoISO) {
    const totalStr = calcularTotal().toFixed(2).replace('.', ',');
    const kids = [
      buildDocLetterhead(),
      h('h1', { class: 'doc-title' }, 'Declaração'),
      h('p', { class: 'doc-body-text' }, `A pedido ${artigoUtente(draft.genero)} ${draft.nomeUtente || '—'}, com o n.º de cartão de cidadão ${draft.ccUtente || '—'}, declara-se que tem adquirido nesta farmácia medicação crónica no valor mensal de ${totalStr} €.`),
    ];
    if (draft.discriminado) {
      const linhasValidas = draft.itens.filter(it => String(it.nome || '').trim() || String(it.preco || '').trim());
      const linhasNode = linhasValidas.map(it => h('tr', {}, [
        h('td', {}, it.nome || '—'),
        h('td', {}, (parseFloat(String(it.preco).replace(',', '.')) || 0).toFixed(2).replace('.', ',')),
      ]));
      linhasNode.push(h('tr', { class: 'doc-table-total' }, [h('td', {}, 'TOTAL'), h('td', {}, `${totalStr} €`)]));
      kids.push(h('table', { class: 'doc-table' }, [
        h('thead', {}, h('tr', {}, [h('th', {}, 'Medicamento / Produto'), h('th', {}, 'Preço (€)')])),
        h('tbody', {}, linhasNode),
      ]));
    }
    return buildDocA4(kids, buildDocRodape(dataEmissaoISO));
  }

  async function guardarDocumento(modo) {
    if (!String(draft.nomeUtente || '').trim() || !String(draft.ccUtente || '').trim()) {
      alert('Por favor, preencha o Nome do Utente e o Cartão de Cidadão.');
      return;
    }
    if (!/^[0-9]{8}$/.test(String(draft.ccUtente || '').trim())) {
      alert('O Cartão de Cidadão deve ter exatamente 8 dígitos numéricos.');
      return;
    }
    saving = true; rerender();
    const dataEmissao = todayISO();
    const registo = {
      tipo: 'despesas_mensal',
      nomeUtente: draft.nomeUtente,
      ccUtente: draft.ccUtente,
      discriminado: !!draft.discriminado,
      valorTotal: calcularTotal(),
      itens: draft.discriminado ? draft.itens.filter(it => String(it.nome || '').trim() || String(it.preco || '').trim()) : null,
      parametros: { genero: draft.genero },
      responsavelNome: (activeUser && (activeUser.nomeCompleto || activeUser.username)) || '',
      responsavelCargo: (activeUser && activeUser.categoriaProfissional) || '',
      dataEmissao,
    };
    const created = await gravarOuAtualizarDocumento(editingId, registo);
    saving = false;
    if (!created) { alert(`Não foi possível guardar o documento. ${lastDbError || 'Verifique a ligação e tente novamente.'}`); rerender(); return; }
    editingId = created.id;
    if (modo === 'pdf') await baixarPdfDocumento(construirDocumentoNode(dataEmissao), `Declaracao_Despesas_${(draft.nomeUtente || 'utente').replace(/\s+/g, '_')}.pdf`);
    else if (modo === 'print') imprimirDocumento(construirDocumentoNode(dataEmissao));
    else { goTo('hub-documentos'); return; } // "Guardar Apenas" volta ao Histórico de Documentos
    rerender();
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    wrap.appendChild(withBackButton(buildPageHeader('fileDollar', 'Declaração de Despesas Mensal', 'Emitir declaração de despesas mensais do utente.', undefined), goTo));

    const nomeInput = h('input', { class: 'input' });
    nomeInput.value = draft.nomeUtente;
    nomeInput.addEventListener('input', () => { draft.nomeUtente = nomeInput.value; });
    const ccInput = h('input', { class: 'input', inputmode: 'numeric', pattern: '[0-9]{8}', maxlength: '8', placeholder: '8 dígitos' });
    ccInput.value = draft.ccUtente;
    ccInput.addEventListener('input', () => {
      const cleaned = ccInput.value.replace(/\D/g, '').slice(0, 8);
      if (cleaned !== ccInput.value) ccInput.value = cleaned;
      draft.ccUtente = ccInput.value;
    });
    const discCb = h('input', { type: 'checkbox', checked: !!draft.discriminado });
    discCb.addEventListener('change', () => { draft.discriminado = discCb.checked; rerender(); });

    const campos = [
      h('div', { class: 'field doc-w-md' }, [h('label', {}, 'Nome do Utente'), nomeInput]),
      h('div', { class: 'field doc-w-xs' }, [h('label', {}, 'Cartão de Cidadão'), ccInput]),
      buildGeneroUtenteField(draft),
    ];
    const linhaCheckbox = h('label', { class: 'checkbox-field', style: 'margin-top:14px;' }, [discCb, h('span', {}, 'Discriminar Medicamentos / Produtos')]);

      const valorInput = h('input', { class: 'input', type: 'number', step: '0.01', min: '0', placeholder: '0,00' });
      valorInput.value = draft.valorTotalManual;
      valorInput.addEventListener('keydown', (e) => { if (e.key === '-') e.preventDefault(); });
      valorInput.addEventListener('input', () => {
        if (valorInput.value !== '' && parseFloat(valorInput.value) < 0) valorInput.value = valorInput.value.replace('-', '');
        draft.valorTotalManual = valorInput.value;
      });
      campos.push(h('div', { class: 'field doc-w-40' }, [h('label', {}, 'Valor Total (€)'), valorInput]));
    }
    const formChildren = [h('div', { class: 'doc-fields-row' }, campos), linhaCheckbox];

    if (draft.discriminado) {
      const linhasEl = draft.itens.map((it, idx) => {

        precoInput.value = it.preco;
        precoInput.addEventListener('keydown', (e) => { if (e.key === '-') e.preventDefault(); });
        precoInput.addEventListener('input', () => {
          if (precoInput.value !== '' && parseFloat(precoInput.value) < 0) precoInput.value = precoInput.value.replace('-', '');

        return h('div', { class: 'doc-item-row' }, [nomeProdInput, precoInput, delBtn]);
      });
      const addBtn = h('button', { class: 'btn btn-secondary', onclick: () => { draft.itens.push({ nome: '', preco: '' }); rerender(); } }, [Icon('plus', { size: 14 }), ' Adicionar Produto']);
      const totalLabel = h('p', { class: 'login-sub', style: 'text-align:right;font-weight:800;margin-top:10px;' }, `Total: ${calcularTotal().toFixed(2).replace('.', ',')} €`);
      formChildren.push(h('div', { style: 'margin-top:14px;' }, [...linhasEl, addBtn, totalLabel]));
    }
    wrap.appendChild(h('div', { class: 'card card-pad' }, formChildren));

    const saveBtn = h('button', { class: 'btn btn-secondary', onclick: saving ? null : () => requireAuth(() => guardarDocumento(false)) }, saving ? 'A guardar…' : 'Guardar Apenas');
    const pdfBtn = h('button', { class: 'btn btn-secondary', onclick: saving ? null : () => requireAuth(() => guardarDocumento('pdf')) }, 'Download PDF');
    const printBtn = h('button', { class: 'btn btn-primary', onclick: saving ? null : () => requireAuth(() => guardarDocumento('print')) }, 'Imprimir');
    wrap.appendChild(h('div', { class: 'form-actions', style: 'margin-top:16px;' }, [saveBtn, pdfBtn, printBtn]));

    return wrap;
  }

  rerender();
}

/* ---- Declaração de Avaliação Física ---- */
function buildDeclaracaoAvaliacaoFisicaPage(container, goTo) {
  if (!podeEmitirDocumentos()) { buildDocumentosAcessoNegado(container, goTo); return; }

  const registoEditar = (documentoEmEdicao && documentoEmEdicao.tipo === 'avaliacao_fisica') ? documentoEmEdicao : null;
  documentoEmEdicao = null;
  let editingId = registoEditar ? registoEditar.id : null;
  let draft = registoEditar ? (() => {
    const params = parseJSONSafe(registoEditar.parametrosJson) || {};
    return {
      nomeUtente: registoEditar.nomeUtente || '', ccUtente: registoEditar.ccUtente || '',
      genero: params.genero || 'Masculino', dataNascimento: params.dataNascimento || '',
      altura: params.altura || '', peso: params.peso || '', tensao: params.tensao || '',
    };
  })() : { nomeUtente: '', ccUtente: '', genero: 'Masculino', dataNascimento: '', altura: '', peso: '', tensao: '' };
  let saving = false;

  function rerender() { clear(container); container.appendChild(build()); }

  // Idade calculada a partir da Data de Nascimento — evita depender de um
  // número que fica desatualizado; se a data não estiver preenchida, o
  // texto simplesmente omite essa parte da frase.
  function calcularIdade() {
    if (!draft.dataNascimento) return null;
    const nasc = new Date(draft.dataNascimento + 'T00:00:00');
    if (isNaN(nasc.getTime())) return null;
    const hoje = new Date();
    let idade = hoje.getFullYear() - nasc.getFullYear();
    const aindaNaoFezAnos = (hoje.getMonth() < nasc.getMonth()) || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate());
    if (aindaNaoFezAnos) idade -= 1;
    return idade >= 0 ? idade : null;
  }

  function construirDocumentoNode(dataEmissaoISO) {
    const artigo = artigoUtente(draft.genero);
    const idade = calcularIdade();
    const parteIdade = idade !== null ? `, de sexo ${draft.genero} e com ${idade} anos de idade` : `, de sexo ${draft.genero}`;
    const linhas = [
      ['Altura (m)', draft.altura || '—'],
      ['Peso (kg)', draft.peso || '—'],
      ['Tensão Arterial (mmHg)', draft.tensao || '—'],
    ];
    const kids = [
      buildDocLetterhead(),
      h('h1', { class: 'doc-title' }, 'Declaração de Avaliação Física'),
      h('p', { class: 'doc-body-text' }, `Declara-se, para os devidos efeitos, que a pedido ${artigo} ${draft.nomeUtente || '—'}, com o n.º de cartão de cidadão ${draft.ccUtente || '—'}${parteIdade}, foram registados na Farmácia Juncal os seguintes parâmetros de avaliação física na presente data:`),
      h('table', { class: 'doc-table' }, [
        h('thead', {}, h('tr', {}, [h('th', {}, 'Parâmetro'), h('th', {}, 'Resultado')])),
        h('tbody', {}, linhas.map(([label, valor]) => h('tr', {}, [h('td', {}, label), h('td', {}, valor)]))),
      ]),
    ];
    return buildDocA4(kids, buildDocRodape(dataEmissaoISO));
  }

  async function guardarDocumento(modo) {
    if (!String(draft.nomeUtente || '').trim() || !String(draft.ccUtente || '').trim()) {
      alert('Por favor, preencha o Nome do Utente e o Cartão de Cidadão.');
      return;
    }
    if (!/^[0-9]{8}$/.test(String(draft.ccUtente || '').trim())) {
      alert('O Cartão de Cidadão deve ter exatamente 8 dígitos numéricos.');
      return;
    }
    saving = true; rerender();
    const dataEmissao = todayISO();
    const registo = {
      tipo: 'avaliacao_fisica',
      nomeUtente: draft.nomeUtente,
      ccUtente: draft.ccUtente,
      discriminado: false,
      valorTotal: null,
      parametros: { genero: draft.genero, dataNascimento: draft.dataNascimento, altura: draft.altura, peso: draft.peso, tensao: draft.tensao },
      responsavelNome: (activeUser && (activeUser.nomeCompleto || activeUser.username)) || '',
      responsavelCargo: (activeUser && activeUser.categoriaProfissional) || '',
      dataEmissao,
    };
    const created = await gravarOuAtualizarDocumento(editingId, registo);
    saving = false;
    if (!created) { alert(`Não foi possível guardar o documento. ${lastDbError || 'Verifique a ligação e tente novamente.'}`); rerender(); return; }
    editingId = created.id;
    if (modo === 'pdf') await baixarPdfDocumento(construirDocumentoNode(dataEmissao), `Declaracao_Avaliacao_Fisica_${(draft.nomeUtente || 'utente').replace(/\s+/g, '_')}.pdf`);
    else if (modo === 'print') imprimirDocumento(construirDocumentoNode(dataEmissao));
    else { goTo('hub-documentos'); return; } // "Guardar Apenas" volta ao Histórico de Documentos
    rerender();
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    wrap.appendChild(withBackButton(buildPageHeader('fileHeart', 'Declaração de Avaliação Física', 'Emitir declaração dos parâmetros de avaliação física do utente.', undefined), goTo));

    const nomeInput = h('input', { class: 'input' });
    nomeInput.value = draft.nomeUtente;
    nomeInput.addEventListener('input', () => { draft.nomeUtente = nomeInput.value; });
    const ccInput = h('input', { class: 'input', inputmode: 'numeric', pattern: '[0-9]{8}', maxlength: '8', placeholder: '8 dígitos' });
    ccInput.value = draft.ccUtente;
    ccInput.addEventListener('input', () => {
      const cleaned = ccInput.value.replace(/\D/g, '').slice(0, 8);
      if (cleaned !== ccInput.value) ccInput.value = cleaned;
      draft.ccUtente = ccInput.value;
    });
    const nascInput = h('input', { class: 'input', type: 'date' });
    nascInput.value = draft.dataNascimento;
    nascInput.addEventListener('input', () => { draft.dataNascimento = nascInput.value; });

    // Género do utente — só decide a flexão "do utente"/"da utente" no
    // texto impresso; Masculino vem pré-selecionado.
    const generoField = buildGeneroUtenteField(draft);

    const campos = [
      h('div', { class: 'field doc-w-md' }, [h('label', {}, 'Nome do Utente'), nomeInput]),
      h('div', { class: 'field doc-w-xs' }, [h('label', {}, 'Cartão de Cidadão'), ccInput]),
      generoField,
      h('div', { class: 'field doc-w-36' }, [h('label', {}, 'Data de Nascimento'), nascInput]),
    ];
    wrap.appendChild(h('div', { class: 'card card-pad' }, [h('div', { class: 'doc-fields-row' }, campos)]));

    // Altura/Peso/Tensão em linha compacta, cada campo com largura limitada
    // — evita esticar 3 números curtos por toda a largura do ecrã.
    const alturaInput = h('input', { class: 'input', type: 'number', step: '0.01', min: '0', placeholder: 'Ex: 1.75' });
    alturaInput.value = draft.altura;
    alturaInput.addEventListener('keydown', (e) => { if (e.key === '-') e.preventDefault(); });
    alturaInput.addEventListener('input', () => {
      if (alturaInput.value !== '' && parseFloat(alturaInput.value) < 0) alturaInput.value = alturaInput.value.replace('-', '');
      draft.altura = alturaInput.value;
    });
    const pesoInput = h('input', { class: 'input', type: 'number', step: '0.1', min: '0', placeholder: 'Ex: 70.5' });
    pesoInput.value = draft.peso;
    pesoInput.addEventListener('keydown', (e) => { if (e.key === '-') e.preventDefault(); });
    pesoInput.addEventListener('input', () => {
      if (pesoInput.value !== '' && parseFloat(pesoInput.value) < 0) pesoInput.value = pesoInput.value.replace('-', '');
      draft.peso = pesoInput.value;
    });
    // Tensão Arterial fica em formato texto "120/80" (não é um número
    // simples), mas nunca faz sentido conter um sinal "-" — bloqueia-o tal
    // como nos campos numéricos, só que preservando a barra "/".
    const tensaoInput = h('input', { class: 'input', placeholder: 'Ex: 120/80', inputmode: 'numeric' });
    tensaoInput.value = draft.tensao;
    tensaoInput.addEventListener('keydown', (e) => { if (e.key === '-') e.preventDefault(); });
    tensaoInput.addEventListener('input', () => {
      const cleaned = tensaoInput.value.replace(/[^0-9/]/g, '');
      if (cleaned !== tensaoInput.value) tensaoInput.value = cleaned;
      draft.tensao = tensaoInput.value;
    });

    const medidasRow = h('div', { class: 'doc-fields-row' }, [
      h('div', { class: 'field doc-w-32' }, [h('label', {}, 'Altura (m)'), alturaInput]),
      h('div', { class: 'field doc-w-32' }, [h('label', {}, 'Peso (kg)'), pesoInput]),
      h('div', { class: 'field doc-w-36' }, [h('label', {}, 'Tensão Arterial (mmHg)'), tensaoInput]),
    ]);
    wrap.appendChild(h('div', { class: 'card card-pad' }, [medidasRow]));

    const saveBtn = h('button', { class: 'btn btn-secondary', onclick: saving ? null : () => requireAuth(() => guardarDocumento(false)) }, saving ? 'A guardar…' : 'Guardar Apenas');
    const pdfBtn = h('button', { class: 'btn btn-secondary', onclick: saving ? null : () => requireAuth(() => guardarDocumento('pdf')) }, 'Download PDF');
    const printBtn = h('button', { class: 'btn btn-primary', onclick: saving ? null : () => requireAuth(() => guardarDocumento('print')) }, 'Imprimir');
    wrap.appendChild(h('div', { class: 'form-actions', style: 'margin-top:16px;' }, [saveBtn, pdfBtn, printBtn]));

    return wrap;
  }

  rerender();
}

// Reconstrói a folha A4 de qualquer tipo de documento diretamente a partir
// de um registo já gravado (histórico) — usado por "Ver/Reimprimir" e
// "Download PDF" na tabela, sem precisar de reabrir o formulário. Ao
// contrário da emissão original, a assinatura usa sempre o responsável
// GRAVADO no registo, não quem está a reimprimir agora.
function construirDocumentoNodeFromRegisto(registo) {
  const params = parseJSONSafe(registo.parametrosJson) || {};
  const itens = parseJSONSafe(registo.itensJson) || [];
  const genero = params.genero || 'Masculino';
  const nomeResp = [registo.responsavelNome, registo.responsavelCargo].filter(Boolean).join(' - ');
  const rodape = buildDocRodapeComResponsavel(nomeResp, registo.dataEmissao);

  if (registo.tipo === 'despesas_mensal') {
    const totalStr = (registo.valorTotal != null ? registo.valorTotal : 0).toFixed(2).replace('.', ',');
    const kids = [
      buildDocLetterhead(),
      h('h1', { class: 'doc-title' }, 'Declaração'),
      h('p', { class: 'doc-body-text' }, `A pedido ${artigoUtente(genero)} ${registo.nomeUtente || '—'}, com o n.º de cartão de cidadão ${registo.ccUtente || '—'}, declara-se que tem adquirido nesta farmácia medicação crónica no valor mensal de ${totalStr} €.`),
    ];
    if (registo.discriminado && itens.length) {
      const linhasNode = itens.map(it => h('tr', {}, [h('td', {}, it.nome || '—'), h('td', {}, (parseFloat(it.preco) || 0).toFixed(2).replace('.', ','))]));
      linhasNode.push(h('tr', { class: 'doc-table-total' }, [h('td', {}, 'TOTAL'), h('td', {}, `${totalStr} €`)]));
      kids.push(h('table', { class: 'doc-table' }, [h('thead', {}, h('tr', {}, [h('th', {}, 'Medicamento / Produto'), h('th', {}, 'Preço (€)')])), h('tbody', {}, linhasNode)]));
    }
    return buildDocA4(kids, rodape);
  }
  if (registo.tipo === 'avaliacao_fisica') {
    const idade = (() => {
      if (!params.dataNascimento) return null;
      const nasc = new Date(params.dataNascimento + 'T00:00:00');
      if (isNaN(nasc.getTime())) return null;
      const ref = registo.dataEmissao ? new Date(registo.dataEmissao + 'T00:00:00') : new Date();
      let i = ref.getFullYear() - nasc.getFullYear();
      if ((ref.getMonth() < nasc.getMonth()) || (ref.getMonth() === nasc.getMonth() && ref.getDate() < nasc.getDate())) i -= 1;
      return i >= 0 ? i : null;
    })();
    const parteIdade = idade !== null ? `, de sexo ${genero} e com ${idade} anos de idade` : `, de sexo ${genero}`;
    const linhas = [['Altura (m)', params.altura || '—'], ['Peso (kg)', params.peso || '—'], ['Tensão Arterial (mmHg)', params.tensao || '—']];
    const kids = [
      buildDocLetterhead(),
      h('h1', { class: 'doc-title' }, 'Declaração de Avaliação Física'),
      h('p', { class: 'doc-body-text' }, `Declara-se, para os devidos efeitos, que a pedido ${artigoUtente(genero)} ${registo.nomeUtente || '—'}, com o n.º de cartão de cidadão ${registo.ccUtente || '—'}${parteIdade}, foram registados na Farmácia Juncal os seguintes parâmetros de avaliação física na presente data:`),
      h('table', { class: 'doc-table' }, [h('thead', {}, h('tr', {}, [h('th', {}, 'Parâmetro'), h('th', {}, 'Resultado')])), h('tbody', {}, linhas.map(([l, v]) => h('tr', {}, [h('td', {}, l), h('td', {}, v)])))]),
    ];
    return buildDocA4(kids, rodape);
  }
  if (registo.tipo === 'presenca') {
    const dataServicoFmt = params.dataServico ? dataPorExtensoDoc(params.dataServico) : '—';
    const kids = [
      buildDocLetterhead(),
      h('h1', { class: 'doc-title' }, 'Declaração de Presença'),
      h('p', { class: 'doc-body-text' }, `Declara-se, para os devidos efeitos, que a pedido ${artigoUtente(genero)} ${registo.nomeUtente || '—'}, com o n.º de cartão de cidadão ${registo.ccUtente || '—'}, esteve presente na Farmácia Juncal no dia ${dataServicoFmt}, às ${params.horaInicio || '—'}, com a duração aproximada de ${params.duracaoAprox || '—'}, para realização do serviço de ${params.tipoServico || '—'}.`),
    ];
    return buildDocA4(kids, rodape);
  }
  return null;
}

function buildHistoricoMensagensPage(container, goTo, embedded) {
  let historico = [];
  let loading = true;
  let selectedIds = new Set();

  function rerender() { clear(container); container.appendChild(build()); }
  function load() {
    loading = true; rerender();
    dbFetchMensagemDiaHistorico().then(list => { historico = list; loading = false; rerender(); });
  }
  function toggleSelect(id) { if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); rerender(); }
  function isAtiva(m) {
    const atual = mensagemDiaAtiva();
    return !!(atual && atual.id === m.id);
  }
  function openNewMensagem() { openMensagemDiaModal(() => { STATE.mensagemDia = null; load(); }, null); }
  function editSelected() {
    if (selectedIds.size !== 1) return;
    const m = historico.find(x => x.id === [...selectedIds][0]);
    if (!m) return;
    openMensagemDiaModal(() => { load(); }, m);
  }
  function removeSelected() {
    if (selectedIds.size === 0) return;
    const ids = [...selectedIds];
    const plural = ids.length > 1;
    confirmDialog(`Tem a certeza de que quer eliminar ${ids.length} mensagem${plural ? 'ns' : ''} do histórico? Esta ação não pode ser desfeita.`, async () => {
      const resultados = await Promise.all(ids.map(id => dbDeleteMensagemDiaVersao(id)));
      const apagados = new Set(ids.filter((id, i) => resultados[i]));
      if (apagados.size < ids.length) showDbErrorToast('Não foi possível eliminar todas as mensagens selecionadas');
      historico = historico.filter(m => !apagados.has(m.id));
      selectedIds = new Set([...selectedIds].filter(id => !apagados.has(id)));
      STATE.mensagemDia = await dbFetchMensagemDia();
      rerender();
    }, { danger: true, confirmLabel: 'Eliminar' });
  }

  function buildTable() {
    if (loading) return EmptyState('A carregar histórico…');
    if (historico.length === 0) return EmptyState('Ainda não há mensagens registadas.');
    const thead = h('thead', {}, h('tr', {}, ['', 'Data', 'Mensagem', 'Responsável', 'Estado'].map(t => h('th', {}, t))));
    const rows = historico.map(m => {
      const selected = selectedIds.has(m.id);
      const row = h('tr', { class: 'selectable-row' + (selected ? ' row-selected' : '') }, [
        buildSelectionCheckbox(m.id, selectedIds, toggleSelect),
        h('td', {}, formatDate(m.dataCriacao)),
        h('td', { style: 'max-width:360px;white-space:normal;font-size:12.5px;' }, m.texto || '—'),
        h('td', {}, m.responsavel || '—'),
        h('td', {}, isAtiva(m) ? h('span', { class: 'badge badge-green' }, 'ATIVA') : ''),
      ]);
      return row;
    });
    return h('div', { class: 'card' }, h('div', { class: 'table-wrap' }, h('table', {}, [thead, h('tbody', {}, rows)])));
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    if (!embedded) {
      wrap.appendChild(withBackButton(buildPageHeader('message', 'Mensagens do Dia', 'Arquivo cronológico das mensagens do dia.', historico.length), goTo));
    }
    wrap.appendChild(buildTable());
    wrap.appendChild(buildBottomActionBar({
      selectedCount: selectedIds.size,
      addLabel: 'Nova mensagem',
      onAdd: openNewMensagem,
      onEdit: editSelected,
      onDelete: removeSelected,
    }));
    return wrap;
  }

  load();
}

/* =================================================================
   CÓPIA DE SEGURANÇA (BACKUP) — restrito a Master/Administrador
================================================================= */
async function gerarBackupCompleto() {
  if (!sb) { lastDbError = 'Cliente Supabase indisponível.'; return null; }
  const chaves = Object.keys(TABLES);
  const pedidosExtra = [
    ['mensagemDia', 'mensagem_dia'],
    ['eventosMarcacoes', 'eventos_marcacoes'],
  ];
  const todosPedidos = [
    ...chaves.map(key => [key, TABLES[key]]),
    ...pedidosExtra,
  ];
  const resultados = await Promise.all(todosPedidos.map(async ([key, tabela]) => {
    try {
      const { data, error } = await sb.from(tabela).select('*');
      if (error) return [key, { erro: error.message }];
      return [key, sanitizarSupabase(data || [])];
    } catch (e) {
      return [key, { erro: String(e && e.message ? e.message : e) }];
    }
  }));
  const tabelas = {};
  resultados.forEach(([key, data]) => { tabelas[key] = data; });
  return {
    aplicacao: 'SigaJuncal',
    geradoEm: new Date().toISOString(),
    tabelas,
  };
}
async function descarregarBackup(onStatus) {
  if (onStatus) onStatus('A recolher dados de todas as tabelas…');
  const backup = await gerarBackupCompleto();
  if (!backup) {
    if (onStatus) onStatus(`Não foi possível gerar a cópia de segurança. ${lastDbError || 'Verifique a ligação e tente novamente.'}`, true);
    return;
  }
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const hoje = todayISO().replace(/-/g, '_');
  const a = document.createElement('a');
  a.href = url;
  a.download = `sigajuncal_backup_${hoje}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  if (onStatus) onStatus('Cópia de segurança descarregada com sucesso.');
}

function buildDefinicoesPage(container, goTo) {
  let selectedIds = new Set();
  let showForm = false, editingId = null, draft = {}, formError = '', saving = false;

  function rerender() { clear(container); container.appendChild(build()); }
  function toggleSelect(id) { if (!isMasterUser()) return; if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); rerender(); }

  function isSelf(id) { return activeUser && activeUser.id === id; }

  function openNew() {
    if (!isMasterUser()) return;
    draft = { primeiroNome: '', apelido: '', categoriaProfissional: '', perfilNivel: 'Básico', username: '', pin: '' };
    editingId = null; formError = ''; showForm = true; rerender();
  }
  function openEditSelected() {
    if (!isMasterUser()) return;
    if (selectedIds.size !== 1) return;
    const u = STATE.usuarios.find(x => x.id === [...selectedIds][0]);
    if (!u) return;
    editingId = u.id;
    const partesNome = String(u.nomeCompleto || '').trim().split(/\s+/);
    const primeiroNome = partesNome[0] || '';
    const apelido = partesNome.slice(1).join(' ') || '';
    draft = isSelf(u.id)
      ? Object.assign({}, u, { primeiroNome, apelido })
      : { primeiroNome, apelido, categoriaProfissional: u.categoriaProfissional || '', perfilNivel: u.perfilNivel || 'Basico', prestadorKey: u.prestadorKey || '' };
    formError = '';
    showForm = true;
    rerender();
  }
  function cancel() { formError = ''; showForm = false; rerender(); }

  function checkUsuarioRequired(d, editingSelf, isNew) {
    const missing = [];
    const ehBoaNova = d.perfilNivel === 'Farmácia Boa Nova';
    if (!ehBoaNova) {
      if (!String(d.primeiroNome || '').trim()) missing.push('Primeiro Nome');
      if (!String(d.apelido || '').trim()) missing.push('Apelido');
    }
    const semCategoriaObrigatoria = d.perfilNivel === 'Estafeta' || d.perfilNivel === 'Prestador de Serviço' || ehBoaNova;
    if (!semCategoriaObrigatoria && !String(d.categoriaProfissional || '').trim()) missing.push('Categoria Profissional');
    if (isNew || editingSelf) {
      if (!String(d.username || '').trim()) missing.push('Username');
      if (!String(d.pin || '').trim()) missing.push('PIN');
    }
    return missing;
  }
  // Username e PIN: só algarismos, entre 2 e 4 — nunca 1 só, nunca letras/símbolos.
  function formatoUsernamePinValido(v) { return /^[0-9]{2,4}$/.test(String(v || '').trim()); }
  // Junta Primeiro Nome + Apelido no único campo real da base de dados
  // (nome_completo) — o resto da app usa sempre este campo já combinado.
  function nomeCompletoDoDraft(d) {
    return [d.primeiroNome, d.apelido].filter(v => String(v || '').trim()).join(' ').trim();
  }

  async function submit() {
    const editingSelf = editingId && isSelf(editingId);
    const missing = checkUsuarioRequired(draft, editingSelf, !editingId);
    if (missing.length) {
      formError = `Por favor, preencha: ${missing.join(', ')}.`;
      rerender();
      return;
    }
    if (!editingId || editingSelf) {
      if (!formatoUsernamePinValido(draft.username) || !formatoUsernamePinValido(draft.pin)) {
        formError = 'O Username e o PIN devem conter apenas números, entre 2 e 4 algarismos.';
        rerender();
        return;
      }
    }
    if ((!editingId || editingSelf) && String(draft.username || '').trim()) {
      const usernameNorm = String(draft.username).trim().toLowerCase();
      const duplicado = STATE.usuarios.find(u => u.id !== editingId && String(u.username || '').trim().toLowerCase() === usernameNorm);
      if (duplicado) {
        formError = `Este Username já está a ser usado por ${duplicado.nomeCompleto || duplicado.username}. Escolha um Username diferente.`;
        rerender();
        return;
      }
    }
    formError = '';
    saving = true; rerender();
    const ehBoaNova = draft.perfilNivel === 'Farmácia Boa Nova';
    // Rede de segurança: garante sempre estes valores para o perfil Farmácia
    // Boa Nova, independentemente do que o formulário tinha em memória.
    const nomeCompleto = ehBoaNova ? 'Farmácia Boa Nova' : nomeCompletoDoDraft(draft);
    const categoriaProfissional = ehBoaNova ? 'Não aplicável' : draft.categoriaProfissional;
    const prestadorKey = draft.perfilNivel === 'Prestador de Serviço' ? (draft.prestadorKey || '') : '';
    if (editingId) {
      const payload = editingSelf
        ? { nomeCompleto, categoriaProfissional, perfilNivel: draft.perfilNivel, prestadorKey, username: draft.username, pin: draft.pin }
        : { nomeCompleto, categoriaProfissional, perfilNivel: draft.perfilNivel, prestadorKey };
      const updated = await dbUpdate('usuarios', editingId, payload);
      if (updated) {
        STATE.usuarios = STATE.usuarios.map(u => u.id === editingId ? updated : u);
        if (editingSelf) {
          activeUser = Object.assign({}, activeUser, { nomeCompleto: updated.nomeCompleto, username: updated.username, categoriaProfissional: updated.categoriaProfissional, perfilNivel: updated.perfilNivel, prestadorKey: updated.prestadorKey });
          refreshSidebarBadges();
        }
      } else formError = `Não foi possível guardar as alterações. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    } else {
      const payload = { nomeCompleto, categoriaProfissional, perfilNivel: draft.perfilNivel, prestadorKey, username: draft.username, pin: draft.pin };
      const created = await dbInsertUsuarioComLimpeza(payload);
      if (created) STATE.usuarios = [created, ...STATE.usuarios];
      else formError = `Não foi possível criar o utilizador. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    }
    saving = false;
    if (!formError) showForm = false;
    rerender();
  }

  function removeSelected() {
    if (!isMasterUser() || selectedIds.size === 0) return;
    const ids = [...selectedIds];
    const alvos = STATE.usuarios.filter(u => ids.includes(u.id));
    if (alvos.some(isAdminFundador)) {
      formError = '';
      confirmDialog('A conta de Administrador fundador (username 99) está protegida e não pode ser eliminada, mesmo pelo próprio perfil logado. Desmarque-a para eliminar os restantes utilizadores selecionados.', () => {}, { confirmLabel: 'Entendido' });
      return;
    }
    const plural = ids.length > 1;
    confirmDialog(`ATENÇÃO: Tem a certeza de que quer eliminar permanentemente ${ids.length} utilizador${plural ? 'es' : ''} selecionado${plural ? 's' : ''}? Esta ação não pode ser desfeita!`, async () => {
      const apagados = await bulkHardDelete('usuarios', ids);
      STATE.usuarios = STATE.usuarios.filter(u => !apagados.has(u.id));
      selectedIds = new Set([...selectedIds].filter(id => !apagados.has(id)));
      rerender();
    }, { danger: true, confirmLabel: 'Eliminar' });
  }

  function usuarioFormSchema() {
    const editingSelf = editingId && isSelf(editingId);
    const ehPrestador = draft.perfilNivel === 'Prestador de Serviço';
    // Perfil "Farmácia Boa Nova": conta partilhada/genérica de operação, sem
    // pessoa associada — Nome/Apelido/Categoria ficam preenchidos
    // automaticamente e bloqueados; só Username, PIN e o próprio Nível de
    // Perfil continuam editáveis.
    const ehBoaNova = draft.perfilNivel === 'Farmácia Boa Nova';
    const semCategoria = draft.perfilNivel === 'Estafeta' || ehPrestador || ehBoaNova;
    const base = [
      {
        name: 'primeiroNome', label: 'Primeiro Nome' + (ehBoaNova ? ' (preenchido automaticamente)' : ''),
        type: 'text', singleWord: true, placeholder: 'Ex: Hugo', disabled: ehBoaNova,
      },
      {
        name: 'apelido', label: 'Apelido' + (ehBoaNova ? ' (preenchido automaticamente)' : ''),
        type: 'text', singleWord: true, placeholder: 'Ex: Cunha', disabled: ehBoaNova,
      },
      {
        name: 'categoriaProfissional', label: 'Categoria Profissional' + (semCategoria ? ' (não aplicável)' : ''),
        type: 'combo', options: CATEGORIAS_PROFISSIONAIS, placeholder: semCategoria ? 'Não aplicável a este perfil' : 'Escrever ou escolher...',
        disabled: semCategoria,
      },
      {
        name: 'perfilNivel', label: 'Nível de Perfil', type: 'select', options: PERFIS_NIVEL, size: 'sm', onChange: () => {
          if (draft.perfilNivel === 'Estafeta' || draft.perfilNivel === 'Prestador de Serviço') draft.categoriaProfissional = '';
          if (draft.perfilNivel === 'Farmácia Boa Nova') {
            draft.primeiroNome = 'Farmácia';
            draft.apelido = 'Boa Nova';
            draft.categoriaProfissional = '';
          } else if (draft.primeiroNome === 'Farmácia' && draft.apelido === 'Boa Nova') {
            // Estava preenchido automaticamente pelo perfil anterior — limpa
            // para a pessoa poder escrever o nome real do novo perfil.
            draft.primeiroNome = '';
            draft.apelido = '';
          }
          rerender();
        },
      },
    ];
    if (ehPrestador) {
      base.push({
        name: 'prestadorKey', label: 'Agenda Associada', type: 'select', size: 'sm',
        options: PRESTADORES_AGENDA.map(p => p.key),
        optionLabels: PRESTADORES_AGENDA.map(p => p.nome),
      });
    }
    if (!editingId || editingSelf) {
      base.push(
        { name: 'username', label: 'Username (2 a 4 números)', type: 'text', maxLength: 4, inputmode: 'numeric', pattern: '[0-9]{2,4}', digitsOnly: true, placeholder: 'Ex: 123', size: 'xs' },
        { name: 'pin', label: 'PIN (2 a 4 números)', type: 'text', maxLength: 4, inputmode: 'numeric', pattern: '[0-9]{2,4}', digitsOnly: true, placeholder: 'Ex: 1234', size: 'xs' },
      );
    }
    return base;
  }

  function buildTable() {
    const list = STATE.usuarios.slice().sort((a, b) => (a.nomeCompleto || '').localeCompare(b.nomeCompleto || '', 'pt'));
    if (list.length === 0) return EmptyState('Ainda não há utilizadores registados.');
    const thead = h('thead', {}, h('tr', {}, ['', 'Nome Completo', 'Categoria Profissional', 'Nível de Perfil', 'Username', 'PIN'].map(t => h('th', {}, t))));
    const rows = list.map(u => {
      const selected = selectedIds.has(u.id);
      const rowClass = 'selectable-row' + (selected ? ' row-selected' : '') + (isMasterUser() ? '' : ' cell-muted');
      const checkboxCell = isMasterUser() ? buildSelectionCheckbox(u.id, selectedIds, toggleSelect) : h('td', {});
      const row = h('tr', { class: rowClass }, [
        checkboxCell,
        h('td', { class: 'cell-strong' }, u.nomeCompleto || '—'),
        h('td', {}, u.categoriaProfissional || '—'),
        h('td', {}, u.perfilNivel || 'Basico'),
        h('td', {}, '********'),
        h('td', {}, '********'),
      ]);
      return row;
    });
    return h('div', { class: 'card' }, h('div', { class: 'table-wrap' }, h('table', {}, [thead, h('tbody', {}, rows)])));
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    wrap.appendChild(withBackButton(buildPageHeader('users', 'Utilizadores', 'Gestão de utilizadores, perfis e credenciais de acesso.', STATE.usuarios.length), goTo));

    if (!isMasterUser()) {
      wrap.appendChild(h('p', { class: 'readonly-notice', style: 'margin-bottom:16px;' }, 'O seu perfil é Básico: pode consultar Nome Completo e Categoria Profissional, mas não pode ver, editar ou eliminar credenciais de acesso.'));
    }

    if (showForm) {
      const editingSelf = editingId && isSelf(editingId);
      const editingAlvo = editingId ? STATE.usuarios.find(u => u.id === editingId) : null;
      wrap.appendChild(buildRecordForm(usuarioFormSchema(), draft, {
        editing: !!editingId, onSubmit: submit, onCancel: cancel, errorMessage: formError, saving,
        onDelete: (editingId && !editingSelf && !isAdminFundador(editingAlvo)) ? () => {
          confirmDialog('ATENÇÃO: Tem a certeza de que quer eliminar permanentemente este utilizador? Esta ação não pode ser desfeita!', async () => {
            const ok = await dbPermanentDelete('usuarios', editingId);
            if (ok) { STATE.usuarios = STATE.usuarios.filter(u => u.id !== editingId); selectedIds = new Set(); showForm = false; rerender(); }
            else showDbErrorToast('Não foi possível eliminar o utilizador');
          }, { danger: true, confirmLabel: 'Eliminar' });
        } : null,
      }));
    }

    wrap.appendChild(buildTable());

    if (isMasterUser() && !showForm) {
      wrap.appendChild(buildBottomActionBar({
        selectedCount: selectedIds.size,
        addLabel: 'Novo utilizador',
        onAdd: openNew,
        onEdit: openEditSelected,
        onDelete: removeSelected,
      }));
    }

    return wrap;
  }

  rerender();
}

/* =================================================================
   SEGURANÇA (Cópias de Segurança)
================================================================= */
function buildSegurancaPage(container, goTo) {
  clear(container);
  const wrap = h('div', { class: 'animate-in' });
  wrap.appendChild(withBackButton(buildPageHeader('lockClosed', 'Segurança', 'Cópias de segurança dos dados da aplicação.', undefined), goTo));

  if (!isMasterUser()) {
    wrap.appendChild(h('p', { class: 'readonly-notice' }, 'O seu perfil não tem permissão para gerar cópias de segurança.'));
    container.appendChild(wrap);
    return;
  }

  const statusMsg = h('p', { class: 'backup-status', style: 'display:none;' }, '');
  const backupBtn = h('button', { class: 'btn btn-secondary', onclick: () => requireAuth(async () => {
    backupBtn.disabled = true; backupBtn.textContent = 'A preparar cópia…';
    await descarregarBackup((msg, isError) => {
      statusMsg.textContent = msg;
      statusMsg.style.display = '';
      statusMsg.style.color = isError ? 'var(--red)' : '#059669';
    });
    backupBtn.disabled = false; backupBtn.textContent = 'Descarregar Cópia de Segurança (.json)';
  }) }, 'Descarregar Cópia de Segurança (.json)');
  wrap.appendChild(h('div', { class: 'card card-pad' }, [
    h('h3', { class: 'dash-card-title' }, 'Cópias de Segurança'),
    h('p', { class: 'login-sub', style: 'text-align:left;margin-bottom:16px;' }, 'Gera um ficheiro .json com todos os dados atuais de todas as tabelas da aplicação — pedidos, erros de stock, reclamações, utilizadores, objetivos, Mapa 48H e restantes módulos.'),
    backupBtn,
    statusMsg,
  ]));
  container.appendChild(wrap);
}

/* =================================================================
   MAPA 48H (agendamento do aparelho único)
================================================================= */
function buildMapa48hPage(container, goTo) {
  let activeTab = 'pendentes'; // 'pendentes' | 'historico'
  let searchQuery = '';
  let showForm = false, editingId = null, draft = {}, formError = '', saving = false;
  let selectedIds = new Set();

  function rerender() { clear(container); container.appendChild(build()); }
  function toggleSelect(id) { if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); rerender(); }

  function openNew(prefill) {
    prefill = prefill || {};
    // Data de Início assume logo a Próxima Data Disponível calculada pela
    // app, e a Data de Fim fica pré-calculada a +48H — poupa dois campos a
    // preencher à mão em quase todos os registos novos.
    const dataInicioSugerida = mapa48hProximaDataDisponivel(null);
    draft = {
      nomeCliente: '', nFicha: '', nMapa: '', contacto: '',
      dataInicio: dataInicioSugerida, dataFim: mapa48hCalcularDataFim(dataInicioSugerida),
      faturacao: 'Não', avisado: 'Não', estadoEntrega: 'Pendente', emUso: false, dataLeitura: '', observacoes: '',
      ...prefill,
    };
    editingId = null; formError = ''; showForm = true; rerender();
  }
  function openEditSelected() {
    if (selectedIds.size !== 1) return;
    const r = STATE.mapa48h.find(x => x.id === [...selectedIds][0]);
    if (!r) return;
    draft = Object.assign({}, r); editingId = r.id; formError = ''; showForm = true; rerender();
  }
  function cancel() { formError = ''; showForm = false; rerender(); }

  // Alinhado com o mesmo padrão de "Avisado" usado em Pedidos, Agendas e
  // Eventos: um clique alterna o estado de imediato, sem abrir o formulário.
  async function toggleAvisado(r) {
    const novo = r.avisado === 'Sim' ? 'Não' : 'Sim';
    const updated = await dbUpdate('mapa48h', r.id, { avisado: novo });
    if (updated) { STATE.mapa48h = STATE.mapa48h.map(x => x.id === r.id ? updated : x); rerender(); }
    else showDbErrorToast('Não foi possível atualizar o aviso');
  }
  // "Aparelho a Uso" é um controlo manual — nunca calculado sozinho pela
  // data. Só liga quando a equipa clica a confirmar que entregou mesmo o
  // aparelho ao utente nesse dia, e desliga da mesma forma.
  // "Aparelho a Uso" é um controlo manual — nunca calculado sozinho pela
  // data. Só liga quando a equipa clica a confirmar que entregou mesmo o
  // aparelho ao utente nesse dia, e desliga da mesma forma. Limite: por
  // omissão só 1 aparelho de cada vez; um 2º pede confirmação explícita
  // (aparelho emprestado); um 3º é sempre bloqueado.
  async function aplicarToggleEmUso(r, novo) {
    const updated = await dbUpdate('mapa48h', r.id, { emUso: novo });
    if (updated) { STATE.mapa48h = STATE.mapa48h.map(x => x.id === r.id ? updated : x); rerender(); }
    else showDbErrorToast('Não foi possível atualizar o estado do aparelho');
  }
  async function toggleEmUso(r) {
    const novo = !r.emUso;
    if (novo) {
      const outrosAtivos = STATE.mapa48h.filter(x => x.id !== r.id && x.emUso && x.estadoEntrega !== 'Já entregou').length;
      if (outrosAtivos >= 2) {
        confirmDialog('Limite atingido: já há 2 aparelhos do MAPA a ser utilizados em simultâneo. Não é possível ativar mais nenhum até um deles ser devolvido.', () => {}, { confirmLabel: 'Entendido' });
        return;
      }
      if (outrosAtivos === 1) {
        confirmDialog('Já existe 1 aparelho do MAPA a ser utilizado neste momento. Vão utilizar um segundo aparelho (emprestado)?', () => aplicarToggleEmUso(r, novo), { confirmLabel: 'Sim, usar 2.º aparelho' });
        return;
      }
    }
    await aplicarToggleEmUso(r, novo);
  }

  function checkMapa48hRequired(d) {
    const missing = [];
    if (!String(d.nomeCliente || '').trim()) missing.push('Nome do Cliente');
    if (!String(d.dataInicio || '').trim()) missing.push('Data de Início');
    return missing;
  }

  async function submit() {
    const missing = checkMapa48hRequired(draft);
    if (missing.length) {
      formError = `Por favor, preencha: ${missing.join(', ')}.`;
      rerender();
      return;
    }
    const formatoInvalido = checkFieldFormats(draft, mapa48hSchema);
    if (formatoInvalido) { formError = formatoInvalido; rerender(); return; }
    const conflito = mapa48hConflito(draft.dataInicio, editingId);
    if (conflito) {
      formError = `ATENÇÃO: Agendamento bloqueado. O aparelho já tem uma marcação em ${formatDate(conflito.dataInicio)} (${conflito.nomeCliente || 'sem nome'}). Tem de haver pelo menos 3 dias (72h) de intervalo entre exames. Próxima data disponível: ${formatDate(mapa48hProximaDataDisponivel(editingId))}.`;
      rerender();
      return;
    }
    formError = '';
    draft.responsavel = currentUserName();
    normalizeNameFields(draft);
    saving = true; rerender();
    if (editingId) {
      const updated = await dbUpdate('mapa48h', editingId, draft);
      if (updated) STATE.mapa48h = STATE.mapa48h.map(r => r.id === editingId ? updated : r);
      else formError = `Não foi possível guardar as alterações. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    } else {
      const created = await dbInsert('mapa48h', Object.assign({ dataRegisto: todayISO() }, draft));
      if (created) STATE.mapa48h = [created, ...STATE.mapa48h];
      else formError = `Não foi possível criar o registo. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    }
    saving = false;
    if (!formError) showForm = false;
    rerender();
  }

  function removeSelected() {
    if (selectedIds.size === 0) return;
    const ids = [...selectedIds];
    const plural = ids.length > 1;
    confirmDialog(`ATENÇÃO: Tem a certeza de que quer eliminar permanentemente ${ids.length} registo${plural ? 's' : ''} selecionado${plural ? 's' : ''}? Esta ação não pode ser desfeita!`, async () => {
      const apagados = await bulkSoftDelete('mapa48h', ids);
      STATE.mapa48h = STATE.mapa48h.filter(r => !apagados.has(r.id));
      selectedIds = new Set([...selectedIds].filter(id => !apagados.has(id)));
      rerender();
    }, { danger: true, confirmLabel: 'Eliminar' });
  }

  function marcarEntregue(id) {
    const registoAtual = STATE.mapa48h.find(r => r.id === id);
    confirmarConclusaoMapa48hDialog(async (vaiRepetir) => {
      const updated = await dbUpdate('mapa48h', id, { estadoEntrega: 'Já entregou', emUso: false });
      if (!updated) { showDbErrorToast('Não foi possível marcar como concluído'); return; }
      STATE.mapa48h = STATE.mapa48h.map(r => r.id === id ? updated : r);
      selectedIds = new Set([...selectedIds].filter(x => x !== id));
      showForm = false;
      if (vaiRepetir && registoAtual) {
        // Abre logo o Novo Registo com os dados do utente já preenchidos —
        // só falta confirmar/ajustar as datas, sugeridas automaticamente.
        openNew({ nomeCliente: registoAtual.nomeCliente || '', nFicha: registoAtual.nFicha || '', contacto: registoAtual.contacto || '' });
      } else {
        rerender();
      }
    });
  }
  function anularEntrega(id) {
    confirmDialog('Tem a certeza de que quer anular e devolver este registo aos pendentes?', async () => {
      const updated = await dbUpdate('mapa48h', id, { estadoEntrega: 'Pendente' });
      if (updated) {
        STATE.mapa48h = STATE.mapa48h.map(r => r.id === id ? updated : r);
        showForm = false;
        activeTab = 'pendentes';
        rerender();
      } else showDbErrorToast('Não foi possível anular a entrega');
    }, { confirmLabel: 'Anular' });
  }

  function mapa48hFormSchema() {
    const conflito = draft.dataInicio ? mapa48hConflito(draft.dataInicio, editingId) : null;
    const helper = conflito
      ? `ATENÇÃO: conflito com a marcação de ${formatDate(conflito.dataInicio)} (${conflito.nomeCliente || 'sem nome'}) — tem de haver pelo menos 72h de intervalo.`
      : `Próxima Data Disponível: ${formatDate(mapa48hProximaDataDisponivel(editingId))}`;
    return mapa48hSchema.map(f => f.name === 'dataInicio'
      ? Object.assign({}, f, { onChange: () => { draft.dataFim = mapa48hCalcularDataFim(draft.dataInicio); rerender(); }, helperText: helper })
      : f);
  }

  function visibleMapa48h() {
    const q = searchQuery.trim().toLowerCase();
    let list = STATE.mapa48h.filter(r => activeTab === 'historico' ? r.estadoEntrega === 'Já entregou' : r.estadoEntrega !== 'Já entregou');
    if (q) list = list.filter(r => [r.nomeCliente, r.nFicha, r.nMapa, r.contacto].some(v => (v || '').toLowerCase().includes(q)));
    // Pendentes: fila de espera cronológica — a marcação mais antiga/ativa
    // ("Aparelho a Uso") fica sempre no topo, as futuras ficam por baixo.
    // Histórico: mantém-se por ordem decrescente (concluído mais recente primeiro).
    return list.slice().sort((a, b) => activeTab === 'pendentes'
      ? (a.dataInicio || '').localeCompare(b.dataInicio || '')
      : (b.dataInicio || '').localeCompare(a.dataInicio || ''));
  }

  function buildTable(list) {
    if (list.length === 0) {
      const msg = searchQuery ? 'Nenhum resultado para essa pesquisa.' : (activeTab === 'historico' ? 'Ainda não há entregas concluídas.' : 'Sem marcações ou pendentes de momento.');
      return EmptyState(msg);
    }
    const thead = h('thead', {}, h('tr', {}, ['', 'Cliente', 'Nº Ficha', 'Data Início', 'Data Fim', 'Faturação', 'Avisado', 'Estado'].map(t => h('th', {}, t))));
    const rows = list.map(r => {
      const selected = selectedIds.has(r.id);
      const aUso = activeTab === 'pendentes' && !!r.emUso;
      const rowClass = 'selectable-row' + (selected ? ' row-selected' : '') + (aUso ? ' row-em-uso' : '');
      const estadoCell = r.estadoEntrega === 'Já entregou'
        ? h('span', { class: 'badge badge-green' }, 'JÁ ENTREGOU')
        : h('div', {}, [
          (() => {
            const pendenteBadge = h('span', { class: 'badge badge-orange estado-badge-clicavel', title: 'Clicar para marcar como Concluído' }, 'PENDENTE');
            pendenteBadge.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => marcarEntregue(r.id)); });
            return pendenteBadge;
          })(),
          (() => {
            // Controlo manual: só liga quando a equipa confirma que entregou
            // mesmo o aparelho ao utente — nunca é automático pela data.
            const emUsoBadge = h('span', {
              class: (aUso ? 'badge-em-uso' : 'badge-em-uso-off') + ' estado-badge-clicavel',
              title: aUso ? 'Aparelho entregue ao utente — clicar para desmarcar' : 'Clicar quando o aparelho for entregue ao utente',
            }, [Icon('zap', { size: 11, strokeWidth: 2.4 }), aUso ? ' Aparelho a Uso' : ' Marcar Aparelho a Uso']);
            emUsoBadge.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => toggleEmUso(r)); });
            return emUsoBadge;
          })(),
        ]);
      const avisadoBtn = h('button', {
        class: 'aviso-tag aviso-toggle' + (r.avisado === 'Sim' ? ' aviso-ativo' : ' aviso-inativo'),
        title: r.avisado === 'Sim' ? 'Utente avisado — clicar para desmarcar' : 'Utente não avisado — clicar para marcar',
      }, Icon(r.avisado === 'Sim' ? 'bell' : 'bellOff', { size: 16, strokeWidth: 2.2 }));
      avisadoBtn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => toggleAvisado(r)); });
      const row = h('tr', { class: rowClass }, [
        buildSelectionCheckbox(r.id, selectedIds, toggleSelect),
        h('td', { class: 'cell-strong' }, r.nomeCliente || '—'),
        h('td', {}, r.nFicha || '—'),
        h('td', {}, formatDate(r.dataInicio)),
        h('td', {}, formatDate(r.dataFim)),
        h('td', {}, r.faturacao || '—'),
        h('td', {}, avisadoBtn),
        h('td', {}, estadoCell),
      ]);
      return row;
    });
    return h('div', { class: 'card' }, h('div', { class: 'table-wrap' }, h('table', {}, [thead, h('tbody', {}, rows)])));
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    wrap.appendChild(withBackButton(buildPageHeader('heartPulseClock', 'Mapa 48H', 'Agendamento do aparelho MAPA — aparelho único da farmácia.', STATE.mapa48h.length), goTo));

    if (showForm) {
      wrap.appendChild(buildRecordForm(mapa48hFormSchema(), draft, {
        editing: !!editingId, onSubmit: submit, onCancel: cancel, errorMessage: formError, saving,
        onConclude: (editingId && draft.estadoEntrega !== 'Já entregou') ? () => marcarEntregue(editingId) : null, concludeLabel: 'Marcar como Entregue',
        onRevert: (editingId && draft.estadoEntrega === 'Já entregou') ? () => anularEntrega(editingId) : null, revertLabel: 'Anular Entrega',
      }));
    }

    const pendentesCount = STATE.mapa48h.filter(r => r.estadoEntrega !== 'Já entregou').length;
    const historicoCount = STATE.mapa48h.filter(r => r.estadoEntrega === 'Já entregou').length;
    const tabsRow = h('div', { class: 'tabs-row' }, [
      h('button', { class: 'tab-btn tone-orange' + (activeTab === 'pendentes' ? ' active' : ''), onclick: () => { activeTab = 'pendentes'; selectedIds = new Set(); rerender(); } }, [
        Icon('activity', { size: 14 }), h('span', {}, 'Pendentes'), h('span', { class: 'tab-count' }, String(pendentesCount)),
      ]),
      h('button', { class: 'tab-btn tone-green' + (activeTab === 'historico' ? ' active' : ''), onclick: () => { activeTab = 'historico'; selectedIds = new Set(); rerender(); } }, [
        Icon('checkcircle', { size: 14 }), h('span', {}, 'Histórico de Concluídos'), h('span', { class: 'tab-count' }, String(historicoCount)),
      ]),
    ]);
    wrap.appendChild(tabsRow);

    const searchInput = h('input', { class: 'search-input', type: 'text', placeholder: 'Pesquisar por cliente, nº ficha, nº mapa ou contacto...' });
    searchInput.value = searchQuery;
    const resultsContainer = h('div', {});
    function renderResults() { clear(resultsContainer); resultsContainer.appendChild(buildTable(visibleMapa48h())); }
    searchInput.addEventListener('input', () => { searchQuery = searchInput.value; renderResults(); });
    wrap.appendChild(h('div', { class: 'card card-pad', style: 'margin-bottom:22px;' }, [
      h('div', { class: 'search-row' }, [h('div', { class: 'search-input-wrap' }, [h('span', { class: 'icon' }, Icon('search', { size: 15 })), searchInput])]),
    ]));
    wrap.appendChild(resultsContainer);
    renderResults();

    if (!showForm) {
      wrap.appendChild(buildBottomActionBar({
        selectedCount: selectedIds.size,
        addLabel: 'Novo registo',
        onAdd: openNew,
        onEdit: openEditSelected,
        onDelete: removeSelected,
        onConclude: activeTab === 'pendentes' ? () => { if (selectedIds.size === 1) marcarEntregue([...selectedIds][0]); } : null,
        concludeLabel: 'Marcar como Entregue',
      }));
    }
    return wrap;
  }

  rerender();
}

/* =================================================================

  const linhasAntes = [
    ['Farmácia', r.farmacia || '—'],
    ['Cliente / Destinatário', r.nomeCliente || '—'],
    ['Morada', [r.morada, r.localidade].filter(Boolean).join(', ') || '—'],
    ['Contacto', r.contacto || '—'],

    ['Bloco Horário', r.blocoHorario || '—'],
    ['Hora Limite', entregaHoraLimiteEfetiva(r) || '—'],
    ['Entregue por', r.entreguePor || '—'],
    ['Urgente', r.urgente ? 'SIM — Entrega Imediata' : 'Não'],
  ];
  const pago = r.estadoPagamento === 'Pago';
  const aCobrar = r.estadoPagamento === 'Não Pago';
  const linhasDepois = [];
  if (aCobrar) {
    if (r.metodoPagamento === 'Dinheiro') {

    } else if (r.metodoPagamento === 'MB' && r.levarTerminalMb) {

    ...linhasAntes.map(rowNormal),

  // Estado de Pagamento em destaque — desenhado como caixa autónoma com
  // borda preta grossa e texto em maiúsculas, SEM depender de cor de
  // fundo (muitos browsers/impressoras a laser ignoram o fundo por
  // omissão). O símbolo [ ✓ ]/[ ⚠ ] e o texto grande garantem contraste
  // total mesmo em impressão a preto e branco.
  let pagamentoBox;

      h('span', { class: 'doc-pagamento-symbol' }, '[ ✓ ]'),

  } else if (aCobrar) {
    const valorTxt = (r.metodoPagamento === 'Dinheiro' && r.valorAPagar !== '' && r.valorAPagar !== undefined && r.valorAPagar !== null)
      ? ` NO ATO DA ENTREGA: ${Number(r.valorAPagar).toFixed(2)}€`
      : (r.metodoPagamento ? ` — ${r.metodoPagamento}` : '');
    pagamentoBox = h('div', { class: 'doc-pagamento-box doc-pagamento-alerta' }, [
      h('span', { class: 'doc-pagamento-symbol' }, '[ ⚠ ]'),
      h('span', {}, `A COBRAR${valorTxt}`),
    ]);
  } else {
    pagamentoBox = h('div', { class: 'doc-pagamento-box' }, [
      h('span', { class: 'doc-pagamento-symbol' }, '[ — ]'),
      h('span', {}, 'ESTADO DE PAGAMENTO POR DEFINIR'),

  const kids = [
    buildDocLetterhead(r.farmacia),

    h('table', { class: 'doc-table' }, [tbody]),

  const rodape = h('div', { class: 'doc-rodape' }, [
    h('div', { class: 'doc-signature-block' }, [
      h('div', { class: 'doc-signature-line' }),
      h('p', { class: 'doc-signature-name' }, 'Assinatura de quem recebeu'),
      h('p', { class: 'doc-declaracao-legal' },
        `Declaro ter recebido todos os medicamentos e/ou produtos de saúde e bem-estar solicitados, no meu domicílio, conforme pedido realizado junto à ${nomeFarmaciaDeclaracao}. Compreendi todas as instruções fornecidas para o uso correto e seguro dos medicamentos e/ou produtos de saúde e bem-estar, assim como todos os esclarecimentos adicionais solicitados para a resolução e/ou acompanhamento da minha situação.`),
    ]),

  return buildDocA4(kids, rodape);
