/* =================================================================
   GESTÃO DE ORÇAMENTOS POR PEDIDO — regras fixas por sector:
   - Manipulados: 3 farmácias fixas + 1 bloco livre "Outra Farmácia" (até 4)
   - Ortopedia: 3 fornecedores fixos (ordem: STOP Ortopedia, PRIM, Medi)
     + 1 bloco livre "Outro Fornecedor" (até 4)
   - Ervanária / Veterinária: 1 fornecedor fixo + 1 bloco livre "Outro
     Fornecedor" (até 2 — os blocos 2 e 3 "extra" nem chegam a existir)
   - Outros Fornecedores: sem esta secção — só o campo simples Valor (€)
     que já existe no formulário principal.
================================================================= */
const FORNECEDOR_PRESETS = {
  manipulados: ['Farmácia Guarani', 'Farmácia Clérigos', 'Farmácia Serpa Pinto'],
  ortopedia: ['STOP Ortopedia', 'PRIM', 'Medi'],
  ervanaria: ['Ervanário Portuense'],
  veterinaria: ['Siloal'],
};
// Rótulos fixos e não editáveis para os blocos com fornecedor predefinido.
const ORCAMENTO_LINHA_LABELS = {
  manipulados: ['Farmácia Guarani', 'Farmácia Clérigos', 'Farmácia Serpa Pinto'],
  ortopedia: ['STOP Ortopedia', 'PRIM', 'Medi'],
  ervanaria: ['Ervanário Portuense'],
  veterinaria: ['Siloal'],
};
// Número total de blocos de orçamento por sector (fixos + o bloco livre).
const ORCAMENTO_MAX_SLOTS = {
  manipulados: 4,
  ortopedia: 4,
  ervanaria: 2,
  veterinaria: 2,
};
function orcamentoMaxSlots(listKey) { return ORCAMENTO_MAX_SLOTS[listKey] || 0; }
function orcamentoLinhaLabel(listKey, i) {
  const labels = ORCAMENTO_LINHA_LABELS[listKey];
  if (labels && labels[i - 1]) return labels[i - 1];
  if (i === orcamentoMaxSlots(listKey)) return listKey === 'manipulados' ? 'Outra Farmácia' : 'Outro Fornecedor';
  return `Orçamento ${i}`;
}
function categoriaTemOrcamentos(listKey) {
  return Object.prototype.hasOwnProperty.call(FORNECEDOR_PRESETS, listKey);
}
function orcamentoPedidoField(i) { return `orcamento${i}Pedido`; }
// Denominador dinâmico: só conta as farmácias/fornecedores cuja checkbox
// "Pedido" está assinalada — é a esse número que o rácio da tabela se refere.
function orcamentosSelecionados(draft, listKey) {
  let n = 0;
  const max = orcamentoMaxSlots(listKey);
  for (let i = 1; i <= max; i++) if (draft[orcamentoPedidoField(i)]) n++;
  return n;
}
function orcamentosPreenchidos(draft, listKey) {
  let n = 0;
  const max = orcamentoMaxSlots(listKey);
  for (let i = 1; i <= max; i++) {
    if (!draft[orcamentoPedidoField(i)]) continue; // só conta farmácias marcadas como pedidas
    const valor = parseFloat(draft[`orcamento${i}Valor`]);
    if (!isNaN(valor) && valor > 0) n++;
  }
  return n;
}
function orcamentoStatusLabel(draft, listKey) {
  const max = orcamentoMaxSlots(listKey);
  const aprovado = parseInt(draft.orcamentoAprovado, 10);
  if (aprovado >= 1 && aprovado <= max) {
    const valor = parseFloat(draft[`orcamento${aprovado}Valor`]);
    return `Aprovado - €${isNaN(valor) ? '0.00' : valor.toFixed(2)}`;
  }
  const total = orcamentosSelecionados(draft, listKey);
  if (total === 0) return 'A aguardar orçamentos';
  const n = orcamentosPreenchidos(draft, listKey);
  return `${n}/${total} recebidos`;
}
function orcamentoStatusTone(draft, listKey) {
  const max = orcamentoMaxSlots(listKey);
  const aprovado = parseInt(draft.orcamentoAprovado, 10);
  if (aprovado >= 1 && aprovado <= max) return 'green';
  const total = orcamentosSelecionados(draft, listKey);
  if (total === 0) return 'gray';
  const n = orcamentosPreenchidos(draft, listKey);
  return n === 0 ? 'gray' : 'orange';
}
// Interliga o campo "Farmácia" do topo do formulário com o painel de Gestão
// de Orçamentos:
// - Farmácia escrita diretamente pelo utilizador (fornecedorManual=true) →
//   Orçamentos ficam totalmente bloqueados.
// - Farmácia em branco e 1 só farmácia marcada como "Pedido" nos Orçamentos
//   → Farmácia do topo assume esse nome e fica bloqueada.
// - Farmácia em branco e 2+ farmácias marcadas → Farmácia do topo fica
//   bloqueada e em branco.
// - Assim que há um orçamento Aprovado, esse passa a mandar (fornecedor +
//   PVP), e a Farmácia do topo fica bloqueada nesse valor.
function resolveFornecedorOrcamentoState(listKey, draft, fornecedorManual) {
  if (!categoriaTemOrcamentos(listKey)) return { fornecedorBloqueado: false, orcamentosBloqueados: false };
  const max = orcamentoMaxSlots(listKey);
  const aprovadoIdx = parseInt(draft.orcamentoAprovado, 10);
  if (aprovadoIdx >= 1 && aprovadoIdx <= max) return { fornecedorBloqueado: true, orcamentosBloqueados: false };
  if (fornecedorManual) return { fornecedorBloqueado: false, orcamentosBloqueados: true };
  const pedidoCount = orcamentosSelecionados(draft, listKey);
  if (pedidoCount === 1) {
    for (let i = 1; i <= max; i++) {
      if (draft[orcamentoPedidoField(i)]) {
        draft.fornecedor = draft[`orcamento${i}Fornecedor`] || orcamentoLinhaLabel(listKey, i);
        break;
      }
    }
    return { fornecedorBloqueado: true, orcamentosBloqueados: false };
  }
  if (pedidoCount >= 2) {
    draft.fornecedor = '';
    return { fornecedorBloqueado: true, orcamentosBloqueados: false };
  }
  return { fornecedorBloqueado: false, orcamentosBloqueados: false };
}
// Campo "Farmácia" do topo do formulário, com suporte para o estado
// bloqueado (preenchido automaticamente pelos Orçamentos, ou vazio porque
// há mais do que uma farmácia marcada). onManualChange(isManual) é chamado
// sempre que o utilizador o edita diretamente (não bloqueado).
function buildFornecedorTopField(fieldDef, draft, bloqueado, onManualChange) {
  const listId = 'dl-fornecedor-top-' + (__datalistCounter++);
  const dl = h('datalist', { id: listId }, (fieldDef.options || []).map(o => h('option', { value: o })));
  const inp = h('input', { class: 'input', list: listId, placeholder: fieldDef.placeholder || 'Escrever ou escolher...', disabled: bloqueado ? 'disabled' : undefined });
  inp.value = draft[fieldDef.name] || '';
  inp.addEventListener('change', () => {
    draft[fieldDef.name] = inp.value;
    onManualChange(!!String(inp.value || '').trim());
  });
  const kids = [h('label', {}, fieldDef.label), inp, dl];
  if (bloqueado) {
    kids.push(h('p', { class: 'field-helper-text' }, draft[fieldDef.name]
      ? 'Preenchido automaticamente pela Gestão de Orçamentos.'
      : 'Bloqueado — há mais do que uma farmácia marcada nos Orçamentos.'));
  }
  return h('div', { class: 'field' + (fieldDef.col === 2 ? ' span2' : '') }, kids);
}
function buildOrcamentosPanel(listKey, draft, rerender, bloqueado) {
  if (!categoriaTemOrcamentos(listKey)) return null;
  const presets = FORNECEDOR_PRESETS[listKey];
  const rotulosFixos = ORCAMENTO_LINHA_LABELS[listKey];
  const max = orcamentoMaxSlots(listKey);
  const slots = [];
  for (let i = 1; i <= max; i++) slots.push(i);
  const linhas = slots.map(i => {
    const fCampo = `orcamento${i}Fornecedor`, vCampo = `orcamento${i}Valor`, pCampo = `orcamento${i}Prazo`, oCampo = `orcamento${i}Obs`;
    const pedidoCampo = orcamentoPedidoField(i);
    const aprovado = parseInt(draft.orcamentoAprovado, 10) === i;
    const nomeFixo = rotulosFixos && rotulosFixos[i - 1];
    // Nos blocos de fornecedor fixo (as 3 farmácias de Manipulados), o nome
    // vem sempre pré-preenchido e não é editável — só existe o 4º bloco
    // (\"Outra Farmácia\"/\"Outro Fornecedor\") livre para escrever à mão.
    if (nomeFixo && !draft[fCampo]) draft[fCampo] = nomeFixo;
    // Checkbox \"Pedido\": por defeito só vem assinalada se já houver um valor
    // preenchido (registos antigos) — caso contrário fica por marcar, para o
    // utilizador escolher explicitamente a que farmácias pediu orçamento.
    if (draft[pedidoCampo] === undefined) draft[pedidoCampo] = !!(draft[vCampo] && String(draft[vCampo]).trim());

    let fornInput;
    if (nomeFixo) {
      fornInput = h('p', { class: 'orcamento-fornecedor-fixo' }, nomeFixo);

      inp.value = draft[fCampo] || '';
      inp.addEventListener('input', () => { draft[fCampo] = inp.value; });
      fornInput = h('div', { class: 'orcamento-nome-combo' }, [inp, dl]);
    } else {
      const inp = h('input', { class: 'input', placeholder: i === 4 ? 'Nome da Farmácia/Fornecedor' : 'Laboratório / Fornecedor', disabled: bloqueado ? 'disabled' : undefined });
      inp.value = draft[fCampo] || '';

    const valorInput = h('input', { class: 'input', type: 'number', step: '0.01', min: '0', placeholder: 'Valor €', disabled: bloqueado ? 'disabled' : undefined });
    valorInput.value = draft[vCampo] || '';
    valorInput.addEventListener('keydown', (e) => { if (e.key === '-') e.preventDefault(); });
    valorInput.addEventListener('input', () => {
      if (valorInput.value !== '' && parseFloat(valorInput.value) < 0) valorInput.value = valorInput.value.replace('-', '');

// Objetivos da Equipa — metas de vendas com progresso em tempo real. Cada
// objetivo/marca agrega uma Lista Dinâmica de Produtos (nome, meta, atual),
// guardada em "produtos" (jsonb) — os totais nunca se guardam à parte,
// vêm sempre do somatório dos produtos (uma única fonte de verdade).
const objetivosSchema = [

// Meta/contagem TOTAIS de uma marca/objetivo — somam sempre os produtos da
// sua Lista Dinâmica; nunca há um valor guardado à parte que possa
// desincronizar do array de produtos.
function objetivoProdutos(o) {
  return Array.isArray(o.produtos) ? o.produtos : [];
}
function objetivoMetaTotal(o) {
  return objetivoProdutos(o).reduce((soma, p) => soma + (parseFloat(p.meta) || 0), 0);
}
function objetivoContagemTotal(o) {
  return objetivoProdutos(o).reduce((soma, p) => soma + (parseFloat(p.atual) || 0), 0);
}
function objetivoProgressoPct(o) {
  const meta = objetivoMetaTotal(o);
  const atual = objetivoContagemTotal(o);
  if (meta <= 0) return 0;
  return Math.max(0, Math.min(100, Math.round((atual / meta) * 100)));
}
function objetivoProgressoCor(pct) {
  if (pct >= 100) return '#059669'; // verde — meta atingida
  if (pct >= 70) return 'var(--blue)';
  if (pct >= 40) return '#d97706'; // laranja
  return 'var(--red)';
}
function objetivoAtivo(o) {
  return o.ativo !== 'Não' && o.ativo !== false;
}
// Sempre em unidades — já não há distinção Quantidade/Valor Monetário.
function objetivoFormatarValor(valor) {
  return `${Math.round(parseFloat(valor) || 0)} un.`;
}
function objetivoFormatarProgresso(o) {
  return `${objetivoFormatarValor(objetivoContagemTotal(o))} / ${objetivoFormatarValor(objetivoMetaTotal(o))}`;
}

/* =================================================================
   AGENDA — 6 prestadores de serviço, com regras de duração automática,
   deteção de sobreposição e bloqueio/encaixe de vagas.
   (PRESTADORES_AGENDA está declarado mais acima, antes de NAV_SECTIONS,
   porque o menu principal precisa dele para montar a secção "Agendas".)
================================================================= */
const AGENDA_HORA_INICIO = '08:00';
const AGENDA_HORA_FIM = '21:00';
const AGENDA_SLOT_MIN = 15;
const TIPOS_CONSULTA_NUTRICAO = ['Nutrição — 1ª Consulta', 'Nutrição — Seguimento', 'Nutrição Clínica — 1ª Consulta', 'Nutrição Clínica — Seguimento'];

function agendaGerarSlots() {
  const slots = [];
  let hh = parseInt(AGENDA_HORA_INICIO.split(':')[0], 10);
  let mm = parseInt(AGENDA_HORA_INICIO.split(':')[1], 10);
  const hf = parseInt(AGENDA_HORA_FIM.split(':')[0], 10);
  const mf = parseInt(AGENDA_HORA_FIM.split(':')[1], 10);
  while (hh < hf || (hh === hf && mm < mf)) {
    slots.push(`${pad2(hh)}:${pad2(mm)}`);
    mm += AGENDA_SLOT_MIN;
    if (mm >= 60) { mm -= 60; hh += 1; }
  }
  return slots;
}
const AGENDA_SLOTS_PADRAO = agendaGerarSlots();

function agendaEhNutricao(prestadorKey) { return prestadorKey === 'nutricao_tatiana' || prestadorKey === 'nutricao_joana'; }
// Duração automática: Nutrição 1ª Consulta = 30 min (2 slots), Seguimento =
// 15 min (1 slot); Massagem = sempre 60 min (4 slots); restantes = 15 min.
function agendaDuracaoPorTipo(prestadorKey, tipoConsulta) {
  if (prestadorKey === 'massagem_marco') return 60;
  if (agendaEhNutricao(prestadorKey)) return (tipoConsulta || '').includes('1ª Consulta') ? 30 : 15;
  return 15;
}
function agendaNumSlots(duracaoMin) { return Math.max(1, Math.round((duracaoMin || 15) / AGENDA_SLOT_MIN)); }
// Devolve os horários (strings "HH:MM") que uma marcação de duracaoMin a
// começar em horaInicio ocupa. Fora da grelha padrão (encaixe), ocupa só o
// próprio horário exato.
function agendaHorariosOcupados(horaInicio, duracaoMin) {
  const idx = AGENDA_SLOTS_PADRAO.indexOf(horaInicio);
  if (idx === -1) return [horaInicio];
  return AGENDA_SLOTS_PADRAO.slice(idx, idx + agendaNumSlots(duracaoMin));
}
// Agrupamento simples de blocos de horário para o atalho de bloqueio em
// massa — Manhã (até às 13h) / Tarde (a partir das 13h).
function agendaPeriodoDoSlot(hora) { return hora < '13:00' ? 'Manhã' : 'Tarde'; }
function agendaSlotsDoPeriodo(periodo) { return AGENDA_SLOTS_PADRAO.filter(s => agendaPeriodoDoSlot(s) === periodo); }
// Verifica se uma nova marcação colide com alguma já existente do mesmo
// prestador nesse dia (incluindo vagas bloqueadas). Devolve o registo em
// conflito, ou null se o horário estiver livre.
function agendaConflito(prestadorKey, data, horaInicio, duracaoMin, excludeId) {
  const novosHorarios = new Set(agendaHorariosOcupados(horaInicio, duracaoMin));
  const doDia = STATE.agendaMarcacoes.filter(m => m.prestadorKey === prestadorKey && m.data === data && m.id !== excludeId);
  for (const m of doDia) {
    const horariosExistentes = agendaHorariosOcupados(m.hora, m.duracaoMin || 15);
    if (horariosExistentes.some(hh => novosHorarios.has(hh))) return m;
  }
  return null;
}

// Contagem de marcações efetivas (exclui vagas bloqueadas) de um prestador
// num dado mês/ano — usada no badge por baixo do cabeçalho de cada mês na
// vista das Agendas.
function agendaContagemMes(prestadorKey, year, month) {
  const prefixo = `${year}-${pad2(month + 1)}`;
  return STATE.agendaMarcacoes.filter(m => m.prestadorKey === prestadorKey && m.tipoLinha !== 'bloqueado' && (m.data || '').startsWith(prefixo)).length;
}
function agendaContagemLabel(n) {
  return n === 1 ? '1 marcação' : `${n} marcações`;
}

// ---- Controlo de Dia Aberto/Fechado (Agendas) ----
// Um dia de Agenda fica "aberto" quando existe um registo em
// STATE.agendaDias para aquele prestador+data — isto permite marcar o dia
// como ativo no calendário (badge/cor) mesmo sem qualquer marcação ainda.
function agendaDiaAbertoRegisto(prestadorKey, dateISO) {
  return (STATE.agendaDias || []).find(d => d.prestadorKey === prestadorKey && d.data === dateISO);
}
function agendaDiaAberto(prestadorKey, dateISO) {
  return !!agendaDiaAbertoRegisto(prestadorKey, dateISO);
}
// "Fechar Dia" só é permitido quando não há nenhuma marcação ativa (vagas
// bloqueadas não contam, e uma marcação com estado "cancelada" já não conta
// como ativa).
function agendaDiaTemMarcacaoAtiva(prestadorKey, dateISO) {
  return STATE.agendaMarcacoes.some(m => m.prestadorKey === prestadorKey && m.data === dateISO && m.tipoLinha !== 'bloqueado' && m.estado !== 'cancelada');
}

// Modal do "dia de serviço" de um prestador — grelha de vagas de 15 em 15
// minutos, marcação de consultas (com deteção de sobreposição), bloqueio de
// vagas com um clique, e criação de encaixes fora da grelha padrão. Dias já
// passados ficam só para consulta — nenhuma ação de escrita é permitida.
function buildAgendaDiaModal(prestadorKey, dateISO, onSaved) {
  const overlay = h('div', { class: 'modal-overlay' });
  function close() { overlay.remove(); }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

  const prestador = PRESTADORES_AGENDA.find(p => p.key === prestadorKey);
  const isPast = dateISO < todayISO();
  let showForm = false; // false | 'nova' | 'encaixe'
  let formDraft = {};
  let formError = '';
  let saving = false;

  function marcacoesDoDia() {
    return STATE.agendaMarcacoes.filter(m => m.prestadorKey === prestadorKey && m.data === dateISO);
  }

  function openNovaMarcacao(horaPreenchida) {
    formDraft = { hora: horaPreenchida || AGENDA_SLOTS_PADRAO[0], tipoConsulta: agendaEhNutricao(prestadorKey) ? TIPOS_CONSULTA_NUTRICAO[0] : '', nomeCliente: '', contacto: '', aviso: false, observacoes: '' };
    formError = ''; showForm = 'nova'; render();
  }
  function openEncaixe() {
    formDraft = { hora: '', tipoConsulta: agendaEhNutricao(prestadorKey) ? TIPOS_CONSULTA_NUTRICAO[0] : '', nomeCliente: '', contacto: '', aviso: false, observacoes: '' };
    formError = ''; showForm = 'encaixe'; render();
  }
  function cancelForm() { showForm = false; formError = ''; render(); }

  // ---- Controlo de Dia Aberto/Fechado ----
  async function abrirDiaAgenda() {
    const created = await dbInsert('agendaDias', { prestadorKey, data: dateISO, responsavel: currentUserName() });
    if (created) { STATE.agendaDias = [created, ...STATE.agendaDias]; renderHeaderAcoes(); if (onSaved) onSaved(); }
    else showDbErrorToast('Não foi possível abrir o dia');
  }
  // Abertura automática e silenciosa (sem popup de confirmação), disparada
  // sempre que se cria uma marcação num dia ainda fechado — o dia passa a
  // "Aberto" sem exigir um passo manual extra do utilizador.
  async function abrirDiaAgendaSilencioso() {
    if (agendaDiaAberto(prestadorKey, dateISO)) return;
    const created = await dbInsert('agendaDias', { prestadorKey, data: dateISO, responsavel: currentUserName() });
    if (created) { STATE.agendaDias = [created, ...STATE.agendaDias]; renderHeaderAcoes(); }
  }
  function fecharDiaAgenda() {
    const registo = agendaDiaAbertoRegisto(prestadorKey, dateISO);
    if (!registo) return;
    if (agendaDiaTemMarcacaoAtiva(prestadorKey, dateISO)) return; // bloqueado — nunca deveria disparar, mas por segurança
    confirmDialog('Tem a certeza de que quer fechar este dia? Deixa de ficar disponível/ativo no calendário.', async () => {
      const ok = await dbDelete('agendaDias', registo.id);
      if (ok) { STATE.agendaDias = STATE.agendaDias.filter(d => d.id !== registo.id); renderHeaderAcoes(); if (onSaved) onSaved(); }
      else showDbErrorToast('Não foi possível fechar o dia');
    }, { confirmLabel: 'Fechar Dia' });
  }
  function buildAbrirFecharDiaBtn() {
    if (isPast) return null;
    const aberto = agendaDiaAberto(prestadorKey, dateISO);
    if (!aberto) {
      const btn = h('button', { class: 'btn btn-secondary', title: 'Ativa este dia no calendário mesmo sem marcações' }, [Icon('lockOpen', { size: 14, strokeWidth: 2.2 }), ' Abrir Dia']);
      btn.addEventListener('click', () => requireAuth(abrirDiaAgenda));
      return btn;
    }
    const bloqueado = agendaDiaTemMarcacaoAtiva(prestadorKey, dateISO);
    const btn = h('button', {
      class: 'btn btn-secondary',
      disabled: bloqueado ? 'disabled' : undefined,
      title: bloqueado ? 'Cancele ou remova todas as marcações para poder fechar este dia.' : 'Fecha este dia e remove a sua disponibilidade no calendário',
    }, [Icon('lockClosed', { size: 14, strokeWidth: 2.2 }), ' Fechar Dia']);
    if (!bloqueado) btn.addEventListener('click', () => requireAuth(fecharDiaAgenda));
    return btn;
  }
  const headerAcoesEl = h('div', { style: 'display:flex;align-items:center;gap:8px;' });
  function renderHeaderAcoes() {
    clear(headerAcoesEl);
    const btn = buildAbrirFecharDiaBtn();
    if (btn) headerAcoesEl.appendChild(btn);
  }

  async function submitForm() {
    if (!String(formDraft.nomeCliente || '').trim()) { formError = 'Por favor, preencha o Nome do Cliente.'; render(); return; }
    if (!String(formDraft.contacto || '').trim()) { formError = 'Por favor, preencha o Contacto.'; render(); return; }
    if (!/^[0-9]{9}$/.test(String(formDraft.contacto || '').trim())) { formError = 'O Contacto deve ter exatamente 9 dígitos numéricos.'; render(); return; }
    if (showForm === 'encaixe') {
      formDraft.hora = normalizarHora(formDraft.hora);
      if (!/^\d{2}:\d{2}$/.test(formDraft.hora)) {
        formError = 'Indique a hora do encaixe no formato HH:MM (ex: 14:10).'; render(); return;
      }
    }
    const duracaoMin = agendaDuracaoPorTipo(prestadorKey, formDraft.tipoConsulta);
    const conflito = agendaConflito(prestadorKey, dateISO, formDraft.hora, duracaoMin);
    if (conflito) {
      formError = `ATENÇÃO: Este horário colide com a marcação das ${conflito.hora}${conflito.nomeCliente ? ' (' + conflito.nomeCliente + ')' : ''}. Escolha outro horário.`;
      render();
      return;
    }
    formError = '';
    saving = true; render();
    const payload = {
      prestadorKey, data: dateISO, hora: formDraft.hora, duracaoMin,
      tipoConsulta: formDraft.tipoConsulta || '', nomeCliente: formDraft.nomeCliente,
      contacto: formDraft.contacto || '', aviso: !!formDraft.aviso, observacoes: formDraft.observacoes || '',
      tipoLinha: 'vaga', estado: 'agendada', responsavel: currentUserName(),
    };
    const created = await dbInsert('agendaMarcacoes', payload);
    saving = false;
    if (created) {
      STATE.agendaMarcacoes = [created, ...STATE.agendaMarcacoes];
      showForm = false;
      await abrirDiaAgendaSilencioso();
      if (onSaved) onSaved();
      render();
    } else {
      formError = `Não foi possível guardar. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
      render();
    }
  }

  // Devolve o conjunto contíguo de horários bloqueados (grelha padrão) que
  // inclui `hora` — usado para detetar quando 3 vagas seguidas ficam
  // bloqueadas e sugerir o bloqueio do bloco completo (Manhã/Tarde).
  function agendaRunBloqueadoContendo(hora) {
    const bloqueados = new Set(marcacoesDoDia().filter(m => m.tipoLinha === 'bloqueado').map(m => m.hora));
    const idx = AGENDA_SLOTS_PADRAO.indexOf(hora);
    if (idx === -1) return [hora];
    let ini = idx, fim = idx;
    while (ini > 0 && bloqueados.has(AGENDA_SLOTS_PADRAO[ini - 1])) ini -= 1;
    while (fim < AGENDA_SLOTS_PADRAO.length - 1 && bloqueados.has(AGENDA_SLOTS_PADRAO[fim + 1])) fim += 1;
    return AGENDA_SLOTS_PADRAO.slice(ini, fim + 1);
  }
  async function bloquearBlocoCompleto(periodo) {
    const ocupadas = new Set(marcacoesDoDia().map(m => m.hora));
    const porBloquear = agendaSlotsDoPeriodo(periodo).filter(hora => !ocupadas.has(hora));
    if (!porBloquear.length) return;
    const criados = await Promise.all(porBloquear.map(hora =>
      dbInsert('agendaMarcacoes', { prestadorKey, data: dateISO, hora, duracaoMin: 15, tipoLinha: 'bloqueado', responsavel: currentUserName() })
    ));
    const validos = criados.filter(Boolean);
    if (validos.length) { STATE.agendaMarcacoes = [...validos, ...STATE.agendaMarcacoes]; if (onSaved) onSaved(); render(); }
    if (validos.length < porBloquear.length) showDbErrorToast('Algumas vagas do bloco não puderam ser bloqueadas');
  }
  function bloquearVaga(hora) {
    confirmDialog('Tem a certeza de que pretende bloquear esta vaga?', async () => {
      const created = await dbInsert('agendaMarcacoes', { prestadorKey, data: dateISO, hora, duracaoMin: 15, tipoLinha: 'bloqueado', responsavel: currentUserName() });
      if (created) {
        STATE.agendaMarcacoes = [created, ...STATE.agendaMarcacoes];
        if (onSaved) onSaved();
        render();
        const run = agendaRunBloqueadoContendo(hora);
        if (run.length === 3) {
          const periodo = agendaPeriodoDoSlot(hora);
          confirmDialog(
            `Bloqueou 3 vagas consecutivas. Deseja bloquear o bloco completo de horário (${periodo})? Esta ação vai impedir novas marcações em todo esse período — pode sempre desbloquear vaga a vaga individualmente mais tarde.`,
            () => bloquearBlocoCompleto(periodo),
            { confirmLabel: `Bloquear Bloco da ${periodo}` }
          );
        }
      } else showDbErrorToast('Não foi possível bloquear a vaga');
    });
  }
  function desbloquearVaga(m) {
    confirmDialog('Tem a certeza de que pretende desbloquear esta vaga?', async () => {
      const ok = await dbDelete('agendaMarcacoes', m.id);
      if (ok) { STATE.agendaMarcacoes = STATE.agendaMarcacoes.filter(x => x.id !== m.id); if (onSaved) onSaved(); render(); }
      else showDbErrorToast('Não foi possível desbloquear a vaga');
    });
  }
  function eliminarMarcacao(m) {
    confirmDialog(`Eliminar a marcação de ${m.nomeCliente || 'sem nome'}?`, async () => {
      const ok = await dbDelete('agendaMarcacoes', m.id);
      if (ok) { STATE.agendaMarcacoes = STATE.agendaMarcacoes.filter(x => x.id !== m.id); if (onSaved) onSaved(); render(); }
      else showDbErrorToast('Não foi possível eliminar a marcação');
    }, { danger: true, confirmLabel: 'Eliminar' });
  }
  function eliminarEncaixe(m) {
    confirmDialog('Tem a certeza que pretende eliminar esta vaga extra?', async () => {
      const ok = await dbDelete('agendaMarcacoes', m.id);
      if (ok) { STATE.agendaMarcacoes = STATE.agendaMarcacoes.filter(x => x.id !== m.id); if (onSaved) onSaved(); render(); }
      else showDbErrorToast('Não foi possível eliminar a vaga extra');
    }, { danger: true, confirmLabel: 'Eliminar' });
  }
  function confirmarMarcacao(m) {
    confirmDialog('Tem a certeza que pretende confirmar esta vaga?', async () => {
      const updated = await dbUpdate('agendaMarcacoes', m.id, { estado: 'confirmada' });
      if (updated) { STATE.agendaMarcacoes = STATE.agendaMarcacoes.map(x => x.id === m.id ? updated : x); if (onSaved) onSaved(); render(); }
      else showDbErrorToast('Não foi possível confirmar a vaga');
    }, { confirmLabel: 'Confirmar' });
  }
  function cancelarMarcacao(m) {
    confirmDialog('Tem a certeza que pretende cancelar esta vaga?', async () => {
      const updated = await dbUpdate('agendaMarcacoes', m.id, { estado: 'cancelada' });
      if (updated) { STATE.agendaMarcacoes = STATE.agendaMarcacoes.map(x => x.id === m.id ? updated : x); if (onSaved) onSaved(); render(); }
      else showDbErrorToast('Não foi possível cancelar a vaga');
    }, { danger: true, confirmLabel: 'Cancelar Vaga' });
  }
  // Botões "Confirmar" (marcar como realizada) e "Cancelar" — usados tanto
  // nas vagas normais da grelha como nas vagas de encaixe. Ambos pedem
  // sempre confirmação explícita antes de gravar o novo estado.
  function statusActionBtns(m) {
    const confirmBtn = h('button', { class: 'btn-fab-sm tone-green', title: 'Confirmar consulta', 'aria-label': 'Confirmar consulta' }, Icon('check', { size: 13, strokeWidth: 2.4 }));
    confirmBtn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => confirmarMarcacao(m)); });
    const cancelBtn = h('button', { class: 'btn-fab-sm tone-orange', title: 'Cancelar consulta', 'aria-label': 'Cancelar consulta' }, Icon('x', { size: 13, strokeWidth: 2.4 }));
    cancelBtn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => cancelarMarcacao(m)); });
    return [confirmBtn, cancelBtn];
  }
  function estadoClasseVaga(m) {
    if (m.estado === 'confirmada') return ' agenda-slot-confirmada';
    if (m.estado === 'cancelada') return ' agenda-slot-cancelada';
    return '';
  }
  function estadoSufixoVaga(m) {
    if (m.estado === 'confirmada') return ' · Confirmada';
    if (m.estado === 'cancelada') return ' · Cancelada';
    return '';
  }
  async function toggleAviso(m) {
    const updated = await dbUpdate('agendaMarcacoes', m.id, { aviso: !m.aviso });
    if (updated) {
      STATE.agendaMarcacoes = STATE.agendaMarcacoes.map(x => x.id === m.id ? updated : x);
      if (onSaved) onSaved();
      render();
    } else showDbErrorToast('Não foi possível atualizar o aviso')
  }
  function avisoToggleBtn(m) {
    const btn = h('button', { class: 'aviso-tag aviso-toggle' + (m.aviso ? ' aviso-ativo' : ' aviso-inativo'), title: m.aviso ? 'Utente avisado — clicar para desmarcar' : 'Utente não avisado — clicar para marcar' },
      Icon(m.aviso ? 'bell' : 'bellOff', { size: 16, strokeWidth: 2.2 }));
    btn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => toggleAviso(m)); });
    return btn;
  }

  function buildForm() {
    const isNutricao = agendaEhNutricao(prestadorKey);
    const nomeInput = h('input', { class: 'input', placeholder: 'Nome do Cliente' });
    nomeInput.value = formDraft.nomeCliente || '';
    nomeInput.addEventListener('input', () => { formDraft.nomeCliente = nomeInput.value; });

    const contactoInput = h('input', { class: 'input', placeholder: 'Contacto (9 dígitos)', inputmode: 'numeric', pattern: '[0-9]{9}', maxlength: '9' });
    contactoInput.value = formDraft.contacto || '';
    contactoInput.addEventListener('input', () => {
      const cleaned = contactoInput.value.replace(/\D/g, '').slice(0, 9);
      if (cleaned !== contactoInput.value) contactoInput.value = cleaned;
      formDraft.contacto = contactoInput.value;
    });

    const obsInput = h('input', { class: 'input', placeholder: 'Observações' });
    obsInput.value = formDraft.observacoes || '';
    obsInput.addEventListener('input', () => { formDraft.observacoes = obsInput.value; });

    const campos = [];
    if (showForm === 'encaixe') {
      const horaInput = h('input', { class: 'input', placeholder: 'Hora (ex: 14:10)' });
      horaInput.value = formDraft.hora || '';
      horaInput.addEventListener('input', () => { formDraft.hora = horaInput.value; });
      campos.push(h('div', { class: 'field field-xs' }, [h('label', {}, 'Hora'), horaInput]));
    } else {
      const horaSelect = h('select', { class: 'select' }, AGENDA_SLOTS_PADRAO.map(hh => h('option', { value: hh, selected: formDraft.hora === hh ? 'selected' : undefined }, hh)));
      horaSelect.value = formDraft.hora;
      horaSelect.addEventListener('change', () => { formDraft.hora = horaSelect.value; });
      campos.push(h('div', { class: 'field field-xs' }, [h('label', {}, 'Hora'), horaSelect]));
    }
    if (isNutricao) {
      const tipoSelect = h('select', { class: 'select' }, TIPOS_CONSULTA_NUTRICAO.map(t => h('option', { value: t, selected: formDraft.tipoConsulta === t ? 'selected' : undefined }, t)));
      tipoSelect.value = formDraft.tipoConsulta;
      tipoSelect.addEventListener('change', () => { formDraft.tipoConsulta = tipoSelect.value; render(); });
      campos.push(h('div', { class: 'field span2' }, [h('label', {}, 'Tipo de Consulta'), tipoSelect]));
    }
    const avisoCb = h('input', { type: 'checkbox', checked: !!formDraft.aviso });
    avisoCb.addEventListener('change', () => { formDraft.aviso = avisoCb.checked; });
    const avisoField = h('label', { class: 'checkbox-field' }, [avisoCb, h('span', {}, 'Aviso ao cliente')]);

    campos.push(h('div', { class: 'field span2' }, [h('label', {}, 'Nome do Cliente *'), nomeInput]));
    campos.push(h('div', { class: 'field field-sm' }, [h('label', {}, 'Contacto *'), contactoInput]));
    campos.push(avisoField);
    campos.push(h('div', { class: 'field span2' }, [h('label', {}, 'Observações'), obsInput]));

    const duracaoInfo = h('p', { class: 'field-helper-text' }, `Duração desta marcação: ${agendaDuracaoPorTipo(prestadorKey, formDraft.tipoConsulta)} minutos.`);
    const saveBtn = h('button', { class: 'btn btn-primary', onclick: saving ? null : () => requireAuth(submitForm), disabled: saving ? 'disabled' : undefined }, saving ? 'A guardar…' : 'Confirmar Marcação');
    const cancelBtn = h('button', { class: 'btn btn-secondary', onclick: cancelForm }, 'Cancelar');

    const children = [h('div', { class: 'form-grid' }, campos), duracaoInfo];
    if (formError) children.push(h('p', { class: 'form-error' }, formError));
    children.push(h('div', { class: 'form-actions' }, [saveBtn, cancelBtn]));
    return h('div', { class: 'card card-pad' }, children);
  }

  const bodyEl = h('div', {});
  function render() {
    renderHeaderAcoes();
    clear(bodyEl);
    if (showForm) { bodyEl.appendChild(buildForm()); return; }

    const marcacoes = marcacoesDoDia();
    const ocupacao = {};
    marcacoes.forEach(m => { agendaHorariosOcupados(m.hora, m.duracaoMin || 15).forEach(hh => { ocupacao[hh] = m; }); });
    const encaixes = ordenarPorHora(marcacoes.filter(m => !AGENDA_SLOTS_PADRAO.includes(m.hora)));

    const linhasGrade = [];
    AGENDA_SLOTS_PADRAO.forEach(hora => {
      const m = ocupacao[hora];
      if (!m) {
        let node;
        if (isPast) {
          node = h('div', { class: 'agenda-slot-row agenda-vaga-passada' }, [h('span', { class: 'agenda-slot-hora' }, hora), h('span', { class: 'agenda-slot-label cell-muted' }, '—')]);
        } else {
          const bookBtn = h('button', { class: 'btn-fab-sm tone-blue', title: 'Marcar', 'aria-label': 'Marcar' }, Icon('plus', { size: 13, strokeWidth: 2.4 }));
          bookBtn.addEventListener('click', () => requireAuth(() => openNovaMarcacao(hora)));
          const blockBtn = h('button', { class: 'btn-fab-sm tone-gray', title: 'Bloquear vaga', 'aria-label': 'Bloquear vaga' }, Icon('lockClosed', { size: 12, strokeWidth: 2.2 }));
          blockBtn.addEventListener('click', () => requireAuth(() => bloquearVaga(hora)));
          node = h('div', { class: 'agenda-slot-row agenda-slot-livre agenda-vaga-futura' }, [
            h('span', { class: 'agenda-slot-hora' }, hora),
            h('span', { class: 'agenda-slot-label cell-muted' }, 'Vaga livre'),
            h('div', { class: 'row-actions' }, [bookBtn, blockBtn]),
          ]);
        }
        linhasGrade.push({ hora, node });
        return;
      }
      const primeiraLinha = agendaHorariosOcupados(m.hora, m.duracaoMin || 15)[0] === hora;
      if (!primeiraLinha) return;
      let node;
      if (m.tipoLinha === 'bloqueado') {
        const acoes = [];
        if (!isPast) {
          const reabrirBtn = h('button', { class: 'btn-fab-sm tone-gray', title: 'Reabrir vaga', 'aria-label': 'Reabrir vaga' }, Icon('lockOpen', { size: 12, strokeWidth: 2.2 }));
          reabrirBtn.addEventListener('click', () => requireAuth(() => desbloquearVaga(m)));
          acoes.push(reabrirBtn);
        }
        node = h('div', { class: 'agenda-slot-row agenda-slot-bloqueado' + (isPast ? ' agenda-vaga-passada' : '') }, [
          h('span', { class: 'agenda-slot-hora' }, hora), h('span', { class: 'agenda-slot-label' }, 'Indisponível'),
          h('div', { class: 'row-actions' }, acoes),
        ]);
      } else {
        const acoes = [avisoToggleBtn(m)];
        if (!isPast) {
          acoes.push(...statusActionBtns(m));
          const delBtn = h('button', { class: 'btn-fab-sm tone-red', title: 'Eliminar', 'aria-label': 'Eliminar' }, Icon('trash', { size: 12, strokeWidth: 2.2 }));
          delBtn.addEventListener('click', () => requireAuth(() => eliminarMarcacao(m)));
          acoes.push(delBtn);
        }
        node = h('div', { class: 'agenda-slot-row agenda-slot-ocupado' + estadoClasseVaga(m) + (isPast ? ' agenda-vaga-passada' : '') }, [
          h('span', { class: 'agenda-slot-hora' }, `${m.hora} (${m.duracaoMin || 15}min)`),
          h('span', { class: 'agenda-slot-label cell-strong' }, `${m.nomeCliente || '—'}${m.tipoConsulta ? ' · ' + m.tipoConsulta : ''}${estadoSufixoVaga(m)}`),
          h('div', { class: 'row-actions' }, acoes),
        ]);
      }
      linhasGrade.push({ hora, node });
    });

    const linhasEncaixe = encaixes.map(m => {
      const acoes = [avisoToggleBtn(m)];
      if (!isPast) {
        acoes.push(...statusActionBtns(m));
        const delBtn = h('button', { class: 'btn-fab-sm tone-red', title: 'Eliminar vaga extra', 'aria-label': 'Eliminar vaga extra' }, Icon('trash', { size: 12, strokeWidth: 2.2 }));
        delBtn.addEventListener('click', () => requireAuth(() => eliminarEncaixe(m)));
        acoes.push(delBtn);
      }
      const node = h('div', { class: 'agenda-slot-row agenda-slot-encaixe' + estadoClasseVaga(m) + (isPast ? ' agenda-vaga-passada' : '') }, [
        h('span', { class: 'agenda-slot-hora' }, `${m.hora} · Encaixe`), h('span', { class: 'agenda-slot-label cell-strong' }, `${m.nomeCliente || '—'}${estadoSufixoVaga(m)}`),
        h('div', { class: 'row-actions' }, acoes),
      ]);
      return { hora: normalizarHora(m.hora), node };
    });

    // Intercala as linhas de encaixe com a grelha padrão pela hora real —
    // em vez de as amontoar sempre no fim, cada encaixe aparece encostado
    // ao horário certo entre as vagas normais.
    const linhas = linhasGrade.concat(linhasEncaixe)
      .sort((a, b) => normalizarHora(a.hora).localeCompare(normalizarHora(b.hora)))
      .map(item => item.node);

    bodyEl.appendChild(h('div', { class: 'agenda-slots-list' }, linhas));
    if (!isPast) {
      const encaixeBtn = h('button', { class: 'btn btn-secondary', style: 'margin-top:14px;width:100%;', onclick: () => requireAuth(openEncaixe) }, [Icon('plus', { size: 14 }), ' Nova Linha de Encaixe']);
      bodyEl.appendChild(encaixeBtn);
    }
  }

  // Lista para impressão/PDF: só marcações efetivas (exclui vagas livres e
  // bloqueadas), ordenadas cronologicamente — grelha padrão + encaixes.
  function linhasImpressaoAgenda() {
    return ordenarPorHora(marcacoesDoDia().filter(m => m.tipoLinha !== 'bloqueado'))
      .map(m => ({
        hora: normalizarHora(m.hora), nome: m.nomeCliente, contacto: m.contacto,
        estado: (m.estado === 'confirmada' ? 'Confirmada' : (m.estado === 'cancelada' ? 'Cancelada' : 'Por confirmar')),
        observacoes: m.observacoes,
      }));
  }

  const panel = h('div', { class: 'modal-panel agenda-dia-panel' }, [
    h('div', { class: 'modal-title-row' }, [
      h('div', {}, [
        h('p', { class: 'modal-tag' }, `${prestador.nome} · ${prestador.especialidade}`),
        h('p', { class: 'modal-title' }, formatDate(dateISO)),
      ]),
      h('div', { style: 'display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;' }, [
        headerAcoesEl,
        buildListaDiaAcoes(prestador.nome, prestador.especialidade, dateISO, linhasImpressaoAgenda),
        h('button', { class: 'close-btn', onclick: close }, Icon('x', { size: 16 })),
      ]),
    ]),
    isPast ? h('p', { class: 'readonly-notice' }, 'Este dia já passou — fica só para consulta, sem novos agendamentos.') : null,
    bodyEl,
  ]);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  render();
  return overlay;
}

function calendarioItensDoDia(dateISO) {
  const itens = [];
  (STATE.eventos || []).filter(ev => ev.dataEvento === dateISO).forEach(ev => {
    itens.push({ label: eventoLabel(ev), cor: COR_EVENTOS_RASTREIOS });
  });
  (STATE.agendaMarcacoes || []).forEach(m => {
    if (m.data !== dateISO || m.tipoLinha === 'bloqueado') return;
    const servico = SERVICOS_CALENDARIO.find(s => s.key === m.prestadorKey);
    if (servico && !itens.some(it => it.label === servico.label)) itens.push({ label: servico.label, cor: servico.cor });
  });
  // Dias de Agenda "abertos" mas ainda sem nenhuma marcação — antes só
  // apareciam no calendário da própria página do prestador; agora entram
  // aqui, na função partilhada por TODOS os calendários da app (Dashboard
  // incluído), para que qualquer colaborador veja de imediato que há
  // serviço/agenda ativa nesse dia, mesmo sem consultas ainda marcadas.
  (STATE.agendaDias || []).forEach(d => {
    if (d.data !== dateISO) return;
    const servico = SERVICOS_CALENDARIO.find(s => s.key === d.prestadorKey);
    const labelBase = servico ? servico.label : 'Agenda Aberta';
    // Se já houver uma marcação real desse mesmo prestador nesse dia, o item
    // "com marcações" já chegou acima — não duplica, só assinala "Aberta"
    // quando ainda não há nenhuma consulta agendada.
    if (itens.some(it => it.label === labelBase)) return;
    itens.push({ label: `${labelBase} (Agenda Aberta)`, cor: servico ? servico.cor : COR_AGENDA_DIA_ABERTO });
  });
  return itens.slice(0, 3); // limite de 3 por dia
}
// Divide o fundo da célula em faixas verticais iguais — uma por cor —
// ou usa cor sólida quando há só um serviço/evento nesse dia.
function calendarioCellStyle(cores) {
  if (!cores.length) return '';
  if (cores.length === 1) return `background:${cores[0]};`;
  const n = cores.length;
  const stops = [];
  for (let i = 0; i < n; i++) {
    const inicio = (i / n * 100).toFixed(2);
    const fim = ((i + 1) / n * 100).toFixed(2);
    stops.push(`${cores[i]} ${inicio}%`, `${cores[i]} ${fim}%`);
  }
  return `background:linear-gradient(90deg, ${stops.join(', ')});`;
}

// onDayClick(dateISO, isPast) é opcional — quando omitido (caso da Página
// Inicial), o clique num dia com marcações mostra o popover informativo.
// Quando fornecido (caso das futuras Agendas individuais), o próprio chamador
// decide o que fazer (ex: abrir a grelha de horários desse dia).
// posicao: 'passado' (esquerda, suavizado) | 'atual' (centro, foco absoluto) |
// 'futuro' (direita, tom claro). A cor de fundo do cartão do mês segue a
// POSIÇÃO no carrossel, não necessariamente o mês real — ao navegar, quem
// estiver no centro é sempre o ponto focal, mesmo que já não seja o mês
// presente verdadeiro. O destaque do Dia Presente é a única coisa que segue
// sempre a data real, esteja o cartão onde estiver.
function buildMonthCalendar(year, month, posicao, onDayClick, prestadorKey) {
  const firstDay = new Date(year, month, 1);
  const startWeekday = (firstDay.getDay() + 6) % 7; // segunda-feira = 0
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = todayISO();

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(h('div', { class: 'cal-cell cal-cell-empty' }));
  for (let d = 1; d <= daysInMonth; d++) {
    const dateISO = `${year}-${pad2(month + 1)}-${pad2(d)}`;
    const itens = calendarioItensDoDia(dateISO);
    const cores = itens.map(it => it.cor);
    const isToday = dateISO === todayStr;
    const isPast = dateISO < todayStr;
    const cell = h('div', {
      class: 'cal-cell'
        + (isToday ? ' cal-cell-today' : '')
        + (cores.length ? ' cal-cell-marcado' : '')
        + (isPast ? ' cal-cell-passado' : ' cal-cell-clicavel'),
      style: calendarioCellStyle(cores),
      title: itens.length ? itens.map(it => it.label).join(' + ') : undefined,
    }, String(d));
    if (onDayClick) {
      // Bloqueio de agendamento no passado: dias já passados não abrem a
      // grelha de horários — só ficam visíveis para consulta de histórico.
      cell.addEventListener('click', (e) => { e.stopPropagation(); onDayClick(dateISO, isPast); });
    } else if (itens.length) {
      cell.addEventListener('click', (e) => {
        e.stopPropagation();
        showObsPopover(cell, itens.map(it => it.label).join(' + '));
      });
    }
    cells.push(cell);
  }

  const weekdayRow = h('div', { class: 'cal-weekdays' }, DIAS_SEMANA_PT.map(d => h('div', { class: 'cal-weekday' }, d)));
  const headerItems = [h('h3', { class: 'dash-card-title' }, `${MESES_PT[month]} ${year}`)];
  if (prestadorKey) {
    const total = agendaContagemMes(prestadorKey, year, month);
    headerItems.push(h('p', { class: 'cal-card-contagem' }, agendaContagemLabel(total)));
  }
  return h('div', { class: `card card-pad cal-card cal-card-${posicao}` }, [
    ...headerItems,
    weekdayRow,
    h('div', { class: 'cal-grid' }, cells),
  ]);
}

// Carrossel de 3 meses lado a lado — usado na Página Inicial e (no futuro)
// em cada Agenda individual. O mês do centro é sempre o ponto focal; as
// setas grandes, fora dos calendários, deslocam o bloco inteiro de uma vez
// (ex: seta direita → mês da direita passa a centro, novo mês entra à
// direita, o antigo centro passa a esquerda e fica suavizado).
function buildCalendarioCarrossel(onDayClick, prestadorKey) {
  let offset = 0; // 0 = mês atual é o do centro
  const wrap = h('div', { class: 'cal-carousel-outer' });

  function render() {
    clear(wrap);
    const hoje = new Date();
    const posicoes = ['passado', 'atual', 'futuro', 'futuro'];
    const meses = [-1, 0, 1, 2].map((i, idx) => {
      const d = new Date(hoje.getFullYear(), hoje.getMonth() + offset + i, 1);
      return buildMonthCalendar(d.getFullYear(), d.getMonth(), posicoes[idx], onDayClick, prestadorKey);
    });

    const prevBtn = h('button', { class: 'cal-nav-btn-grande', title: 'Recuar um mês', 'aria-label': 'Recuar um mês' }, Icon('arrowleft', { size: 24, strokeWidth: 2.6 }));
    prevBtn.addEventListener('click', () => { offset -= 1; render(); });
    const nextBtn = h('button', { class: 'cal-nav-btn-grande', title: 'Avançar um mês', 'aria-label': 'Avançar um mês' }, Icon('arrowright', { size: 24, strokeWidth: 2.6 }));
    nextBtn.addEventListener('click', () => { offset += 1; render(); });

    wrap.appendChild(h('div', { class: 'cal-carousel-row' }, [
      prevBtn,
      h('div', { class: 'cal-pair cal-carousel-4' }, meses),
      nextBtn,
    ]));
  }

  render();
  return wrap;
}

/* ---- Bloco de Notas rápido — folha de rascunho única e contínua,
   guardada apenas no localStorage do browser (nunca no Supabase). O texto
   grava-se sozinho a cada tecla; só existe o botão "Limpar Nota". ---- */
/* ---- Bloco de Notas rápido — folha única por utilizador + módulo,
   sincronizada na nuvem (Supabase) para estar disponível em qualquer
   dispositivo em que a mesma pessoa inicie sessão. Grava-se sozinho 1
   segundo depois de parar de escrever (debounce); "Limpar Nota" apaga a
   linha em definitivo — nunca há histórico nem várias entradas.
   Se o Supabase falhar (tabela em falta, sem rede, etc.), o texto nunca se
   perde: cai para um rascunho em localStorage e volta a sincronizar
   automaticamente assim que a próxima gravação for bem-sucedida. ---- */
async function dbFetchNotaUtilizador(userId, modulo) {
  if (!sb) return { ok: false, nota: null };
  try {
    const { data, error } = await sb.from('notas_utilizador').select('*').eq('user_id', userId).eq('modulo', modulo).maybeSingle();
    if (error) { console.error('[Supabase] erro ao ler nota:', error.message); return { ok: false, nota: null }; }
    return { ok: true, nota: data ? rowToRecord(data) : null };
  } catch (e) { console.error('[Supabase] erro de rede ao ler nota:', formatarErroSeguro(e)); return { ok: false, nota: null }; }
}
async function dbUpsertNotaUtilizador(userId, modulo, texto) {
  if (!sb) return false;
  try {
    const payload = recordToRow({ userId, modulo, texto, updatedAt: new Date().toISOString() });
    const { error } = await sb.from('notas_utilizador').upsert(payload, { onConflict: 'user_id,modulo' });
    if (error) { console.error('[Supabase] erro ao guardar nota:', error.message); return false; }
    return true;
  } catch (e) { console.error('[Supabase] erro de rede ao guardar nota:', formatarErroSeguro(e)); return false; }
}
async function dbClearNotaUtilizador(userId, modulo) {
  if (!sb) return false;
  try {
    const { error } = await sb.from('notas_utilizador').delete().eq('user_id', userId).eq('modulo', modulo);
    if (error) { console.error('[Supabase] erro ao limpar nota:', error.message); return false; }
    return true;
  } catch (e) { console.error('[Supabase] erro de rede ao limpar nota:', formatarErroSeguro(e)); return false; }
}
/* ---- Dicionário de CNP (dicionario_cnp) — associa CNP/Código a um nome de
   produto, para o campo "Produto" dos Erros de Stock se autopreencher assim
   que se escreve/confirma um CNP já conhecido. Aprende sozinho: sempre que
   um Erro de Stock novo é gravado com CNP + Produto preenchidos à mão, o par
   fica guardado aqui para a próxima vez. ---- */
async function dbBuscarProdutoPorCnp(cnp) {
  const cnpNorm = String(cnp || '').trim();
  if (!sb || !cnpNorm) return null;
  try {
    const { data, error } = await sb.from('dicionario_cnp').select('nome_produto').eq('cnp', cnpNorm).maybeSingle();
    if (error) { console.error('[Supabase] erro ao consultar dicionario_cnp:', error.message); return null; }
    const limpo = data ? sanitizarSupabase(data) : null;
    return (limpo && limpo.nome_produto) ? String(limpo.nome_produto) : null;
  } catch (e) { console.error('[Supabase] erro de rede ao consultar dicionario_cnp:', formatarErroSeguro(e)); return null; }
}
async function dbUpsertDicionarioCnp(cnp, nomeProduto) {
  const cnpNorm = String(cnp || '').trim();
  const nomeNorm = String(nomeProduto || '').trim();
  if (!sb || !cnpNorm || !nomeNorm) return false;
  try {
    const { error } = await sb.from('dicionario_cnp')
      .upsert({ cnp: cnpNorm, nome_produto: nomeNorm }, { onConflict: 'cnp' });
    if (error) { console.error('[Supabase] erro ao gravar no dicionario_cnp:', error.message); return false; }
    return true;
  } catch (e) { console.error('[Supabase] erro de rede ao gravar no dicionario_cnp:', formatarErroSeguro(e)); return false; }
}
// Dono da nota no Supabase: 'equipa' (valor fixo) para o bloco partilhado
// pela equipa toda (ex: Página Inicial), ou o id do próprio utilizador para
// as notas pessoais (Agendas, Entregas) — nunca os dois ao mesmo tempo.
const NOTA_PARTILHADA_OWNER = 'equipa';
// Chave do rascunho de reserva em localStorage — só usada quando o Supabase
// falha; nunca é a fonte de verdade principal.
function notaFallbackKey(modulo, owner) { return `sigaJuncalNotaFallback_${modulo}_${owner}`; }
function lerNotaFallback(chave) {
  try { return localStorage.getItem(chave); } catch (e) { return null; }
}
function gravarNotaFallback(chave, valor) {
  try { localStorage.setItem(chave, valor); } catch (e) { /* localStorage indisponível — ignora silenciosamente */ }
}
function apagarNotaFallback(chave) {
  try { localStorage.removeItem(chave); } catch (e) { /* localStorage indisponível — ignora silenciosamente */ }
}
function buildNotaRapidaWidget(modulo, titulo, opts) {
  const shared = !!(opts && opts.shared);
  let texto = '';
  let debounceTimer = null;

  const wrap = h('div', { class: 'card card-pad nota-rapida-card' });
  const statusEl = h('span', { class: 'nota-rapida-status' }, '');
  const textarea = h('textarea', { class: 'nota-rapida-textarea', rows: '8', placeholder: 'Escreva aqui a sua nota rápida — sincroniza automaticamente em qualquer dispositivo...' });

  function setStatus(txt) { statusEl.textContent = txt; }
  function ownerId() { return shared ? NOTA_PARTILHADA_OWNER : (activeUser ? String(activeUser.id) : null); }

  async function carregar() {
    const owner = ownerId();
    if (!owner) return;
    const chaveFallback = notaFallbackKey(modulo, owner);
    setStatus('A carregar…');
    const resultado = await dbFetchNotaUtilizador(owner, modulo);
    if (resultado.ok) {
      // Se entretanto ficou um rascunho local por sincronizar (ex: foi
      // escrito offline), esse texto mais recente prevalece sobre o que
      // está no servidor, e tenta-se logo voltar a sincronizá-lo.
      const local = lerNotaFallback(chaveFallback);
      if (local !== null) {
        texto = local;
        textarea.value = texto;
        setStatus('A sincronizar rascunho local…');
        const ok = await dbUpsertNotaUtilizador(owner, modulo, texto);
        if (ok) { apagarNotaFallback(chaveFallback); setStatus('Sincronizado'); }
        else setStatus('Guardado localmente — sincroniza quando a ligação voltar.');
      } else {
        texto = resultado.nota ? (resultado.nota.texto || '') : '';
        textarea.value = texto;
        setStatus(texto ? 'Sincronizado' : '');
      }
    } else {
      // Sem ligação ao Supabase (tabela em falta, sem rede, etc.) — usa o
      // rascunho local como recurso, para nunca mostrar a caixa vazia por
      // cima de texto que a pessoa já tinha escrito.
      const local = lerNotaFallback(chaveFallback);
      texto = local || '';
      textarea.value = texto;
      setStatus(texto ? 'Guardado localmente (sem ligação ao servidor)' : 'Sem ligação ao servidor — a nota vai gravar-se localmente até reconectar.');
    }
  }

  async function gravarAgora() {
    const owner = ownerId();
    if (!owner) return;
    const chaveFallback = notaFallbackKey(modulo, owner);
    setStatus('A guardar…');
    const ok = await dbUpsertNotaUtilizador(owner, modulo, texto);
    if (ok) {
      apagarNotaFallback(chaveFallback); // já sincronizado — não precisa do rascunho local
      setStatus('Sincronizado');
    } else {
      // Nunca perde o que foi escrito: fica em localStorage até conseguir sincronizar.
      gravarNotaFallback(chaveFallback, texto);
      setStatus('Guardado localmente — sincroniza quando a ligação voltar.');
    }
  }
  function agendarGravacao() {
    if (debounceTimer) clearTimeout(debounceTimer);
    setStatus('A escrever…');
    debounceTimer = setTimeout(gravarAgora, 1000);
  }

  textarea.addEventListener('input', () => { texto = textarea.value; agendarGravacao(); });

  function limpar() {
    const owner = ownerId();
    if (!owner) return;
    confirmDialog(shared
      ? 'Apagar todo o texto desta nota partilhada, para toda a equipa? Esta ação não pode ser desfeita.'
      : 'Apagar todo o texto desta nota, em todos os dispositivos? Esta ação não pode ser desfeita.', async () => {
      if (debounceTimer) clearTimeout(debounceTimer);
      texto = '';
      textarea.value = '';
      apagarNotaFallback(notaFallbackKey(modulo, owner));
      const ok = await dbClearNotaUtilizador(owner, modulo);
      setStatus(ok ? '' : 'Limpo localmente — pode não ter sido removido do servidor ainda.');
    }, { danger: true, confirmLabel: 'Apagar' });
  }
  const clearBtn = h('button', { class: 'btn btn-secondary', style: 'color:var(--red);border-color:#fecaca;', onclick: () => requireAuth(limpar) }, 'Limpar Nota');

  // A nota partilhada carrega-se e fica visível mesmo em Modo Consulta (sem
  // sessão) — só a EDIÇÃO exige login, tal como o resto da app. As notas
  // pessoais nem chegam a carregar sem sessão iniciada.
  if (shared || activeUser) carregar();
  if (!activeUser) {
    textarea.readOnly = true;
    textarea.placeholder = shared
      ? 'Inicie sessão para editar esta nota partilhada pela equipa.'
      : 'Inicie sessão para usar o bloco de notas — a nota fica associada à sua conta e sincroniza entre dispositivos.';
  }
  textarea.addEventListener('focus', () => { if (!activeUser) requireAuth(() => render()); });

  wrap.appendChild(h('div', { class: 'nota-rapida-header' }, [Icon('pencil', { size: 15, strokeWidth: 2.2 }), h('span', {}, titulo), statusEl]));
  wrap.appendChild(textarea);
  wrap.appendChild(h('div', { class: 'form-actions', style: 'margin-top:10px;' }, [clearBtn]));
  return wrap;
}

function mapa48hProximaDataDisponivel(excludeId) {
  const ativos = STATE.mapa48h.filter(r => r.id !== excludeId && r.dataInicio);
  if (ativos.length === 0) return todayISO();
  const maxData = ativos.reduce((max, r) => (r.dataInicio > max ? r.dataInicio : max), ativos[0].dataInicio);
  const d = new Date(maxData + 'T00:00:00');
  d.setDate(d.getDate() + MAPA48H_INTERVALO_DIAS);
  const hoje = todayISO();
  const candidata = dateToISO(d);
  return candidata > hoje ? candidata : hoje;
}
// Data de Fim = Data de Início + 2 dias (48H) — mesma janela do exame MAPA,
// recalculada sempre que a Data de Início muda (definida de origem ou
// editada à mão no formulário).
function mapa48hCalcularDataFim(dataInicioISO) {
  if (!dataInicioISO) return '';
  const d = new Date(dataInicioISO + 'T00:00:00');
  d.setDate(d.getDate() + 2);
  return dateToISO(d);
}
// Devolve a marcação em conflito (menos de 72h de intervalo) ou null se a data for válida.
function mapa48hConflito(novaDataInicio, excludeId) {
  if (!novaDataInicio) return null;
  const novaTime = new Date(novaDataInicio + 'T00:00:00').getTime();
  const limiteMs = MAPA48H_INTERVALO_DIAS * 24 * 60 * 60 * 1000;
  for (const r of STATE.mapa48h) {
    if (r.id === excludeId || !r.dataInicio) continue;
    const t = new Date(r.dataInicio + 'T00:00:00').getTime();
    if (Math.abs(novaTime - t) < limiteMs) return r;
  }
  return null;
}

function camelToSnake(s) { return s.replace(/[A-Z]/g, m => '_' + m.toLowerCase()); }
function snakeToCamel(s) { return s.replace(/_([a-z0-9])/g, (_, c) => c.toUpperCase()); }
// Converte qualquer exceção apanhada num catch(e) para uma string simples e
// segura de passar ao console. NUNCA passa o objeto de erro em bruto ao
// console.error/warn: em certos ambientes (ex: consolas de pré-visualização
// que reencaminham os logs para outra janela/frame via postMessage), um
// objeto Error com propriedades internas não-clonáveis do fetch/rede
// provoca "DataCloneError: The object can not be cloned" — o que faz
// parecer que é a LEITURA do Supabase que está a falhar, quando na
// realidade é só o próprio console.error a rebentar ao tentar mostrar o
// erro. Reduzir sempre a uma string simples elimina esse risco de vez.
function formatarErroSeguro(e) {
  try {
    if (e === null || e === undefined) return String(e);
    if (typeof e === 'string') return e;
    if (e instanceof Error) return `${e.name || 'Error'}: ${e.message || ''}`;
    if (typeof e === 'object' && e.message) return String(e.message);
    return JSON.stringify(e);
  } catch (_) {
    return '[erro não serializável]';
  }
}
// Converte qualquer valor devolvido pelo Supabase para um objeto/array JSON
// puro (sem protótipos, getters, Symbols ou outras propriedades não
// serializáveis) através de uma ida-e-volta por JSON.parse(JSON.stringify(...)).
// Necessário porque, nalguns ambientes/browsers, a resposta do cliente
// supabase-js pode vir "amarrada" a objetos internos não clonáveis — o que
// provoca "DataCloneError: The object can not be cloned" assim que a app
// tenta guardar esses dados no STATE (ex: ao clonar/comparar para o
// re-render, ou em qualquer estrutura que use structured clone). Sanitizar
// aqui, mesmo antes dos dados chegarem ao STATE, remove esse risco de vez.
function sanitizarSupabase(valor) {
  if (valor === null || valor === undefined) return valor;
  try {
    return JSON.parse(JSON.stringify(valor));
  } catch (e) {
    console.warn('[Supabase] falha ao sanitizar dados recebidos (a usar valor original):', formatarErroSeguro(e));
    return valor;
  }
}
function rowToRecord(row) {
  const out = {};
  if (!row || typeof row !== 'object') return out;
  // Sanitiza a linha para um objeto JSON puro antes de a mapear — garante
  // que nunca guardamos no STATE nada que não seja clonável.
  const limpo = sanitizarSupabase(row);
  // Object.keys (em vez de for...in) garante que só olhamos para propriedades
  // próprias da linha devolvida pelo Supabase — nunca para propriedades herdadas.
  Object.keys(limpo).forEach((k) => { out[snakeToCamel(k)] = limpo[k]; });
  return out;
}
function recordToRow(record) {
  const out = {};
  // Object.keys (em vez de for...in) garante que só olhamos para propriedades
  // próprias do objeto — nunca para propriedades herdadas do protótipo.
  Object.keys(record).forEach((k) => {
    if (k === 'id') return;
    let v = record[k];
    // Campo de texto em branco ("") vira null antes de enviar — evita o erro
    // "invalid input syntax for type numeric: ''" em colunas numéricas/inteiras
    // (ex: PVP, valores de orçamento) quando o campo fica vazio no formulário.
    if (v === '') v = null;
    // Nunca enviar funções, elementos do DOM, eventos ou outros objetos
    // complexos não serializáveis — só strings, números, booleanos, null,
    // Date, ou arrays/objetos simples (JSON puro — usados por colunas jsonb,
    // ex: "produtos" dos Objetivos).
    const isPlainObject = v !== null && typeof v === 'object' && !Array.isArray(v) && !(v instanceof Date) && v.constructor === Object;
    const isPrimitive = v === null || v === undefined
      || typeof v === 'string' || typeof v === 'number' || typeof v === 'boolean'
      || v instanceof Date || Array.isArray(v) || isPlainObject;
    if (!isPrimitive) {
      console.warn(`[Supabase] campo "${k}" ignorado (valor não serializável, tipo: ${typeof v}).`);
      return;
    }
    out[camelToSnake(k)] = v === undefined ? null : v;
  });
  return out;
}

}
// Elimina em lote (bulk) através de dbDelete, devolvendo o conjunto de ids
// que foi mesmo apagado — usado por todos os módulos com eliminação
// múltipla a partir da barra de ações inferior. Mostra um toast se alguma
// eliminação falhar (ex: falha de rede a meio da operação) para nunca
// deixar registos "presos" sem o utilizador perceber porquê.
async function bulkSoftDelete(listKey, ids) {
  const resultados = await Promise.all(ids.map(id => dbDelete(listKey, id)));
  const apagados = new Set(ids.filter((id, i) => resultados[i]));
  if (apagados.size < ids.length) {
    const falhas = ids.length - apagados.size;
    showDbErrorToast(falhas === 1 ? 'Não foi possível eliminar 1 dos registos selecionados' : `Não foi possível eliminar ${falhas} dos registos selecionados`);
  }
  return apagados;
}
// Elimina em lote (bulk) em definitivo — usado apenas para Utilizadores, para
// que o Username numérico fique imediatamente livre para novo registo
// (soft delete deixaria o username "preso" ao registo eliminado no Lixo).
async function bulkHardDelete(listKey, ids) {
  const resultados = await Promise.all(ids.map(id => dbPermanentDelete(listKey, id)));
  const apagados = new Set(ids.filter((id, i) => resultados[i]));
  if (apagados.size < ids.length) {
    const falhas = ids.length - apagados.size;
    showDbErrorToast(falhas === 1 ? 'Não foi possível eliminar 1 dos registos selecionados' : `Não foi possível eliminar ${falhas} dos registos selecionados`);
  }
  return apagados;
}
// Autocorreção de registos "fantasma": eliminar um utilizador já faz sempre
// HARD DELETE definitivo (ver bulkHardDelete acima), por isso o Username
// fica logo livre para reutilização a partir de agora. Mas registos
// eliminados ANTES desta correção existir (época em que a eliminação ainda
// era soft delete) podem continuar na tabela usuarios_app com "eliminado =
// true", presos a um Username que o Supabase continua a considerar
// ocupado (erro "duplicate key value violates unique constraint
// usuarios_app_username_key"). Esta função deteta especificamente esse
// erro ao criar um utilizador novo, localiza o registo fantasma com o
// mesmo Username, confirma que está mesmo marcado como eliminado, apaga-o
// em definitivo, e tenta a criação uma única vez outra vez — de forma
// totalmente transparente para quem está a usar a app.
async function dbInsertUsuarioComLimpeza(payload) {
  const created = await dbInsert('usuarios', payload);
  if (created) return created;
  const eraUsernameDuplicado = /duplicate key|unique constraint|usuarios_app_username_key/i.test(lastDbError || '');
  if (!eraUsernameDuplicado || !sb || !payload.username) return null;
  try {
    const { data, error } = await sb.from('usuarios_app').select('id, eliminado').eq('username', payload.username).limit(1);
    if (error || !data || !data.length) return null;
    const fantasma = sanitizarSupabase(data)[0];
    // Segurança extra: só apaga automaticamente se o registo encontrado já
    // estava mesmo marcado como eliminado — nunca apaga um utilizador ativo.
    if (!fantasma || !fantasma.eliminado) return null;
    const apagouFantasma = await dbPermanentDelete('usuarios', fantasma.id);
    if (!apagouFantasma) return null;
    return await dbInsert('usuarios', payload);
  } catch (e) {
    console.error('[Supabase] erro ao limpar registo fantasma de utilizador:', formatarErroSeguro(e));
    return null;
  }
}

function dispararNotificacaoNativa(titulo, corpo) {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;

// Toca um pequeno alerta sonoro (dois "bips") via Web Audio API — não depende
// de nenhum ficheiro de áudio externo, por isso funciona sempre, mesmo
// offline. Usado exclusivamente pelo alerta de Nova Entrega Pendente do
// Estafeta, para nunca passar despercebido no balcão.
function tocarSomNotificacaoEntrega() {
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;
    const ctx = new AudioCtx();
    const bip = (freq, atraso, duracao) => {
      setTimeout(() => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.35, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duracao);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + duracao + 0.05);
      }, atraso);
    };
    bip(880, 0, 0.45);
    bip(1100, 280, 0.4);
  } catch (e) { /* Web Audio indisponível neste browser/ambiente — ignora silenciosamente */ }
}
// Chamado a partir da subscrição Realtime de Entregas (farmacia_entregas)
// sempre que chega um registo novo (INSERT) — dispara notificação nativa +
// som EXCLUSIVAMENTE para o perfil Estafeta, e só se este tiver sessão ativa
// neste dispositivo em concreto. Todos os restantes perfis (Master, Básico,
// Administrador, Prestador de Serviço, Farmácia Boa Nova) nunca veem nem
// ouvem este alerta — a lista de Entregas continua a atualizar-se na mesma
// para eles, só sem o pop-up/som, para não gerar ruído fora do contexto.
function handleNovaEntregaPendente(entrega) {
  if (!entrega || !activeUser) return;
  if (!isEstafeta()) return;
  const cliente = entrega.nomeCliente || 'Cliente';
  const farmacia = entrega.farmacia ? ` — Farmácia ${entrega.farmacia}` : '';
  dispararNotificacaoNativa('🛵 Nova Entrega Pendente', `${cliente}${farmacia}`);
  tocarSomNotificacaoEntrega();
}
// Chamado a partir da subscrição Realtime do Chat sempre que chega uma
// mensagem nova (INSERT) — atualiza o badge nativo do ícone da app e, se a
// pessoa não estiver a ver o Chat, dispara também uma notificação do sistema.
function handleNovaMensagemChat(msg) {
  if (!msg || !activeUser) return;
  if (String(msg.userId) === String(activeUser.id)) return; // nunca notifica a própria mensagem
  atualizarBadgeApp();
  atualizarTituloAba();
  if (STATE.page !== 'chat') {
    dispararNotificacaoNativa(`Nova mensagem de ${msg.primeiroNome || 'colega'}`, msg.texto || '');
  }
}

/* ---- Contagem de marcações (vagas) por evento ---- */
async function dbFetchMarcacaoCounts() {
  if (!sb) return {};
  try {
    const { data, error } = await sb.from('eventos_marcacoes').select('evento_id, nome_cliente, tipo_linha').eq('eliminado', false);
    if (error) { console.error('[Supabase] erro ao contar marcações:', error.message); return {}; }
    const counts = {};
    (data || []).forEach(row => {
      if (row.tipo_linha === 'bloqueado') return; // intervalos/almoço não contam para a ocupação
      const id = row.evento_id;
      if (!counts[id]) counts[id] = { total: 0, preenchidas: 0 };
      counts[id].total += 1;
      if (row.nome_cliente && String(row.nome_cliente).trim()) counts[id].preenchidas += 1;
    });
    return counts;
  } catch (e) { console.error('[Supabase] erro de rede ao contar marcações:', formatarErroSeguro(e)); return {}; }
}
/* ---- Mensagem do Dia / Passagem de Turno (registo único, id fixo = 1) ---- */
async function dbFetchMensagemDia() {
  if (!sb) return null;
  try {
    const { data, error } = await sb.from('mensagem_dia').select('*').order('created_at', { ascending: false }).limit(1);
    if (error) { lastDbError = error.message; console.error('[Supabase] erro ao ler mensagem do dia:', error.message); return null; }
    return (data && data[0]) ? rowToRecord(data[0]) : null;
  } catch (e) { lastDbError = e && e.message ? e.message : 'Falha de rede ao comunicar com o Supabase.'; console.error('[Supabase] erro de rede ao ler mensagem do dia:', formatarErroSeguro(e)); return null; }
}
async function dbFetchMensagemDiaHistorico() {
  if (!sb) return [];
  try {
    const { data, error } = await sb.from('mensagem_dia').select('*').order('created_at', { ascending: false }).limit(200);
    if (error) { lastDbError = error.message; console.error('[Supabase] erro ao ler histórico de mensagens:', error.message); return []; }

async function dbSaveMensagemDia(texto, responsavel) {
  if (!sb) { lastDbError = 'Cliente Supabase indisponível.'; return null; }
  try {
    const record = { texto: texto || '', dataCriacao: todayISO(), responsavel: responsavel || '', versao: 1 };
    const { data, error } = await sb.from('mensagem_dia').insert(recordToRow(record)).select().single();
    if (error) { lastDbError = error.message; console.error('[Supabase] erro ao guardar mensagem do dia:', error.message); return null; }
    return rowToRecord(data);
  } catch (e) { lastDbError = e && e.message ? e.message : 'Falha de rede ao comunicar com o Supabase.'; console.error('[Supabase] erro de rede ao guardar mensagem do dia:', formatarErroSeguro(e)); return null; }
}
async function dbDeleteMensagemDiaVersao(id) {

/* ---- Leitura da Mensagem do Dia por utilizador (mensagens_lidas) — o
   destaque/pulsação só aparece a quem ainda não viu ESTA mensagem em
   NENHUM dispositivo; assim que vista (em qualquer um), fica marcada para
   sempre e nunca mais pisca, mesmo ao mudar de aparelho. ---- */
async function dbMensagemJaLida(userId, mensagemId) {
  if (!sb || !userId || !mensagemId) return true; // sem sessão/sem ligação: por segurança, não anima
  try {
    const { data, error } = await sb.from('mensagens_lidas').select('id').eq('user_id', userId).eq('mensagem_id', mensagemId).maybeSingle();
    if (error) { console.error('[Supabase] erro ao verificar leitura da mensagem:', error.message); return true; }
    return !!data;
  } catch (e) { console.error('[Supabase] erro de rede ao verificar leitura da mensagem:', formatarErroSeguro(e)); return true; }
}
async function dbMarcarMensagemLida(userId, mensagemId) {
  if (!sb || !userId || !mensagemId) return false;
  try {
    const { error } = await sb.from('mensagens_lidas')
      .upsert({ user_id: userId, mensagem_id: mensagemId, updated_at: new Date().toISOString() }, { onConflict: 'user_id,mensagem_id' });
    if (error) { console.error('[Supabase] erro ao marcar mensagem como lida:', error.message); return false; }
    return true;
  } catch (e) { console.error('[Supabase] erro de rede ao marcar mensagem como lida:', formatarErroSeguro(e)); return false; }
}

function emptyRecord(schema) {
  const obj = {};
  schema.forEach(f => {
    obj[f.name] = f.type === 'checkbox' ? false : '';
  });
  return obj;
}
function pad2(n) { return String(n).padStart(2, '0'); }
// Normaliza qualquer forma de introduzir uma hora ("9:00", "9:15", "09:15
// · Encaixe"...) para sempre "HH:MM" com zero à esquerda — usada sempre que
// se grava, filtra, compara ou ordena horários (Agendas, Rastreios, Dias de
// Conselheira), para nunca mais uma vaga "9:15" ficar fora de ordem só por
// não ter o zero à esquerda de "09:15".
function normalizarHora(str) {
  if (!str) return '00:00';
  const limpo = str.toString().trim().split(' ')[0].split('·')[0];
  let [h, m] = limpo.split(':');
  if (!h) h = '00';
  if (!m) m = '00';
  return `${h.padStart(2, '0')}:${m.padStart(2, '0')}`;
}
// Ordena um array de vagas/horários por ordem cronológica ascendente — quer
// os itens sejam strings ("09:15") quer objetos com campo .hora.
function ordenarPorHora(vagas) {
  return vagas.slice().sort((a, b) => {
    const horaA = normalizarHora(typeof a === 'object' ? a.hora : a);
    const horaB = normalizarHora(typeof b === 'object' ? b.hora : b);
    return horaA.localeCompare(horaB);
  });
}
function dateToISO(d) {
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
}
function todayISO() { return dateToISO(new Date()); }
function formatDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '—';
  return `${pad2(d.getDate())}/${pad2(d.getMonth() + 1)}/${d.getFullYear()} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}
function formatDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  if (parts.length !== 3) return d;
  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

/* ---- Formatação de nomes (Title Case, respeitando preposições PT) ---- */
const PT_LOWERCASE_WORDS = new Set(['de', 'do', 'da', 'dos', 'das', 'e']);
function toTitleCasePT(str) {
  if (!str || typeof str !== 'string') return str;
  const words = str.trim().split(/\s+/);
  if (words.length === 0 || (words.length === 1 && words[0] === '')) return str;
  return words.map((word, idx) => {
    const lower = word.toLocaleLowerCase('pt-PT');
    if (idx > 0 && PT_LOWERCASE_WORDS.has(lower)) return lower;
    // suporta nomes compostos com hífen ou apóstrofo, ex: "jean-pierre", "d'ávila"
    return lower.replace(/(^|[-'])([a-zà-öø-ÿ])/g, (m, sep, ch) => sep + ch.toLocaleUpperCase('pt-PT'));
  }).join(' ');
}
// Capitaliza automaticamente a primeira letra de cada frase (início do texto,
// e a seguir a ponto final, ponto de interrogação ou ponto de exclamação),
// usada nos campos de Observações / Notas / texto livre.
function capitalizeSentences(str) {
  if (!str || typeof str !== 'string') return str;
  return str.replace(/(^\s*[a-zà-öø-ÿ])|([.!?]\s+[a-zà-öø-ÿ])/g, (m) => m.toLocaleUpperCase('pt-PT'));
}
// Normaliza os campos "nome" e "responsável" de um registo antes de o guardar,
// para garantir consistência independentemente de como foi escrito no balcão.
function normalizeNameFields(draft) {
  if (Object.prototype.hasOwnProperty.call(draft, 'nome') && draft.nome) {
    draft.nome = toTitleCasePT(draft.nome);
  }
  if (Object.prototype.hasOwnProperty.call(draft, 'responsavel') && draft.responsavel) {
    draft.responsavel = toTitleCasePT(draft.responsavel);
  }
  return draft;
}

/* ---- Validação de campos obrigatórios (Responsável e Data, em qualquer módulo) ---- */
function getRequiredFieldNames(schema) {
  const fieldNames = schema.map(f => f.name);
  if (fieldNames.includes('info')) return ['info'];
  if (fieldNames.includes('qtdFisica')) return ['data', 'produto'];
  const itemFieldName = fieldNames.includes('manipulado') ? 'manipulado' : 'produto';
  return ['data', 'nome', 'contacto', 'numCliente', itemFieldName];
}
function checkRequiredFields(draft, schema) {
  const fieldNames = schema.map(f => f.name);
  return getRequiredFieldNames(schema).filter(name => fieldNames.includes(name) && !String(draft[name] || '').trim());
}
// Valida o FORMATO (não a obrigatoriedade) de campos com "pattern" definido
// no schema — ex: Contacto (exatamente 9 dígitos) ou Cartão de Cidadão
// (exatamente 8 dígitos). Só valida quando o campo tem valor (a
// obrigatoriedade em si já é tratada por checkRequiredFields); um campo
// opcional vazio não é aqui rejeitado. Devolve a mensagem de erro do
// primeiro campo inválido encontrado, ou '' se estiver tudo certo.
function checkFieldFormats(draft, schema) {
  for (const f of schema) {
    if (!f.pattern) continue;
    const v = String(draft[f.name] || '').trim();
    if (!v) continue;
    const re = new RegExp('^' + f.pattern + '$');
    if (!re.test(v)) {
      return `${f.label} inválido — deve ter exatamente ${f.maxLength || 'o número certo de'} dígitos.`;
    }
  }
  return '';
}
function buildRequiredMessage(missing, schema) {
  if (missing.length === 0) return '';
  const fieldNames = schema.map(f => f.name);
  if (fieldNames.includes('info')) return 'Por favor, preencha a Informação do lembrete.';
  if (fieldNames.includes('qtdFisica')) return 'Por favor, preencha os campos obrigatórios do erro de stock (Data e Produto).';
  // "Produto" adapta-se dinamicamente ao separador ativo: em Manipulados
  // chama-se "Manipulado", nos restantes (Ortopedia, Ervanária, Veterinária,
  // Outros Fornecedores) chama-se "Produto" — usa sempre o rótulo real do
  // campo, em vez de um texto fixo, para nunca desalinhar dos dois.
  const itemFieldName = fieldNames.includes('manipulado') ? 'manipulado' : 'produto';
  const itemField = schema.find(f => f.name === itemFieldName);
  const itemLabel = itemField ? itemField.label : 'Produto';
  return `Por favor, preencha todos os campos obrigatórios (Data, Nome, Contacto, Nº Ficha e ${itemLabel}).`;
}

/* ---- Números inteiros (Qtd. Física / Qtd. Sistema): negativos permitidos, decimais bloqueados ---- */
function sanitizeIntegerInput(raw) {
  if (raw === null || raw === undefined) return '';
  const str = String(raw);
  const negative = str.trim().charAt(0) === '-';
  const digits = str.replace(/[^0-9]/g, '');
  return (negative ? '-' : '') + digits;
}
// Converte para inteiro com parseInt(valor, 10); vazio/ inválido -> null (não 0, para não mascarar erros de preenchimento)
function toIntegerOrNull(v) {
  if (v === '' || v === null || v === undefined) return null;
  const cleaned = sanitizeIntegerInput(v);
  if (cleaned === '' || cleaned === '-') return null;
  const n = parseInt(cleaned, 10);
  return isNaN(n) ? null : n;
}

function buildBottomActionBar(opts) {
  // opts.selectedCount (preferível): número exato de linhas selecionadas.
  // opts.hasSelection (compatibilidade): booleano, equivale a 0 ou 1.
  const count = typeof opts.selectedCount === 'number' ? opts.selectedCount : (opts.hasSelection ? 1 : 0);

  const canBulk = count >= 1; // Eliminar/Concluir funcionam com 1 ou mais
