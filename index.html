    disabled: canEdit ? undefined : 'disabled',
  }, Icon('pencil', { size: 19, strokeWidth: 2.3 }));
  const children = [addBtn, editBtn];
  // opts.onConclude (opcional): botão de conclusão/correção rápida — só
  // aparece nos módulos que o definem, e só fica ativo com exatamente 1
  // registo selecionado (a mesma regra do Editar).
  if (opts.onConclude) {
    const concludeBtn = h('button', {
      class: 'btn-fab tone-green', onclick: canEdit ? () => requireAuth(opts.onConclude) : null,
      title: canEdit ? (opts.concludeLabel || 'Concluir selecionado') : 'Selecione apenas 1 registo', 'aria-label': opts.concludeLabel || 'Concluir selecionado',
      disabled: canEdit ? undefined : 'disabled',
    }, Icon(opts.concludeIcon || 'check', { size: 19, strokeWidth: 2.6 }));
    children.push(concludeBtn);
  }
  // opts.hideDelete: usado por perfis com permissão estritamente limitada
  // (ex: Estafeta em Entregas) — o botão de eliminar nem chega a existir no DOM.
  if (!opts.hideDelete) {
    const delBtn = h('button', {
      class: 'btn-fab tone-red', onclick: canBulk ? () => requireAuth(opts.onDelete) : null, title: 'Eliminar selecionados', 'aria-label': 'Eliminar selecionados',
      disabled: canBulk ? undefined : 'disabled',
    }, Icon('trash', { size: 19, strokeWidth: 2.3 }));
    children.push(delBtn);
  }
  return h('div', { class: 'bottom-action-bar' }, children);
}
/* ---- Popover flutuante para observações ---- */
let currentPopover = null;
function onPopoverDocClick(e) {
  if (currentPopover && !currentPopover.contains(e.target)) closePopover();
}
function onPopoverKeydown(e) {
  if (e.key === 'Escape') closePopover();
}
function closePopover() {
  if (currentPopover) {
    currentPopover.remove();
    currentPopover = null;
    document.removeEventListener('click', onPopoverDocClick);
    document.removeEventListener('keydown', onPopoverKeydown);
  }
}
function showObsPopover(anchor, text) {
  closePopover();
  const pop = h('div', { class: 'obs-popover' }, [
    h('div', { class: 'obs-popover-head' }, [
      h('span', { class: 'obs-popover-title' }, [Icon('filetext', { size: 13 }), ' Observação']),
      h('button', { class: 'obs-popover-close', onclick: (e) => { e.stopPropagation(); closePopover(); } }, Icon('x', { size: 13 })),
    ]),
    h('p', { class: 'obs-popover-text' }, text),
  ]);
  document.body.appendChild(pop);
  const rect = anchor.getBoundingClientRect();
  const popRect = pop.getBoundingClientRect();
  let left = rect.left + rect.width / 2 - popRect.width / 2;
  left = Math.max(10, Math.min(left, window.innerWidth - popRect.width - 10));
  let top = rect.bottom + 8;
  if (top + popRect.height > window.innerHeight - 10) top = rect.top - popRect.height - 8;
  pop.style.left = left + 'px';
  pop.style.top = Math.max(10, top) + 'px';
  currentPopover = pop;
  setTimeout(() => {
    document.addEventListener('click', onPopoverDocClick);
    document.addEventListener('keydown', onPopoverKeydown);
  }, 0);
}

function buildField(field, draft) {
  const colClass = field.col === 2 ? ' span2' : (field.size ? ' field-' + field.size : '');
  if (field.type === 'checkbox') {
    const cb = h('input', { type: 'checkbox', checked: !!draft[field.name] });
    cb.addEventListener('change', () => { draft[field.name] = cb.checked; if (field.onChange) field.onChange(); });
    return h('label', { class: 'checkbox-field' + colClass }, [cb, h('span', {}, field.label)]);
  }
  let control, extra = null;
  if (field.type === 'select') {
    const opts = field.options || [];
    const labels = field.optionLabels || opts;
    let currentVal = draft[field.name] || '';
    if (!currentVal && opts.length) {
      currentVal = opts[0];
      draft[field.name] = currentVal;
    }
    control = h('select', { class: 'select' }, opts.map((o, i) => h('option', { value: o, selected: currentVal === o ? 'selected' : undefined }, labels[i] || o)));
    control.value = currentVal;
    control.addEventListener('change', () => { draft[field.name] = control.value; if (field.onChange) field.onChange(); });
  } else if (field.type === 'combo') {
    const listId = 'dl-' + (__datalistCounter++);
    extra = h('datalist', { id: listId }, field.options.map(o => h('option', { value: o })));
    control = h('input', { class: 'input', list: listId, placeholder: field.placeholder || 'Escrever ou escolher...' });
    control.value = draft[field.name] || '';
    control.addEventListener('input', () => { draft[field.name] = control.value; });
    if (field.onChange) control.addEventListener('change', () => field.onChange());
  } else if (field.integer) {
    control = h('input', {
      class: 'input', type: 'number', step: '1', inputmode: 'numeric',
      placeholder: field.placeholder || '0',
      min: field.allowNegative ? undefined : '0',
      id: field.id || undefined,
    });
    control.value = draft[field.name] || '';
    control.addEventListener('keydown', (e) => {
      if (e.key === '.' || e.key === ',') e.preventDefault();
      if (e.key === '-' && !field.allowNegative) e.preventDefault();
    });
    control.addEventListener('input', () => {
      let cleaned = sanitizeIntegerInput(control.value);
      // O sinal "-" só é permitido em campos explicitamente marcados como
      // allowNegative (ex: Erros de Stock) — em todos os outros, um "-"
      // colado/escrito de outra forma (autofill, copiar/colar) é sempre
      // removido aqui, e não só bloqueado no keydown.
      if (!field.allowNegative && cleaned.charAt(0) === '-') cleaned = cleaned.slice(1);
      if (cleaned !== control.value) control.value = cleaned;
      draft[field.name] = control.value;
    });
  } else if (field.singleWord) {
    control = h('input', { class: 'input', type: 'text', placeholder: field.placeholder || '' });
    control.value = draft[field.name] || '';
    control.addEventListener('keydown', (e) => { if (e.key === ' ') e.preventDefault(); });
    control.addEventListener('input', () => {
      const cleaned = control.value.replace(/\s+/g, '');
      if (cleaned !== control.value) control.value = cleaned;
      draft[field.name] = control.value;
    });
    control.addEventListener('blur', () => {
      if (control.value) { control.value = toTitleCasePT(control.value); draft[field.name] = control.value; }
    });
  } else if (field.type === 'textarea') {
    control = h('textarea', { class: 'textarea', placeholder: field.placeholder || '' });
    control.value = draft[field.name] || '';
    control.addEventListener('input', () => { draft[field.name] = control.value; });
    control.addEventListener('blur', () => {
      const capitalized = capitalizeSentences(control.value);
      if (capitalized !== control.value) { control.value = capitalized; draft[field.name] = capitalized; }
    });
  } else {
    control = h('input', {
      class: 'input', type: field.type, step: field.type === 'number' ? (field.step || '0.01') : undefined,
      placeholder: field.placeholder || '', inputmode: field.inputmode || undefined, pattern: field.pattern || undefined,
      min: (field.type === 'number' && !field.allowNegative) ? '0' : undefined,
    });
    control.value = draft[field.name] || '';
    if (field.type === 'number' && !field.allowNegative) {
      control.addEventListener('keydown', (e) => { if (e.key === '-') e.preventDefault(); });
    }
    control.addEventListener('input', () => {
      let v = control.value;
      if (field.digitsOnly) {
        const cleaned = v.replace(/\D/g, '');
        if (cleaned !== v) { control.value = cleaned; v = cleaned; }
      }
      // Segunda barreira (além do keydown) contra valores negativos em
      // campos financeiros/quantidades — cobre colar/autofill, que o
      // keydown não apanha.
      if (field.type === 'number' && !field.allowNegative && v !== '' && parseFloat(v) < 0) {
        v = v.replace('-', '');
        control.value = v;
      }
      draft[field.name] = v;
    });
    if (field.onChange) control.addEventListener('change', () => field.onChange());
  }
  const kids = [h('label', {}, field.label), control];
  if (field.maxLength) {
    control.maxLength = field.maxLength;
    control.setAttribute('maxlength', String(field.maxLength));
  }
  if (field.disabled) {
    control.disabled = true;
    control.setAttribute('disabled', 'disabled');
  }
  if (extra) kids.push(extra);
  if (field.helperText) kids.push(h('p', { class: 'field-helper-text' }, field.helperText));
  return h('div', { class: 'field' + colClass }, kids);
}

// ---- Toasts: feedback visível e não-bloqueante, usado sobretudo para
// falhas de rede/Supabase em ações rápidas que não têm formulário próprio
// (togglear estado, eliminar a partir de uma tabela, etc.). Empilham-se e
// desaparecem sozinhos ao fim de alguns segundos, ou ao clicar em fechar.
function getToastStack() {
  let el = document.getElementById('toast-stack');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast-stack';
    el.className = 'toast-stack';
    document.body.appendChild(el);
  }
  return el;
}
function showToast(message, kind) {
  kind = kind || 'info'; // 'error' | 'success' | 'info'
  const stack = getToastStack();
  const toast = h('div', { class: `toast toast-${kind}` }, [
    h('span', {}, message),
  ]);
  function dismiss() {
    if (!toast.isConnected) return;
    toast.classList.add('toast-closing');
    setTimeout(() => toast.remove(), 180);
  }
  const closeBtn = h('button', { class: 'toast-close', title: 'Fechar', 'aria-label': 'Fechar', onclick: dismiss }, Icon('x', { size: 13, strokeWidth: 2.4 }));
  toast.appendChild(closeBtn);
  stack.appendChild(toast);
  setTimeout(dismiss, kind === 'error' ? 6000 : 3500);
}
function showDbErrorToast(acao) {
  showToast(`${acao}. ${lastDbError || 'Verifique a ligação e tente novamente.'}`, 'error');
}

function confirmDialog(message, onConfirm, opts) {
  opts = opts || {};

  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

  document.addEventListener('keydown', onKeydown);
  const confirmBtn = h('button', { class: opts.danger ? 'btn btn-danger-solid' : 'btn btn-primary', onclick: () => {
    close();

  } }, opts.confirmLabel || 'Confirmar');
  const cancelBtn = h('button', { class: 'btn btn-secondary', onclick: close }, 'Cancelar');
  const panel = h('div', { class: 'modal-panel confirm-panel' }, [
    h('p', { class: 'confirm-message' }, message),
    h('div', { class: 'form-actions' }, [confirmBtn, cancelBtn]),

}

function buildReadOnlyField(field, record) {
  const colClass = field.col === 2 ? ' span2' : (field.size ? ' field-' + field.size : '');
  let displayVal;
  const raw = record[field.name];
  if (field.type === 'checkbox') displayVal = raw ? 'Sim' : 'Não';
  else if (field.type === 'date') displayVal = formatDate(raw);
  else displayVal = (raw === '' || raw === undefined || raw === null) ? '—' : String(raw);
  let control;
  if (field.type === 'textarea') {
    control = h('textarea', { class: 'calc-readonly', readonly: 'readonly', rows: '2' });
    control.value = displayVal;
  } else {
    control = h('input', { class: 'calc-readonly', type: 'text', readonly: 'readonly' });
    control.value = displayVal;
  }
  return h('div', { class: 'field' + colClass }, [h('label', {}, field.label), control]);
}

function openRecordModal(listKey, schema, record, title, onSaved) {
  closePopover();
  const draft = Object.assign({}, record);
  const overlay = h('div', { class: 'modal-overlay' });
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  function close() { overlay.remove(); }
  const errorMsg = h('p', { class: 'form-error', style: 'display:none;' }, '');
  async function save() {
    const missing = checkRequiredFields(draft, schema);
    if (missing.length) {
      errorMsg.textContent = buildRequiredMessage(missing, schema);
      errorMsg.style.display = '';
      return;
    }
    const formatoInvalido = checkFieldFormats(draft, schema);
    if (formatoInvalido) {
      errorMsg.textContent = formatoInvalido;
      errorMsg.style.display = '';
      return;
    }
    normalizeNameFields(draft);
    draft.responsavel = currentUserName();
    saveBtn.disabled = true; saveBtn.textContent = 'A guardar…';
    const updated = await dbUpdate(listKey, record.id, draft);
    if (updated) {
      STATE[listKey] = STATE[listKey].map(r => r.id === record.id ? updated : r);
      close();
      onSaved();
    } else {
      saveBtn.disabled = false; saveBtn.textContent = 'Guardar alterações';
      errorMsg.textContent = `Não foi possível guardar as alterações. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
      errorMsg.style.display = '';
    }
  }
  const grid = h('div', { class: 'form-grid' }, schema.map(f => buildField(f, draft)));
  const saveBtn = h('button', { class: 'btn btn-primary', onclick: save }, 'Guardar alterações');
  const cancelBtn = h('button', { class: 'btn btn-secondary', onclick: close }, 'Cancelar');
  const panel = h('div', { class: 'modal-panel' }, [
    h('div', { class: 'modal-title-row' }, [
      h('div', {}, [h('p', { class: 'modal-tag' }, title), h('p', { class: 'modal-title' }, 'Editar registo')]),
      h('button', { class: 'close-btn', onclick: close }, Icon('x', { size: 16 })),
    ]),
    grid,
    errorMsg,
    h('div', { class: 'form-actions' }, [saveBtn, cancelBtn]),
  ]);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
}

const TABLE_HIDE = new Set(['numCliente', 'medidaTornozelo', 'medidaBarrigaPerna', 'medidaCoxa', 'medidaAlturaPerna']);

// Medidas opcionais do cliente (só usadas em Ortopedia, quando Produto =
// "Meias") — combinam-se com as Observações no mesmo popover de detalhe,
// sempre com as Observações primeiro e as Medidas por baixo.
const MEDIDA_FIELDS_ORTOPEDIA = [
  { name: 'medidaTornozelo', label: 'Tornozelo' },
  { name: 'medidaBarrigaPerna', label: 'Barriga da Perna' },
  { name: 'medidaCoxa', label: 'Coxa' },
  { name: 'medidaAlturaPerna', label: 'Altura da Perna' },
];
function buildDetalhesTexto(schema, r) {
  const temMedidas = schema.some(f => f.name === 'medidaTornozelo');
  const partes = [];
  if (r.obs && String(r.obs).trim()) partes.push(String(r.obs).trim());
  if (temMedidas) {
    const linhasMedidas = MEDIDA_FIELDS_ORTOPEDIA
      .filter(m => r[m.name] && String(r[m.name]).trim())
      .map(m => `${m.label}: ${r[m.name]}`);
    if (linhasMedidas.length) partes.push(`Medidas:\n${linhasMedidas.join('\n')}`);
  }
  return partes.join('\n\n');
}

function buildRecordTable(schema, records, selectedIds, onToggleSelect, listKey, tableOpts) {
  if (records.length === 0) {
    return EmptyState('Sem registos para mostrar. Adiciona o primeiro pedido pela barra de ações abaixo.');
  }
  const cols = schema.filter(f => !TABLE_HIDE.has(f.name));
  const temOrcamentos = listKey && categoriaTemOrcamentos(listKey);
  const opts = tableOpts || {};
  const headers = ['', ...cols.map(c => c.name === 'obs' ? 'Obs.' : c.label)];
  if (temOrcamentos) headers.push('Cotações');
  const thead = h('thead', {}, h('tr', {}, headers.map(t => h('th', {}, t))));

  async function gravarCampo(r, patch) {
    const updated = await dbUpdate(listKey, r.id, patch);
    if (updated) { STATE[listKey] = STATE[listKey].map(x => x.id === r.id ? updated : x); if (opts.onSaved) opts.onSaved(); }
    else showDbErrorToast('Não foi possível guardar a alteração');
  }

  // Estado: por defeito mostra-se como rótulo limpo (badge). Ao clicar,
  // troca-se localmente por um <select> aberto e focado — sem precisar de
  // voltar a desenhar a tabela inteira. Fecha e confirma com Enter ou ao
  // perder o foco (clicar fora); só grava mesmo se o valor tiver mudado.
  function buildEstadoCell(r) {
    const td = h('td', {});
    function mostrarBadge() {
      clear(td);
      const badge = StatusBadge(r.estado);
      badge.classList.add('estado-badge-clicavel');
      badge.addEventListener('click', (e) => { e.stopPropagation(); mostrarSelect(); });
      td.appendChild(badge);
    }
    function mostrarSelect() {
      clear(td);
      const sel = h('select', { class: 'select inline-input inline-estado' }, ESTADOS.map(o => h('option', { value: o, selected: r.estado === o ? 'selected' : undefined }, o)));
      sel.value = r.estado || '';
      sel.addEventListener('click', (e) => e.stopPropagation());
      sel.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); sel.blur(); } });
      sel.addEventListener('blur', () => {
        if (sel.value !== r.estado) requireAuth(() => gravarCampo(r, { estado: sel.value }));
        else mostrarBadge();
      });
      td.appendChild(sel);
      setTimeout(() => sel.focus(), 0);
    }
    mostrarBadge();
    return td;
  }

  const tbody = h('tbody', {}, records.map(r => {
    const cells = [buildSelectionCheckbox(r.id, selectedIds, onToggleSelect)];
    cells.push(...cols.map(c => {
      // Edição inline permitida SEMPRE (sem modo de edição à parte) só em
      // Estado (dropdown), Aviso (sino) e Rota (carro) — grava-se de imediato
      // ao alterar. Todos os restantes campos ficam estáticos na linha; a
      // edição detalhada faz-se sempre via seleção + botão Editar global.
      if (c.name === 'estado') return buildEstadoCell(r);
      if (c.name === 'aviso') {
        const btn = h('button', { class: 'aviso-tag aviso-toggle' + (r.aviso ? ' aviso-ativo' : ' aviso-inativo'), title: r.aviso ? 'Utente avisado — clicar para desmarcar' : 'Utente não avisado — clicar para marcar' },
          Icon(r.aviso ? 'bell' : 'bellOff', { size: 16, strokeWidth: 2.2 }));
        btn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => gravarCampo(r, { aviso: !r.aviso })); });
        return h('td', {}, btn);
      }
      if (c.name === 'rota') {
        const btn = h('button', { class: 'rota-tag rota-toggle' + (r.rota ? ' rota-ativa' : ' rota-inativa'), title: r.rota ? 'Já incluído no ficheiro de rotas — clicar para desmarcar' : 'Ainda não incluído no ficheiro de rotas — clicar para marcar' },
          Icon('truck', { size: 16, strokeWidth: 2.2 }));
        btn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => gravarCampo(r, { rota: !r.rota })); });
        return h('td', {}, btn);
      }
      let content;
      if (c.name === 'obs') content = ObsIndicator(buildDetalhesTexto(schema, r));
      else if (c.type === 'date') content = formatDate(r[c.name]);
      else if (c.name === 'pvp') content = r[c.name] ? `€ ${r[c.name]}` : '—';
      else content = (r[c.name] === '' || r[c.name] === undefined || r[c.name] === null) ? '—' : r[c.name];
      return h('td', {}, content);
    }));

    if (temOrcamentos) {
      const tone = orcamentoStatusTone(r, listKey);
      cells.push(h('td', {}, h('span', { class: `badge-cotacao tone-${tone}` }, orcamentoStatusLabel(r, listKey))));
    }

    const selected = selectedIds.has(r.id);
    const row = h('tr', { class: rowClassForEstado(r.estado) + ' selectable-row' + (selected ? ' row-selected' : '') }, cells);
    return row;
  }));
  return h('div', { class: 'card' }, h('div', { class: 'table-wrap' }, h('table', { class: 'pedidos-table' }, [thead, tbody])));
}

function buildPageHeader(icon, title, subtitle, count, actionsEl) {

   PÁGINA GENÉRICA DE CATEGORIA
================================================================= */
/* =================================================================
   ORTOPEDIA — página dedicada (em vez do buildCategoryPage genérico),
   para poder mostrar/esconder Tipo, Cor e Medidas consoante o Produto
   selecionado seja "Meias" ou não.
================================================================= */
function buildOrtopediaPage(container, goTo) {
  const listKey = 'ortopedia';
  let showForm = false, editingId = null, draft = emptyRecord(ortopediaSchema);
  let formError = '';
  let saving = false;
  let selectedIds = new Set();
  // Farmácia/Orçamentos: true assim que o utilizador escreve diretamente no
  // campo "Farmácia" do topo — nesse caso os Orçamentos ficam bloqueados.
  let fornecedorEditadoManualmente = false;

  function records() { return STATE.ortopedia; }
  function rerender() { clear(container); container.appendChild(build()); }
  function toggleSelect(id) { if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); rerender(); }
  function openNew() { draft = emptyRecord(ortopediaSchema); editingId = null; formError = ''; fornecedorEditadoManualmente = false; showForm = true; rerender(); }
  function openEditSelected() {
    if (selectedIds.size !== 1) return;
    const id = [...selectedIds][0];
    const r = records().find(x => x.id === id);
    if (!r) return;
    draft = Object.assign({}, r); editingId = r.id; formError = '';
    fornecedorEditadoManualmente = orcamentosSelecionados(draft, listKey) === 0 && !!String(draft.fornecedor || '').trim();
    showForm = true; rerender();
  }

  async function submit() {
    const missing = checkRequiredFields(draft, ortopediaSchema);
    if (missing.length) {
      formError = buildRequiredMessage(missing, ortopediaSchema);
      rerender();
      return;
    }
    const formatoInvalido = checkFieldFormats(draft, ortopediaSchema);
    if (formatoInvalido) { formError = formatoInvalido; rerender(); return; }
    // Fora do produto "Meias de Compressão", Tipo/Cor/Biqueira/Medidas não
    // fazem sentido — e vice-versa para o Nome do Artigo — limpa o que não
    // se aplica para não deixar dados desatualizados escondidos no registo.
    if (!isMeias()) {
      draft.tipo = ''; draft.cor = ''; draft.biqueira = '';
      draft.medidaTornozelo = ''; draft.medidaBarrigaPerna = ''; draft.medidaCoxa = ''; draft.medidaAlturaPerna = '';
    } else {
      draft.descricaoArtigo = '';
    }
    formError = '';
    draft.responsavel = currentUserName();
    normalizeNameFields(draft);
    saving = true; rerender();
    if (editingId) {
      const updated = await dbUpdate(listKey, editingId, draft);
      if (updated) STATE[listKey] = records().map(r => r.id === editingId ? updated : r);
      else formError = `Não foi possível guardar as alterações. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    } else {
      const created = await dbInsert(listKey, draft);
      if (created) STATE[listKey] = [created, ...records()];
      else formError = `Não foi possível adicionar o registo. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    }
    saving = false;
    if (!formError) showForm = false;
    rerender();
  }
  function cancel() { formError = ''; showForm = false; rerender(); }
  function removeSelected() {
    if (selectedIds.size === 0) return;
    const ids = [...selectedIds];
    const plural = ids.length > 1;
    confirmDialog(`ATENÇÃO: Tem a certeza de que quer eliminar permanentemente ${ids.length} registo${plural ? 's' : ''} selecionado${plural ? 's' : ''}? Esta ação não pode ser desfeita!`, async () => {
      const apagados = await bulkSoftDelete(listKey, ids);
      STATE[listKey] = records().filter(r => !apagados.has(r.id));
      selectedIds = new Set([...selectedIds].filter(id => !apagados.has(id)));
      showForm = false; rerender();
    }, { danger: true, confirmLabel: 'Eliminar' });
  }

  function isMeias() { return String(draft.produto || '').trim() === 'Meias de Compressão'; }

  function buildMedidasBlock() {
    const medidaFields = [
      { name: 'medidaTornozelo', label: 'Tornozelo (cm)' },
      { name: 'medidaBarrigaPerna', label: 'Barriga da Perna (cm)' },
      { name: 'medidaCoxa', label: 'Coxa (cm)' },
      { name: 'medidaAlturaPerna', label: 'Altura da Perna (cm)' },
    ];
    const inputs = medidaFields.map(m => {
      const inp = h('input', { class: 'input', type: 'number', step: '0.1', placeholder: 'Ex: 32.5' });
      inp.value = draft[m.name] || '';
      inp.addEventListener('input', () => { draft[m.name] = inp.value; });
      return h('div', { class: 'field field-xs' }, [h('label', {}, m.label), inp]);
    });
    return h('div', { class: 'card card-pad', style: 'grid-column:1/-1;background:var(--pharm-50);margin:4px 0 0;' }, [
      h('h3', { class: 'dash-card-title', style: 'font-size:13px;margin-bottom:2px;' }, 'Medidas do Cliente (opcional)'),
      h('p', { class: 'field-helper-text', style: 'margin:0 0 12px;' }, 'Apenas informativas — nenhum destes campos é obrigatório.'),
      h('div', { class: 'form-grid' }, inputs),
    ]);
  }

  // Campos fixos do formulário (Tipo/Cor/Biqueira/Medidas/Nome do Artigo
  // ficam de fora — são geridos à parte, na secção condicional que muda
  // consoante o Produto: "Meias de Compressão" vs "Ortótese / Outro").
  const CAMPOS_CONDICIONAIS = ['tipo', 'cor', 'biqueira', 'descricaoArtigo', 'medidaTornozelo', 'medidaBarrigaPerna', 'medidaCoxa', 'medidaAlturaPerna'];

  function buildOrtopediaForm(estadoOrcamento) {
    const camposBase = ortopediaSchema.filter(f => !CAMPOS_CONDICIONAIS.includes(f.name));

    // A secção condicional vive num wrapper próprio, que se atualiza sozinho
    // quando o Produto muda — sem recriar o resto do formulário, para não
    // perder o foco enquanto se escreve nos outros campos.
    const condWrap = h('div', { style: 'display:contents;' });
    function renderCondicional() {
      clear(condWrap);
      if (isMeias()) {
        condWrap.appendChild(buildField({ name: 'tipo', label: 'Tipo', type: 'combo', options: ['Joelho', 'Raiz da Coxa', 'Collant'], placeholder: 'Escrever ou escolher... (máx. 15 carat.)', maxLength: 15 }, draft));
        condWrap.appendChild(buildField({ name: 'cor', label: 'Cor', type: 'combo', options: ['Bege', 'Preto'], placeholder: 'Escrever ou escolher... (máx. 15 carat.)', maxLength: 15 }, draft));
        condWrap.appendChild(buildField({ name: 'biqueira', label: 'Biqueira', type: 'select', options: ['Aberta', 'Fechada'] }, draft));
        condWrap.appendChild(buildMedidasBlock());
      } else {
        draft.tipo = ''; draft.cor = ''; draft.biqueira = '';
        draft.medidaTornozelo = ''; draft.medidaBarrigaPerna = ''; draft.medidaCoxa = ''; draft.medidaAlturaPerna = '';
        condWrap.appendChild(buildField({ name: 'descricaoArtigo', label: 'Nome do Artigo', type: 'text', col: 2, placeholder: 'Ex: Joelheira, Canadiana, Colar cervical...' }, draft));
      }
    }

    const gridFields = camposBase.map(f => {
      if (f.name === 'fornecedor') return buildFornecedorTopField(f, draft, estadoOrcamento.fornecedorBloqueado, (isManual) => { fornecedorEditadoManualmente = isManual; rerender(); });
      if (f.name === 'produto') return buildField(Object.assign({}, f, { onChange: () => renderCondicional() }), draft);
      return buildField(f, draft);
    });

    const grid = h('div', { class: 'form-grid' }, [...gridFields, condWrap]);
    renderCondicional();

    const submitBtn = h('button', {
      class: 'btn btn-primary', onclick: saving ? null : () => requireAuth(submit), disabled: saving ? 'disabled' : undefined,
    }, saving ? 'A guardar…' : (editingId ? 'Guardar alterações' : 'Adicionar registo'));
    const cancelBtn = h('button', { class: 'btn btn-secondary', onclick: cancel }, 'Cancelar');
    const children = [
      h('h3', { class: 'page-eyebrow', style: 'margin-bottom:14px;color:var(--pharm-800);font-size:15px;text-transform:none;letter-spacing:0;' }, editingId ? 'Editar registo' : 'Novo registo'),
      grid,
    ];
    if (formError) children.push(h('p', { class: 'form-error' }, formError));
    children.push(h('div', { class: 'form-actions' }, [submitBtn, cancelBtn]));
    return h('div', { class: 'card card-pad animate-in', style: 'margin-bottom:24px;' }, children);
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    wrap.appendChild(withBackButton(buildPageHeader('body', 'Ortopedia', 'Gestão e acompanhamento de encomendas de ortopedia.', records().length), goTo));
    if (showForm) {
      const estadoOrcamento = resolveFornecedorOrcamentoState(listKey, draft, fornecedorEditadoManualmente);
      wrap.appendChild(buildOrtopediaForm(estadoOrcamento));
      const painelOrcamentos = buildOrcamentosPanel(listKey, draft, rerender, estadoOrcamento.orcamentosBloqueados);
      if (painelOrcamentos) wrap.appendChild(painelOrcamentos);
    } else {
      wrap.appendChild(buildRecordTable(ortopediaSchema, records(), selectedIds, toggleSelect, listKey, {
        onSaved: rerender,
      }));
    }
    if (!showForm) {
      wrap.appendChild(buildBottomActionBar({
        selectedCount: selectedIds.size,
        addLabel: 'Novo pedido',
        onAdd: openNew,
        onEdit: openEditSelected,
        onDelete: removeSelected,
      }));
    }
    return wrap;
  }

  rerender();
}

function buildCategoryPage(container, title, icon, subtitle, schema, listKey, goTo, extraButton) {
  let showForm = false, editingId = null, draft = emptyRecord(schema);
  let formError = '';
  let saving = false;
  let selectedIds = new Set();
  // Farmácia/Orçamentos: true assim que o utilizador escreve diretamente no
  // campo "Farmácia" do topo — nesse caso os Orçamentos ficam bloqueados.
  let fornecedorEditadoManualmente = false;

  function records() { return STATE[listKey]; }

  function rerender() {
    clear(container);
    container.appendChild(build());
  }
  function toggleSelect(id) {
    if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
    rerender();
  }

  function openNew() { draft = emptyRecord(schema); editingId = null; formError = ''; fornecedorEditadoManualmente = false; showForm = true; rerender(); }
  function openEditSelected() {
    if (selectedIds.size !== 1) return;
    const id = [...selectedIds][0];
    const r = records().find(x => x.id === id);
    if (!r) return;
    draft = Object.assign({}, r); editingId = r.id; formError = '';
    // Regista de novo (registo já existente): se não há farmácias marcadas
    // como "Pedido" nos Orçamentos mas há Fornecedor preenchido, assume-se
    // que foi um Pedido Direto — caso contrário, deixa os Orçamentos mandar.
    fornecedorEditadoManualmente = categoriaTemOrcamentos(listKey)
      ? (orcamentosSelecionados(draft, listKey) === 0 && !!String(draft.fornecedor || '').trim())
      : false;
    showForm = true; rerender();
  }

  async function submit() {
    const missing = checkRequiredFields(draft, schema);
    if (missing.length) {
      formError = buildRequiredMessage(missing, schema);
      rerender();
      return;
    }
    const formatoInvalido = checkFieldFormats(draft, schema);
    if (formatoInvalido) { formError = formatoInvalido; rerender(); return; }
    formError = '';
    draft.responsavel = currentUserName();
    normalizeNameFields(draft);
    saving = true; rerender();
    if (editingId) {
      const updated = await dbUpdate(listKey, editingId, draft);
      if (updated) STATE[listKey] = records().map(r => r.id === editingId ? updated : r);
      else formError = `Não foi possível guardar as alterações. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    } else {
      const created = await dbInsert(listKey, draft);
      if (created) STATE[listKey] = [created, ...records()];
      else formError = `Não foi possível adicionar o registo. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    }
    saving = false;
    if (!formError) showForm = false;
    rerender();
  }
  function cancel() { formError = ''; showForm = false; rerender(); }
  function removeSelected() {
    if (selectedIds.size === 0) return;
    const ids = [...selectedIds];
    const plural = ids.length > 1;
    confirmDialog(`ATENÇÃO: Tem a certeza de que quer eliminar permanentemente ${ids.length} registo${plural ? 's' : ''} selecionado${plural ? 's' : ''}? Esta ação não pode ser desfeita!`, async () => {
      const apagados = await bulkSoftDelete(listKey, ids);
      STATE[listKey] = records().filter(r => !apagados.has(r.id));
      selectedIds = new Set([...selectedIds].filter(id => !apagados.has(id)));
      showForm = false; rerender();
    }, { danger: true, confirmLabel: 'Eliminar' });
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    wrap.appendChild(withBackButton(buildPageHeader(icon, title, subtitle, records().length), goTo));
    if (showForm) {
      const estado = resolveFornecedorOrcamentoState(listKey, draft, fornecedorEditadoManualmente);
      const fieldOverrides = categoriaTemOrcamentos(listKey) ? {
        fornecedor: (f) => buildFornecedorTopField(f, draft, estado.fornecedorBloqueado, (isManual) => { fornecedorEditadoManualmente = isManual; rerender(); }),
      } : {};
      wrap.appendChild(buildRecordForm(schema, draft, {
        editing: !!editingId, onSubmit: submit, onCancel: cancel, errorMessage: formError, saving, fieldOverrides,
      }));
      const painelOrcamentos = buildOrcamentosPanel(listKey, draft, rerender, estado.orcamentosBloqueados);
      if (painelOrcamentos) wrap.appendChild(painelOrcamentos);
    } else {
      wrap.appendChild(buildRecordTable(schema, records(), selectedIds, toggleSelect, listKey, {
        onSaved: rerender,
      }));
    }
    if (extraButton && !showForm) {
      wrap.appendChild(h('div', { style: 'margin-top:18px;text-align:center;' }, [
        h('button', { class: 'btn btn-secondary', onclick: extraButton.onClick }, extraButton.label),
      ]));
    }
    if (!showForm) {
      wrap.appendChild(buildBottomActionBar({
        selectedCount: selectedIds.size,
        addLabel: 'Novo pedido',
        onAdd: openNew,
        onEdit: openEditSelected,
        onDelete: removeSelected,
      }));
    }
    return wrap;
  }

  rerender();
}

/* =================================================================
   MENSAGEM DO DIA / PASSAGEM DE TURNO
================================================================= */
function mensagemDiaAtiva() {
  const m = STATE.mensagemDia;
  if (!m || !m.texto || !String(m.texto).trim()) return null;
  // Expira automaticamente assim que muda o dia — nunca mostra mensagens de dias anteriores
  if (!m.dataCriacao || m.dataCriacao < todayISO()) return null;
  return m;
}

function openMensagemDiaModal(onSaved, seedRecord) {
  const current = seedRecord || mensagemDiaAtiva();
  const overlay = h('div', { class: 'modal-overlay' });
  function close() { overlay.remove(); }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

  const textarea = h('textarea', { class: 'textarea', placeholder: 'Escreva o aviso ou mensagem do dia para a equipa...', rows: '4' });
  textarea.value = current ? current.texto : '';
  const errorMsg = h('p', { class: 'form-error', style: 'display:none;' }, '');

  let saving = false;
  async function doSave(textoValue) {
    if (saving) return;
    saving = true; saveBtn.disabled = true; saveBtn.textContent = 'A guardar…';
    const updated = await dbSaveMensagemDia(textoValue, currentUserName());
    if (updated) { STATE.mensagemDia = updated; close(); onSaved(); }
    else {
      errorMsg.textContent = `Não foi possível guardar. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
      errorMsg.style.display = '';
      saving = false; saveBtn.disabled = false; saveBtn.textContent = 'Guardar mensagem';
    }
  }
  const saveBtn = h('button', { class: 'btn btn-primary', onclick: () => doSave(textarea.value) }, 'Guardar mensagem');
  const clearBtn = h('button', { class: 'btn btn-secondary', onclick: () => doSave('') }, 'Limpar mensagem');
  const cancelBtn = h('button', { class: 'btn btn-secondary', onclick: close }, 'Cancelar');

  const panel = h('div', { class: 'modal-panel' }, [
    h('div', { class: 'modal-title-row' }, [
      h('div', {}, [h('p', { class: 'modal-tag' }, 'Passagem de turno'), h('p', { class: 'modal-title' }, 'Mensagem do Dia')]),
      h('button', { class: 'close-btn', onclick: close }, Icon('x', { size: 16 })),
    ]),
    h('div', { class: 'form-grid' }, [
      h('div', { class: 'field span2' }, [h('label', {}, 'Mensagem para a equipa') , textarea]),
    ]),
    errorMsg,
    h('div', { class: 'form-actions' }, [saveBtn, clearBtn, cancelBtn]),
  ]);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  setTimeout(() => textarea.focus(), 50);
}

/* ---- Metas Ativas: painel na Página Inicial com atualização rápida ---- */
// Ajuste rápido de um produto de um objetivo — usado pelos botões +1/-1 do
// widget da Página Inicial. Atualiza o array "produtos" inteiro (a única
// fonte de verdade) e grava de imediato no Supabase.
async function ajustarProdutoObjetivo(objetivo, produtoIdx, delta, onSaved) {
  const produtos = objetivoProdutos(objetivo).map((p, i) => {
    if (i !== produtoIdx) return p;
    const novoAtual = Math.max(0, (parseFloat(p.atual) || 0) + delta);
    return Object.assign({}, p, { atual: String(novoAtual) });
  });
  const updated = await dbUpdate('objetivos', objetivo.id, { produtos });
  if (updated) { STATE.objetivos = STATE.objetivos.map(o => o.id === objetivo.id ? updated : o); onSaved(); }
  else showDbErrorToast('Não foi possível atualizar o produto');
}
// Define diretamente o número exato de unidades vendidas de um produto do
// objetivo (em vez de incrementar/decrementar de 1 em 1) — usado pelo popup
// de edição rápida que abre ao clicar no badge "X / Y un.".
async function definirProdutoObjetivo(objetivo, produtoIdx, novoValor, onSaved) {
  const produtos = objetivoProdutos(objetivo).map((p, i) => {
    if (i !== produtoIdx) return p;
    return Object.assign({}, p, { atual: String(Math.max(0, novoValor)) });
  });
  const updated = await dbUpdate('objetivos', objetivo.id, { produtos });
  if (updated) { STATE.objetivos = STATE.objetivos.map(o => o.id === objetivo.id ? updated : o); onSaved(); }
  else showDbErrorToast('Não foi possível atualizar o produto');
}
// Popup pequeno para introduzir diretamente o número atualizado de unidades
// vendidas — mais rápido do que clicar várias vezes em +1/-1.
function abrirModalEdicaoUnidades(objetivo, produtoIdx, onSaved) {
  const produto = objetivoProdutos(objetivo)[produtoIdx];
  if (!produto) return;
  const overlay = h('div', { class: 'modal-overlay' });
  function close() { document.removeEventListener('keydown', onKeydown); overlay.remove(); }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  function onKeydown(e) { if (e.key === 'Escape') close(); }
  document.addEventListener('keydown', onKeydown);

  const input = h('input', { class: 'input input-unidades-compacto', type: 'number', min: '0', inputmode: 'numeric' });
  input.value = String(Math.round(parseFloat(produto.atual) || 0));

  function guardar() {
    const novoValor = Math.max(0, Math.round(parseFloat(input.value) || 0));
    close();
    definirProdutoObjetivo(objetivo, produtoIdx, novoValor, onSaved);
  }
  const saveBtn = h('button', { class: 'btn btn-primary', onclick: guardar }, 'Guardar');
  const cancelBtn = h('button', { class: 'btn btn-secondary', onclick: close }, 'Cancelar');
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') guardar(); });

  const panel = h('div', { class: 'modal-panel confirm-panel' }, [
    h('p', { class: 'modal-title', style: 'margin-bottom:12px;text-align:center;' }, `${produto.nome || 'Produto'} — Unidades Vendidas`),
    h('div', { class: 'field', style: 'align-items:center;' }, [
      h('label', { style: 'text-align:center;' }, `Meta: ${Math.round(parseFloat(produto.meta) || 0)} un.`),
      input,
    ]),
    h('div', { class: 'form-actions' }, [saveBtn, cancelBtn]),
  ]);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  setTimeout(() => { input.focus(); input.select(); }, 50);
}

// Cartão "Objetivos Ativos" da Página Inicial — lista dinamicamente todas as
// metas em estado "Ativo" (Equipa > Objetivos), agrupadas por Título/Marca,
// com o progresso de cada Produto e botões +1/-1 para atualizar vendas no
// balcão sem sair do Dashboard nem abrir o formulário completo.
function buildMetasAtivasCard(onSaved) {
  const ativos = STATE.objetivos.filter(objetivoAtivo);
  const listChildren = ativos.length ? ativos.map(o => {
    const pct = objetivoProgressoPct(o);
    const produtosEl = objetivoProdutos(o).map((p, idx) => {
      const minusBtn = h('button', { class: 'btn-fab-sm tone-gray', title: 'Tirar 1 unidade', 'aria-label': 'Tirar 1 unidade', style: 'font-weight:800;font-size:15px;line-height:1;' }, '−');
      minusBtn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => ajustarProdutoObjetivo(o, idx, -1, onSaved)); });
      const plusBtn = h('button', { class: 'btn-fab-sm tone-green', title: 'Adicionar 1 unidade', 'aria-label': 'Adicionar 1 unidade' }, Icon('plus', { size: 12, strokeWidth: 2.6 }));
      plusBtn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => ajustarProdutoObjetivo(o, idx, 1, onSaved)); });
      const contagemBtn = h('button', {
        class: 'meta-produto-contagem-btn', title: 'Clicar para introduzir o número exato de unidades',
      }, `${Math.round(parseFloat(p.atual) || 0)}/${Math.round(parseFloat(p.meta) || 0)} un.`);
      contagemBtn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => abrirModalEdicaoUnidades(o, idx, onSaved)); });
      return h('div', { class: 'meta-produto-row' }, [
        h('span', { class: 'meta-produto-nome' }, `${p.nome || '—'}:`),
        contagemBtn,
        h('div', { style: 'display:flex;gap:4px;flex-shrink:0;margin-left:auto;' }, [minusBtn, plusBtn]),
      ]);
    });
    return h('div', { class: 'meta-row' }, [
      h('div', { class: 'meta-row-top' }, [
        h('span', { class: 'meta-row-title' }, o.titulo || '—'),
        objetivoProdutos(o).length === 1
          ? (() => {
              const totalBtn = h('button', { class: 'meta-row-count meta-row-count-btn', title: 'Clicar para introduzir o número exato de unidades' }, objetivoFormatarProgresso(o));
              totalBtn.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => abrirModalEdicaoUnidades(o, 0, onSaved)); });
              return totalBtn;
            })()
          : h('span', { class: 'meta-row-count' }, objetivoFormatarProgresso(o)),
      ]),
      buildProgressBar(pct),
      h('div', { class: 'meta-produtos-list' }, produtosEl),
    ]);
  }) : [h('p', { class: 'cell-muted', style: 'text-align:center;padding:24px 0;' }, 'Sem objetivos ativos no momento.')];
  return h('div', { class: 'card card-pad dash-col zone-lembretes' }, [
    h('h3', { class: 'dash-card-title' }, 'Objetivos Ativos'),
    h('div', { class: 'metas-list-scroll' }, listChildren),
  ]);
}

// Saudação simples — sem qualquer deteção ou flexão de género.
function saudacaoPersonalizada(nomeCompleto) {
  const primeiroNome = (nomeCompleto || '').trim().split(/\s+/)[0] || '';
  return `Olá, ${primeiroNome}!`;
}

function buildMensagemDiaBanner(onSaved) {
  const ativa = mensagemDiaAtiva();
  const texto = ativa ? ativa.texto : 'Deixa uma mensagem ou aviso importante para a equipa...';
  const editBtn = h('button', { class: 'btn-fab-sm tone-blue msg-edit-btn', title: 'Editar mensagem do dia', 'aria-label': 'Editar mensagem do dia' }, Icon('pencil', { size: 13, strokeWidth: 2.2 }));
  editBtn.addEventListener('click', () => openMensagemDiaModal(onSaved));
  const banner = h('div', { class: 'msg-dia-banner' }, [
    h('p', { class: 'msg-dia-text' + (ativa ? '' : ' placeholder') }, texto),
    editBtn,
  ]);

  // Mensagem nova/editada para este utilizador (ainda não lida em nenhum
  // dispositivo, segundo o Supabase) → destaque a pulsar durante 6s, e só
  // depois disso se regista como lida — sincronizado, nunca só localStorage.
  // A chave da cache inclui o user_id: sem isso, depois de um utilizador ver
  // a mensagem, um colega que iniciasse sessão a seguir no mesmo posto nunca
  // mais via o destaque, porque a verificação ficava "saltada" para todos.
  if (ativa && activeUser) {
    const cacheKey = `${activeUser.id}:${ativa.id}`;
    if (!MENSAGEM_LIDA_CACHE.has(cacheKey)) {
      dbMensagemJaLida(String(activeUser.id), ativa.id).then(jaLida => {
        if (jaLida) { MENSAGEM_LIDA_CACHE.add(cacheKey); return; }
        banner.classList.add('msg-dia-banner-nova');
        setTimeout(() => {
          banner.classList.remove('msg-dia-banner-nova');
          MENSAGEM_LIDA_CACHE.add(cacheKey);
          dbMarcarMensagemLida(String(activeUser.id), ativa.id);
        }, 6000);
      });
    }
  }
  return banner;
}

/* =================================================================
   CHAT INTERNO — mensagens em tempo real entre a equipa
================================================================= */
function buildChatPage(container, goTo) {
  // Proteção de rota: mesmo que alguém force a navegação para 'chat',
  // Estafetas, Prestadores de Serviço e o perfil Farmácia Boa Nova nunca
  // veem o conteúdo do chat.
  if (isEstafeta() || isPrestadorServico() || isBoaNovaOperador()) {
    clear(container);
    const wrap = h('div', { class: 'animate-in' });
    wrap.appendChild(withBackButton(buildPageHeader('lockClosed', 'Acesso Não Autorizado', 'O seu perfil não tem acesso ao Chat Interno.', undefined), goTo));
    wrap.appendChild(EmptyState('Este módulo está disponível apenas para a equipa interna da farmácia.'));
    container.appendChild(wrap);
    return;
  }
  chatMarkAllRead();
  limparBadgeApp();
  atualizarTituloAba();
  refreshSidebarBadges();

  let texto = '';
  let sending = false;
  let editingId = null;
  let editText = '';

  function scrollToBottom() {
    const el = container.querySelector('.chat-messages');
    if (el) el.scrollTop = el.scrollHeight;
  }
  function rerender() { clear(container); build(); scrollToBottom(); }

  async function enviar() {
    const t = texto.trim();
    if (!t || !activeUser || sending) return;
    sending = true; rerender();
    const primeiroNome = String(activeUser.nomeCompleto || activeUser.username || '').trim().split(/\s+/)[0] || activeUser.username;
    const created = await dbInsertChatMsg({ userId: String(activeUser.id), primeiroNome, texto: t });
    sending = false;
    if (created) { STATE.mensagensChat = [...STATE.mensagensChat, created]; texto = ''; }
    else showDbErrorToast('Não foi possível enviar a mensagem');
    rerender();
  }
  function iniciarEdicao(m) { editingId = m.id; editText = m.texto || ''; rerender(); }
  function cancelarEdicao() { editingId = null; editText = ''; rerender(); }
  async function guardarEdicao(m) {
    const t = editText.trim();
    if (!t) return;
    const updated = await dbUpdateChatMsg(m.id, { texto: t, updatedAt: new Date().toISOString() });
    if (updated) STATE.mensagensChat = STATE.mensagensChat.map(x => x.id === m.id ? updated : x);
    else showDbErrorToast('Não foi possível guardar a edição da mensagem');
    editingId = null; editText = ''; rerender();
  }
  function eliminarMensagem(m) {
    confirmDialog('Eliminar esta mensagem? Esta ação não pode ser desfeita.', async () => {
      const ok = await dbDeleteChatMsg(m.id);
      if (ok) { STATE.mensagensChat = STATE.mensagensChat.filter(x => x.id !== m.id); rerender(); }
      else showDbErrorToast('Não foi possível eliminar a mensagem');
    }, { danger: true, confirmLabel: 'Eliminar' });
  }
  function limparChat() {
    if (!isMasterUser()) return;
    confirmDialog('ATENÇÃO: Tem a certeza de que quer apagar TODO o histórico do chat, para todos os utilizadores? Esta ação não pode ser desfeita!', async () => {
      const ok = await dbClearChat();
      if (ok) { STATE.mensagensChat = []; rerender(); }
      else showDbErrorToast('Não foi possível limpar o chat');
    }, { danger: true, confirmLabel: 'Limpar Chat' });
  }

  function buildBubble(m) {
    const own = !!activeUser && String(m.userId) === String(activeUser.id);
    const hora = m.createdAt ? new Date(m.createdAt).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }) : '';
    const editado = !!(m.updatedAt && m.createdAt && m.updatedAt !== m.createdAt);

    if (editingId === m.id) {
      const inp = h('input', { class: 'input', style: 'min-width:220px;' });
      inp.value = editText;
      inp.addEventListener('input', () => { editText = inp.value; });
      inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') requireAuth(() => guardarEdicao(m)); if (e.key === 'Escape') cancelarEdicao(); });
      const saveBtn = h('button', { class: 'btn-fab-sm tone-green', title: 'Guardar', 'aria-label': 'Guardar' }, Icon('check', { size: 13, strokeWidth: 2.4 }));
      saveBtn.addEventListener('click', () => requireAuth(() => guardarEdicao(m)));
      const cancelBtn = h('button', { class: 'btn-fab-sm tone-gray', title: 'Cancelar', 'aria-label': 'Cancelar' }, Icon('x', { size: 13, strokeWidth: 2.4 }));
      cancelBtn.addEventListener('click', cancelarEdicao);
      return h('div', { class: 'chat-msg-row own' }, [
        h('p', { class: 'chat-msg-name' }, m.primeiroNome || '—'),
        h('div', { class: 'chat-bubble-wrap' }, [inp, saveBtn, cancelBtn]),
      ]);
    }

    const kids = [h('div', { class: 'chat-bubble' }, m.texto || '')];
    if (own) {
      const editBtn = h('button', { class: 'btn-fab-sm tone-gray', title: 'Editar mensagem', 'aria-label': 'Editar mensagem' }, Icon('pencil', { size: 12, strokeWidth: 2.2 }));
      editBtn.addEventListener('click', () => requireAuth(() => iniciarEdicao(m)));
      const delBtn = h('button', { class: 'btn-fab-sm tone-red', title: 'Eliminar mensagem', 'aria-label': 'Eliminar mensagem' }, Icon('trash', { size: 12, strokeWidth: 2.2 }));
      delBtn.addEventListener('click', () => requireAuth(() => eliminarMensagem(m)));
      kids.push(h('div', { class: 'chat-msg-actions' }, [editBtn, delBtn]));
    }
    return h('div', { class: 'chat-msg-row' + (own ? ' own' : ' other') }, [
      h('p', { class: 'chat-msg-name' }, m.primeiroNome || '—'),
      h('div', { class: 'chat-bubble-wrap' }, kids),
      h('p', { class: 'chat-msg-time' }, hora + (editado ? ' · editado' : '')),
    ]);
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    wrap.appendChild(withBackButton(buildPageHeader('message', 'Conversas', 'Chat interno da equipa — em tempo real.', STATE.mensagensChat.length), goTo));
    const presencaBadgeChat = buildUtilizadoresOnlineBadge();
    if (presencaBadgeChat) wrap.appendChild(h('div', { style: 'margin:-10px 0 16px;' }, [presencaBadgeChat]));

    const limparBtn = isMasterUser()
      ? h('button', { class: 'btn btn-secondary', style: 'color:var(--red);border-color:#fecaca;', onclick: () => requireAuth(limparChat) }, [Icon('trash', { size: 14 }), ' Limpar Chat'])
      : null;
    if (limparBtn) wrap.appendChild(h('div', { class: 'form-actions', style: 'justify-content:flex-end;margin-bottom:10px;margin-top:0;' }, [limparBtn]));

    const list = STATE.mensagensChat || [];
    const messagesEl = h('div', { class: 'chat-messages' }, list.length ? list.map(buildBubble) : [EmptyState('Ainda não há mensagens. Diz olá à equipa! 👋')]);

    const textInput = h('input', { class: 'input', placeholder: 'Escreva uma mensagem...' });
    textInput.value = texto;
    textInput.addEventListener('input', () => { texto = textInput.value; });
    textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !sending) requireAuth(enviar); });

    const emojis = ['😀', '😂', '👍', '🙏', '❤️', '🎉', '😮', '😢'];
    const emojiRow = h('div', { class: 'chat-emoji-row' }, emojis.map(e => {
      const btn = h('button', { class: 'chat-emoji-btn', type: 'button' }, e);
      btn.addEventListener('click', () => { texto += e; textInput.value = texto; textInput.focus(); });
      return btn;
    }));

    const sendBtn = h('button', { class: 'btn btn-primary', onclick: sending ? null : () => requireAuth(enviar), disabled: sending ? 'disabled' : undefined }, sending ? 'A enviar…' : 'Enviar');
    const inputRow = h('div', { class: 'chat-input-row' }, [textInput, sendBtn]);

    wrap.appendChild(h('div', { class: 'card card-pad chat-page-wrap' }, [messagesEl, emojiRow, inputRow]));
    container.appendChild(wrap);
  }

  clear(container);
  build();
  scrollToBottom();
}

/* =================================================================
   ERROS DE STOCK
================================================================= */
function buildErrosPage(container, goTo) {
  let showForm = false, editingId = null, draft = emptyRecord(errosSchema);
  let searchQuery = '';
  let activeTab = 'pending';
  let formError = '';
  let saving = false;
  let selectedIds = new Set();

  function rerender() { clear(container); container.appendChild(build()); }
  function openNew() {
    draft = emptyRecord(errosSchema);
    // Data preenchida logo com hoje (continua editável) e foco automático
    // no CNP — no balcão, o passo seguinte é quase sempre bipar o código.
    draft.data = todayISO();
    editingId = null; formError = ''; showForm = true; rerender();
    setTimeout(() => {
      const campoCnp = document.getElementById('erro-cnp-input');
      if (campoCnp) campoCnp.focus();
    }, 0);
  }
  function openEditSelected() {
    if (selectedIds.size !== 1) return;
    const id = [...selectedIds][0];
    const r = STATE.erros.find(x => x.id === id);
    if (!r) return;
    draft = Object.assign({}, r); editingId = r.id; formError = ''; showForm = true; rerender();
  }
  function toggleSelect(id) { if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); rerender(); }
  // Campo CNP/Código com autopreenchimento: ao sair do campo (blur/change)
  // com um CNP novo, consulta o dicionario_cnp e, se encontrar, preenche
  // sozinho o Nome do Produto — mas nunca substitui um nome que a pessoa já
  // tenha escrito à mão. Se não encontrar nada, o campo Produto continua
  // normalmente editável.
  function buildCnpAutoFillField(f) {
    const control = h('input', { class: 'input', type: 'text', id: 'erro-cnp-input', placeholder: f.placeholder || 'Ex: 1234567 (ou passa o leitor de código de barras)' });
    control.value = draft.cnp || '';
    let debounceTimer = null;
    let ultimoCnpConsultado = '';
    // Consulta o dicionario_cnp e, se encontrar, preenche o Produto e salta
    // logo para a Qtd. Física — pensado para o registo ser tão rápido
    // quanto digitar/ler o CNP e escrever só a diferença de stock.
    async function consultarEPreencher() {
      const cnpAtual = String(draft.cnp || '').trim();
      if (!cnpAtual || cnpAtual === ultimoCnpConsultado) return;
      ultimoCnpConsultado = cnpAtual;
      if (String(draft.produto || '').trim()) return; // já tem nome escrito à mão — nunca o substitui
      const nomeEncontrado = await dbBuscarProdutoPorCnp(cnpAtual);
      // Confirma que o CNP não mudou entretanto e que o Produto continua
      // vazio antes de preencher — protege contra respostas tardias.
      if (String(draft.cnp || '').trim() !== cnpAtual || String(draft.produto || '').trim()) return;
      if (nomeEncontrado) {
        draft.produto = nomeEncontrado;
        rerender();
        // Poupa cliques: com o produto já identificado, o próximo passo
        // natural é logo a quantidade física contada no balcão.
        setTimeout(() => {
          const campoQtd = document.getElementById('erro-qtd-fisica-input');
          if (campoQtd) { campoQtd.focus(); campoQtd.select(); }
        }, 0);
      }
    }
    control.addEventListener('input', () => {
      draft.cnp = control.value;
      ultimoCnpConsultado = ''; // CNP mudou — liberta para uma nova consulta
      if (debounceTimer) clearTimeout(debounceTimer);
      // Debounce curto: cobre tanto quem escreve à mão como um leitor de
      // código de barras, que despeja os dígitos quase instantaneamente.
      debounceTimer = setTimeout(consultarEPreencher, 350);
    });
    // Leitores de código de barras terminam tipicamente com um "Enter" —
    // dispara a consulta de imediato, sem esperar pelo debounce.
    control.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (debounceTimer) clearTimeout(debounceTimer);
        consultarEPreencher();
      }
    });
    control.addEventListener('change', () => {
      if (debounceTimer) clearTimeout(debounceTimer);
      consultarEPreencher();
    });
    control.addEventListener('blur', () => {
      if (debounceTimer) clearTimeout(debounceTimer);
      consultarEPreencher();
    });
    const kids = [h('label', {}, f.label), control];
    if (f.helperText) kids.push(h('p', { class: 'field-helper-text' }, f.helperText));
    return h('div', { class: 'field' + (f.size ? ' field-' + f.size : '') }, kids);
  }
  async function submit() {
    // Data deixou de ser obrigatória — se ficar em branco por algum motivo,
    // assume hoje em silêncio, sem incomodar quem está a registar o erro.
    if (!String(draft.data || '').trim()) draft.data = todayISO();
    // Único requisito real: Produto preenchido, ou CNP/Código preenchido
    // (que já identifica o produto sozinho, mesmo sem o nome escrito).
    if (!String(draft.produto || '').trim() && !String(draft.cnp || '').trim()) {
      formError = 'Por favor, preencha o Produto ou o CNP / Código.';
      rerender();
      return;
    }
    const fis = toIntegerOrNull(draft.qtdFisica);
    const sis = toIntegerOrNull(draft.qtdSistema);
    const fisInvalid = draft.qtdFisica !== '' && draft.qtdFisica !== undefined && draft.qtdFisica !== null && fis === null;
    const sisInvalid = draft.qtdSistema !== '' && draft.qtdSistema !== undefined && draft.qtdSistema !== null && sis === null;
    if (fisInvalid || sisInvalid) {
      formError = 'As quantidades têm de ser números inteiros (ex.: -2, 0, 5) — sem casas decimais.';
      rerender();
      return;
    }
    formError = '';
    draft.qtdFisica = fis === null ? '' : String(fis);
    draft.qtdSistema = sis === null ? '' : String(sis);
    draft.responsavel = currentUserName();
    normalizeNameFields(draft);
    saving = true; rerender();
    if (editingId) {
      const updated = await dbUpdate('erros', editingId, draft);
      if (updated) STATE.erros = STATE.erros.map(r => r.id === editingId ? updated : r);
      else formError = `Não foi possível guardar as alterações. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    } else {
      const created = await dbInsert('erros', Object.assign({ estado: 'Por corrigir' }, draft));
      if (created) STATE.erros = [created, ...STATE.erros];
      else formError = `Não foi possível adicionar o registo. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    }
    saving = false;
    if (!formError) {
      showForm = false;
      // Ensina o dicionário: se ficou um CNP + Nome do Produto preenchidos
      // (escritos à mão ou confirmados), grava/atualiza o par no
      // dicionario_cnp para autopreencher da próxima vez que este CNP
      // aparecer — feito em segundo plano, sem bloquear nem exigir sucesso.
      if (String(draft.cnp || '').trim() && String(draft.produto || '').trim()) {
        dbUpsertDicionarioCnp(draft.cnp, draft.produto);
      }
    }
    rerender();
  }
  function cancel() { formError = ''; showForm = false; rerender(); }
  function removeSelected() {
    if (selectedIds.size === 0) return;
    const ids = [...selectedIds];
    const plural = ids.length > 1;
    confirmDialog(`ATENÇÃO: Tem a certeza de que quer eliminar permanentemente ${ids.length} registo${plural ? 's' : ''} selecionado${plural ? 's' : ''}? Esta ação não pode ser desfeita!`, async () => {
      const apagados = await bulkSoftDelete('erros', ids);
      STATE.erros = STATE.erros.filter(r => !apagados.has(r.id));
      selectedIds = new Set([...selectedIds].filter(id => !apagados.has(id)));
      showForm = false; rerender();
    }, { danger: true, confirmLabel: 'Eliminar' });
  }
  function revertCorrection(id) {
    confirmDialog('Tem a certeza de que quer anular esta correção e devolver o registo aos erros ativos?', async () => {
      const updated = await dbUpdate('erros', id, { estado: 'Por corrigir', dataCorrecao: null });
      if (updated) {
        STATE.erros = STATE.erros.map(r => r.id === id ? updated : r);
        showForm = false;
        activeTab = 'pending';
        rerender();
      } else showDbErrorToast('Não foi possível anular a correção');
    }, { confirmLabel: 'Anular Correção' });
  }

  function correct(id) {
    confirmDialog('Tem a certeza de que quer marcar este erro de stock como corrigido?', async () => {
      const updated = await dbUpdate('erros', id, { estado: 'Corrigido', dataCorrecao: todayISO() });
      if (updated) {
        STATE.erros = STATE.erros.map(r => r.id === id ? updated : r);
        selectedIds = new Set([...selectedIds].filter(x => x !== id));
        showForm = false;
        rerender();
      } else showDbErrorToast('Não foi possível marcar como corrigido');
    }, { confirmLabel: 'Corrigir' });
  }

  function visibleErros() {
    const q = searchQuery.trim().toLowerCase();
    let list = STATE.erros;
    if (q) list = list.filter(r => [r.produto, r.cnp, r.responsavel, r.obs].some(v => (v || '').toLowerCase().includes(q)));
    if (activeTab === 'resolved') {
      return list.filter(r => r.estado === 'Corrigido')
        .slice()
        .sort((a, b) => (b.dataCorrecao || '').localeCompare(a.dataCorrecao || ''));
    }
    return list.filter(r => r.estado !== 'Corrigido');
  }

  function buildTable(list, mode) {
    if (list.length === 0) {
      const msg = searchQuery
        ? 'Nenhum resultado para essa pesquisa.'
        : (mode === 'resolved' ? 'Ainda não há correções registadas.' : 'Sem erros por corrigir. Tudo em dia!');
      return EmptyState(msg);
    }
    const cols = mode === 'resolved'
      ? ['', 'Data Inicial', 'Data de Correção', 'Produto', 'CNP/Código', 'Físico', 'Sistema', 'Diferença', 'Responsável', 'Estado', 'Obs.']
      : ['', 'Data', 'Produto', 'CNP/Código', 'Físico', 'Sistema', 'Diferença', 'Responsável', 'Obs.'];
    const thead = h('thead', {}, h('tr', {}, cols.map(t => h('th', {}, t))));
    const tbody = h('tbody', {}, list.map(r => {
      const fisV = toIntegerOrNull(r.qtdFisica) || 0;
      const sisV = toIntegerOrNull(r.qtdSistema) || 0;
      const diff = fisV - sisV;
      const diffSpan = h('span', { style: `font-weight:700;color:${diff === 0 ? 'var(--pharm-500)' : 'var(--red)'}` }, diff > 0 ? `+${diff}` : String(diff));
      const cells = [buildSelectionCheckbox(r.id, selectedIds, toggleSelect)];
      cells.push(...(mode === 'resolved'
        ? [h('td', {}, formatDate(r.data)), h('td', { class: 'cell-strong' }, formatDate(r.dataCorrecao))]
        : [h('td', {}, formatDate(r.data))]));
      cells.push(
        h('td', { class: mode === 'resolved' ? '' : 'cell-strong' }, r.produto || '—'),
        h('td', {}, r.cnp || '—'),
        h('td', {}, String(fisV)),
        h('td', {}, String(sisV)),
        h('td', {}, diffSpan),
        h('td', {}, r.responsavel || '—'),
      );
      if (mode === 'resolved') cells.push(h('td', {}, h('span', { class: 'badge badge-green' }, 'RESOLVIDO')));
      cells.push(h('td', {}, ObsIndicator(r.obs)));

      const selected = selectedIds.has(r.id);
      const row = h('tr', { id: `erro-row-${r.id}`, class: (mode === 'resolved' ? 'row-resolved ' : '') + 'selectable-row' + (selected ? ' row-selected' : '') }, cells);
      return row;
    }));
    return h('div', { class: 'card' }, h('div', { class: 'table-wrap' }, h('table', {}, [thead, tbody])));
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    const pendingCount = STATE.erros.filter(r => r.estado !== 'Corrigido').length;
    const resolvedCount = STATE.erros.filter(r => r.estado === 'Corrigido').length;
    wrap.appendChild(withBackButton(buildPageHeader('alert', 'Erros de Stock', 'Registo e monitorização de falhas e acertos de stock.', STATE.erros.length), goTo));

    if (showForm) {
      const pendenteAgora = editingId && draft.estado !== 'Corrigido';
      wrap.appendChild(buildRecordForm(errosSchema, draft, {
        editing: !!editingId, onSubmit: submit, onCancel: cancel,
        errorMessage: formError, saving,
        fieldOverrides: { cnp: buildCnpAutoFillField },
        onConclude: (editingId && pendenteAgora) ? () => correct(editingId) : null, concludeLabel: 'Marcar como Corrigido',
        onRevert: (editingId && draft.estado === 'Corrigido') ? () => revertCorrection(editingId) : null,
      }));
    }

    const tabsRow = h('div', { class: 'tabs-row' }, [
      h('button', { class: 'tab-btn tone-red' + (activeTab === 'pending' ? ' active' : ''), onclick: () => { activeTab = 'pending'; selectedIds = new Set(); rerender(); } }, [
        Icon('alert', { size: 14 }), h('span', {}, 'Erros por Corrigir'), h('span', { class: 'tab-count' }, String(pendingCount)),
      ]),
      h('button', { class: 'tab-btn tone-green' + (activeTab === 'resolved' ? ' active' : ''), onclick: () => { activeTab = 'resolved'; selectedIds = new Set(); rerender(); } }, [
        Icon('checkcircle', { size: 14 }), h('span', {}, 'Histórico de Correções'), h('span', { class: 'tab-count' }, String(resolvedCount)),
      ]),
    ]);
    wrap.appendChild(tabsRow);

    const searchInput = h('input', { class: 'search-input', type: 'text', placeholder: 'Pesquisar por produto, CNP, lote ou responsável...' });
    searchInput.value = searchQuery;
    const resultsCount = h('p', { class: 'results-count' }, '');
    const resultsContainer = h('div', {});
    function renderResults() {
      const list = visibleErros();
      resultsCount.textContent = `${list.length} resultado${list.length === 1 ? '' : 's'} encontrado${list.length === 1 ? '' : 's'}`;
      clear(resultsContainer);
      resultsContainer.appendChild(buildTable(list, activeTab === 'resolved' ? 'resolved' : 'pending'));
    }
    searchInput.addEventListener('input', () => { searchQuery = searchInput.value; renderResults(); });

    const searchCard = h('div', { class: 'card card-pad', style: 'margin-bottom:22px;' }, [
      h('div', { class: 'search-row' }, [
        h('div', { class: 'search-input-wrap' }, [h('span', { class: 'icon' }, Icon('search', { size: 15 })), searchInput]),
      ]),
      resultsCount,
    ]);
    wrap.appendChild(searchCard);
    wrap.appendChild(resultsContainer);
    renderResults();

    if (!showForm) {
      wrap.appendChild(buildBottomActionBar({
        selectedCount: selectedIds.size,
        addLabel: 'Registar erro',
        onAdd: openNew,
        onEdit: openEditSelected,
        onDelete: removeSelected,
        onConclude: activeTab === 'pending' ? () => { if (selectedIds.size === 1) correct([...selectedIds][0]); } : null,
        concludeLabel: 'Corrigir selecionado',
      }));
    }
    return wrap;
  }

  rerender();
}

/* =================================================================
