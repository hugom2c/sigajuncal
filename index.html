// Administrador fundador — gravado diretamente no código, para nunca ficar
// sem acesso à app, mesmo que o registo respetivo na base de dados seja
// apagado, corrompido, ou a ligação à Supabase esteja em baixo.
const ADMIN_FUNDADOR = {
  id: 'admin-fundador-99',
  username: '99',
  pin: '20',
  nomeCompleto: 'Hugo Cunha',
  categoriaProfissional: 'Diretor Técnico Adjunto',
  perfilNivel: 'Administrador',
};
function findUsuario(username, pin) {
  const uname = String(username || '').trim().toLowerCase();
  const p = String(pin || '').trim();
  if (!uname || !p) return null;
  if (uname === ADMIN_FUNDADOR.username && p === ADMIN_FUNDADOR.pin) return ADMIN_FUNDADOR;
  return (STATE.usuarios || []).find(u =>
    String(u.username || '').trim().toLowerCase() === uname && String(u.pin || '') === p
  ) || null;
}

// Constrói o botão/badge do utilizador consoante o estado atual — chamado
// tanto no primeiro render como sempre que a sessão muda (login/logout/
// expiração), sem nunca precisar de voltar a desenhar o resto da app.
function buildUserBadgeElement() {
  if (activeUser) {
    const cargo = String(activeUser.categoriaProfissional || '').trim();
    const kids = [h('p', { class: 'active-user-name' }, activeUser.nomeCompleto || activeUser.username)];
    if (cargo && cargo !== '-' && cargo !== '—' && cargo !== 'Não aplicável') kids.push(h('p', { class: 'active-user-role' }, cargo));
    kids.push(h('p', { class: 'active-user-perfil' }, activeUser.perfilNivel || 'Básico'));
    return h('button', { class: 'active-user-badge', onclick: manualLogout, title: 'Terminar sessão', 'aria-label': 'Terminar sessão' }, [
      h('span', { class: 'active-user-icon unlocked' }, Icon('lockOpen', { size: 26, strokeWidth: 2 })),
      h('div', {}, kids),
    ]);
  }
  return h('button', { class: 'active-user-badge inactive', onclick: () => requireAuth(() => { if (STATE.page === 'home') render(); }), title: 'Iniciar sessão', 'aria-label': 'Iniciar sessão' }, [
    h('span', { class: 'active-user-icon' }, Icon('lockClosed', { size: 26, strokeWidth: 2 })),
    h('div', {}, [
      h('p', { class: 'active-user-name' }, 'Iniciar Sessão'),
      h('p', { class: 'active-user-role' }, 'Modo Consulta'),
    ]),
  ]);
}
// Atualiza só o badge da sidebar (desktop + painel mobile, se aberto) sem
// tocar em mais nenhuma parte do ecrã — garante que um formulário aberto
// nunca é perdido só porque a sessão expirou ou alguém iniciou/terminou turno.
function refreshSidebarBadges() {
  document.querySelectorAll('.sidebar-badge-slot').forEach(slot => {
    clear(slot);
    buildSidebarBadgeSlotContent().forEach(el => slot.appendChild(el));
  });
}

// Camada 2 (Username + PIN): qualquer ação de escrita passa primeiro por
// aqui — mas como a app já bloqueia tudo sem sessão ativa (ver render()),
// na prática activeUser já está sempre definido quando isto é chamado.
// Se já houver sessão, a ação corre de imediato; caso contrário abre-se um
// modal rápido de Login da Equipa e a ação só corre depois de validado.
function requireAuth(actionFn) {
  if (activeUser) { actionFn(); return; }
  showUserLoginScreen(() => {
    if (isEstafeta() || isBoaNovaOperador()) {
      // Perfil de bloqueio total: independentemente da ação que estava a ser
      // tentada, o login como Estafeta ou Farmácia Boa Nova refaz sempre a
      // app inteira (sidebar reduzida a Entregas), nunca a ação original.
      STATE.page = 'entregas';
      render();
      return;
    }
    refreshSidebarBadges();
    if (actionFn) actionFn();
  });
}

// Modal de Login da Equipa (Camada 2) — Username e PIN, ambos mascarados
// visualmente só por CSS (a máscara nunca reescreve o valor real do campo,
// eliminando qualquer risco de o valor enviado ficar corrompido). O valor
// real de cada campo vive só neste objeto de estado em memória.
function showUserLoginScreen(onSuccess) {
  const overlay = h('div', { class: 'modal-overlay' });
  function close() { overlay.remove(); }
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

  const credenciais = { usernameReal: '', pinReal: '' };

  const userInput = h('input', { class: 'login-input login-input-masked', type: 'text', inputmode: 'numeric', pattern: '[0-9]{2,4}', maxlength: '4', placeholder: 'Username', autocomplete: 'off', autocapitalize: 'off', spellcheck: 'false' });
  userInput.addEventListener('input', () => { const v = userInput.value.replace(/\D/g, ''); if (v !== userInput.value) userInput.value = v; credenciais.usernameReal = v; });

  const pinInput = h('input', { class: 'login-input login-input-masked', type: 'text', inputmode: 'numeric', pattern: '[0-9]{2,4}', maxlength: '4', placeholder: 'PIN', autocomplete: 'off', autocapitalize: 'off', spellcheck: 'false', style: 'margin-top:10px;' });
  pinInput.addEventListener('input', () => { const v = pinInput.value.replace(/\D/g, ''); if (v !== pinInput.value) pinInput.value = v; credenciais.pinReal = v; });

  const errorMsg = h('p', { class: 'login-error' }, '');

  function tryLogin() {
    if (!/^[0-9]{2,4}$/.test(credenciais.usernameReal) || !/^[0-9]{2,4}$/.test(credenciais.pinReal)) {
      errorMsg.textContent = 'O Username e o PIN devem conter entre 2 e 4 números.';
      return;
    }
    // Nunca lemos userInput.value / pinInput.value diretamente aqui —
    // usamos sempre os valores reais guardados no objeto de estado.
    const u = findUsuario(credenciais.usernameReal, credenciais.pinReal);
    if (u) {
      activeUser = { id: u.id, username: u.username, nomeCompleto: u.nomeCompleto || u.username, categoriaProfissional: u.categoriaProfissional || '', perfilNivel: u.perfilNivel || 'Basico', prestadorKey: u.prestadorKey || '' };
      pedirPermissaoNotificacoes();
      iniciarPresenca();
      close();
      onSuccess();
    } else {
      errorMsg.textContent = 'Username ou PIN incorretos.';
      credenciais.pinReal = '';
      pinInput.value = '';
      pinInput.focus();
    }
  }
  userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') pinInput.focus(); });
  pinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });
  const enterBtn = h('button', { class: 'btn btn-primary', onclick: tryLogin }, 'Entrar');
  const cancelBtn = h('button', { class: 'btn btn-secondary', onclick: close }, 'Cancelar');

  const panel = h('div', { class: 'login-panel modal-panel-compact' }, [
    h('img', { src: SIGA_LOGO_DATA_URI, alt: 'SigaJuncal', class: 'login-logo' }),
    h('p', { class: 'login-sub' }, 'Identifique-se para continuar (Username e PIN do seu posto).'),
    h('div', { class: 'login-field' }, [userInput]),
    h('div', { class: 'login-field' }, [pinInput]),
    errorMsg,
    enterBtn,
    cancelBtn,
  ]);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  setTimeout(() => userInput.focus(), 60);
}

/* ---- Modo de Teste do Administrador: pausa o bloqueio automático de 30s
   durante 10 minutos, com aviso visual bem vincado (borda vermelha a
   pulsar) enquanto estiver ativo — só disponível para Administradores. ---- */
const MODO_TESTE_DURACAO_MS = 10 * 60 * 1000;
let modoTesteAtivo = false;
let modoTesteFimEm = null;
let modoTesteIntervalo = null;
function getModoTesteOverlay() {
  let el = document.getElementById('modo-teste-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'modo-teste-overlay';
    el.className = 'modo-teste-overlay';
    document.body.appendChild(el);
  }
  return el;
}
function modoTesteTempoRestanteLabel() {
  if (!modoTesteAtivo || !modoTesteFimEm) return '';
  const restanteMs = Math.max(0, modoTesteFimEm - Date.now());
  const totalSeg = Math.ceil(restanteMs / 1000);
  return `${pad2(Math.floor(totalSeg / 60))}:${pad2(totalSeg % 60)}`;
}
function ativarModoTeste() {
  if (!isAdministrador()) return;
  modoTesteAtivo = true;
  modoTesteFimEm = Date.now() + MODO_TESTE_DURACAO_MS;
  if (inactivityTimer) clearTimeout(inactivityTimer); // suspende já o temporizador de 30s em curso
  getModoTesteOverlay().classList.add('ativo');
  if (modoTesteIntervalo) clearInterval(modoTesteIntervalo);
  modoTesteIntervalo = setInterval(() => {
    if (!modoTesteAtivo || Date.now() >= modoTesteFimEm) { desativarModoTeste(); return; }
    refreshSidebarBadges(); // só atualiza a contagem decrescente no botão
  }, 1000);
  refreshSidebarBadges();
}
function desativarModoTeste() {
  modoTesteAtivo = false;
  modoTesteFimEm = null;
  if (modoTesteIntervalo) { clearInterval(modoTesteIntervalo); modoTesteIntervalo = null; }
  getModoTesteOverlay().classList.remove('ativo');
  resetInactivityTimer(); // volta já ao comportamento normal de bloqueio
  refreshSidebarBadges();
}
function buildModoTesteButton() {
  if (!activeUser || !isAdministrador()) return null;
  if (modoTesteAtivo) {
    return h('button', { class: 'modo-teste-btn ativo', onclick: desativarModoTeste, title: 'Clique para desativar o Modo de Teste já' }, [
      h('span', { class: 'modo-teste-btn-icon' }, '⚠️'),
      h('span', { class: 'modo-teste-btn-text' }, [
        'MODO TESTE ATIVO',
        h('br'),
        h('span', { class: 'modo-teste-btn-sub' }, `(${modoTesteTempoRestanteLabel()}) — Desativar`),
      ]),
    ]);
  }
  return h('button', { class: 'modo-teste-btn', onclick: ativarModoTeste, title: 'Suspende o bloqueio automático de 30s durante 10 minutos, para testar a app sem perder a sessão' }, [
    h('span', { class: 'modo-teste-btn-icon' }, '🔒'),
    h('span', { class: 'modo-teste-btn-text' }, [
      'Pausar Bloqueio',
      h('br'),
      h('span', { class: 'modo-teste-btn-sub' }, '(Modo Teste)'),
    ]),
  ]);
}
// Junta o cartão do utilizador + (se Administrador) o botão de Modo de
// Teste — usado tanto na construção inicial da sidebar como em cada
// atualização feita por refreshSidebarBadges().
function buildSidebarBadgeSlotContent() {
  const badge = buildUserBadgeElement();
  const modoTesteBtn = buildModoTesteButton();
  if (!modoTesteBtn) return [badge];
  return [h('div', { class: 'active-user-card' }, [badge, modoTesteBtn])];
}

/* ---- Expiração de sessão por inatividade (bloqueia a app) ----
   Já não existe ecrã de bloqueio. Ao fim do tempo limite sem interação, a
   sessão do utilizador é simplesmente limpa da memória — a app continua
   exatamente como estava no ecrã, só o badge da sidebar muda para "Iniciar
   Turno".
   Limite alargado para 1 hora (Estafeta e Prestador de Serviço): estes
   perfis trabalham tipicamente "fora do balcão" (na rua a fazer entregas,
   ou numa sala de atendimento), com longos períodos sem tocar no
   ecrã/telemóvel entre uma ação e a seguinte — 30s seria demasiado
   agressivo e obrigaria a autenticações constantes. Todos os restantes
   perfis mantêm o limite padrão, mais curto, por estarem sempre junto ao
   posto de trabalho. */
const INACTIVITY_LIMIT_MS = 30000;
const INACTIVITY_LIMIT_ESTAFETA_PRESTADOR_MS = 60 * 60 * 1000; // 1 hora (3600s)
let inactivityTimer = null;
function resetInactivityTimer() {
  if (inactivityTimer) clearTimeout(inactivityTimer);
  if (modoTesteAtivo) return; // bloqueio automático suspenso pelo Modo de Teste do Administrador
  const limite = (isEstafeta() || isPrestadorServico()) ? INACTIVITY_LIMIT_ESTAFETA_PRESTADOR_MS : INACTIVITY_LIMIT_MS;
  inactivityTimer = setTimeout(clearSessionSilently, limite);
}
function clearSessionSilently() {
  if (!activeUser) return;
  activeUser = null;
  pararPresenca();
  // Importante: NÃO chama render() aqui — isso faria a app saltar para a
  // Página Inicial, perdendo o ecrã onde a pessoa estava a trabalhar. Só se
  // atualiza o badge, e mostra-se logo o pop-up a pedir novamente as
  // credenciais, sem sair da página atual.
  refreshSidebarBadges();
  showUserLoginScreen(() => { refreshSidebarBadges(); });
}
function manualLogout() {
  confirmDialog('Deseja terminar a sessão atual?', () => {
    activeUser = null;
    pararPresenca();
    render();
    resetInactivityTimer();
  }, { confirmLabel: 'Terminar sessão' });
}
function setupInactivityWatcher() {
  ['mousemove', 'keydown', 'click', 'touchstart'].forEach(evt => {
    document.addEventListener(evt, resetInactivityTimer, { passive: true });
  });
  resetInactivityTimer();
}

async function startApp() {
  const loadingEl = buildLoadingScreen();
  document.body.appendChild(loadingEl);
  await loadAllData();
  await autoCancelOldOrders();
  loadingEl.remove();
  // Sem sessão ativa (Camada 2), render() mostra de imediato o ecrã de
  // bloqueio "Iniciar Sessão" — já não existe Modo de Consulta Livre.
  render();
  document.body.appendChild(buildSignature());
  document.body.appendChild(buildClock());
  setupRealtime();
  setupInactivityWatcher();
  // Temporizadores de Hora Limite das Entregas — só existem badges quando a
  // vista de Pendentes está visível; o querySelectorAll é barato quando não há nenhum.
  setInterval(atualizarTodosEntregaTimerBadges, 20000);
}

function showLoginGate() {
  const overlay = h('div', { class: 'login-gate' });
  // Esta é a ÚNICA password que o browser pode memorizar nativamente —
  // é a camada 1 (acesso global ao computador), por isso não tem
  // autocomplete="off": queremos mesmo que o Chrome ofereça guardá-la.
  const input = h('input', { class: 'login-input', type: 'password', placeholder: 'Palavra-passe de acesso', autocomplete: 'current-password', name: 'sigajuncal-master-password' });
  const errorMsg = h('p', { class: 'login-error' }, '');

  function tryLogin() {
    if (input.value === APP_PASSWORD) {
      writeStoredAuth();
      overlay.remove();
      startApp();
    } else {
      errorMsg.textContent = 'Palavra-passe incorreta. Tente novamente.';
      input.value = '';
      input.focus();
    }
  }

  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });
  const enterBtn = h('button', { class: 'btn btn-primary', onclick: tryLogin }, 'Entrar');

  const panel = h('div', { class: 'login-panel' }, [
    h('img', { src: SIGA_LOGO_DATA_URI, alt: 'SigaJuncal', class: 'login-logo' }),
    h('p', { class: 'login-sub' }, 'Introduza a palavra-passe de acesso à aplicação.'),
    h('div', { class: 'login-field' }, [input]),
    errorMsg,
    enterBtn,
  ]);
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  setTimeout(() => input.focus(), 60);
}

// FLUXO DE ARRANQUE OBRIGATÓRIO — a Camada 1 mantém-se absolutamente inalterada:
//  1) Password master da app ("Juncal2026") — guardada em localStorage e com
//     autocomplete ativo, para o Chrome (ou outro browser) a poder memorizar
//     e facilitar o arranque diário. Só é pedida uma vez por computador.
//  2) SÓ DEPOIS da camada 1 validada, a app pede logo o login individual
//     (Username + PIN, Camada 2) através do ecrã de bloqueio "Iniciar
//     Sessão". Já não existe Modo de Consulta Livre — sem sessão ativa,
//     nada na app é visível nem interativo.
if (readStoredAuth()) {
  startApp();
} else {
  showLoginGate();
}
</script>
