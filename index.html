// ---- Assistente de Rota Dinâmico (banner no topo do Módulo de Entregas) ----
// Perfil Estafeta: resumo global das duas farmácias (a rota de um estafeta
// não se limita a uma só). Restantes perfis: foco exclusivo na farmácia
// atualmente selecionada — mas o alerta de urgência varre TODAS as entregas
// dessa farmácia, seja qual for o estafeta atribuído, para que o balcão saiba
// sempre se algo precisa de sair imediatamente.
function entregaMaisUrgente(lista) {
  let melhor = null;
  lista.forEach(r => {
    const limite = entregaLimiteTimestamp(r);
    if (!limite) return;
    const restante = limite.getTime() - Date.now();
    if (!melhor || restante < melhor.restante) melhor = { r, restante };
  });
  return melhor;
}
function buildAssistenteRotaCard(farmaciaAtiva) {
  if (!activeUser) return null;
  const nome = String(activeUser.nomeCompleto || activeUser.username || '').trim().split(/\s+/)[0] || activeUser.username;
  const estafeta = isEstafeta();
  const pend = (farm) => STATE.entregas.filter(r => r.farmacia === farm && r.estadoEntrega !== 'Entregue');
  const pendJuncal = pend('Juncal');
  const pendBoaNova = pend('Boa Nova');

  let escopo, mensagemBase;
  if (estafeta) {
    escopo = [...pendJuncal, ...pendBoaNova];
    mensagemBase = escopo.length === 0
      ? `Olá, ${nome}! Não tens nenhuma entrega pendente de momento, tanto na Juncal como na Boa Nova. Bom trabalho!`
      : `Olá, ${nome}! Tens ${pendJuncal.length} entrega${pendJuncal.length === 1 ? '' : 's'} pendente${pendJuncal.length === 1 ? '' : 's'} na Juncal e ${pendBoaNova.length} na Boa Nova.`;
  } else {
    const farm = farmaciaAtiva || 'Juncal';
    escopo = pend(farm);
    mensagemBase = escopo.length === 0
      ? `Olá, ${nome}! Não há entregas pendentes de momento na Farmácia ${farm}. Bom trabalho!`
      : `Olá, ${nome}! Existem ${escopo.length} entrega${escopo.length === 1 ? '' : 's'} pendente${escopo.length === 1 ? '' : 's'} na ${farm}.`;
  }

  const urgente = entregaMaisUrgente(escopo);
  let mensagemAlerta = '';
  let temAlerta = false;
  if (urgente && urgente.restante <= 60 * 60 * 1000) {
    temAlerta = true;
    const min = Math.round(urgente.restante / 60000);
    const horaLabel = entregaHoraLimiteEfetiva(urgente.r);
    const cliente = urgente.r.nomeCliente || 'sem nome';
    const restanteTexto = min > 0 ? `restam ${min} min` : 'já expirou';
    mensagemAlerta = estafeta
      ? ` ATENÇÃO: A entrega de ${cliente} tem hora limite para as ${horaLabel} (${restanteTexto}).`
      : ` ⚠️ ATENÇÃO: A entrega de ${cliente} vence às ${horaLabel} (${restanteTexto}) e necessita de envio imediato!`;
  } else if (escopo.length > 0) {
    mensagemAlerta = ' Boa rota!';
  }

  return h('div', { class: 'card card-pad assistente-rota-card' + (temAlerta ? ' alerta' : '') }, [
    h('div', { class: 'assistente-rota-icon' }, Icon(temAlerta ? 'alert' : 'truck', { size: 20, strokeWidth: 2 })),
    h('p', { class: 'assistente-rota-texto' }, mensagemBase + mensagemAlerta),
  ]);
}

/* ---- Temporizador Inteligente de Hora Limite (Entregas Pendentes) ----
   O badge só é recalculado localmente, via classe .entrega-timer-badge +
   atributo data-limite (timestamp ISO) — um único intervalo global percorre
   estes elementos e atualiza texto/cor sem nunca precisar de refazer a
   tabela inteira (evita perder scroll, seleção, etc.). */
// Extrai a última "HH" de um bloco horário como "2º (14H - 16H)" ou
// "Sábado (14H - 18H)" — é sempre a hora de FIM do bloco.
function blocoHorarioFimHora(bloco) {
  if (!bloco) return null;
  const matches = String(bloco).match(/(\d{1,2})H/gi);
  if (!matches || !matches.length) return null;
  const hh = parseInt(matches[matches.length - 1], 10);
  if (isNaN(hh) || hh < 0 || hh > 23) return null;
  return `${pad2(hh)}:00`;
}
// Um Bloco Horário só pode "expirar" no próprio dia de hoje — se a Data de
// Entrega for outro dia (passado já não se agenda; futuro ainda não chegou),
// não faz sentido nenhum bloco estar "expirado".
function entregaBlocoExpirado(bloco, dataISO) {
  if (!bloco || !dataISO || dataISO !== todayISO()) return false;
  const fimHora = blocoHorarioFimHora(bloco);
  if (!fimHora) return false;
  const fimTimestamp = new Date(`${dataISO}T${fimHora}:00`);
  return !isNaN(fimTimestamp.getTime()) && Date.now() > fimTimestamp.getTime();
}
// Hora-limite efetiva: usa a Hora Limite Específica se definida, senão o
// fim do Bloco Horário selecionado.
function entregaHoraLimiteEfetiva(r) {
  if (r.horaLimite && /^\d{2}:\d{2}$/.test(r.horaLimite)) return r.horaLimite;
  return blocoHorarioFimHora(r.blocoHorario);
}
function entregaLimiteTimestamp(r) {
  const hora = entregaHoraLimiteEfetiva(r);
  if (!hora || !r.dataEntrega) return null;
  const d = new Date(`${r.dataEntrega}T${hora}:00`);
  return isNaN(d.getTime()) ? null : d;
}
function entregaTimerEstado(restanteMs) {
  const restanteMin = Math.round(restanteMs / 60000);
  if (restanteMs <= 0) return { cor: 'vermelho', texto: 'Expirado', piscar: true };
  if (restanteMin <= 15) return { cor: 'vermelho', texto: `${restanteMin} min`, piscar: true };
  if (restanteMin < 60) return { cor: 'amarelo', texto: `${restanteMin} min`, piscar: false };
  const h = Math.floor(restanteMin / 60), m = restanteMin % 60;
  return { cor: 'verde', texto: m ? `${h}h${pad2(m)}` : `${h}h`, piscar: false };
}
function atualizarEntregaTimerBadge(badge) {
  const limiteMs = Number(badge.dataset.limite);
  const horaLabel = badge.dataset.horaLabel || '';
  const estado = entregaTimerEstado(limiteMs - Date.now());
  badge.className = 'entrega-timer-badge tone-' + estado.cor + (estado.piscar ? ' piscar' : '');
  clear(badge);
  badge.appendChild(Icon('clock', { size: 11, strokeWidth: 2.4 }));
  badge.appendChild(document.createTextNode(` ${estado.texto} (até às ${horaLabel})`));
}
// Único intervalo global — percorre todos os badges de temporizador
// atualmente na página (normalmente só os da tabela de Entregas Pendentes,
// que é a única vista onde este badge é criado) e atualiza-os no próprio
// elemento, sem tocar em mais nada do ecrã.
function atualizarTodosEntregaTimerBadges() {
  document.querySelectorAll('.entrega-timer-badge').forEach(atualizarEntregaTimerBadge);
}
function buildEntregaTimerBadge(r) {
  const limite = entregaLimiteTimestamp(r);
  if (!limite) return null;
  const badge = h('span', { class: 'entrega-timer-badge' });
  badge.dataset.limite = String(limite.getTime());
  badge.dataset.horaLabel = entregaHoraLimiteEfetiva(r);
  atualizarEntregaTimerBadge(badge);
  return badge;
}

/* =================================================================
   MAPA DE TAREFAS — mapa de responsabilidades por área da farmácia.
   Leitura aberta a toda a equipa autenticada; adicionar/editar/eliminar
   fica reservado a Administrador/Master (isMasterUser()).
================================================================= */
function buildMapaTarefasPage(container, goTo) {
  let showForm = false, editingId = null, draft = emptyRecord(mapaTarefasSchema);
  let formError = '';
  let saving = false;

  function podeEditar() { return isMasterUser(); }
  function rerender() { clear(container); container.appendChild(build()); }

  function openNew(categoriaPreSelecionada) {
    if (!podeEditar()) return;
    draft = emptyRecord(mapaTarefasSchema);
    if (categoriaPreSelecionada) draft.categoria = categoriaPreSelecionada;
    editingId = null; formError = ''; showForm = true; rerender();
  }
  function openEdit(r) {
    if (!podeEditar()) return;
    draft = Object.assign({}, r); editingId = r.id; formError = ''; showForm = true; rerender();
  }
  function cancel() { formError = ''; showForm = false; rerender(); }

  function checkMapaTarefasRequired(d) {
    const missing = [];
    if (!String(d.categoria || '').trim()) missing.push('Categoria');
    if (!String(d.titulo || '').trim()) missing.push('Título / Nome da Tarefa');
    if (!String(d.responsavel || '').trim()) missing.push('Responsável');
    return missing;
  }

  async function submit() {
    if (!podeEditar()) return;
    const missing = checkMapaTarefasRequired(draft);
    if (missing.length) {
      formError = `Por favor, preencha: ${missing.join(', ')}.`;
      rerender();
      return;
    }
    formError = '';
    saving = true; rerender();
    if (editingId) {
      const updated = await dbUpdate('mapaTarefas', editingId, draft);
      if (updated) STATE.mapaTarefas = STATE.mapaTarefas.map(r => r.id === editingId ? updated : r);
      else formError = `Não foi possível guardar as alterações. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    } else {
      const created = await dbInsert('mapaTarefas', draft);
      if (created) STATE.mapaTarefas = [created, ...STATE.mapaTarefas];
      else formError = `Não foi possível adicionar a tarefa. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    }
    saving = false;
    if (!formError) showForm = false;
    rerender();
  }

  function removeTarefa(r) {
    if (!podeEditar()) return;
    confirmDialog(`Tem a certeza de que quer eliminar "${r.titulo}"?`, async () => {
      const ok = await dbDelete('mapaTarefas', r.id);
      if (ok) { STATE.mapaTarefas = STATE.mapaTarefas.filter(x => x.id !== r.id); showForm = false; rerender(); }
      else showDbErrorToast('Não foi possível eliminar a tarefa');
    }, { danger: true, confirmLabel: 'Eliminar' });
  }

  // Preenche os dropdowns de Responsável/Substituto dinamicamente com a
  // equipa elegível (exclui Estafetas e Prestadores de Serviço).
  function mapaTarefasFormSchema() {
    const nomes = membrosElegiveisMapaTarefas().map(u => u.nomeCompleto || u.username).filter(Boolean);
    return mapaTarefasSchema.map(f => {
      if (f.name === 'responsavel' || f.name === 'substituto') {
        const opts = f.name === 'substituto' ? ['—', ...nomes] : nomes;
        return Object.assign({}, f, { options: opts.length ? opts : [draft[f.name] || ''].filter(Boolean) });
      }
      return f;
    });
  }

  function buildCategoriaSection(categoria) {
    const itens = STATE.mapaTarefas
      .filter(r => r.categoria === categoria)
      .sort((a, b) => String(a.titulo || '').localeCompare(String(b.titulo || '')));

    const header = h('div', { style: 'display:flex;align-items:center;justify-content:space-between;margin:22px 0 10px;' }, [
      h('h3', { class: 'dash-card-title', style: 'margin:0;' }, `${categoria} (${itens.length})`),
    ]);

    if (!itens.length) {
      return h('div', {}, [header, h('p', { class: 'cell-muted', style: 'margin:0 0 8px;' }, 'Sem tarefas nesta categoria.')]);
    }

    const thead = h('thead', {}, h('tr', {}, ['Título', 'Responsável', 'Substituto', 'Observações', ''].map(t => h('th', {}, t))));
    const tbody = h('tbody', {}, itens.map(r => {
      const editBtn = podeEditar() ? editIconButton(() => openEdit(r)) : null;
      const delBtn = podeEditar() ? h('button', { class: 'btn-fab-sm tone-red', title: 'Eliminar', 'aria-label': 'Eliminar' }, Icon('trash', { size: 13, strokeWidth: 2.2 })) : null;
      if (delBtn) delBtn.addEventListener('click', () => removeTarefa(r));
      const acoes = podeEditar() ? h('div', { class: 'row-actions' }, [editBtn, delBtn]) : '';
      return h('tr', {}, [
        h('td', { class: 'cell-strong' }, r.titulo || '—'),
        h('td', {}, r.responsavel || '—'),
        h('td', {}, (r.substituto && r.substituto !== '—') ? r.substituto : '—'),
        h('td', { class: 'cell-muted' }, r.observacoes || '—'),
        h('td', { class: 'text-right' }, acoes),
      ]);
    }));
    return h('div', {}, [header, h('div', { class: 'card' }, h('div', { class: 'table-wrap' }, h('table', {}, [thead, tbody])))]);
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    // Proteção de rota: mesmo que alguém force a navegação para
    // 'mapa-tarefas', os perfis restritos (Estafeta, Farmácia Boa Nova,
    // Prestador de Serviço) nunca veem o conteúdo — o seu acesso está
    // limitado à área que lhes é própria (Entregas ou a sua Agenda).
    if (isEstafeta() || isBoaNovaOperador() || isPrestadorServico()) {
      wrap.appendChild(withBackButton(buildPageHeader('lockClosed', 'Acesso Não Autorizado', 'O seu perfil não tem acesso ao Mapa de Tarefas.', undefined), goTo));
      wrap.appendChild(EmptyState('Este módulo está disponível apenas para a equipa interna da farmácia.'));
      container.appendChild(wrap);
      return wrap;
    }
    wrap.appendChild(withBackButton(buildPageHeader('clipboardCheck', 'Mapa de Tarefas', 'Mapa de responsabilidades da farmácia — quem trata de cada área, e quem substitui.', STATE.mapaTarefas.length), goTo));

    if (!podeEditar()) {
      wrap.appendChild(h('p', { class: 'readonly-notice' }, 'Consulta disponível para toda a equipa — adicionar, editar ou eliminar está reservado a Administradores.'));
    }

    if (showForm) {
      wrap.appendChild(buildRecordForm(mapaTarefasFormSchema(), draft, {
        editing: !!editingId,
        onSubmit: submit,
        onCancel: cancel,
        onDelete: editingId ? () => removeTarefa(draft) : null,
        saving,
        errorMessage: formError,
      }));
      return wrap;
    }

    MAPA_TAREFAS_CATEGORIAS.forEach(cat => wrap.appendChild(buildCategoriaSection(cat)));

    if (podeEditar() && !showForm) {
      const fab = h('button', { class: 'mapa-tarefas-fab', title: 'Adicionar tarefa', 'aria-label': 'Adicionar tarefa' }, Icon('plus', { size: 22, strokeWidth: 2.4 }));
      fab.addEventListener('click', () => openNew());
      wrap.appendChild(fab);
    }

    return wrap;
  }

  rerender();
}

function buildEntregasPage(container, goTo) {
  // Só Estafeta e Administrador escolhem entre as duas farmácias — todos os
  // restantes colaboradores entram direta e automaticamente na Juncal.
  // Só Estafeta e Administrador escolhem entre as duas farmácias — o perfil
  // Farmácia Boa Nova fica sempre fixo na Boa Nova; todos os restantes
  // colaboradores entram direta e automaticamente na Juncal.
  let farmaciaAtiva = isBoaNovaOperador() ? 'Boa Nova' : ((isEstafeta() || isAdministrador()) ? null : 'Juncal');
  let activeTab = 'pendentes'; // 'pendentes' | 'historico'
  let searchQuery = '';
  let showForm = false, editingId = null, draft = {}, formError = '', saving = false;
  let selectedIds = new Set();

  function rerender() { clear(container); container.appendChild(build()); }
  function toggleSelect(id) { if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); rerender(); }
  function trocarFarmacia(f) { farmaciaAtiva = f; activeTab = 'pendentes'; selectedIds = new Set(); searchQuery = ''; showForm = false; rerender(); }
  function voltarSelecaoFarmacia() { if (isBoaNovaOperador()) return; farmaciaAtiva = null; showForm = false; selectedIds = new Set(); rerender(); }

  // Estafetas disponíveis para "Entregue por" — pré-seleciona o mais antigo
  // (id mais baixo = criado há mais tempo), mas o dropdown permite trocar.
  function estafetasDisponiveis() { return (STATE.usuarios || []).filter(u => u.perfilNivel === 'Estafeta'); }
  function estafetaPredefinidoNome() {
    const lista = estafetasDisponiveis().slice().sort((a, b) => (a.id > b.id ? 1 : -1));
    return lista.length ? (lista[0].nomeCompleto || lista[0].username) : '';
  }
  function empresaPorId(id) { return (STATE.empresasParceiras || []).find(e => String(e.id) === String(id)); }
  // Troco = Valor Entregue - Valor a Pagar — recalculado sempre que um dos
  // dois campos muda; nunca negativo na apresentação (evita confusão).
  function recalcularTroco() {
    if (!draft.precisaTroco) { draft.troco = ''; return; }
    const entregue = parseFloat(String(draft.valorEntregue).replace(',', '.')) || 0;
    const aPagar = parseFloat(String(draft.valorAPagar).replace(',', '.')) || 0;
    const troco = entregue - aPagar;
    draft.troco = troco > 0 ? troco.toFixed(2) : '0.00';
  }

  function openNew() {
    const hoje = todayISO();
    draft = {
      farmacia: farmaciaAtiva, tipoDestinatario: 'Particular', empresaParceiraId: '',
      nomeCliente: '', morada: '', localidade: '', contacto: '', dataEntrega: hoje,
      blocoHorario: entregaEhSabado(hoje) ? BLOCO_SABADO : '', horaLimite: '', urgente: false,
      entreguePor: estafetaPredefinidoNome(), estadoPagamento: '', metodoPagamento: '', levarTerminalMb: false,
      valorAPagar: '', precisaTroco: false, valorEntregue: '', troco: '',
      observacoes: '', estadoEntrega: 'Pendente',
    };
    editingId = null; formError = ''; showForm = true; rerender();
  }
  function openEditSelected() {
    if (selectedIds.size !== 1) return;
    const r = STATE.entregas.find(x => x.id === [...selectedIds][0]);
    if (!r) return;
    draft = Object.assign({}, r); editingId = r.id; formError = ''; showForm = true; rerender();
  }
  function cancel() { formError = ''; showForm = false; rerender(); }

  // Dropdown do Bloco Horário reage à Data: em Sábado fixa-se automaticamente
  // em "Sábado (14H - 18H)" e bloqueiam-se as restantes opções; em qualquer
  // outro dia, a opção de Sábado fica indisponível e a escolha é manual.
  // Além disso: filtra os campos condicionais (Empresa Parceira, Troco) e
  // preenche as opções dinâmicas (empresas, estafetas) consoante o estado atual.
  function entregasFormSchema() {
    const sabado = entregaEhSabado(draft.dataEntrega);
    const ehEmpresa = draft.tipoDestinatario === 'Empresa Parceira';
    const ehDinheiro = draft.metodoPagamento === 'Dinheiro';
    const ehMB = draft.metodoPagamento === 'MB';
    const pago = draft.estadoPagamento === 'Pago';
    const camposOcultos = new Set();
    if (!ehEmpresa) camposOcultos.add('empresaParceiraId');
    if (!ehDinheiro) camposOcultos.add('precisaTroco');
    if (!ehDinheiro || !draft.precisaTroco) { camposOcultos.add('valorEntregue'); camposOcultos.add('troco'); }
    // TPA só faz sentido quando ainda há algo a cobrar na rua — com a
    // entrega já paga, o campo desaparece e a checkbox fica sempre desmarcada.
    if (!ehMB || pago) camposOcultos.add('levarTerminalMb');

    return entregasSchema.filter(f => !camposOcultos.has(f.name)).map(f => {
      if (f.name === 'tipoDestinatario') {
        return Object.assign({}, f, { onChange: () => { if (draft.tipoDestinatario !== 'Empresa Parceira') draft.empresaParceiraId = ''; rerender(); } });
      }
      if (f.name === 'empresaParceiraId') {
        return f;
      }
      if (f.name === 'dataEntrega') {
        return Object.assign({}, f, {
          onChange: () => {
            const sab = entregaEhSabado(draft.dataEntrega);
            if (sab) draft.blocoHorario = BLOCO_SABADO;
            else if (draft.blocoHorario === BLOCO_SABADO) draft.blocoHorario = '';
            rerender();
          },
        });
      }
      if (f.name === 'blocoHorario') {
        const opcoes = sabado ? [BLOCO_SABADO] : BLOCOS_HORARIOS;
        const optionLabels = opcoes.map(o => entregaBlocoExpirado(o, draft.dataEntrega) ? `${o} — Expirado` : o);
        let helperText;
        if (sabado) helperText = 'Data de Sábado — bloco fixado automaticamente, sem outras opções disponíveis.';
        else if (draft.urgente) helperText = '🚨 Modo Urgente ativo — pode escolher qualquer bloco, mesmo já expirado para hoje.';
        else if (entregaBlocoExpirado(draft.blocoHorario, draft.dataEntrega)) helperText = 'Este bloco já expirou para hoje — assinale "URGENTE" para o manter.';
        return Object.assign({}, f, {
          options: opcoes,
          optionLabels,
          helperText,
          onChange: () => {
            if (entregaBlocoExpirado(draft.blocoHorario, draft.dataEntrega) && !draft.urgente) {
              alert('Este bloco horário já expirou para o dia de hoje. Para realizar uma entrega fora de prazo/imediata, deve assinalar a opção "URGENTE — Entrega Imediata".');
              draft.blocoHorario = '';
            }
            rerender();
          },
        });
      }
      if (f.name === 'urgente') {
        return Object.assign({}, f, { onChange: () => rerender() });
      }
      if (f.name === 'horaLimite') {
        return Object.assign({}, f, {
          helperText: 'Só para casos em que o destino fecha antes do fim do Bloco Horário (ex: empresas). Se ficar em branco, o temporizador da entrega usa o fim do Bloco Horário.',
        });
      }
      if (f.name === 'entreguePor') {
        const estafetas = estafetasDisponiveis();
        const nomes = estafetas.map(u => u.nomeCompleto || u.username);
        return Object.assign({}, f, { options: nomes.length ? nomes : [draft.entreguePor || ''].filter(Boolean) });
      }
      if (f.name === 'metodoPagamento') {
        return Object.assign({}, f, {
          onChange: () => {
            if (draft.metodoPagamento !== 'Dinheiro') draft.precisaTroco = false;
            if (draft.metodoPagamento !== 'MB') draft.levarTerminalMb = false;
            rerender();
          },
        });
      }
      if (f.name === 'valorAPagar') {
        const pago = draft.estadoPagamento === 'Pago';
        return Object.assign({}, f, {
          disabled: pago,
          helperText: pago ? 'Entrega já paga — não há valor a cobrar pelo estafeta.' : undefined,
          onChange: () => { recalcularTroco(); rerender(); },
        });
      }
      if (f.name === 'precisaTroco') {
        return Object.assign({}, f, { onChange: () => { recalcularTroco(); rerender(); } });
      }
      if (f.name === 'valorEntregue') {
        return Object.assign({}, f, { onChange: () => { recalcularTroco(); rerender(); } });
      }
      if (f.name === 'troco') {
        return Object.assign({}, f, { disabled: true, helperText: 'Calculado automaticamente: Valor Entregue − Valor a Pagar.' });
      }
      return f;
    });
  }
  function buildMoradaComMapsField(f) {
    const inp = h('input', { class: 'input' });
    inp.value = draft[f.name] || '';
    inp.addEventListener('input', () => { draft[f.name] = inp.value; });
    const mapsBtn = h('a', {
      href: `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(draft[f.name] || '')}`,
      target: '_blank', rel: 'noopener noreferrer', class: 'btn-fab-sm tone-blue', title: 'Abrir no Google Maps', 'aria-label': 'Abrir no Google Maps',
    }, Icon('mapPin', { size: 13, strokeWidth: 2.2 }));
    return h('div', { class: 'field' + (f.col === 2 ? ' span2' : (f.size ? ' field-' + f.size : '')) }, [
      h('label', {}, f.label),
      h('div', { style: 'display:flex;gap:8px;align-items:center;' }, [inp, mapsBtn]),
    ]);
  }
  function buildEmpresaParceiraField(f) {
    const empresas = STATE.empresasParceiras || [];
    const sel = h('select', { class: 'select' }, [
      h('option', { value: '' }, 'Escolher empresa...'),
      ...empresas.map(e => h('option', { value: String(e.id), selected: String(draft.empresaParceiraId) === String(e.id) ? 'selected' : undefined }, e.nome)),
    ]);
    sel.value = draft.empresaParceiraId || '';
    sel.addEventListener('change', () => {
      draft.empresaParceiraId = sel.value;
      const emp = empresaPorId(sel.value);
      if (emp) { draft.nomeCliente = emp.nome || ''; draft.morada = emp.morada || ''; draft.localidade = emp.localidade || ''; draft.contacto = emp.contacto || ''; }
      rerender();
    });
    const gerirBtn = h('button', { type: 'button', class: 'btn-fab-sm tone-gray', title: 'Gerir Empresas Parceiras', 'aria-label': 'Gerir Empresas Parceiras' }, Icon('settings', { size: 13, strokeWidth: 2.2 }));
    gerirBtn.addEventListener('click', () => requireAuth(() => goTo('gestao-empresas-parceiras')));
    return h('div', { class: 'field' + (f.col === 2 ? ' span2' : (f.size ? ' field-' + f.size : '')) }, [h('label', {}, f.label), h('div', { style: 'display:flex;gap:8px;align-items:center;' }, [sel, gerirBtn])]);
  }
  function buildEstadoPagamentoField(f) {
    const opts = [{ value: 'Pago', tone: 'green' }, { value: 'Não Pago', tone: 'red' }];
    const btns = opts.map(o => {
      const ativo = draft.estadoPagamento === o.value;
      const btn = h('button', { type: 'button', class: 'pagamento-toggle-btn tone-' + o.tone + (ativo ? ' ativo' : '') }, o.value.toUpperCase());
      btn.addEventListener('click', () => {
        draft.estadoPagamento = o.value;
        // "Pago" — já não há nada a cobrar pelo estafeta, por isso o campo
        // fica bloqueado e limpo; "Não Pago" liberta-o de imediato para
        // se indicar o valor a cobrar.
        if (o.value === 'Pago') { draft.valorAPagar = ''; draft.levarTerminalMb = false; recalcularTroco(); }
        rerender();
      });
      return btn;
    });
    return h('div', { class: 'field span2' }, [h('label', {}, f.label), h('div', { style: 'display:flex;gap:10px;margin-top:2px;' }, btns)]);
  }
  // Troco: campo só de leitura, calculado automaticamente (Valor Entregue −
  // Valor a Pagar). Em vez de um <input type="number" disabled> — que em
  // vários browsers continua a mostrar as setinhas de incremento mesmo
  // desativado — usa-se aqui um <input type="text" readonly>, formatado em
  // euros com vírgula decimal, com o mesmo estilo "só consulta" (fundo
  // acinzentado, negrito, cursor not-allowed) dos calculadores da app.
  function buildTrocoReadonlyField(f, draft) {
    const temValor = draft.troco !== '' && draft.troco !== undefined && draft.troco !== null;
    const control = h('input', { class: 'input calc-readonly', type: 'text', readonly: 'readonly', inputmode: 'none', placeholder: '0,00 €' });
    control.value = temValor ? `${Number(draft.troco).toFixed(2).replace('.', ',')} €` : '';
    const kids = [h('label', {}, f.label), control];
    if (f.helperText) kids.push(h('p', { class: 'field-helper-text' }, f.helperText));
    return h('div', { class: 'field' + (f.size ? ' field-' + f.size : '') }, kids);
  }
  function entregasFieldOverrides() {
    return {
      morada: buildMoradaComMapsField,
      empresaParceiraId: buildEmpresaParceiraField,
      estadoPagamento: buildEstadoPagamentoField,
      troco: buildTrocoReadonlyField,
    };
  }

  async function submit(imprimirDepois) {
    const missing = checkEntregaRequired(draft);
    if (missing.length) {
      formError = `Por favor, preencha: ${missing.join(', ')}.`;
      rerender();
      return;
    }
    const formatoInvalido = checkFieldFormats(draft, entregasSchema);
    if (formatoInvalido) { formError = formatoInvalido; rerender(); return; }
    if (entregaBlocoExpirado(draft.blocoHorario, draft.dataEntrega) && !draft.urgente) {
      alert('Este bloco horário já expirou para o dia de hoje. Para realizar uma entrega fora de prazo/imediata, deve assinalar a opção "URGENTE — Entrega Imediata".');
      return;
    }
    formError = '';
    draft.responsavel = currentUserName();
    normalizeNameFields(draft);
    saving = true; rerender();
    let registoGuardado = null;
    if (editingId) {
      const updated = await dbUpdate('entregas', editingId, draft);
      if (updated) { STATE.entregas = STATE.entregas.map(r => r.id === editingId ? updated : r); registoGuardado = updated; }
      else formError = `Não foi possível guardar as alterações. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    } else {
      const created = await dbInsert('entregas', Object.assign({ farmacia: farmaciaAtiva, estadoEntrega: 'Pendente' }, draft));
      if (created) { STATE.entregas = [created, ...STATE.entregas]; registoGuardado = created; }
      else formError = `Não foi possível criar o registo. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    }
    saving = false;
    if (!formError) {
      showForm = false;
      selectedIds = new Set();
      // Redireciona automaticamente para a lista de Pendentes/Histórico da
      // farmácia respetiva: entradas novas ficam sempre em Pendentes; ao
      // editar, segue o estado atual do registo guardado.
      activeTab = draft.estadoEntrega === 'Entregue' ? 'historico' : 'pendentes';
      if (imprimirDepois && registoGuardado) imprimirFormularioEntrega(registoGuardado);
    }
    rerender();
  }

  function removeSelected() {
    if (selectedIds.size === 0) return;
    const ids = [...selectedIds];
    const plural = ids.length > 1;
    confirmDialog(`ATENÇÃO: Tem a certeza de que quer eliminar permanentemente ${ids.length} registo de entrega${plural ? 's' : ''} selecionado${plural ? 's' : ''}? Esta ação não pode ser desfeita!`, async () => {
      const apagados = await bulkSoftDelete('entregas', ids);
      STATE.entregas = STATE.entregas.filter(r => !apagados.has(r.id));
      selectedIds = new Set([...selectedIds].filter(id => !apagados.has(id)));
      rerender();
    }, { danger: true, confirmLabel: 'Eliminar' });
  }

  function marcarEntregue(id) {
    const registo = STATE.entregas.find(r => r.id === id);
    // Entrega "A Cobrar" (ou sem estado de pagamento definido) — pergunta
    // explicitamente se o dinheiro/pagamento foi mesmo cobrado no ato,
    // antes de a entrega sair da lista de Pendentes e correr o risco de
    // ficar esquecida por cobrar.
    if (registo && registo.estadoPagamento !== 'Pago') {
      confirmarPagamentoEntregaDialog(async (marcarComoPago) => {
        const patch = { estadoEntrega: 'Entregue', horaEntregaReal: new Date().toISOString() };
        if (marcarComoPago) patch.estadoPagamento = 'Pago';
        const updated = await dbUpdate('entregas', id, patch);
        if (updated) { STATE.entregas = STATE.entregas.map(r => r.id === id ? updated : r); selectedIds = new Set([...selectedIds].filter(x => x !== id)); showForm = false; rerender(); }
        else showDbErrorToast('Não foi possível marcar como entregue');
      });
      return;
    }
    // Já estava "Pago" — segue diretamente, sem o popup de confirmação de pagamento.
    confirmDialog('Confirma que esta entrega já foi feita? Vai passar para o histórico desta farmácia.', async () => {
      const updated = await dbUpdate('entregas', id, { estadoEntrega: 'Entregue', horaEntregaReal: new Date().toISOString() });
      if (updated) { STATE.entregas = STATE.entregas.map(r => r.id === id ? updated : r); selectedIds = new Set([...selectedIds].filter(x => x !== id)); showForm = false; rerender(); }
      else showDbErrorToast('Não foi possível marcar como entregue');
    }, { confirmLabel: 'Marcar como Entregue' });
  }
  function anularEntrega(id) {
    confirmDialog('Tem a certeza de que quer devolver esta entrega a Pendente?', async () => {
      const updated = await dbUpdate('entregas', id, { estadoEntrega: 'Pendente', horaEntregaReal: null });
      if (updated) { STATE.entregas = STATE.entregas.map(r => r.id === id ? updated : r); showForm = false; activeTab = 'pendentes'; rerender(); }
      else showDbErrorToast('Não foi possível anular a entrega');
    }, { confirmLabel: 'Anular' });
  }
  // Ação direta no badge de Pagamento da tabela — alterna Pago/Não Pago sem
  // abrir o formulário completo, só com uma confirmação rápida.
  function togglePagamento(r) {
    const novo = r.estadoPagamento === 'Pago' ? 'Não Pago' : 'Pago';
    confirmDialog(`Mudar o estado de pagamento para ${novo.toUpperCase()}?`, async () => {
      const updated = await dbUpdate('entregas', r.id, { estadoPagamento: novo });
      if (updated) { STATE.entregas = STATE.entregas.map(x => x.id === r.id ? updated : x); rerender(); }
      else showDbErrorToast('Não foi possível atualizar o pagamento');
    }, { confirmLabel: 'Confirmar' });
  }

  // Fluxo isolado: cada farmácia só vê e só pesquisa dentro dos seus próprios registos —
  // nunca há mistura entre os dados da Juncal e os da Boa Nova.
  function visibleEntregas() {
    const q = searchQuery.trim().toLowerCase();
    let list = STATE.entregas.filter(r => r.farmacia === farmaciaAtiva);
    list = list.filter(r => activeTab === 'historico' ? r.estadoEntrega === 'Entregue' : r.estadoEntrega !== 'Entregue');
    if (q) list = list.filter(r => [r.nomeCliente, r.morada, r.contacto].some(v => (v || '').toLowerCase().includes(q)));
    return list.slice().sort((a, b) => (b.dataEntrega || '').localeCompare(a.dataEntrega || ''));
  }

  function buildTable(list) {
    if (list.length === 0) {
      const msg = searchQuery
        ? 'Nenhum resultado para essa pesquisa.'
        : (activeTab === 'historico' ? `Ainda não há entregas concluídas da Farmácia ${farmaciaAtiva}.` : `Sem entregas pendentes da Farmácia ${farmaciaAtiva}.`);
      return EmptyState(msg);
    }
    const thead = h('thead', {}, h('tr', {}, ['', 'Prazo', 'Cliente', 'Morada', 'Contacto', 'Data', 'Bloco Horário', 'Pagamento', 'Estado', ''].map(t => h('th', {}, t))));
    const rows = list.map(r => {
      const selected = selectedIds.has(r.id);
      // Coluna "Prazo": em Pendentes mostra o temporizador regressivo ao
      // vivo; em Histórico, mostra só a nota da hora-limite pedida e a hora
      // real a que a entrega foi mesmo feita (o temporizador desaparece).
      let prazoCell = '—';
      if (activeTab === 'historico') {
        const horaLabel = entregaHoraLimiteEfetiva(r);
        const horaReal = r.horaEntregaReal ? formatDateTime(r.horaEntregaReal).split(' ')[1] : null;
        if (horaLabel || horaReal) {
          prazoCell = h('div', { style: 'display:flex;flex-direction:column;gap:2px;' }, [
            horaLabel ? h('span', { class: 'cell-muted', style: 'font-size:11px;' }, `Limite: ${horaLabel}`) : null,
            horaReal ? h('span', { class: 'cell-muted', style: 'font-size:11px;font-weight:700;' }, `Entregue: ${horaReal}`) : null,
          ]);
        }
      } else {
        prazoCell = buildEntregaTimerBadge(r) || '—';
      }
      const moradaCell = h('div', { style: 'display:flex;align-items:center;gap:6px;' }, [
        h('span', {}, r.morada || '—'),
        r.morada ? h('a', { href: `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.morada)}`, target: '_blank', rel: 'noopener noreferrer', class: 'btn-fab-sm tone-blue', title: 'Abrir no Google Maps', 'aria-label': 'Abrir no Google Maps' }, Icon('mapPin', { size: 11, strokeWidth: 2.4 })) : null,
      ]);
      // Badge de Pagamento — clicável: alterna Pago/Não Pago com confirmação
      // rápida, sem abrir o formulário completo. Quando falta cobrar, destaca
      // exatamente o que o estafeta precisa de levar/saber na rua.
      let pagamentoCell = '—';
      if (r.estadoPagamento === 'Pago') {
        const badge = h('span', { class: 'badge badge-green estado-badge-clicavel', title: 'Clicar para alternar o estado de pagamento' }, '🟢 PAGO');
        badge.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => togglePagamento(r)); });
        pagamentoCell = h('div', { style: 'display:flex;align-items:center;gap:6px;flex-wrap:wrap;' }, [
          badge,
          r.metodoPagamento ? h('span', { class: 'cell-muted', style: 'font-size:12px;' }, r.metodoPagamento) : null,
        ]);
      } else if (r.estadoPagamento === 'Não Pago') {
        const badge = h('span', { class: 'badge badge-red estado-badge-clicavel', title: 'Clicar para alternar o estado de pagamento' }, '🔴 A COBRAR');
        badge.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => togglePagamento(r)); });
        const detalhes = [];
        if (r.metodoPagamento === 'Dinheiro') {
          if (r.valorAPagar !== '' && r.valorAPagar !== undefined && r.valorAPagar !== null) detalhes.push(`Cobrar ${Number(r.valorAPagar).toFixed(2)}€`);
          if (r.precisaTroco && r.troco !== '' && r.troco !== undefined && r.troco !== null) detalhes.push(`Troco: ${Number(r.troco).toFixed(2)}€`);
        } else if (r.metodoPagamento === 'MB' && r.levarTerminalMb) {
          detalhes.push('💳 Levar Terminal');
        } else if (r.metodoPagamento) {
          detalhes.push(r.metodoPagamento);
        }
        pagamentoCell = h('div', { style: 'display:flex;flex-direction:column;gap:3px;align-items:flex-start;' }, [
          badge,
          detalhes.length ? h('span', { class: 'cell-muted', style: 'font-size:11.5px;font-weight:600;' }, detalhes.join(' · ')) : null,
        ]);
      }
      // Badge de Estado — clicável: PENDENTE → confirma passagem a Entregue;
      // ENTREGUE → confirma reversão a Pendente. Sem abrir o formulário.
      let estadoBadge;
      if (r.estadoEntrega === 'Entregue') {
        estadoBadge = h('span', { class: 'badge badge-green estado-badge-clicavel', title: 'Clicar para reverter para Pendente' }, 'ENTREGUE');
        estadoBadge.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => anularEntrega(r.id)); });
      } else {
        estadoBadge = h('span', { class: 'badge badge-orange estado-badge-clicavel', title: 'Clicar para marcar como Entregue' }, 'PENDENTE');
        estadoBadge.addEventListener('click', (e) => { e.stopPropagation(); requireAuth(() => marcarEntregue(r.id)); });
      }
      const nomeCell = h('div', { style: 'display:flex;align-items:center;gap:6px;' }, [
        r.urgente ? h('span', { title: 'Entrega Urgente', style: 'font-size:13px;' }, '🚨') : null,
        h('span', {}, r.nomeCliente || '—'),
      ]);
      const printRowBtn = h('button', { class: 'btn-fab-sm tone-blue', title: 'Reimprimir formulário de entrega', 'aria-label': 'Reimprimir formulário de entrega' }, Icon('printer', { size: 12, strokeWidth: 2.2 }));
      printRowBtn.addEventListener('click', (e) => { e.stopPropagation(); imprimirFormularioEntrega(r); });
      const row = h('tr', { class: 'selectable-row' + (selected ? ' row-selected' : '') }, [
        buildSelectionCheckbox(r.id, selectedIds, toggleSelect),
        h('td', {}, prazoCell),
        h('td', { class: 'cell-strong' }, nomeCell),
        h('td', {}, moradaCell),
        h('td', {}, r.contacto || '—'),
        h('td', {}, formatDate(r.dataEntrega)),
        h('td', {}, r.blocoHorario ? h('span', { class: 'badge-bloco' }, r.blocoHorario) : '—'),
        h('td', {}, pagamentoCell),
        h('td', {}, estadoBadge),
        h('td', {}, printRowBtn),
      ]);
      return row;
    });
    return h('div', { class: 'card' }, h('div', { class: 'table-wrap' }, h('table', {}, [thead, h('tbody', {}, rows)])));
  }

  // ---- Ecrã de transição: só dois botões, nada de tabelas até se escolher a farmácia ----
  function buildSeletorFarmacia() {
    const wrap = h('div', { class: 'animate-in' });
    const header = buildPageHeader('truck', 'Entregas', 'Escolha a farmácia para consultar as entregas.', undefined);
    wrap.appendChild(withBackButton(header, goTo));

    const assistenteRota = buildAssistenteRotaCard(farmaciaAtiva);
    if (assistenteRota) wrap.appendChild(assistenteRota);

    // Badge contadora (estilo notificação do Chat) — número de entregas
    // pendentes de cada farmácia; oculta-se automaticamente quando é 0.
    const pendCount = entregasPendentesPorFarmacia();
    const juncalBadge = pendCount.juncal > 0 ? h('span', { class: 'nav-badge' }, pendCount.juncal > 99 ? '99+' : String(pendCount.juncal)) : null;
    const boaNovaBadge = pendCount.boaNova > 0 ? h('span', { class: 'nav-badge' }, pendCount.boaNova > 99 ? '99+' : String(pendCount.boaNova)) : null;

    const juncalBtn = h('button', { class: 'hub-card hub-card-juncal', onclick: () => trocarFarmacia('Juncal') }, [

// Estima a duração (em minutos) de uma formação a partir do texto livre do
// campo "Duração" (ex: "30min", "1H", "1h30", "45"). Heurística best-effort
// — usada só para o resumo de horas por ano; nunca bloqueia o registo.
function parseDuracaoMinutos(str) {
  if (!str) return 0;
  const s = String(str).toLowerCase().replace(',', '.');
  let minutos = 0;
  const horaMatch = s.match(/(\d+(?:\.\d+)?)\s*h/);
  const minMatch = s.match(/(\d+)\s*min/);
  if (horaMatch) minutos += parseFloat(horaMatch[1]) * 60;
  if (minMatch) minutos += parseInt(minMatch[1], 10);
  if (horaMatch && !minMatch) {
    const restoAposHora = s.match(/h\s*(\d{1,2})(?!\w)/);
    if (restoAposHora) minutos += parseInt(restoAposHora[1], 10);
  }
  if (!horaMatch && !minMatch) {
    const soNumero = s.match(/^(\d+(?:\.\d+)?)$/);
    if (soNumero) minutos += parseFloat(soNumero[1]);
  }
  return minutos;
}
function formatMinutosResumo(totalMin) {
  const hh = Math.floor(totalMin / 60);
  const mm = Math.round(totalMin % 60);
  if (hh && mm) return `${hh}h ${mm}min`;
  if (hh) return `${hh}h`;
  return `${mm}min`;
}
// Utilizadores elegíveis para participar em formações: só perfis de balcão
// (Master, Básico, Administrador) — Estafetas e Prestadores de Serviço
// ficam de fora. STATE.usuarios já só contém utilizadores ativos (o
// carregamento filtra sempre eliminado = false).
const PERFIS_ELEGIVEIS_FORMACAO = ['Master', 'Básico', 'Administrador'];
function usuariosElegiveisFormacao() {
  return (STATE.usuarios || []).filter(u => PERFIS_ELEGIVEIS_FORMACAO.includes(u.perfilNivel));
}
// Seletor dinâmico de participantes (tags/checkboxes) — substitui a antiga
// caixa de texto livre. Guarda-se como lista separada por vírgulas no mesmo
// campo "participantes", mantendo compatibilidade com a coluna existente.
function buildParticipantesField(draft, rerender) {
  const elegiveis = usuariosElegiveisFormacao();
  const selecionados = new Set(String(draft.participantes || '').split(',').map(s => s.trim()).filter(Boolean));
  let tagsEl;
  if (!elegiveis.length) {
    tagsEl = h('p', { class: 'field-helper-text' }, 'Sem colaboradores elegíveis (Master, Básico ou Administrador) disponíveis.');
  } else {
    tagsEl = h('div', { class: 'participante-tags' }, elegiveis.map(u => {
      const nome = u.nomeCompleto || u.username;
      const ativo = selecionados.has(nome);
      const cb = h('input', { type: 'checkbox', checked: ativo });
      cb.addEventListener('change', () => {
        if (cb.checked) selecionados.add(nome); else selecionados.delete(nome);
        draft.participantes = [...selecionados].join(', ');
        rerender();
      });
      return h('label', { class: 'participante-tag' + (ativo ? ' participante-tag-ativo' : '') }, [cb, h('span', {}, nome)]);
    }));
  }
  return h('div', { class: 'field span2' }, [h('label', {}, 'Colaboradores Presentes / Participantes *'), tagsEl]);
}

function buildFormacoesPage(container, goTo) {
  let showForm = false, editingId = null, draft = {}, formError = '', saving = false;
  let selectedIds = new Set();
  let anoFiltro = 'Todos'; // 'Todos' | 'YYYY' — filtro por ano da listagem inferior
  let colaboradorFiltro = 'Todos'; // 'Todos' | nome do colaborador

  function rerender() { clear(container); container.appendChild(build()); }
  function toggleSelect(id) { if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); rerender(); }
  function openNew() { draft = { data: todayISO(), laboratorioEntidade: '', gamaTema: '', duracao: '', regime: 'Presencial', horario: 'Laboral', participantes: '' }; editingId = null; formError = ''; showForm = true; rerender(); }
  function openEditSelected() {
    if (selectedIds.size !== 1) return;
    const f = STATE.formacoes.find(x => x.id === [...selectedIds][0]);
    if (!f) return;
    draft = Object.assign({}, f); editingId = f.id; formError = ''; showForm = true; rerender();
  }
  function cancel() { formError = ''; showForm = false; rerender(); }

  async function submit() {
    const missing = checkFormacaoRequired(draft);
    if (missing.length) { formError = `Por favor, preencha: ${missing.join(', ')}.`; rerender(); return; }
    formError = '';
    draft.responsavel = currentUserName();
    saving = true; rerender();
    if (editingId) {
      const updated = await dbUpdate('formacoes', editingId, draft);
      if (updated) STATE.formacoes = STATE.formacoes.map(f => f.id === editingId ? updated : f);
      else formError = `Não foi possível guardar as alterações. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    } else {
      const created = await dbInsert('formacoes', draft);
      if (created) STATE.formacoes = [created, ...STATE.formacoes];
      else formError = `Não foi possível criar o registo. ${lastDbError || 'Verifique a ligação e tente novamente.'}`;
    }
    saving = false;
    if (!formError) showForm = false;
    rerender();
  }
  function removeSelected() {
    if (selectedIds.size === 0) return;
    const ids = [...selectedIds];
    const plural = ids.length > 1;
    confirmDialog(`ATENÇÃO: Tem a certeza de que quer eliminar permanentemente ${ids.length} registo de formação${plural ? 's' : ''} selecionado${plural ? 's' : ''}? Esta ação não pode ser desfeita!`, async () => {
      const apagados = await bulkSoftDelete('formacoes', ids);
      STATE.formacoes = STATE.formacoes.filter(f => !apagados.has(f.id));
      selectedIds = new Set([...selectedIds].filter(id => !apagados.has(id)));
      rerender();
    }, { danger: true, confirmLabel: 'Eliminar' });
  }

  // Formulário — mesmos campos e estilo visual de sempre, exceto
  // "Participantes", que passa a ser o seletor dinâmico de tags/checkboxes.
  function buildFormacaoForm() {
    const camposSimples = formacoesSchema.filter(f => f.name !== 'participantes');
    const grid = h('div', { class: 'form-grid' }, [
      ...camposSimples.map(f => buildField(f, draft)),
      buildParticipantesField(draft, rerender),
    ]);
    const submitBtn = h('button', {
      class: 'btn btn-primary', onclick: saving ? null : () => requireAuth(submit), disabled: saving ? 'disabled' : undefined,
    }, saving ? 'A guardar…' : (editingId ? 'Guardar alterações' : 'Adicionar registo'));
    const cancelBtn = h('button', { class: 'btn btn-secondary', onclick: cancel }, 'Cancelar');
    const children = [
      h('h3', { class: 'page-eyebrow', style: 'margin-bottom:14px;color:var(--pharm-800);font-size:15px;text-transform:none;letter-spacing:0;' }, editingId ? 'Editar registo' : 'Novo registo'),
      grid,
    ];
    if (formError) children.push(h('p', { class: 'form-error' }, formError));
    children.push(h('div', { class: 'form-actions' }, [submitBtn, cancelBtn]));
    return h('div', { class: 'card card-pad animate-in', style: 'margin-bottom:24px;' }, children);
  }

  // Anos disponíveis (a partir dos registos existentes), mais recente primeiro.
  function anosDisponiveis() {
    return Array.from(new Set(STATE.formacoes.map(f => (f.data || '').slice(0, 4)).filter(Boolean))).sort((a, b) => b.localeCompare(a));
  }
  // Colaboradores disponíveis — extraídos dos "Participantes" de todos os
  // registos (o campo guarda os nomes separados por vírgula).
  function colaboradoresDisponiveis() {
    const nomes = new Set();
    STATE.formacoes.forEach(f => String(f.participantes || '').split(',').map(n => n.trim()).filter(Boolean).forEach(n => nomes.add(n)));
    return Array.from(nomes).sort((a, b) => a.localeCompare(b));
  }
  function formacoesDoAno(ano) {
    return ano === 'Todos' ? STATE.formacoes : STATE.formacoes.filter(f => (f.data || '').startsWith(ano));
  }
  function formacoesFiltradas() {
    let list = formacoesDoAno(anoFiltro);
    if (colaboradorFiltro !== 'Todos') {
      list = list.filter(f => String(f.participantes || '').split(',').map(n => n.trim()).includes(colaboradorFiltro));
    }
    return list;
  }
  function buildAnoTabs() {
    const anos = ['Todos', ...anosDisponiveis()];
    return h('div', { class: 'tabs-row' }, anos.map(ano => h('button', {
      class: 'tab-btn tone-blue' + (anoFiltro === ano ? ' active' : ''),
      onclick: () => { anoFiltro = ano; rerender(); },
    }, [h('span', {}, ano), h('span', { class: 'tab-count' }, String(formacoesDoAno(ano).length))])));
  }
  function buildColaboradorFiltro() {
    const nomes = colaboradoresDisponiveis();
    if (!nomes.length) return null;
    const sel = h('select', { class: 'select', style: 'max-width:260px;' }, [
      h('option', { value: 'Todos' }, 'Todos os colaboradores'),
      ...nomes.map(n => h('option', { value: n, selected: colaboradorFiltro === n ? 'selected' : undefined }, n)),
    ]);
    sel.value = colaboradorFiltro;
    sel.addEventListener('change', () => { colaboradorFiltro = sel.value; rerender(); });
    return h('div', { class: 'field field-sm', style: 'margin-bottom:16px;' }, [h('label', {}, 'Filtrar por Colaborador'), sel]);
  }
  function buildResumoAno(list) {
    const totalMin = list.reduce((soma, f) => soma + parseDuracaoMinutos(f.duracao), 0);
    const texto = list.length === 0
      ? `Sem formações registadas para este filtro.`
      : `${list.length} formaç${list.length === 1 ? 'ão' : 'ões'} · ${formatMinutosResumo(totalMin)} no total${anoFiltro !== 'Todos' ? ` em ${anoFiltro}` : ''}${colaboradorFiltro !== 'Todos' ? ` · ${colaboradorFiltro}` : ''}`;
    return h('p', { class: 'results-count' }, texto);
  }

  function buildTable(list) {
    if (list.length === 0) return EmptyState('Ainda sem formações registadas para este filtro.');
    const thead = h('thead', {}, h('tr', {}, ['', 'Data', 'Laboratório / Entidade', 'Gama / Tema', 'Duração', 'Regime', 'Horário', 'Participantes'].map(t => h('th', {}, t))));
    const tbody = h('tbody', {}, list.map(f => {
      const selected = selectedIds.has(f.id);
      const row = h('tr', { class: 'selectable-row' + (selected ? ' row-selected' : '') }, [
        buildSelectionCheckbox(f.id, selectedIds, toggleSelect),
        h('td', {}, formatDate(f.data)),
        h('td', { class: 'cell-strong' }, f.laboratorioEntidade || '—'),
        h('td', {}, f.gamaTema || '—'),
        h('td', {}, f.duracao || '—'),
        h('td', {}, f.regime || '—'),
        h('td', {}, f.horario || '—'),
        h('td', {}, obsEyeButton(f.participantes)),
      ]);
      return row;
    }));
    return h('div', { class: 'card' }, h('div', { class: 'table-wrap' }, h('table', {}, [thead, tbody])));
  }

  // ---- Exportação formal em PDF/impressão — cabeçalho da farmácia, lista
  // detalhada, somatório de horas, data e assinatura do Diretor Técnico. ----
  function buildRelatorioFormacoesDoc(list) {
    const totalMin = list.reduce((soma, f) => soma + parseDuracaoMinutos(f.duracao), 0);
    const subtitulo = [
      anoFiltro !== 'Todos' ? `Ano: ${anoFiltro}` : null,
      colaboradorFiltro !== 'Todos' ? `Colaborador: ${colaboradorFiltro}` : null,
    ].filter(Boolean).join(' · ') || 'Todos os registos';
    const thead = h('thead', {}, h('tr', {}, ['Data', 'Laboratório / Entidade', 'Gama / Tema', 'Duração', 'Regime', 'Participantes'].map(t => h('th', {}, t))));
    const linhas = list.map(f => h('tr', {}, [
      h('td', {}, formatDate(f.data)),
      h('td', {}, f.laboratorioEntidade || '—'),
      h('td', {}, f.gamaTema || '—'),
      h('td', {}, f.duracao || '—'),
      h('td', {}, f.regime || '—'),
      h('td', {}, f.participantes || '—'),
    ]));
    const totalRow = h('tr', { class: 'doc-table-total' }, [h('td', { colspan: '3' }, 'TOTAL'), h('td', { colspan: '3' }, formatMinutosResumo(totalMin))]);
    const kids = [
      buildDocLetterhead(),
      h('h1', { class: 'doc-title' }, 'Relatório de Formações'),
      h('p', { class: 'doc-body-text', style: 'margin-top:0;' }, subtitulo),
      h('table', { class: 'doc-table' }, [thead, h('tbody', {}, [...linhas, totalRow])]),
    ];
    const rodape = buildDocRodapeComResponsavel('Hugo Cunha - Diretor Técnico Adjunto', todayISO());
    return buildDocA4(kids, rodape);
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    wrap.appendChild(withBackButton(buildPageHeader('graduation', 'Formações', 'Registo e acompanhamento de formações realizadas pela equipa.', STATE.formacoes.length), goTo));

    if (showForm) {
      wrap.appendChild(buildFormacaoForm());
    }

    wrap.appendChild(buildAnoTabs());
    const colabFiltroEl = buildColaboradorFiltro();
    if (colabFiltroEl) wrap.appendChild(colabFiltroEl);
    const list = formacoesFiltradas().slice().sort((a, b) => (b.data || '').localeCompare(a.data || ''));
    wrap.appendChild(buildResumoAno(list));

    if (!showForm) {
      const printBtn = h('button', { class: 'btn btn-secondary', style: 'margin-bottom:16px;' }, [Icon('printer', { size: 14, strokeWidth: 2.2 }), ' Exportar / Imprimir Relatório de Formações']);
      printBtn.addEventListener('click', () => imprimirDocumento(buildRelatorioFormacoesDoc(list)));
      wrap.appendChild(printBtn);
    }

    wrap.appendChild(buildTable(list));

    if (!showForm) {
      wrap.appendChild(buildBottomActionBar({
        selectedCount: selectedIds.size,
        addLabel: 'Nova formação',
        onAdd: openNew,
        onEdit: openEditSelected,
        onDelete: removeSelected,
      }));
    }
    return wrap;
  }

  rerender();
}

   LIXO (Soft delete — registos eliminados de todos os módulos)
================================================================= */
const LIXO_SOURCES = [
  { key: 'manipulados', schema: manipuladosSchema, categoria: 'Manipulados', icon: 'flask', itemField: 'manipulado' },
  { key: 'ortopedia', schema: ortopediaSchema, categoria: 'Ortopedia', icon: 'body', itemField: 'produto' },
  { key: 'ervanaria', schema: ervanariaSchema, categoria: 'Ervanária', icon: 'leaf', itemField: 'produto' },
  { key: 'outros', schema: outrosSchema, categoria: 'Outros Fornecedores', icon: 'package', itemField: 'produto' },
  { key: 'veterinaria', schema: veterinariaSchema, categoria: 'Veterinária', icon: 'paw', itemField: 'produto' },
  { key: 'erros', schema: errosSchema, categoria: 'Erros de Stock', icon: 'alert', itemField: 'produto' },
  { key: 'lembretes', schema: lembretesSchema, categoria: 'Lembretes', icon: 'bell', itemField: 'info' },
  { key: 'reclamacoes', schema: reclamacoesSchema, categoria: 'Reclamações', icon: 'bookOpen', itemField: 'produto' },
  { key: 'eventos', schema: [], categoria: 'Eventos', icon: 'star', itemField: 'label' },
  { key: 'orcamentos', schema: orcamentosSchema, categoria: 'Orçamentos Conhecidos', icon: 'flask', itemField: 'dosagemCapsulas' },
  { key: 'mapa48h', schema: mapa48hSchema, categoria: 'Mapa 48H', icon: 'heartPulseClock', itemField: 'nomeCliente' },
  { key: 'entregas', schema: entregasSchema, categoria: 'Entregas', icon: 'truck', itemField: 'nomeCliente' },
  { key: 'recolhas', schema: recolhasSchema, categoria: 'Recolhas', icon: 'returnBox', itemField: 'nomeProduto' },
  { key: 'tarefas', schema: tarefasSchema, categoria: 'Tarefas', icon: 'clipboard', itemField: 'titulo' },
  { key: 'formacoes', schema: formacoesSchema, categoria: 'Formações', icon: 'graduation', itemField: 'gamaTema' },
  { key: 'desafios', schema: desafiosSchema, categoria: 'Prémios', icon: 'award', itemField: 'tituloDesafio' },
  { key: 'objetivos', schema: objetivosSchema, categoria: 'Objetivos', icon: 'target', itemField: 'titulo' },
];

function buildLixoPage(container, goTo) {
  let loading = true;
  let items = [];
  let searchQuery = '';
  let selectedUids = new Set();

  function rerender() { clear(container); container.appendChild(build()); }
  function toggleSelect(uid) {
    if (selectedUids.has(uid)) selectedUids.delete(uid);
    else selectedUids.add(uid);
    rerender();
  }

  async function loadDeleted() {
    const results = await Promise.all(LIXO_SOURCES.map(src => dbFetchDeleted(src.key)));
    const combined = [];
    LIXO_SOURCES.forEach((src, i) => {
      results[i].forEach(r => {
        let artigo = '';
        if (src.itemField === 'info') {
          artigo = r.info ? (r.info.length > 40 ? r.info.slice(0, 40) + '…' : r.info) : '';
        } else if (src.itemField === 'label') {
          artigo = eventoLabel(r);
        } else {
          artigo = r[src.itemField] || '';
        }
        combined.push({
          uid: `${src.key}-${r.id}`,
          listKey: src.key,
          schema: src.key === 'eventos' ? eventoViewSchema(r) : src.schema,
          categoria: src.categoria,
          responsavel: r.responsavel || '',
          dataEliminacao: r.dataEliminacao,
          artigo,
          record: r,
        });
      });
    });
    combined.sort((a, b) => (b.dataEliminacao || '').localeCompare(a.dataEliminacao || ''));
    items = combined;
    loading = false;
    rerender();
  }

  function visibleItems() {
    const q = searchQuery.trim().toLowerCase();
    if (!q) return items;
    return items.filter(it => [it.categoria, it.responsavel, it.artigo].some(v => (v || '').toLowerCase().includes(q)));
  }

  function permanentDeleteSelected() {
    if (!isAdministrador() || selectedUids.size === 0) return;
    const selecionados = items.filter(x => selectedUids.has(x.uid));
    const plural = selecionados.length > 1;
    confirmDialog(`ATENÇÃO MÁXIMA: esta ação apaga definitivamente ${selecionados.length} registo${plural ? 's' : ''} selecionado${plural ? 's' : ''} — não vai${plural ? 'o' : ''} para lado nenhum, é irreversível. Tem a certeza absoluta?`, async () => {
      const resultados = await Promise.all(selecionados.map(it => dbPermanentDelete(it.listKey, it.record.id)));
      const apagados = new Set(selecionados.filter((it, i) => resultados[i]).map(it => it.uid));
      items = items.filter(x => !apagados.has(x.uid));
      selectedUids = new Set([...selectedUids].filter(uid => !apagados.has(uid)));
      rerender();
    }, { danger: true, confirmLabel: 'Eliminar Selecionados' });
  }

  // Barra própria do Lixo: NÃO existe (propositadamente) nenhuma ação de
  // "restaurar" na app — para nenhum perfil. A única ação possível é Eliminar
  // Selecionados, e essa só existe fisicamente no DOM para o perfil
  // Administrador; para os restantes (Master, Básico), a barra nem aparece.
  function buildLixoActionBar() {
    if (!isAdministrador()) return null;
    const hasSel = selectedUids.size > 0;
    const deleteBtn = h('button', {
      class: 'btn-fab tone-red', onclick: hasSel ? () => requireAuth(permanentDeleteSelected) : null,
      title: 'Eliminar Selecionados', 'aria-label': 'Eliminar Selecionados', disabled: hasSel ? undefined : 'disabled',
    }, Icon('trash', { size: 19, strokeWidth: 2.3 }));
    return h('div', { class: 'bottom-action-bar' }, [
      deleteBtn,
      hasSel ? h('span', { style: 'font-size:12px;font-weight:700;color:var(--pharm-600);' }, `${selectedUids.size} selecionado${selectedUids.size > 1 ? 's' : ''}`) : null,
    ]);
  }

  function buildTable(list) {
    if (list.length === 0) {
      return EmptyState(searchQuery ? 'Nenhum resultado para essa pesquisa.' : 'O lixo está vazio.');
    }
    const thead = h('thead', {}, h('tr', {}, ['', 'Categoria', 'Responsável Inicial', 'Data de Eliminação', 'Artigo / Produto', ''].map((t, i) =>
      h('th', { class: i === 5 ? 'text-right' : '' }, i === 5 ? '' : t)
    )));
    const tbody = h('tbody', {}, list.map(it => {
      const selected = selectedUids.has(it.uid);
      const checkbox = h('input', { type: 'checkbox' });
      checkbox.checked = selected;
      checkbox.addEventListener('click', (e) => { e.stopPropagation(); toggleSelect(it.uid); });
      const viewBtn = h('button', {
        class: 'btn-fab-sm tone-blue', title: 'Visualizar', 'aria-label': 'Visualizar',
      }, Icon('eye', { size: 14, strokeWidth: 2.2 }));
      viewBtn.addEventListener('click', (e) => { e.stopPropagation(); openViewOnlyModal(it.schema, it.record, it.categoria); });
      const row = h('tr', { class: 'selectable-row' + (selected ? ' row-selected' : '') }, [
        h('td', {}, checkbox),
        h('td', {}, it.categoria),
        h('td', { class: 'cell-strong' }, it.responsavel || '—'),
        h('td', {}, formatDateTime(it.dataEliminacao)),
        h('td', {}, it.artigo || '—'),
        h('td', { class: 'text-right' }, viewBtn),
      ]);
      return row;
    }));
    return h('div', { class: 'card' }, h('div', { class: 'table-wrap' }, h('table', {}, [thead, tbody])));
  }

  function build() {
    const wrap = h('div', { class: 'animate-in' });
    wrap.appendChild(withBackButton(buildPageHeader('trash', 'Lixo', 'Histórico de registos eliminados para consulta e auditoria.', loading ? undefined : items.length), goTo));

    if (!isAdministrador()) {
      wrap.appendChild(h('p', { class: 'readonly-notice', style: 'margin-bottom:16px;' }, 'Só o perfil Administrador pode eliminar definitivamente registos do Lixo. O seu perfil só pode consultar os itens aqui listados.'));
    }

    const searchInput = h('input', { class: 'search-input', type: 'text', placeholder: 'Pesquisar por categoria, responsável ou artigo...' });
    searchInput.value = searchQuery;
    const resultsCount = h('p', { class: 'results-count' }, '');
    const resultsContainer = h('div', {});
    function renderResults() {
      if (loading) {
        resultsCount.textContent = '';
        clear(resultsContainer);
        resultsContainer.appendChild(EmptyState('A carregar o lixo…'));
        return;
      }
      const list = visibleItems();
      resultsCount.textContent = `${list.length} resultado${list.length === 1 ? '' : 's'} encontrado${list.length === 1 ? '' : 's'}`;
      clear(resultsContainer);
      resultsContainer.appendChild(buildTable(list));
    }
    searchInput.addEventListener('input', () => { searchQuery = searchInput.value; renderResults(); });

    const searchCard = h('div', { class: 'card card-pad', style: 'margin-bottom:22px;' }, [
      h('div', { class: 'search-row' }, [
        h('div', { class: 'search-input-wrap' }, [h('span', { class: 'icon' }, Icon('search', { size: 15 })), searchInput]),
      ]),
      resultsCount,
    ]);
    wrap.appendChild(searchCard);
    wrap.appendChild(resultsContainer);
    renderResults();

    const lixoBar = buildLixoActionBar();
    if (lixoBar) wrap.appendChild(lixoBar);
    return wrap;
  }

  rerender();
  loadDeleted();
}

const SECTOR_HUBS = [
  { title: 'Pedidos', hubKey: 'hub-pedidos', icon: 'clipboard' },
  { title: 'Documentos', hubKey: 'hub-documentos', icon: 'folder' },
  { title: 'Stocks', hubKey: 'hub-stocks', icon: 'package' },
  { title: 'Gestão', hubKey: 'hub-gestao', icon: 'briefcase' },

  { title: 'Equipa', hubKey: 'hub-equipa', icon: 'users' },
  { title: 'Definições', hubKey: 'hub-definicoes', icon: 'settings' },
];
// Hierarquia em planos/níveis de cada secção da sidebar (Primeiro/Segundo/
// Terceiro Plano), do pedido do utilizador. Secções não listadas aqui caem
// de volta a uma grelha única (ver buildSectorHubPage).
const SECTOR_HUB_TIERS = {
  'Stocks': [
    { label: 'Principal', keys: ['erros', 'recolhas'] },
    { label: 'Ferramentas', keys: ['calculadoras'] },
  ],
  'Gestão': [
    { label: 'Principal', keys: ['eventos', 'mapa48h'] },
    { label: 'Alertas', keys: ['reclamacoes'] },
  ],
  'Equipa': [
    { label: 'Principal', keys: ['objetivos', 'desafios', 'lembretes'] },
    { label: 'Registo', keys: ['mapa-tarefas', 'formacoes'] },
    { label: 'Outros', keys: ['historico-mensagens'] },
  ],
  'Definições': [
    { label: 'Principal', keys: ['definicoes', 'seguranca'] },
    { label: 'Informação', keys: ['sobre'] },
  ],
};
function buildSectorHubPage(container, goTo, sectionTitle, icon) {
  clear(container);
  const section = NAV_SECTIONS.find(s => s.title === sectionTitle);
  const wrap = h('div', { class: 'animate-in' });
  wrap.appendChild(withBackButton(buildPageHeader(icon, sectionTitle, `Escolha uma opção de ${sectionTitle}.`, undefined), goTo));

  function buildCard(item) {
    const goHandler = (item.key === 'definicoes' || item.key === 'seguranca') ? () => requireAuth(() => goTo(item.key)) : () => goTo(item.key);
    return h('button', { class: 'hub-card' + (item.tone ? ' hub-card-' + item.tone : ''), onclick: goHandler }, [
      h('span', { class: 'icon-wrap' }, Icon(item.icon, { size: 40, strokeWidth: 1.6 })),
      h('span', { class: 'label' }, item.label),
    ]);
  }

  const tiers = SECTOR_HUB_TIERS[sectionTitle];
  if (tiers) {
    const itemByKey = {};
    section.items.forEach(it => { itemByKey[it.key] = it; });
    tiers.forEach(tier => {
      const items = tier.keys.map(k => itemByKey[k]).filter(Boolean);
      if (!items.length) return;
      wrap.appendChild(h('div', { class: 'quick-grid hub-tier-row' }, items.map(buildCard)));

// Perfis de acesso restrito (Estafeta, Prestador de Serviço) veem a MESMA
// sidebar completa que todos os outros perfis — mas cada botão a que não
// têm acesso fica visivelmente cinzento/desativado (classe nav-item-disabled
// + atributo disabled), e só o botão da sua própria área fica ativo e
// clicável. Isto substitui a versão anterior, que escondia por completo
// os restantes separadores do DOM.
function buildSidebarContent(onClose, goTo) {
  const navChildren = [];
  const estafeta = isEstafeta();
  const prestadorServico = isPrestadorServico();
  const boaNovaOperador = isBoaNovaOperador();
  const agendaPropria = prestadorServico ? prestadorAgendaDoUtilizador() : null;
  const paginaPropriaPrestador = agendaPropria ? `agenda-${agendaPropria.key}` : null;

  // Página Inicial fica sempre acessível — inclusive para os perfis
  // restritos (é a única página "neutra" para onde podem navegar além da
  // sua área própria; ver a rede de segurança em render()).
  navChildren.push(h('button', { class: 'nav-item nav-item-home' + (STATE.page === 'home' ? ' active' : ''), onclick: () => goTo('home'), title: 'Página Inicial', 'aria-label': 'Página Inicial' }, [
    h('span', { class: 'nav-icon' }, Icon('house', { size: 28 })),
  ]));
  navChildren.push(h('div', { class: 'nav-divider' }));

  NAV_SECTIONS.forEach(section => {
    if (!section.title) return; // Página Inicial já tratada acima
    if (section.items.length === 1) {
      const item = section.items[0];
      // "Conversas" fica completamente invisível para Estafetas, Prestadores
      // de Serviço e o perfil Farmácia Boa Nova — nem sequer aparece
      // cinzento, desaparece da sidebar.
      if (item.key === 'chat' && (estafeta || prestadorServico || boaNovaOperador)) return;
      let allowed = true;
      if (estafeta) allowed = item.key === 'entregas';
      else if (prestadorServico) allowed = false; // só a própria Agenda, tratada no ramo "else" abaixo
      else if (boaNovaOperador) allowed = item.key === 'entregas';
      const active = allowed && STATE.page === item.key;
      const iconSize = item.key === 'chat' ? 24 : 17;
      const btnKids = [h('span', { class: 'nav-icon' }, Icon(item.icon, { size: iconSize })), h('span', {}, section.title)];
      if (item.key === 'chat') {
        const unread = chatUnreadCount();
        if (unread > 0) btnKids.push(h('span', { class: 'nav-badge' }, unread > 99 ? '99+' : String(unread)));
        atualizarBadgeApp();
        atualizarTituloAba();
      }
      navChildren.push(h('button', {
        class: 'nav-item' + (item.key === 'chat' ? ' nav-item-chat' : '') + (active ? ' active' : '') + (allowed ? '' : ' nav-item-disabled'),
        onclick: allowed ? () => requireAuth(() => goTo(item.key)) : null,
        disabled: allowed ? undefined : 'disabled',
        title: allowed ? undefined : 'Sem acesso a esta área',
      }, btnKids));
    } else {
      // "Equipa" (onde vive o Mapa de Tarefas/Responsabilidades) fica
      // completamente invisível para os três perfis restritos — nem sequer
      // aparece cinzento/desativado, tal como já acontece com o "Conversas".
      if (section.title === 'Equipa' && (estafeta || boaNovaOperador || prestadorServico)) return;
      const hub = SECTOR_HUBS.find(s => s.title === section.title);
      const isAgendasHub = section.title === 'Agendas';
      let allowed = true;
      let clickTarget = hub.hubKey;
      if (estafeta) allowed = false;
      else if (prestadorServico) {
        allowed = isAgendasHub && !!paginaPropriaPrestador;
        if (allowed) clickTarget = paginaPropriaPrestador; // vai direto à sua agenda, sem passar pelo hub de seleção
      } else if (boaNovaOperador) allowed = false;
      const activeHub = allowed && (
        STATE.page === clickTarget
        || section.items.some(it => it.key === STATE.page)
        || STATE.page === hub.hubKey
        || (typeof STATE.page === 'string' && STATE.page.indexOf(hub.hubKey + '-') === 0)
      );
      const extraClass = section.title === 'Definições' ? ' nav-item-definicoes' : '';
      navChildren.push(h('button', {
        class: 'nav-item' + extraClass + (activeHub ? ' active' : '') + (allowed ? '' : ' nav-item-disabled'),
        onclick: allowed ? () => requireAuth(() => goTo(clickTarget)) : null,
        disabled: allowed ? undefined : 'disabled',
        title: allowed ? undefined : 'Sem acesso a esta área',
      }, [
        h('span', { class: 'nav-icon' }, Icon(hub.icon, { size: 17 })), h('span', {}, section.title),
      ]));
    }
  });

  const brand = h('div', { class: 'sidebar-brand-logo' }, [
    h('img', { src: SIGA_LOGO_DATA_URI, alt: 'SigaJuncal', class: 'sidebar-logo-img' }),
    onClose ? h('button', { class: 'close-btn close-btn-abs', onclick: onClose }, Icon('x', { size: 16 })) : null,
  ]);
  const badgeSlot = h('div', { class: 'sidebar-badge-slot' }, buildSidebarBadgeSlotContent());
  const footer = h('div', { class: 'sidebar-footer' });
  return [brand, badgeSlot, h('nav', { class: 'nav' }, navChildren), footer];
}

  const root = document.getElementById('root');
  clear(root);

  // A Página Inicial (Mensagem do Dia + Badges + Calendário) é sempre
  // visível sem login individual — só a navegação para os setores e as
  // ações de escrita exigem sessão ativa (ver buildSidebarContent e
  // requireAuth).
  if (!activeUser && STATE.page !== 'home') {
    STATE.page = 'home';
  }

  // Rede de segurança: um Estafeta só pode estar na Página Inicial (restrita,
  // com apenas o botão de Entregas) ou no próprio ecrã de Entregas — qualquer
  // outra página é bloqueada e devolve-o imediatamente a Entregas.
  if (isEstafeta() && STATE.page !== 'entregas' && STATE.page !== 'home') {
    STATE.page = 'entregas';
  }
  // Mesma lógica para o Prestador de Serviço: só a Página Inicial (restrita)
  // ou a sua própria agenda — nunca outra agenda, nem qualquer outra página
  // (incluindo o Chat, que lhes está vedado).
  if (isPrestadorServico()) {
    const agendaPropria = prestadorAgendaDoUtilizador();
    const paginaPropria = agendaPropria ? `agenda-${agendaPropria.key}` : 'home';
    if (STATE.page !== paginaPropria && STATE.page !== 'home') {
      STATE.page = paginaPropria;
    }
  }
  // Perfil Farmácia Boa Nova: entra direta e automaticamente no módulo de
  // Entregas (nem sequer passa pela Página Inicial) — e fica lá preso,
  // sempre fixo na Farmácia Boa Nova (ver farmaciaAtiva em buildEntregasPage).
  if (isBoaNovaOperador() && STATE.page !== 'entregas') {
    STATE.page = 'entregas';
  }

  function goTo(key, preset) { STATE.navFrom = STATE.page; STATE.page = key; STATE.sidebarOpen = false; STATE.consultaPreset = preset || null; render(); }
  function toggleSidebar(open) { STATE.sidebarOpen = open; render(); }

  // de não lidas — assim nunca fica um "1" pendurado depois de já se ter
  // entrado no Chat.
  let handledByAgenda = false;

      case 'mapa-tarefas': buildMapaTarefasPage(pageContainer, goTo); break;

      case 'recolhas': buildRecolhasPage(pageContainer, goTo); break;

async function loadAllData() {
  const keys = Object.keys(TABLES);
  const results = await Promise.all(keys.map(k => dbFetchAll(k)));
  // dbFetchAll() já devolve dados sanitizados (ver rowToRecord), mas volta a
  // passar por sanitizarSupabase() mesmo aqui, no exato ponto em que entra
  // no STATE — garante blindagem total, mesmo que algum dia uma função de
  // leitura nova seja adicionada sem essa sanitização embutida.
  keys.forEach((k, i) => { STATE[k] = sanitizarSupabase(results[i]); });
  STATE.mensagemDia = sanitizarSupabase(await dbFetchMensagemDia());
  await dbCleanupOldChatMessages();
  STATE.mensagensChat = sanitizarSupabase(await dbFetchChat());
  STATE.documentosEmitidos = sanitizarSupabase(await dbFetchDocumentosEmitidos());
}

// Cancela automaticamente pedidos ativos há mais de 6 meses (exceto Resolvido/Cancelado)
const PEDIDO_LIST_KEYS = ['manipulados', 'ortopedia', 'ervanaria', 'veterinaria', 'outros'];
async function autoCancelOldOrders() {
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - 6);
  const cutoffISO = dateToISO(cutoff);

  for (const listKey of PEDIDO_LIST_KEYS) {
    const toCancel = (STATE[listKey] || []).filter(r =>
      r.data && r.data < cutoffISO && r.estado !== 'Resolvido' && r.estado !== 'Cancelado'
    );
    if (toCancel.length === 0) continue;
    const updates = await Promise.all(toCancel.map(r => dbUpdate(listKey, r.id, { estado: 'Cancelado' })));
    STATE[listKey] = STATE[listKey].map(r => {
      const idx = toCancel.findIndex(t => t.id === r.id);
      return (idx >= 0 && updates[idx]) ? updates[idx] : r;
    });
  }
}

function setupRealtime() {
  if (!sb) return;
  Object.keys(TABLES).forEach(listKey => {
    sb.channel('realtime-' + TABLES[listKey])
      .on('postgres_changes', { event: '*', schema: 'public', table: TABLES[listKey] }, async (payload) => {
        // Sanitização explícita, mesmo em cima do que dbFetchAll() já devolve
        // limpo — o STATE nunca recebe diretamente o que vem do Realtime/rede.
        STATE[listKey] = sanitizarSupabase(await dbFetchAll(listKey));
        // Notificação nativa de "Nova Entrega Pendente" — exclusiva da tabela
        // de Entregas e só quando é mesmo um registo novo (INSERT); a
        // verificação de perfil (só Estafeta) acontece dentro da função.
        if (listKey === 'entregas' && payload.eventType === 'INSERT' && payload.new) {
          handleNovaEntregaPendente(sanitizarSupabase(rowToRecord(payload.new)));
        }
        render();
      })
      .subscribe();
  });
  sb.channel('realtime-mensagens_chat')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'mensagens_chat' }, async (payload) => {
      STATE.mensagensChat = sanitizarSupabase(await dbFetchChat());
      if (payload.eventType === 'INSERT' && payload.new) {
        handleNovaMensagemChat(sanitizarSupabase(rowToRecord(payload.new)));
      }
      render();
    })
    .subscribe();
}

/* ---- Presença de utilizadores online (Supabase Realtime Presence) —
   mostra, no Dashboard e no Chat, quem mais da equipa está com sessão
   ativa neste preciso momento noutro posto/dispositivo. ---- */
let presenceChannel = null;
function iniciarPresenca() {
  if (!sb || !activeUser) return;
  if (presenceChannel) { try { sb.removeChannel(presenceChannel); } catch (e) { /* ignora */ } presenceChannel = null; }
  presenceChannel = sb.channel('presenca-equipa', { config: { presence: { key: String(activeUser.id) } } });
  presenceChannel.on('presence', { event: 'sync' }, () => {
    const estado = presenceChannel.presenceState();
    STATE.utilizadoresOnline = sanitizarSupabase(Object.values(estado).map(arr => arr[0]).filter(Boolean));
    refreshSidebarBadges();
    if (STATE.page === 'home' || STATE.page === 'chat') render();
  });
  presenceChannel.subscribe(async (status) => {
    if (status === 'SUBSCRIBED') {
      await presenceChannel.track({ userId: activeUser.id, nome: activeUser.nomeCompleto || activeUser.username });
    }
  });
}
function pararPresenca() {
  if (presenceChannel) { try { sb.removeChannel(presenceChannel); } catch (e) { /* ignora */ } presenceChannel = null; }
  STATE.utilizadoresOnline = [];
}
// Badge/lista compacta de "quem está online" — usado no Dashboard e no Chat.
function buildUtilizadoresOnlineBadge() {
  const lista = (STATE.utilizadoresOnline || []).filter(u => !activeUser || String(u.userId) !== String(activeUser.id));
  if (!lista.length) return null;
  const primeirosNomes = lista.map(u => String(u.nome || '').trim().split(/\s+/)[0]).filter(Boolean);
  const nomesCompletos = lista.map(u => u.nome).join(', ');
  return h('span', { class: 'presenca-online-badge', title: `Online agora: ${nomesCompletos}` }, [
    h('span', { class: 'presenca-dot' }),
    `${lista.length} online`,
    primeirosNomes.length ? h('span', { class: 'presenca-online-nomes' }, `: ${primeirosNomes.join(', ')}`) : null,
  ]);
}
